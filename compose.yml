# rest + admin 두 컨테이너를 같은 이미지(ddit-backend:latest)에서 기동.
# 이미지는 rest 서비스에서 한 번만 빌드, admin 은 그 이미지를 재사용.
services:
  rest:
    build: .
    image: ddit-backend:latest
    environment:
      - APP_JAR=rest.jar
    env_file: .env          # 인스턴스에 둔 .env 의 db_host, jwt_secret 등을 주입
    ports:
      - "8081:8081"
    mem_limit: 2g
    restart: unless-stopped

  admin:
    image: ddit-backend:latest   # rest 가 빌드한 이미지를 그대로 사용 (재빌드 X)
    depends_on:
      - rest
    environment:
      - APP_JAR=admin.jar
    env_file: .env
    ports:
      - "8080:8080"
    mem_limit: 2g
    restart: unless-stopped
