spring.application.name=admin
server.port=8080

spring.config.import=classpath:common-config.properties


spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Gzip 압축 — JS/CSS 파일 전송 크기 60~70% 절감 (첫 로딩 속도 향상)
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# 정적 파일 브라우저 캐시 — vendor 파일은 변경이 없으므로 1년 캐시 (재방문 속도 향상)
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=365d

# 개발 중에는 캐시 비활성화 (변경 사항 즉시 반영)
spring.web.resources.cache.cachecontrol.no-store=true


file.server.base-url=${file_server_url}
file.server.api-key=${file_server_api_key}
