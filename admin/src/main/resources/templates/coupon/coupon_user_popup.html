<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쿠폰 발급 - 회원 선택</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/admin-core.css}" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-white text-slate-800 flex flex-col h-screen overflow-hidden">

  <!-- 헤더 -->
  <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 bg-white shrink-0">
    <div>
      <h1 class="text-sm font-bold text-slate-800">
        <i class="fa-solid fa-ticket mr-2 text-blue-500"></i>쿠폰 발급 - 회원 선택
      </h1>
      <p id="couponNmLabel" class="text-xs text-slate-400 mt-0.5" th:text="${couponNm}">-</p>
    </div>
    <button type="button" onclick="window.close()"
      class="text-slate-400 hover:text-slate-600 text-lg leading-none">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- 검색 -->
  <div class="px-5 py-3 border-b border-slate-100 shrink-0">
    <div class="flex gap-2">
      <input type="text" id="searchInput" class="hm-input flex-1 text-sm"
        placeholder="이름 또는 아이디로 검색..."
        oninput="scheduleSearch()" />
      <button type="button" onclick="doSearch()"
        class="hm-btn-primary text-sm px-4 py-2 whitespace-nowrap">
        <i class="fa-solid fa-magnifying-glass mr-1.5"></i>검색
      </button>
    </div>
  </div>

  <!-- 전체 선택 -->
  <div class="flex items-center gap-2 px-5 py-2 border-b border-slate-100 bg-slate-50 shrink-0">
    <label class="flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"
        class="w-4 h-4 accent-blue-600 rounded" />
      <span class="text-xs font-medium text-slate-500">전체 선택</span>
    </label>
    <span class="ml-auto text-xs text-slate-500">
      <span id="selectedCount" class="font-bold text-blue-600">0</span>명 선택됨
    </span>
  </div>

  <!-- 회원 목록 -->
  <div class="flex-1 overflow-y-auto">
    <table class="w-full text-sm">
      <thead class="sticky top-0 bg-slate-50 border-b border-slate-100">
        <tr class="text-left text-slate-500 text-xs">
          <th class="px-5 py-3 font-semibold w-10"></th>
          <th class="px-4 py-3 font-semibold">아이디</th>
          <th class="px-4 py-3 font-semibold">이름</th>
          <th class="px-4 py-3 font-semibold text-center">권한</th>
        </tr>
      </thead>
      <tbody id="userList">
        <!-- JS로 렌더링 -->
      </tbody>
    </table>
    <div id="emptyMsg" class="hidden py-10 text-center text-sm text-slate-400">
      <i class="fa-solid fa-user-slash text-2xl text-slate-200 mb-2 block"></i>
      검색 결과가 없습니다.
    </div>
    <div id="loadingMsg" class="py-10 text-center text-sm text-slate-400">
      <i class="fa-solid fa-spinner fa-spin mr-1"></i>불러오는 중...
    </div>
  </div>

  <!-- 하단 발급 버튼 -->
  <div class="shrink-0 px-5 py-3 border-t border-slate-100 bg-white flex items-center justify-end gap-3">
    <button type="button" onclick="window.close()" class="hm-btn-ghost">취소</button>
    <button type="button" onclick="submitIssue()" class="hm-btn-primary">
      <i class="fa-solid fa-paper-plane mr-1.5"></i>
      <span id="submitLabel">발급하기</span>
    </button>
  </div>

  <script th:inline="javascript">
    const COUPON_SN = /*[[${couponSn}]]*/ 0;
    let searchTimer = null;

    function scheduleSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(doSearch, 300);
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      document.getElementById('loadingMsg').classList.remove('hidden');
      document.getElementById('emptyMsg').classList.add('hidden');
      document.getElementById('userList').innerHTML = '';
      document.getElementById('selectAll').checked = false;
      updateCount();

      const res = await fetch('/admin/coupon/popup/users/search?q=' + encodeURIComponent(q));
      document.getElementById('loadingMsg').classList.add('hidden');

      if (!res.ok) { document.getElementById('emptyMsg').classList.remove('hidden'); return; }
      const users = await res.json();
      renderUsers(users);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('userList');
      if (!users || users.length === 0) {
        document.getElementById('emptyMsg').classList.remove('hidden');
        return;
      }
      users.forEach(function(u) {
        const roleLabel = u.userRole === 'ROLE_STUDENT' ? '학생' : '일반회원';
        const roleCls   = u.userRole === 'ROLE_STUDENT'
          ? 'bg-indigo-50 text-indigo-600'
          : 'bg-slate-100 text-slate-500';
        const tr = document.createElement('tr');
        tr.className = 'border-t border-slate-100 hover:bg-blue-50/40 transition-colors cursor-pointer';
        tr.dataset.userId = u.userId;
        tr.innerHTML = `
          <td class="px-5 py-3">
            <input type="checkbox" class="user-checkbox w-4 h-4 accent-blue-600 rounded"
              value="${u.userId}" onchange="updateCount()" />
          </td>
          <td class="px-4 py-3 font-mono text-slate-700">${u.userId}</td>
          <td class="px-4 py-3 font-medium text-slate-800">${u.userName ?? '-'}</td>
          <td class="px-4 py-3 text-center">
            <span class="text-xs font-bold px-2 py-0.5 rounded-md ${roleCls}">${roleLabel}</span>
          </td>`;
        tr.addEventListener('click', function(e) {
          if (e.target.type === 'checkbox') return;
          const cb = tr.querySelector('.user-checkbox');
          cb.checked = !cb.checked;
          updateCount();
        });
        tbody.appendChild(tr);
      });
    }

    function toggleSelectAll(master) {
      document.querySelectorAll('.user-checkbox').forEach(function(cb) {
        cb.checked = master.checked;
      });
      updateCount();
    }

    function updateCount() {
      const checked = document.querySelectorAll('.user-checkbox:checked').length;
      const total   = document.querySelectorAll('.user-checkbox').length;
      document.getElementById('selectedCount').textContent = checked;
      document.getElementById('selectAll').checked = total > 0 && checked === total;
      document.getElementById('submitLabel').textContent = checked > 0 ? `${checked}명에게 발급하기` : '발급하기';
    }

    async function submitIssue() {
      const userIds = Array.from(document.querySelectorAll('.user-checkbox:checked')).map(function(cb) { return cb.value; });
      if (userIds.length === 0) { alert('발급할 회원을 선택하세요.'); return; }

      const res = await fetch(`/admin/coupon/${COUPON_SN}/issue/bulk`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userIds })
      });

      if (res.ok) {
        const data = await res.json();
        alert(`${data.count}명에게 쿠폰이 발급되었습니다.`);
        window.close();
      } else {
        const err = await res.json().catch(function() { return null; });
        alert(err?.message || '발급 중 오류가 발생했습니다.');
      }
    }

    // 팝업 열리면 전체 목록 바로 로드
    document.addEventListener('DOMContentLoaded', doSearch);
  </script>
</body>
</html>
