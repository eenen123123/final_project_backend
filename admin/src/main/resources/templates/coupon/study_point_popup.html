<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스터디포인트 등록</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/admin-core.css}" />
  <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-white text-slate-800">

  <!-- 헤더 -->
  <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100 bg-white">
    <div>
      <h1 class="text-sm font-bold text-slate-800">
        <i class="fa-solid fa-star mr-2 text-violet-500"></i>스터디포인트 등록
      </h1>
      <p class="text-xs text-slate-400 mt-0.5">등록 후 회원에게 개별 발급할 수 있습니다.</p>
    </div>
    <button type="button" onclick="window.close()"
      class="text-slate-400 hover:text-slate-600 text-lg leading-none">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- 폼 -->
  <div class="flex-1 px-5 py-4 space-y-5">

    <!-- 포인트 항목명 -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
        포인트 항목명 <span class="text-rose-400">*</span>
      </label>
      <input type="text" id="couponNm" class="hm-input w-full"
        placeholder="예) 이벤트 참여 포인트" maxlength="100" />
    </div>

    <!-- 지급량 -->
    <div>
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
        지급량 (p) <span class="text-rose-400">*</span>
      </label>
      <input type="number" id="discAmt" class="hm-input" placeholder="예) 1000" min="1" style="width:10rem;" />
    </div>

  </div>

  <!-- 하단 버튼 -->
  <div class="px-5 py-3 border-t border-slate-100 bg-white flex items-center justify-end gap-3">
    <button type="button" onclick="window.close()" class="hm-btn-ghost">취소</button>
    <button type="button" onclick="submitInsert()" class="hm-btn-primary">
      <i class="fa-solid fa-plus mr-1.5"></i>등록
    </button>
  </div>

  <script>
    async function submitInsert() {
      const nm  = document.getElementById('couponNm').value.trim();
      const amt = parseInt(document.getElementById('discAmt').value);

      if (!nm) { alert('포인트 항목명을 입력하세요.'); return; }
      if (!amt || amt < 1) { alert('지급량을 1 이상 입력하세요.'); return; }

      const res = await fetch('/admin/coupon/study-point', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ couponNm: nm, discAmt: amt })
      });

      if (res.ok) {
        if (window.opener) {
          window.opener.location.href = window.opener.location.pathname + '#point';
          window.opener.location.reload();
        }
        window.close();
      } else {
        const err = await res.json().catch(() => null);
        alert(err?.message || '등록 중 오류가 발생했습니다.');
      }
    }
  </script>
</body>
</html>
