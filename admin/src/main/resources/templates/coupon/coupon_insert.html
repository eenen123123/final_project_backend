<title th:fragment="pageTitle">쿠폰 등록 | HERMES</title>

<div class="space-y-6 max-w-2xl mx-auto">

  <!-- 헤더 -->
  <div class="flex items-center gap-3">
    <a href="/admin/coupon"
      class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 transition-colors mr-3">
      <i class="fa-solid fa-arrow-left text-sm"></i>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">쿠폰 등록</h1>
      <p class="text-sm text-slate-500 mt-0.5">새 쿠폰을 등록합니다. 등록 후 회원에게 개별 발급할 수 있습니다.</p>
    </div>
  </div>

  <!-- 등록 폼 카드 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm divide-y divide-slate-100">

    <!-- 1. 쿠폰명 -->
    <div class="px-6 py-5">
      <label for="couponNm" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        쿠폰명 <span class="text-rose-400">*</span>
      </label>
      <input type="text" id="couponNm" class="hm-input w-full"
        placeholder="예) 신규 가입 20% 할인 쿠폰" maxlength="100" />
    </div>

    <!-- 2. 할인 방식 -->
    <div class="px-6 py-5">
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        할인 방식 <span class="text-rose-400">*</span>
      </label>
      <div class="flex gap-3">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="discType" value="FIXED" id="discTypeFixed"
            onchange="onDiscTypeChange()" checked
            class="w-4 h-4 accent-blue-600" />
          <span class="text-sm font-medium text-slate-700">정액 (원)</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="discType" value="RATE" id="discTypeRate"
            onchange="onDiscTypeChange()"
            class="w-4 h-4 accent-blue-600" />
          <span class="text-sm font-medium text-slate-700">정률 (%)</span>
        </label>
      </div>

      <!-- 정액 입력 -->
      <div id="fieldFixed" class="mt-3">
        <label for="discAmt" class="block text-xs text-slate-400 mb-1.5">할인 금액 (원)</label>
        <input type="number" id="discAmt" class="hm-input" placeholder="예) 3000" min="1"
          style="width: 12rem;" />
      </div>

      <!-- 정률 입력 -->
      <div id="fieldRate" class="mt-3 hidden">
        <label for="discRate" class="block text-xs text-slate-400 mb-1.5">할인율 (%)</label>
        <input type="number" id="discRate" class="hm-input" placeholder="예) 20" min="1" max="100"
          style="width: 8rem;" />
      </div>
    </div>

    <!-- 3. 사용 가능 범위 -->
    <div class="px-6 py-5">
      <label for="useLimitCd" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        사용 가능 범위
      </label>
      <select id="useLimitCd" class="hm-input" style="width: 12rem;">
        <option value="ALL">전체 (강좌 + 교재)</option>
        <option value="COURSE">강좌만</option>
        <option value="TEXTBOOK">교재만</option>
      </select>
    </div>

    <!-- 4. 유효일수 -->
    <div class="px-6 py-5">
      <label for="validDays" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        유효일수 <span class="text-rose-400">*</span>
        <span class="text-slate-300 font-normal normal-case ml-1">발급일 기준 만료까지의 일수</span>
      </label>
      <input type="number" id="validDays" class="hm-input" placeholder="예) 30" min="1"
        style="width: 8rem;" />
    </div>

    <!-- 푸터 버튼 -->
    <div class="px-6 py-4 bg-slate-50/60 flex items-center justify-end gap-3 rounded-b-2xl">
      <a href="/admin/coupon" class="hm-btn-ghost">취소</a>
      <button type="button" onclick="submitInsert()" class="hm-btn-primary">등록</button>
    </div>

  </div>

</div>

<script th:inline="javascript">
  function onDiscTypeChange() {
    const isFixed = document.getElementById('discTypeFixed').checked;
    document.getElementById('fieldFixed').classList.toggle('hidden', !isFixed);
    document.getElementById('fieldRate').classList.toggle('hidden', isFixed);
  }

  async function submitInsert() {
    const couponNm  = document.getElementById('couponNm').value.trim();
    const discType  = document.querySelector('input[name="discType"]:checked').value;
    const useLimitCd = document.getElementById('useLimitCd').value;
    const validDays = parseInt(document.getElementById('validDays').value);

    if (!couponNm) { alert('쿠폰명을 입력하세요.'); return; }
    if (!validDays || validDays < 1) { alert('유효일수를 1일 이상 입력하세요.'); return; }

    const body = { couponNm, discType, useLimitCd, validDays };

    if (discType === 'FIXED') {
      const discAmt = parseInt(document.getElementById('discAmt').value);
      if (!discAmt || discAmt < 1) { alert('할인 금액을 입력하세요.'); return; }
      body.discAmt = discAmt;
    } else {
      const discRate = parseInt(document.getElementById('discRate').value);
      if (!discRate || discRate < 1 || discRate > 100) { alert('할인율을 1~100 사이로 입력하세요.'); return; }
      body.discRate = discRate;
    }

    const res = await fetch('/admin/coupon/insert', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      location.href = '/admin/coupon';
    } else {
      const err = await res.json().catch(() => null);
      alert(err?.message || '등록 중 오류가 발생했습니다.');
    }
  }
</script>
