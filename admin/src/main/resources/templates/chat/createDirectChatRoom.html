<title th:fragment="pageTitle">1:1 다이렉트 메시지 | HERMES</title>

<div class="space-y-6">
  <!-- 페이지 헤더 -->
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
  >
    <div>
      <h1
        class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2"
      >
        <i class="fa-solid fa-user text-sky-500"></i>
        <span>1:1 다이렉트 메시지</span>
      </h1>
      <p class="text-sm text-slate-500 mt-1">
        대화할 상대를 선택하면 바로 채팅방으로 이동합니다.
      </p>
    </div>
    <a
      href="/admin/chat/room/list"
      class="inline-flex items-center gap-1.5 px-3 py-2 text-sm font-medium text-slate-600 bg-white hover:bg-slate-50 border border-slate-200 rounded-lg transition-colors"
    >
      <i class="fa-solid fa-arrow-left text-xs"></i>
      <span>목록으로</span>
    </a>
  </div>

  <!-- 유저 목록 카드 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
      <i class="fa-solid fa-users text-sky-400 text-xs"></i>
      대화 상대 선택
    </h2>

    <!-- 역할별 그룹 목록 (스크롤 영역) -->
    <div
      class="max-h-[28rem] overflow-y-auto space-y-4 pr-1"
      th:unless="${#maps.isEmpty(groupedAdminUsers)}"
    >
      <div th:each="entry : ${groupedAdminUsers}">
        <!-- 역할 구분 헤더 -->
        <div
          class="flex items-center gap-2 px-1 py-1 sticky top-0 bg-white z-10"
        >
          <span
            class="text-[11px] font-bold text-sky-600 uppercase tracking-wider"
            th:text="${entry.key}"
            >역할</span
          >
          <span
            class="text-[10px] text-slate-400 font-medium"
            th:text="${entry.value.size()} + '명'"
            >0명</span
          >
          <div class="flex-1 h-px bg-slate-100"></div>
        </div>

        <!-- 해당 역할의 유저 목록 -->
        <ul class="space-y-0.5">
          <li th:each="user : ${entry.value}">
            <a
              th:href="@{/admin/chat/room/direct(otherUserId=${user.userId})}"
              class="flex items-center gap-3 py-2.5 px-2 rounded-lg hover:bg-sky-50 transition-colors group"
            >
              <div
                class="w-9 h-9 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center text-sm font-bold shrink-0"
                th:text="${#strings.substring(user.userId, 0, 1).toUpperCase()}"
              >
                U
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1 mb-0.5">
                  <span
                    class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 truncate"
                    th:text="${user.employeeInfo.jbgrNm}"
                    >직급명</span
                  >
                </div>
                <p
                  class="text-sm font-semibold text-slate-800 truncate"
                  th:text="${user.userName}"
                >
                  이름
                </p>
                <p
                  class="text-xs text-slate-400 truncate"
                  th:text="${user.userId}"
                >
                  아이디
                </p>
              </div>
              <i
                class="fa-solid fa-arrow-right text-[10px] text-slate-300 group-hover:text-sky-400 transition-colors shrink-0"
              ></i>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- 대화 가능한 상대 없을 때 -->
    <div
      th:if="${#maps.isEmpty(groupedAdminUsers)}"
      class="py-10 flex flex-col items-center justify-center gap-2 text-center"
    >
      <div
        class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-xl"
      >
        <i class="fa-solid fa-user-slash"></i>
      </div>
      <p class="text-sm text-slate-400">대화 가능한 상대가 없습니다.</p>
    </div>
  </div>
</div>
