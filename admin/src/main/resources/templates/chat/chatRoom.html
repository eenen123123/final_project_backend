<title
  th:fragment="pageTitle"
  th:text="${room != null ? room.roomNm + ' | HERMES' : '채팅방 | HERMES'}"
>
  채팅방 | HERMES
</title>

<th:block th:fragment="pageCss">
  <style>
    .chat-bubble-mine {
      background-color: #7c3aed;
      color: #fff;
      border-radius: 1rem 1rem 0.25rem 1rem;
    }
    .chat-bubble-other {
      background-color: #f1f5f9;
      color: #1e293b;
      border-radius: 1rem 1rem 1rem 0.25rem;
    }
    #chatMessages {
      scroll-behavior: smooth;
    }
    @keyframes msgFadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .msg-enter {
      animation: msgFadeIn 0.18s ease-out;
    }
  </style>
</th:block>

<div class="flex gap-5 h-[calc(100vh-10rem)]">
  <!-- 메시지 영역 -->
  <div
    class="flex flex-col flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden min-w-0"
  >
    <!-- 채팅방 헤더 -->
    <div
      class="flex items-center justify-between px-5 py-4 border-b border-slate-100 shrink-0"
    >
      <div class="flex items-center gap-3">
        <a
          href="/admin/chat/room/list"
          class="text-slate-400 hover:text-slate-600 transition-colors p-1"
        >
          <i class="fa-solid fa-arrow-left text-sm"></i>
        </a>
        <div
          class="w-9 h-9 rounded-xl flex items-center justify-center text-sm shrink-0"
          th:classappend="${room != null and room.roomTypeCd == '01'} ? 'bg-sky-50 text-sky-500' : 'bg-violet-50 text-violet-500'"
        >
          <i
            th:class="${room != null and room.roomTypeCd == '01'} ? 'fa-solid fa-user' : 'fa-solid fa-users'"
          ></i>
        </div>
        <div>
          <p
            class="font-bold text-slate-900 text-sm leading-tight"
            th:text="${room != null ? (room.roomNm != null ? room.roomNm : '1:1 DM') : '채팅방'}"
          >
            채팅방
          </p>
          <p
            class="text-xs text-slate-400"
            th:text="${room != null and room.participants != null ? room.participants.size() + '명 참여 중' : ''}"
          ></p>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <span
          th:if="${room != null and room.roomTypeCd == '01'}"
          class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-sky-50 text-sky-600"
        >
          <i class="fa-solid fa-user text-[10px]"></i> 1:1 DM
        </span>
        <span
          th:if="${room != null and room.roomTypeCd == '02'}"
          class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-violet-50 text-violet-600"
        >
          <i class="fa-solid fa-users text-[10px]"></i> 그룹
        </span>
      </div>
    </div>

    <!-- 메시지 목록 -->
    <div id="chatMessages" class="flex-1 overflow-y-auto px-5 py-4 space-y-4">
      <!-- 메시지 없을 때 -->
      <div
        th:if="${#lists.isEmpty(chatMessages)}"
        data-empty
        class="h-full flex flex-col items-center justify-center gap-3 text-center py-16"
      >
        <div
          class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-xl"
        >
          <i class="fa-regular fa-comment-dots"></i>
        </div>
        <p class="text-sm text-slate-400">
          아직 메시지가 없습니다. 첫 메시지를 보내보세요!
        </p>
      </div>

      <!-- 메시지 반복 -->
      <th:block th:each="msg : ${chatMessages}">
        <!-- 내 메시지 (오른쪽) -->
        <div
          th:if="${msg.sendrUserId == currentUserId}"
          class="flex flex-col items-end gap-1"
          th:attr="data-msg-sn=${msg.msgSn}"
        >
          <div class="flex items-end gap-2">
            <span
              class="text-[10px] text-slate-400 mb-0.5"
              th:text="${msg.sndDt != null ? #temporals.format(msg.sndDt, 'yyyy-MM-dd HH:mm') : ''}"
            ></span>
            <div
              class="chat-bubble-mine px-4 py-2.5 text-sm max-w-xs lg:max-w-sm break-words"
              th:text="${msg.msgCn}"
            >
              메시지 내용
            </div>
          </div>
        </div>

        <!-- 상대방 메시지 (왼쪽) -->
        <div
          th:unless="${msg.sendrUserId == currentUserId}"
          class="flex flex-col items-start gap-1"
          th:attr="data-msg-sn=${msg.msgSn}"
        >
          <div class="flex items-center gap-1.5 pl-1">
            <span
              th:if="${msg.senderRoleName != null}"
              th:class="${msg.senderRoleName == 'ROLE_ADMIN'}
                                ? 'text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-rose-50 text-rose-500'
                                : 'text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500'"
              th:text="${msg.senderRoleName == 'ROLE_ADMIN'} ? '관리자' : ${msg.senderRoleName}"
            ></span>
            <span
              class="text-xs font-semibold text-slate-700"
              th:text="${msg.userName}"
            ></span>
            <span
              class="text-xs text-slate-400"
              th:text="'(' + ${msg.sendrUserId} + ')'"
            ></span>
          </div>
          <div class="flex items-end gap-2">
            <div
              class="chat-bubble-other px-4 py-2.5 text-sm max-w-xs lg:max-w-sm break-words"
              th:text="${msg.msgCn}"
            >
              메시지 내용
            </div>
            <span
              class="text-[10px] text-slate-400 mb-0.5"
              th:text="${msg.sndDt != null ? #temporals.format(msg.sndDt, 'yyyy-MM-dd HH:mm') : ''}"
            ></span>
          </div>
        </div>
      </th:block>
    </div>

    <!-- 메시지 입력창 -->
    <div class="px-4 py-3 border-t border-slate-100 bg-slate-50/50 shrink-0">
      <div
        class="flex items-center gap-2 bg-white rounded-xl border border-slate-200 px-3 py-2 focus-within:border-violet-400 transition-colors"
      >
        <textarea
          id="messageInput"
          rows="1"
          placeholder="메시지를 입력하세요..."
          class="flex-1 resize-none text-sm text-slate-800 placeholder-slate-400 outline-none bg-transparent max-h-28 overflow-y-auto leading-relaxed py-1"
        ></textarea>
        <button
          onclick="sendMessage()"
          class="cursor-pointer shrink-0 w-8 h-8 rounded-lg bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white flex items-center justify-center transition-colors"
        >
          <i class="fa-solid fa-paper-plane text-xs"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- 참여자 목록 사이드바 -->
  <div
    class="w-80 shrink-0 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden flex flex-col"
  >
    <div
      class="px-4 py-3.5 border-b border-slate-100 flex items-center justify-between"
    >
      <div>
        <h3
          class="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-1.5"
        >
          <i class="fa-solid fa-users text-violet-400"></i>
          <span
            >참여자
            <span
              class="text-violet-500"
              th:text="${room != null and room.participants != null ? room.participants.size() : 0}"
              >0</span
            >명
          </span>
        </h3>
      </div>
      <div
        th:if="${room != null and room.roomTypeCd == '02'}"
        class="flex items-center gap-2"
      >
        <span class="text-sm text-violet-500 font-medium">초대하기</span>
      </div>
    </div>
    <ul class="flex-1 overflow-y-auto divide-y divide-slate-50 p-2">
      <li
        th:each="p : ${room?.participants}"
        class="flex items-center gap-2.5 px-2 py-2.5 rounded-lg hover:bg-slate-50 transition-colors"
      >
        <div
          class="w-7 h-7 rounded-full bg-violet-100 text-violet-600 flex items-center justify-center text-xs font-bold shrink-0"
          th:text="${#strings.substring(p.partUserId, 0, 1).toUpperCase()}"
        >
          U
        </div>
        <span
          class="text-sm text-slate-700 font-medium truncate"
          th:text="'[' + ${p.partRoleName} + '] ' + ${p.partUserName} + ' (' + ${p.partUserId} + ')'"
          >참여자</span
        >
      </li>
      <!-- 참여자 없을 때 -->
      <li
        th:if="${room == null or room.participants == null or #lists.isEmpty(room.participants)}"
        class="px-2 py-4 text-xs text-slate-400 text-center"
      >
        참여자 정보 없음
      </li>
    </ul>
  </div>
</div>

<div class="hidden lg:block w-60 shrink-0"></div>
<th:block th:fragment="pageJs">
  <script
    src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
  <script src="/js/chat-room.js"></script>
</th:block>
