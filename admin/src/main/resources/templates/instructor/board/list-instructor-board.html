<title th:fragment="pageTitle">강사 게시판 관리 | HERMES</title>

<link rel="stylesheet" th:href="@{/css/instructor/board.css}" />

<!-- 페이지 헤더 -->
<div class="flex items-center justify-between mb-6">
  <div class="flex items-center gap-2">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">강사 게시판</h1>
      <p class="text-sm text-slate-500 mt-1">공지사항, 질문, 자료를 관리합니다.</p>
    </div>
  </div>
  <a th:href="@{/instructor/board/insertForm(page=${currentPage}, keyword=${keyword}, boardTypeCd=${boardTypeCd}, searchType=${searchType})}" class="hm-btn-primary hm-btn-sky">
    <i class="fa-solid fa-pen-to-square"></i>글쓰기
  </a>
</div>

<!-- 탭 -->
<div class="board-tabs">
  <a th:href="@{/instructor/board/list(keyword=${keyword}, searchType=${searchType})}"
     th:classappend="${boardTypeCd == ''} ? ' active'" class="board-tab">전체</a>
  <a th:each="type : ${boardTypes}"
     th:href="@{/instructor/board/list(boardTypeCd=${type.comCd}, keyword=${keyword}, searchType=${searchType})}"
     th:classappend="${type.comCd == boardTypeCd} ? ' active'"
     th:text="${type.comCdNm}"
     class="board-tab"></a>
</div>

<!-- 검색 + 건수 -->
<div class="board-filter">
  <form method="get" action="/instructor/board/list" style="display:contents;">
    <input type="hidden" name="boardTypeCd" th:value="${boardTypeCd}" />
    <select name="searchType" class="hm-input hm-input-sky" style="width:auto; min-width:110px;">
      <option value=""        th:selected="${searchType == ''}">전체</option>
      <option value="title"        th:selected="${searchType == 'title'}">제목</option>
      <option value="content"      th:selected="${searchType == 'content'}">내용</option>
      <option value="titleContent" th:selected="${searchType == 'titleContent'}">제목+내용</option>
      <option value="writer"       th:selected="${searchType == 'writer'}">작성자</option>
    </select>
    <input type="text" name="keyword" th:value="${keyword}" placeholder="검색어를 입력하세요" class="hm-input hm-input-sky"
      style="width:220px;" />
    <button type="submit" class="hm-btn-primary hm-btn-sky">
      <i class="fa-solid fa-magnifying-glass"></i>검색
    </button>
    <a th:if="${keyword != ''}"
       th:href="@{/instructor/board/list(boardTypeCd=${boardTypeCd})}"
       class="btn-filter-reset">
      <i class="fa-solid fa-xmark mr-0.5"></i>초기화
    </a>
    <span class="board-filter-count">
      <strong th:text="${totalCount}">0</strong>건<th:block th:if="${keyword != ''}"> · 검색 결과</th:block>
    </span>
  </form>
</div>

<div class="board-list">
  <div class="board-list-header">
    <span>번호</span><span>분류</span><span>제목</span><span>조회</span><span>작성자</span><span>등록일</span>
  </div>

  <!-- 빈 목록 -->
  <div th:if="${#lists.isEmpty(boardList)}" class="board-empty">
    <i class="fa-regular fa-folder-open"></i>
    <p th:if="${keyword != '' or boardTypeCd != ''}">검색 결과가 없습니다.</p>
    <p th:unless="${keyword != '' or boardTypeCd != ''}">등록된 게시글이 없습니다.</p>
  </div>

  <!-- 게시글 목록 -->
  <a th:each="board : ${boardList}"
     th:href="@{/instructor/board/detail/{sn}(sn=${board.postSn}, page=${currentPage}, keyword=${keyword}, boardTypeCd=${boardTypeCd}, searchType=${searchType})}"
     th:classappend="${board.useYn == 'N'} ? ' deleted'" class="board-item">
    <span class="board-item-no" th:text="${board.displayNo}"></span>
    <span>
      <span th:if="${board.boardTypeCd == 'NOTICE'}" class="badge badge-notice" th:text="${board.boardTypeNm}"></span>
      <span th:if="${board.boardTypeCd == 'QNA'}" class="badge badge-qna" th:text="${board.boardTypeNm}"></span>
      <span th:if="${board.boardTypeCd == 'DATAROOM'}" class="badge badge-dataroom" th:text="${board.boardTypeNm}"></span>
    </span>
    <span class="board-item-title">
      <span th:if="${board.useYn == 'N'}" class="deleted-tag">삭제됨</span>
      <span th:classappend="${board.useYn == 'N'} ? ' strikethrough'" th:text="${board.title}"></span>
    </span>
    <span class="board-item-no" th:text="${board.inqCnt != null ? board.inqCnt : 0}"></span>
    <span class="board-item-author" th:text="${board.userName}"></span>
    <span class="board-item-date" th:text="${board.regDt}"></span>
  </a>
</div>

<!-- 페이지네이션 -->
<div th:if="${totalPages > 1}" class="board-pagination">
  <a th:if="${currentPage > 1}"
    th:href="@{/instructor/board/list(page=${currentPage - 1}, keyword=${keyword}, boardTypeCd=${boardTypeCd}, searchType=${searchType})}">
    <i class="fa-solid fa-chevron-left text-xs"></i>
  </a>
  <span th:unless="${currentPage > 1}" class="disabled">
    <i class="fa-solid fa-chevron-left text-xs"></i>
  </span>

  <th:block th:with="startPage=${T(java.lang.Math).max(1, currentPage - 2)},
                     endPage=${T(java.lang.Math).min(totalPages, currentPage + 2)}">
    <th:block th:each="p : ${#numbers.sequence(startPage, endPage)}">
      <a th:if="${p != currentPage}"
        th:href="@{/instructor/board/list(page=${p}, keyword=${keyword}, boardTypeCd=${boardTypeCd}, searchType=${searchType})}"
        th:text="${p}"></a>
      <span th:if="${p == currentPage}" class="current" th:text="${p}"></span>
    </th:block>
  </th:block>

  <a th:if="${currentPage < totalPages}"
    th:href="@{/instructor/board/list(page=${currentPage + 1}, keyword=${keyword}, boardTypeCd=${boardTypeCd}, searchType=${searchType})}">
    <i class="fa-solid fa-chevron-right text-xs"></i>
  </a>
  <span th:unless="${currentPage < totalPages}" class="disabled">
    <i class="fa-solid fa-chevron-right text-xs"></i>
  </span>
</div>
