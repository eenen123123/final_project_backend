<link rel="stylesheet" th:href="@{/css/instructor/board.css}" />

<!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-2">
      <div class="w-1 h-7 rounded-full bg-sky-500"></div>
      <div>
        <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
          <span class="text-sky-500 font-medium">강사 게시판</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">게시글 상세</h1>
        <p class="text-sm text-slate-500 mt-0.5">게시글 내용을 확인하고 관리합니다.</p>
      </div>
    </div>
    <div class="flex gap-2">
      <!-- 활성 게시글: 수정 + 삭제 버튼 -->
      <th:block th:if="${board.useYn != 'N'}">
        <a
          th:href="@{/instructor/board/updateForm/{postSn}(postSn=${board.postSn}, page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd})}"
          class="hm-btn-primary hm-btn-sky text-base"
        >
          <i class="fa-solid fa-pen"></i>
          수정
        </a>
        <form
          id="deleteForm"
          th:action="@{/instructor/board/delete/{postSn}(postSn=${board.postSn})}"
          method="post"
        >
          <button
            type="button"
            onclick="openDeleteModal()"
            class="hm-btn-danger bg-red-500 hover:bg-red-600 text-base"
          >
            <i class="fa-solid fa-trash"></i>
            삭제
          </button>
        </form>
      </th:block>
      <!-- 삭제된 게시글: 복구 버튼 -->
      <th:block th:if="${board.useYn == 'N'}">
        <form
          th:action="@{/instructor/board/restore/{postSn}(postSn=${board.postSn})}"
          method="post"
        >
          <button type="submit" class="hm-btn-primary hm-btn-emerald text-base">
            <i class="fa-solid fa-rotate-left"></i>
            복구
          </button>
        </form>
      </th:block>
      <a th:href="@{/instructor/board/list(page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd})}"
         class="hm-btn-secondary text-base">
        <i class="fa-solid fa-list"></i>
        목록으로
      </a>
    </div>
  </div>


  <!-- 성공 메시지 -->
  <div
    th:if="${successMessage}"
    class="mb-4 rounded-xl border border-green-200 bg-green-50 px-5 py-3 text-sm text-green-600"
  >
    <i class="fa-solid fa-circle-check mr-1"></i>
    <span th:text="${successMessage}"></span>
  </div>

  <!-- 게시글 상세 카드 -->
  <div
    class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
    th:classappend="${board.useYn == 'N'} ? 'opacity-60'"
  >
    <!-- 제목 영역 -->
    <div class="border-b border-slate-100 px-8 py-6">
      <div class="flex items-center gap-3">
        <span
          th:if="${board.useYn == 'N'}"
          class="inline-block rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-500"
          >삭제됨</span
        >
        <h2
          class="text-xl font-semibold text-slate-800"
          th:classappend="${board.useYn == 'N'} ? 'line-through text-slate-400'"
          th:text="${board.title}"
        ></h2>
      </div>
      <div class="mt-3 flex items-center gap-4 text-sm text-slate-500">
        <span
          th:if="${board.boardTypeCd == 'NOTICE'}"
          class="inline-block rounded-full bg-sky-100 px-2.5 py-0.5 text-xs font-semibold text-sky-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span
          th:if="${board.boardTypeCd == 'QNA'}"
          class="inline-block rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-semibold text-amber-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span
          th:if="${board.boardTypeCd == 'DATAROOM'}"
          class="inline-block rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-semibold text-emerald-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span>
          <i class="fa-regular fa-user mr-1"></i>
          <span th:text="${board.userName}"></span>
        </span>
        <span>
          <i class="fa-regular fa-calendar mr-1"></i>
          <span th:text="${board.regDt}"></span>
        </span>
      </div>
    </div>

    <!-- 본문 영역 -->
    <div
      class="min-h-64 px-8 py-6 text-base leading-relaxed text-slate-700"
      th:utext="${board.content}"
    ></div>
  </div>

  <!-- Q&A 답변 섹션 -->
  <div th:if="${board.boardTypeCd == 'QNA'}" class="mt-6 overflow-hidden rounded-2xl border border-amber-200 bg-amber-50 shadow-sm">
    <div class="border-b border-amber-200 px-8 py-4">
      <h3 class="text-base font-semibold text-amber-800">
        <i class="fa-solid fa-reply mr-2"></i>답변
        <span th:if="${board.answer != null and board.answer.answYn == 'Y'}"
              class="ml-2 inline-block rounded-full bg-amber-200 px-2.5 py-0.5 text-xs font-semibold text-amber-800">답변 완료</span>
        <span th:unless="${board.answer != null and board.answer.answYn == 'Y'}"
              class="ml-2 inline-block rounded-full bg-slate-200 px-2.5 py-0.5 text-xs font-semibold text-slate-500">미답변</span>
      </h3>
    </div>

    <!-- 기존 답변 표시 (수정 토글 포함) -->
    <div th:if="${board.answer != null and board.answer.answYn == 'Y'}" class="px-8 py-6">
      <div id="answerView">
        <div class="mb-2 flex items-center justify-between">
          <div class="flex items-center gap-3 text-sm text-slate-500">
            <span><i class="fa-regular fa-user mr-1"></i><span th:text="${board.answer.answrUserNm}"></span></span>
            <span><i class="fa-regular fa-calendar mr-1"></i><span th:text="${board.answer.answDt}"></span></span>
          </div>
          <button type="button" onclick="toggleAnswerEdit()" class="hm-btn-secondary text-sm">
            <i class="fa-solid fa-pen mr-1"></i>수정
          </button>
        </div>
        <p class="whitespace-pre-wrap text-base leading-relaxed text-slate-700" th:text="${board.answer.answCn}"></p>
      </div>
      <form id="answerEditForm" class="hidden"
            th:action="@{/instructor/board/answer/{postSn}(postSn=${board.postSn})}" method="post">
        <textarea name="answCn" rows="5" required
                  th:text="${board.answer.answCn}"
                  class="w-full rounded-xl border border-amber-300 bg-white px-4 py-3 text-sm text-slate-700 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-100"></textarea>
        <div class="mt-3 flex justify-end gap-2">
          <button type="button" onclick="toggleAnswerEdit()" class="hm-btn-secondary text-sm">취소</button>
          <button type="submit" class="hm-btn-primary hm-btn-sky text-sm">
            <i class="fa-solid fa-paper-plane mr-1"></i>답변 수정
          </button>
        </div>
      </form>
    </div>

    <!-- 답변 입력 폼 (미답변 상태일 때만) -->
    <div th:unless="${board.answer != null and board.answer.answYn == 'Y'}" class="px-8 py-6">
      <form th:action="@{/instructor/board/answer/{postSn}(postSn=${board.postSn})}" method="post">
        <textarea name="answCn" rows="5" required
                  placeholder="답변을 입력하세요."
                  class="w-full rounded-xl border border-amber-300 bg-white px-4 py-3 text-sm text-slate-700 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-100"></textarea>
        <div class="mt-3 flex justify-end">
          <button type="submit" class="hm-btn-primary hm-btn-sky text-sm">
            <i class="fa-solid fa-paper-plane mr-1"></i>답변 등록
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div
  id="deleteModal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm"
>
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center gap-3">
      <div
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-100"
      >
        <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
      </div>
      <h3 class="text-base font-semibold text-slate-800">게시글 삭제</h3>
    </div>
    <p class="mb-6 text-sm text-slate-500">
      삭제된 게시글은 목록에서 숨겨지며,<br />상세 페이지에서 복구할 수
      있습니다.
    </p>
    <div class="flex justify-end gap-2">
      <button
        type="button"
        onclick="closeDeleteModal()"
        class="hm-btn-secondary bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm"
      >
        취소
      </button>
      <button
        type="button"
        onclick="document.getElementById('deleteForm').submit()"
        class="hm-btn-danger bg-red-500 hover:bg-red-600 text-sm"
      >
        <i class="fa-solid fa-trash"></i>
        삭제
      </button>
    </div>
  </div>
</div>

<script>
  function toggleAnswerEdit() {
    document.getElementById("answerView").classList.toggle("hidden");
    document.getElementById("answerEditForm").classList.toggle("hidden");
  }
  function openDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }
  function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }
  document
    .getElementById("deleteModal")
    .addEventListener("click", function (e) {
      if (e.target === this) closeDeleteModal();
    });
</script>
