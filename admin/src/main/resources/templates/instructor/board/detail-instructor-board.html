<title th:fragment="pageTitle">강사 게시판 관리 | HERMES</title>
<link rel="stylesheet" th:href="@{/css/instructor/instructor-board.css}" />

<!-- 페이지 헤더 -->
<div class="flex items-center justify-between mb-6">
  <div class="flex items-center gap-2">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">게시글 상세</h1>
      <p class="text-sm text-slate-500 mt-1">게시글 내용을 확인하고 관리합니다.</p>
    </div>
  </div>
  <div class="flex gap-2">
    <!-- 활성 게시글: 수정(Q&A 제외) + 삭제 버튼 -->
    <th:block th:if="${board.useYn != 'N'}">
      <a th:unless="${board.boardTypeCd == 'QNA'}"
        th:href="@{/instructor/board/updateForm/{postSn}(postSn=${board.postSn}, page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd}, searchType=${listSearchType})}"
        class="hm-btn-primary hm-btn-sky text-base">
        <i class="fa-solid fa-pen"></i>
        수정
      </a>
      <form id="deleteForm" th:action="@{/instructor/board/delete/{postSn}(postSn=${board.postSn})}" method="post">
        <input type="hidden" name="listPage" th:value="${listPage}" />
        <input type="hidden" name="listKeyword" th:value="${listKeyword}" />
        <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd}" />
        <input type="hidden" name="listSearchType" th:value="${listSearchType}" />
        <button type="button" onclick="openDeleteModal()" class="hm-btn-danger bg-red-500 hover:bg-red-600 text-base">
          <i class="fa-solid fa-trash"></i>
          삭제
        </button>
      </form>
    </th:block>
    <!-- 삭제된 게시글: 복구 버튼 -->
    <th:block th:if="${board.useYn == 'N'}">
      <form th:action="@{/instructor/board/restore/{postSn}(postSn=${board.postSn})}" method="post">
        <input type="hidden" name="listPage" th:value="${listPage}" />
        <input type="hidden" name="listKeyword" th:value="${listKeyword}" />
        <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd}" />
        <input type="hidden" name="listSearchType" th:value="${listSearchType}" />
        <button type="submit" class="hm-btn-primary hm-btn-emerald text-base">
          <i class="fa-solid fa-rotate-left"></i>
          복구
        </button>
      </form>
    </th:block>
    <a th:href="@{/instructor/board/list(page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd}, searchType=${listSearchType})}"
      class="hm-btn-secondary text-base">
      <i class="fa-solid fa-list"></i>
      목록으로
    </a>
  </div>
</div>

<!-- 성공 메시지 -->
<div th:if="${successMessage}"
  class="mb-4 rounded-xl border border-green-200 bg-green-50 px-5 py-3 text-sm text-green-600">
  <i class="fa-solid fa-circle-check mr-1"></i>
  <span th:text="${successMessage}"></span>
</div>
<!-- 오류 메시지 -->
<div th:if="${errorMessage}" class="mb-4 rounded-xl border border-red-200 bg-red-50 px-5 py-3 text-sm text-red-600">
  <i class="fa-solid fa-circle-exclamation mr-1"></i>
  <span th:text="${errorMessage}"></span>
</div>

<!-- 게시글 상세 카드 -->
<div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
  th:classappend="${board.useYn == 'N'} ? 'opacity-60'">
  <!-- 제목 영역 -->
  <div class="border-b border-slate-100 px-8 py-6">
    <div class="flex items-center gap-3">
      <span th:if="${board.useYn == 'N'}"
        class="inline-block rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-500">삭제됨</span>
      <h2 class="text-xl font-semibold text-slate-800"
        th:classappend="${board.useYn == 'N'} ? 'line-through text-slate-400'" th:text="${board.title}"></h2>
    </div>
    <div class="mt-3 flex items-center gap-4 text-sm text-slate-500">
      <span th:if="${board.boardTypeCd == 'NOTICE'}"
        class="inline-block rounded-full bg-sky-100 px-2.5 py-0.5 text-xs font-semibold text-sky-700"
        th:text="${board.boardTypeNm}"></span>
      <span th:if="${board.boardTypeCd == 'QNA'}"
        class="inline-block rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-semibold text-amber-700"
        th:text="${board.boardTypeNm}"></span>
      <span th:if="${board.boardTypeCd == 'DATAROOM'}"
        class="inline-block rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-semibold text-emerald-700"
        th:text="${board.boardTypeNm}"></span>
      <span>
        <i class="fa-regular fa-user mr-1"></i>
        <span th:text="${board.userName}"></span>
      </span>
      <span>
        <i class="fa-regular fa-calendar mr-1"></i>
        <span th:text="${board.regDt}"></span>
      </span>
    </div>
  </div>

  <!-- 본문 영역 -->
  <div class="board-content min-h-64 px-8 py-6 text-base" th:utext="${board.content}"></div>
</div>
<script>
  document.querySelectorAll('.board-content img[data-file-id]').forEach(function (img) {
    img.src = '/admin/files/' + img.dataset.fileId + '/view';
  });
</script>

<!-- 첨부파일 섹션 -->
<div th:if="${board.files != null and not #lists.isEmpty(board.files)}"
  class="mt-4 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-100 px-8 py-4">
    <h3 class="text-sm font-semibold text-slate-700">
      <i class="fa-solid fa-paperclip mr-2 text-slate-400"></i>첨부파일
      <span class="ml-1 text-slate-400" th:text="'(' + ${#lists.size(board.files)} + ')'"></span>
    </h3>
  </div>
  <ul class="divide-y divide-slate-100">
    <li th:each="f : ${board.files}" class="flex items-center gap-3 px-8 py-3 text-sm text-slate-700">
      <i class="fa-solid fa-file text-slate-400"></i>
      <span class="flex-1 truncate" th:text="${f.orgnFileNm}"></span>
      <span class="text-xs text-slate-400"
        th:text="${#numbers.formatDecimal(f.fileSizeCnt / 1024.0, 1, 1) + ' KB'}"></span>
      <a th:href="@{/admin/files/{id}/download(id=${f.fileServerId})}"
        class="flex items-center gap-1 text-xs text-sky-500 hover:text-sky-700">
        <i class="fa-solid fa-download"></i>다운로드
      </a>
    </li>
  </ul>
</div>

<!-- Q&A 답변 섹션 -->
<div th:if="${board.boardTypeCd == 'QNA' and board.useYn != 'N'}"
  class="mt-6 overflow-hidden rounded-2xl border border-amber-200 bg-amber-50 shadow-sm">
  <div class="border-b border-amber-200 px-8 py-4">
    <h3 class="text-base font-semibold text-amber-800">
      <i class="fa-solid fa-reply mr-2"></i>답변
      <span th:if="${board.answer != null and board.answer.answYn == 'Y'}"
        class="ml-2 inline-block rounded-full bg-amber-200 px-2.5 py-0.5 text-xs font-semibold text-amber-800">답변
        완료</span>
      <span th:unless="${board.answer != null and board.answer.answYn == 'Y'}"
        class="ml-2 inline-block rounded-full bg-slate-200 px-2.5 py-0.5 text-xs font-semibold text-slate-500">미답변</span>
    </h3>
  </div>

  <!-- 기존 답변 표시 (수정 토글 포함) -->
  <div th:if="${board.answer != null and board.answer.answYn == 'Y'}" class="px-8 py-6">
    <div id="answerView">
      <div class="mb-2 flex items-center justify-between">
        <div class="flex items-center gap-3 text-sm text-slate-500">
          <span><i class="fa-regular fa-user mr-1"></i><span th:text="${board.answer.answrUserNm}"></span></span>
          <span><i class="fa-regular fa-calendar mr-1"></i><span th:text="${board.answer.answDt}"></span></span>
        </div>
        <button type="button" onclick="toggleAnswerEdit()" class="hm-btn-secondary text-sm">
          <i class="fa-solid fa-pen mr-1"></i>수정
        </button>
      </div>
      <div id="answerViewContent" class="board-content text-base leading-relaxed text-slate-700"
        th:utext="${board.answer.answCn}"></div>
    </div>
    <form id="answerEditForm" class="hidden" th:action="@{/instructor/board/answer/{postSn}(postSn=${board.postSn})}"
      method="post">
      <input type="hidden" name="listPage" th:value="${listPage}" />
      <input type="hidden" name="listKeyword" th:value="${listKeyword}" />
      <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd}" />
      <input type="hidden" name="listSearchType" th:value="${listSearchType}" />
      <input type="hidden" name="answCn" id="answCnEdit" />
      <div id="answerEditEditor" class="answer-editor mb-3"></div>
      <div class="mt-3 flex justify-end gap-2">
        <button type="button" onclick="toggleAnswerEdit()" class="hm-btn-secondary text-sm">취소</button>
        <button type="button" onclick="submitAnswerEdit()" class="hm-btn-primary hm-btn-sky text-sm">
          <i class="fa-solid fa-paper-plane mr-1"></i>답변 수정
        </button>
      </div>
    </form>
  </div>

  <!-- 답변 입력 폼 (미답변 상태일 때만) -->
  <div th:unless="${board.answer != null and board.answer.answYn == 'Y'}" class="px-8 py-6">
    <form id="answerNewForm" th:action="@{/instructor/board/answer/{postSn}(postSn=${board.postSn})}" method="post">
      <input type="hidden" name="listPage" th:value="${listPage}" />
      <input type="hidden" name="listKeyword" th:value="${listKeyword}" />
      <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd}" />
      <input type="hidden" name="listSearchType" th:value="${listSearchType}" />
      <input type="hidden" name="answCn" id="answCnNew" />
      <div id="answerNewEditor" class="answer-editor mb-3"></div>
      <div class="mt-3 flex justify-end">
        <button type="button" onclick="submitAnswerNew()" class="hm-btn-primary hm-btn-sky text-sm">
          <i class="fa-solid fa-paper-plane mr-1"></i>답변 등록
        </button>
      </div>
    </form>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center gap-3">
      <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-100">
        <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
      </div>
      <h3 class="text-base font-semibold text-slate-800">게시글 삭제</h3>
    </div>
    <p class="mb-6 text-sm text-slate-500">
      삭제된 게시글은 목록에서 숨겨지며,<br />상세 페이지에서 복구할 수
      있습니다.
    </p>
    <div class="flex justify-end gap-2">
      <button type="button" onclick="closeDeleteModal()"
        class="hm-btn-secondary bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm">
        취소
      </button>
      <button type="button" onclick="document.getElementById('deleteForm').submit()"
        class="hm-btn-danger bg-red-500 hover:bg-red-600 text-sm">
        <i class="fa-solid fa-trash"></i>
        삭제
      </button>
    </div>
  </div>
</div>

<script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
<script th:inline="javascript">
  const existingAnswerContent = /*[[${board.answer?.answCn}]]*/ null;
</script>
<script>
  let editEditor = null;
  let newEditor = null;

  document.addEventListener('DOMContentLoaded', function () {
    // TipTap 도입 이전 plain text 데이터의 줄바꿈(\n) 복원
    const answerViewContent = document.getElementById('answerViewContent');
    if (answerViewContent && !answerViewContent.querySelector('p, h1, h2, h3, ul, ol, blockquote')) {
      answerViewContent.innerHTML = answerViewContent.textContent.replace(/\n/g, '<br>');
    }

    // 답변 수정 에디터 (hidden 상태로 초기화 — toggleAnswerEdit 시 표시)
    if (document.getElementById('answerEditEditor')) {
      editEditor = TipTapEditor.mount('answerEditEditor', {
        editable: true,
        outputInputId: 'answCnEdit',
        imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
      });
      // 기존 답변 내용 복원 (HTML 또는 plain text)
      if (existingAnswerContent) {
        const t = setInterval(() => {
          const el = document.querySelector('#answerEditEditor .tiptap');
          if (el && el.editor) {
            el.editor.commands.setContent(existingAnswerContent);
            clearInterval(t);
          }
        }, 50);
        setTimeout(() => clearInterval(t), 3000);
      }
    }

    // 신규 답변 에디터
    if (document.getElementById('answerNewEditor')) {
      newEditor = TipTapEditor.mount('answerNewEditor', {
        editable: true,
        outputInputId: 'answCnNew',
        imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
      });
    }
  });

  function submitAnswerEdit() {
    const el = document.querySelector('#answerEditEditor .tiptap');
    if (el && el.editor) {
      if (!el.editor.getText().trim()) {
        alert('답변 내용을 입력해주세요.');
        return;
      }
      document.getElementById('answCnEdit').value = el.editor.getHTML();
    }
    document.getElementById('answerEditForm').submit();
  }

  function submitAnswerNew() {
    const el = document.querySelector('#answerNewEditor .tiptap');
    if (el && el.editor) {
      if (!el.editor.getText().trim()) {
        alert('답변 내용을 입력해주세요.');
        return;
      }
      document.getElementById('answCnNew').value = el.editor.getHTML();
    }
    document.getElementById('answerNewForm').submit();
  }

  function toggleAnswerEdit() {
    document.getElementById("answerView").classList.toggle("hidden");
    document.getElementById("answerEditForm").classList.toggle("hidden");
  }
  function openDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }
  function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }
  document
    .getElementById("deleteModal")
    .addEventListener("click", function (e) {
      if (e.target === this) closeDeleteModal();
    });
</script>
