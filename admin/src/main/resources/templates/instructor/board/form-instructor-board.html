<link rel="stylesheet" th:href="@{/css/instructor/board.css}" />

<!-- 페이지 헤더 -->
<div class="flex items-center justify-between mb-6">
  <div class="flex items-center gap-2">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight"
          th:text="${board?.postSn != null} ? '게시글 수정' : '게시글 작성'"></h1>
      <p class="text-sm text-slate-500 mt-1">강의 관련 공지, 질문, 자료를 등록합니다.</p>
    </div>
  </div>
  <a th:href="@{/instructor/board/list(page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd})}"
     class="hm-btn-secondary text-base">
    <i class="fa-solid fa-list"></i>
    목록으로
  </a>
</div>

<!-- 에러 메시지 -->
<div th:if="${errorMessage}"
     class="mb-4 rounded-xl border border-red-200 bg-red-50 px-5 py-3 text-sm text-red-600">
  <i class="fa-solid fa-circle-exclamation mr-1"></i>
  <span th:text="${errorMessage}"></span>
</div>

<!-- 작성 폼 -->
<form th:action="@{${board?.postSn != null ? '/instructor/board/update' : '/instructor/board/insert'}}"
      method="post"
      enctype="multipart/form-data"
      class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <input type="hidden" name="postSn" th:if="${board?.postSn != null}" th:value="${board?.postSn}" />
  <input type="hidden" name="atchFileId" th:if="${board?.atchFileId != null}" th:value="${board?.atchFileId}" />
  <input type="hidden" name="postCn" id="postCnHidden" />
  <input type="hidden" name="listPage" th:value="${listPage != null ? listPage : 1}" />
  <input type="hidden" name="listKeyword" th:value="${listKeyword != null ? listKeyword : ''}" />
  <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd != null ? listBoardTypeCd : ''}" />

  <div class="divide-y divide-slate-100">
    <!-- 게시판 분류 -->
    <div class="flex items-center px-8 py-5">
      <label for="boardTypeCd" class="w-28 shrink-0 text-sm font-semibold text-slate-600">게시판 분류</label>
      <select id="boardTypeCd" name="boardTypeCd" class="hm-input hm-input-sky max-w-56 text-base">
        <option value="">-- 선택 --</option>
        <option th:each="type : ${boardTypes}"
                th:if="${board?.postSn != null or type.comCd != 'QNA'}"
                th:value="${type.comCd}"
                th:text="${type.comCdNm}"
                th:selected="${type.comCd == board?.boardTypeCd}"></option>
      </select>
    </div>

    <!-- 제목 -->
    <div class="flex items-center px-8 py-5">
      <label for="postSj" class="w-28 shrink-0 text-sm font-semibold text-slate-600">
        제목 <span class="text-red-400">*</span>
      </label>
      <input id="postSj" type="text" name="postSj" maxlength="100"
             placeholder="제목을 입력하세요."
             th:value="${board?.postSj}"
             class="hm-input hm-input-sky text-base" />
    </div>

    <!-- 내용 -->
    <div class="flex px-8 py-5">
      <label class="w-28 shrink-0 pt-1 text-sm font-semibold text-slate-600">
        내용 <span class="text-red-400">*</span>
      </label>
      <div id="editor" class="flex-1"></div>
    </div>

    <!-- 첨부파일 -->
    <div class="flex items-start px-8 py-5">
      <label class="w-28 shrink-0 pt-2 text-sm font-semibold text-slate-600">첨부파일</label>
      <div class="flex-1">
        <!-- 기존 파일 목록 (수정 시) -->
        <div th:if="${board?.atchFileId != null and not #lists.isEmpty(existingFiles)}" class="mb-3 space-y-1">
          <div th:each="f : ${existingFiles}"
               class="flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">
            <i class="fa-solid fa-paperclip text-slate-400"></i>
            <span th:text="${f.orgnFileNm}" class="flex-1 truncate"></span>
            <span class="text-xs text-slate-400"
                  th:text="${#numbers.formatDecimal(f.fileSizeCnt / 1024.0, 1, 1) + ' KB'}"></span>
            <a th:href="@{/admin/files/{id}/download(id=${f.fileServerId})}"
               class="text-sky-500 hover:text-sky-700 text-xs">
              <i class="fa-solid fa-download"></i>
            </a>
            <form th:action="@{/instructor/board/file/{fileDtlSn}/delete(fileDtlSn=${f.atchFileDtlSn})}"
                  method="post"
                  onsubmit="return confirm('파일을 삭제하시겠습니까?')"
                  class="inline">
              <input type="hidden" name="postSn" th:value="${board.postSn}" />
              <input type="hidden" name="listPage" th:value="${listPage}" />
              <input type="hidden" name="listKeyword" th:value="${listKeyword}" />
              <input type="hidden" name="listBoardTypeCd" th:value="${listBoardTypeCd}" />
              <button type="submit" class="text-rose-400 hover:text-rose-600 transition-colors ml-1">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </form>
          </div>
        </div>
        <!-- 파일 선택 -->
        <label class="flex cursor-pointer items-center gap-2 rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-500 hover:border-sky-400 hover:text-sky-500 transition-colors">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span>파일 선택 (여러 개 가능)</span>
          <input type="file" name="attachFiles" multiple class="hidden" id="fileInput"
                 onchange="showSelectedFiles(this)" />
        </label>
        <ul id="selectedFileList" class="mt-2 space-y-1 text-sm text-slate-600"></ul>
      </div>
    </div>
  </div>

  <!-- 버튼 영역 -->
  <div class="flex justify-end gap-3 border-t border-slate-100 bg-slate-50 px-8 py-4">
    <a th:href="@{/instructor/board/list(page=${listPage}, keyword=${listKeyword}, boardTypeCd=${listBoardTypeCd})}"
       class="hm-btn-secondary bg-slate-200 text-slate-700 text-base hover:bg-slate-300">
      취소
    </a>
    <button type="submit" class="hm-btn-primary hm-btn-sky text-base">
      <i class="fa-solid fa-floppy-disk"></i>
      <span th:text="${board?.postSn != null} ? '수정' : '등록'"></span>
    </button>
  </div>
</form>

<script>
  function showSelectedFiles(input) {
    const list = document.getElementById('selectedFileList');
    list.innerHTML = '';
    Array.from(input.files).forEach(function(f) {
      const li = document.createElement('li');
      li.className = 'flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2';
      const icon = document.createElement('i');
      icon.className = 'fa-solid fa-paperclip text-slate-400';
      const name = document.createElement('span');
      name.className = 'flex-1 truncate';
      name.textContent = f.name;
      const size = document.createElement('span');
      size.className = 'text-xs text-slate-400';
      size.textContent = (f.size / 1024).toFixed(1) + ' KB';
      li.append(icon, name, size);
      list.appendChild(li);
    });
  }
</script>
<script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
<script th:inline="javascript">
  document.addEventListener('DOMContentLoaded', function () {
    const savedContent = /*[[${board?.postCn}]]*/ null;

    // TipTapEditor.mount의 initialContent는 JSON만 처리함.
    // 검증 실패 후 redirect 시 savedContent가 HTML로 오므로 JSON 여부를 먼저 판별.
    let initialForMount = '';
    let htmlToRestore = null;
    if (savedContent) {
      try {
        JSON.parse(savedContent);
        initialForMount = savedContent; // JSON → TipTap이 직접 처리
      } catch {
        htmlToRestore = savedContent;   // HTML → mount 후 직접 주입
      }
    }

    TipTapEditor.mount('editor', {
      editable: true,
      outputInputId: 'postCnHidden',
      initialContent: initialForMount,
      imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
    });

    // HTML 복원: TipTap은 내부적으로 setTimeout(0)으로 초기화하므로 폴링으로 대기
    if (htmlToRestore) {
      const t = setInterval(() => {
        const el = document.querySelector('#editor .tiptap');
        if (el && el.editor) {
          el.editor.commands.setContent(htmlToRestore);
          clearInterval(t);
        }
      }, 50);
      setTimeout(() => clearInterval(t), 3000); // 3초 내 초기화 안 되면 포기
    }

    // submit 직전에 TipTap JSON → HTML 변환 후 hidden field에 기록
    document.querySelector('form').addEventListener('submit', function () {
      const el = document.querySelector('#editor .tiptap');
      if (el && el.editor) {
        document.getElementById('postCnHidden').value = el.editor.getHTML();
      }
    });
  });
</script>
