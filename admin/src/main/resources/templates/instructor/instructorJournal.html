<div class="journal-container">
    <link rel="stylesheet" th:href="@{/css/instructor/journal.css}" />

    <!-- 페이지 헤더 -->
    <div class="flex items-center gap-2 mb-5">
        <div class="w-1 h-7 rounded-full bg-sky-500"></div>
        <h1 class="text-2xl font-bold text-slate-800">업무 일지</h1>
        <span th:if="${isViewer}"
              class="text-xs font-semibold text-sky-600 bg-sky-50 border border-sky-200 rounded-full px-2 py-0.5 ml-2">읽기 전용</span>
    </div>

    <!-- 2-pane 레이아웃 -->
    <div class="journal-layout">

        <!-- ── 좌측: 일지 목록 패널 ── -->
        <div class="journal-list-pane">
            <div class="list-header">
                <h2><i class="fa-solid fa-book-open mr-1 text-sky-400"></i>일지 목록</h2>
                <!-- 뷰어(수석 강사·원장)는 작성 버튼 숨김 -->
                <a th:unless="${isViewer}"
                   th:href="@{/instructor/journals(newForm=true, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                   class="btn-new">
                    <i class="fa-solid fa-plus mr-0.5"></i> 새 일지
                </a>
            </div>

            <!-- 검색/필터 영역 -->
            <div class="filter-area">
                <form th:action="@{/instructor/journals}" method="get">
                    <!-- 뷰어 전용: 강사 선택 드롭다운 -->
                    <select th:if="${isViewer}" name="selectedInstrId"
                            style="width:100%; padding:0.3rem 0.5rem; border:1px solid #e2e8f0; border-radius:0.375rem; font-size:0.72rem; color:#334155; margin-bottom:0.35rem; box-sizing:border-box;">
                        <option value="">전체 강사</option>
                        <option th:each="instr : ${journalInstructors}"
                                th:value="${instr.instrUserId}"
                                th:text="${instr.instrUserNm}"
                                th:selected="${instr.instrUserId == selectedInstrId}"></option>
                    </select>
                    <input type="text" name="keyword" placeholder="제목 검색"
                           th:value="${keyword}" />
                    <div class="filter-date-row">
                        <input type="date" name="fromDt" th:value="${fromDt}" />
                        <span>~</span>
                        <input type="date" name="toDt" th:value="${toDt}" />
                    </div>
                    <button type="submit" class="btn-filter">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i>검색
                    </button>
                    <a th:if="${keyword != '' or fromDt != '' or toDt != '' or selectedInstrId != ''}"
                       th:href="@{/instructor/journals}"
                       class="btn-filter-reset">필터 초기화</a>
                </form>
            </div>

            <div class="journal-list">
                <div th:if="${#lists.isEmpty(journalList)}"
                     class="text-center text-slate-400 text-xs py-8">
                    작성된 일지가 없습니다.
                </div>

                <a th:each="j : ${journalList}"
                   th:href="@{/instructor/journals(jrnlSn=${j.jrnlSn}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                   th:classappend="${selected != null and selected.jrnlSn == j.jrnlSn} ? 'active' : ''"
                   class="journal-item">
                    <div class="item-date"  th:text="${j.jrnlDt}">2026-06-01</div>
                    <div class="item-title" th:text="${j.jrnlTitle}">제목</div>
                    <!-- 뷰어 모드: 목록에서 작성 강사 이름 표시 -->
                    <div th:if="${isViewer}" class="item-author" th:text="${j.instrUserNm}"></div>
                </a>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:if="${currentPage > 1}"
                   th:href="@{/instructor/journals(page=${currentPage - 1}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}">
                    <i class="fa-solid fa-chevron-left"></i> 이전
                </a>
                <span th:unless="${currentPage > 1}" class="disabled">
                    <i class="fa-solid fa-chevron-left"></i> 이전
                </span>

                <span class="page-info"
                      th:text="${currentPage} + ' / ' + ${totalPages} + ' 페이지'"></span>

                <a th:if="${currentPage < totalPages}"
                   th:href="@{/instructor/journals(page=${currentPage + 1}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}">
                    다음 <i class="fa-solid fa-chevron-right"></i>
                </a>
                <span th:unless="${currentPage < totalPages}" class="disabled">
                    다음 <i class="fa-solid fa-chevron-right"></i>
                </span>
            </div>
        </div>

        <!-- ── 우측: 상세 / 폼 패널 ── -->
        <div class="journal-detail-pane">

            <!-- (1) 초기 상태 -->
            <div th:if="${mode == 'none'}" class="empty-hint">
                <i class="fa-regular fa-file-lines"></i>
                <p>일지를 선택하거나 새 일지를 작성하세요.</p>
            </div>

            <!-- (2) 읽기 모드 -->
            <div th:if="${mode == 'view'}">
                <!-- 본인 일지에만 수정·삭제 버튼 표시 (isOwner = 본인 작성 + 뷰어 아님) -->
                <div class="action-bar" th:if="${isOwner}">
                    <a th:href="@{/instructor/journals(jrnlSn=${selected.jrnlSn}, edit=true, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                       class="btn-edit"><i class="fa-solid fa-pen mr-1"></i>수정</a>
                    <form th:action="@{/instructor/journals/{sn}/delete(sn=${selected.jrnlSn})}"
                          method="post"
                          onsubmit="return confirm('이 일지를 삭제하시겠습니까?')">
                        <button type="submit" class="btn-delete">
                            <i class="fa-solid fa-trash mr-1"></i>삭제
                        </button>
                    </form>
                </div>

                <div class="detail-title" th:text="${selected.jrnlTitle}">제목</div>
                <div class="detail-meta">
                    <span><i class="fa-regular fa-calendar mr-1"></i><span th:text="${selected.jrnlDt}"></span></span>
                    <!-- 뷰어 모드: 작성자 표시 -->
                    <span th:if="${isViewer}">
                        <i class="fa-solid fa-user mr-1"></i>
                        <span style="font-weight:600; color:#0369a1;" th:text="${selected.instrUserNm}"></span>
                    </span>
                    <span th:if="${selected.mdfcnDt != null}" style="color:#cbd5e1;">
                        수정: <span th:text="${selected.mdfcnDt}"></span>
                    </span>
                </div>
                <div class="detail-content" th:text="${selected.jrnlCont}">내용</div>
            </div>

            <!-- (3) 새 일지 작성 폼 -->
            <div th:if="${mode == 'new'}">
                <h2 class="text-base font-bold text-slate-700 mb-4">
                    <i class="fa-solid fa-plus-circle mr-1 text-sky-400"></i>새 일지 작성
                </h2>
                <form id="form-create" th:action="@{/instructor/journals/create}" method="post" novalidate>
                    <div class="form-group">
                        <label class="form-label">제목 *</label>
                        <input type="text" id="create-title" name="jrnlTitle" class="hm-input"
                               placeholder="일지 제목을 입력하세요" maxlength="200" />
                        <div class="form-hint"><span id="create-title-count">0</span> / 200</div>
                        <div class="form-error" id="create-title-error">제목을 입력해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">업무 날짜 *</label>
                        <input type="date" id="create-dt" name="jrnlDt" class="hm-input"
                               th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" />
                        <div class="form-error" id="create-dt-error">날짜를 선택해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">내용 *</label>
                        <textarea id="create-cont" name="jrnlCont" class="hm-input"
                                  placeholder="업무 내용을 자유롭게 작성하세요."></textarea>
                        <div class="form-error" id="create-cont-error">내용을 입력해주세요.</div>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <a th:href="@{/instructor/journals(selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}" class="hm-btn-secondary">취소</a>
                        <button type="submit" class="hm-btn-primary hm-btn-sky">
                            <i class="fa-solid fa-floppy-disk mr-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>

            <!-- (4) 수정 폼 -->
            <div th:if="${mode == 'edit'}">
                <h2 class="text-base font-bold text-slate-700 mb-4">
                    <i class="fa-solid fa-pen mr-1 text-sky-400"></i>일지 수정
                </h2>
                <form id="form-edit" th:action="@{/instructor/journals/{sn}/update(sn=${selected.jrnlSn})}" method="post" novalidate>
                    <div class="form-group">
                        <label class="form-label">제목 *</label>
                        <input type="text" id="edit-title" name="jrnlTitle" class="hm-input"
                               th:value="${selected.jrnlTitle}" maxlength="200" />
                        <div class="form-hint"><span id="edit-title-count" th:text="${#strings.length(selected.jrnlTitle)}">0</span> / 200</div>
                        <div class="form-error" id="edit-title-error">제목을 입력해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">업무 날짜 *</label>
                        <input type="date" id="edit-dt" name="jrnlDt" class="hm-input"
                               th:value="${selected.jrnlDt}" />
                        <div class="form-error" id="edit-dt-error">날짜를 선택해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">내용 *</label>
                        <textarea id="edit-cont" name="jrnlCont" class="hm-input"
                                  th:text="${selected.jrnlCont}"></textarea>
                        <div class="form-error" id="edit-cont-error">내용을 입력해주세요.</div>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <a th:href="@{/instructor/journals(jrnlSn=${selected.jrnlSn}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}" class="hm-btn-secondary">취소</a>
                        <button type="submit" class="hm-btn-primary hm-btn-sky">
                            <i class="fa-solid fa-floppy-disk mr-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>

        </div><!-- /detail-pane -->
    </div><!-- /journal-layout -->
</div>

<th:block th:fragment="pageJs">
<script>
(function () {
    const TITLE_MAX = 200;

    function setError(inputEl, errorEl, msg) {
        inputEl.classList.add('is-error');
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
    }
    function clearError(inputEl, errorEl) {
        inputEl.classList.remove('is-error');
        errorEl.classList.remove('visible');
    }
    function updateCount(countEl, hintEl, len) {
        countEl.textContent = len;
        hintEl.classList.toggle('warn', len >= TITLE_MAX * 0.9 && len < TITLE_MAX);
        hintEl.classList.toggle('over', len >= TITLE_MAX);
    }

    function bindForm(formId, titleId, countId, dtId, contId) {
        const form    = document.getElementById(formId);
        if (!form) return;

        const titleEl = document.getElementById(titleId);
        const countEl = document.getElementById(countId);
        const hintEl  = countEl ? countEl.closest('.form-hint') : null;
        const dtEl    = document.getElementById(dtId);
        const contEl  = document.getElementById(contId);

        const titleErr = document.getElementById(titleId + '-error');
        const dtErr    = document.getElementById(dtId    + '-error');
        const contErr  = document.getElementById(contId  + '-error');

        // 글자수 카운터
        if (titleEl && countEl) {
            updateCount(countEl, hintEl, titleEl.value.length);
            titleEl.addEventListener('input', () => {
                updateCount(countEl, hintEl, titleEl.value.length);
                if (titleEl.value.trim()) clearError(titleEl, titleErr);
            });
        }

        // 날짜/내용 입력 시 에러 해제
        if (dtEl) dtEl.addEventListener('change', () => { if (dtEl.value) clearError(dtEl, dtErr); });
        if (contEl) contEl.addEventListener('input', () => { if (contEl.value.trim()) clearError(contEl, contErr); });

        form.addEventListener('submit', function (e) {
            let valid = true;

            if (!titleEl.value.trim()) {
                setError(titleEl, titleErr, '제목을 입력해주세요.');
                valid = false;
            } else if (titleEl.value.length > TITLE_MAX) {
                setError(titleEl, titleErr, `제목은 ${TITLE_MAX}자 이내로 입력해주세요.`);
                valid = false;
            } else {
                clearError(titleEl, titleErr);
            }

            if (!dtEl.value) {
                setError(dtEl, dtErr, '날짜를 선택해주세요.');
                valid = false;
            } else {
                clearError(dtEl, dtErr);
            }

            if (!contEl.value.trim()) {
                setError(contEl, contErr, '내용을 입력해주세요.');
                valid = false;
            } else {
                clearError(contEl, contErr);
            }

            if (!valid) {
                e.preventDefault();
                form.querySelector('.is-error').focus();
            }
        });
    }

    bindForm('form-create', 'create-title', 'create-title-count', 'create-dt', 'create-cont');
    bindForm('form-edit',   'edit-title',   'edit-title-count',   'edit-dt',   'edit-cont');
})();
</script>
</th:block>
