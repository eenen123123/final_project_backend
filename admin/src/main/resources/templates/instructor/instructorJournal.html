<title th:fragment="pageTitle">업무 일지 관리 | HERMES</title>

<div class="journal-container">
    <link rel="stylesheet" th:href="@{/css/instructor/instructorJournal.css}" />

    <!-- 페이지 헤더 -->
    <div class="flex items-center justify-between mb-5">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">업무 일지</h1>
            <p class="text-sm text-slate-500 mt-1">업무 기록을 작성하고 관리합니다.</p>
        </div>
    </div>

    <!-- 서버 검증 에러 배너 -->
    <div th:if="${errorMessage}"
        class="flex items-center gap-2 mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-semibold">
        <i class="fa-solid fa-circle-exclamation text-red-400"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- 2-pane 레이아웃 -->
    <div class="journal-layout">

        <!-- ── 좌측: 일지 목록 패널 ── -->
        <div class="journal-list-pane">

            <!-- 패널 헤더 -->
            <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                <h2 class="text-sm font-bold text-slate-700">
                    <i class="fa-solid fa-book-open mr-1 text-sky-400"></i>일지 목록
                </h2>
                <div class="flex items-center gap-1.5">
                    <button type="button" id="btn-toggle-filter" class="hm-btn-secondary text-xs px-3 py-1.5">
                        <i class="fa-solid fa-filter"></i> 검색
                    </button>
                    <a th:unless="${isReadOnly}"
                        th:href="@{/instructor/journals(newForm=true, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                        class="hm-btn-primary hm-btn-sky text-xs px-3 py-1.5">
                        <i class="fa-solid fa-plus"></i> 새 일지
                    </a>
                </div>
            </div>

            <!-- 검색/필터 영역 -->
            <div class="filter-area" id="filter-area" th:classappend="${keyword == null and fromDt == null and toDt == null and selectedInstrId == null} ? 'hidden' : ''">
                <form th:action="@{/instructor/journals}" method="get" class="flex flex-col gap-1.5">
                    <select th:if="${isViewer}" name="selectedInstrId" class="hm-input hm-input-sky">
                        <option value="">전체 강사</option>
                        <option th:each="instr : ${journalInstructors}" th:value="${instr.instrUserId}"
                            th:text="${instr.instrUserNm}" th:selected="${instr.instrUserId == selectedInstrId}">
                        </option>
                    </select>
                    <input type="text" name="keyword" placeholder="제목 검색" th:value="${keyword}"
                        class="hm-input hm-input-sky" style="margin-bottom:0; border-radius:0.75rem" />
                    <div class="filter-date-row">
                        <input type="date" name="fromDt" th:value="${fromDt}" class="hm-input hm-input-sky" style="border-radius:0.75rem" />
                        <span>~</span>
                        <input type="date" name="toDt" th:value="${toDt}" class="hm-input hm-input-sky" style="border-radius:0.75rem" />
                    </div>
                    <button type="submit" class="hm-btn-primary hm-btn-sky w-full">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i>검색
                    </button>
                    <a th:href="@{/instructor/journals}" class="hm-btn-secondary w-full">
                        <i class="fa-solid fa-rotate-left mr-1"></i>초기화
                    </a>
                </form>
            </div>

            <!-- 일지 목록 -->
            <div class="journal-list">
                <div th:if="${#lists.isEmpty(journalList)}" class="text-center text-slate-400 text-xs py-8">
                    작성된 일지가 없습니다.
                </div>
                <a th:each="j : ${journalList}"
                    th:href="@{/instructor/journals(jrnlSn=${j.jrnlSn}, page=${currentPage}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                    th:classappend="${selected != null and selected.jrnlSn == j.jrnlSn} ? 'active' : ''"
                    class="journal-item">
                    <div class="item-date" th:text="${j.jrnlDt}">2026-06-01</div>
                    <div class="item-title" th:text="${j.jrnlTitle}">제목</div>
                    <div th:if="${isViewer}" class="item-author" th:text="${j.instrUserNm}"></div>
                </a>
            </div>

            <!-- 페이지네이션 -->
            <div th:if="${totalPages > 1}"
                class="flex items-center justify-between px-3 py-2 border-t border-slate-100 flex-shrink-0 text-xs">
                <a th:if="${currentPage > 1}"
                    th:href="@{/instructor/journals(page=${currentPage - 1}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                    class="text-slate-500 hover:text-sky-500 flex items-center gap-1">
                    <i class="fa-solid fa-chevron-left text-xs"></i> 이전
                </a>
                <span th:unless="${currentPage > 1}" class="text-slate-300 flex items-center gap-1">
                    <i class="fa-solid fa-chevron-left text-xs"></i> 이전
                </span>

                <span class="text-slate-400" th:text="${currentPage} + ' / ' + ${totalPages} + ' 페이지'"></span>

                <a th:if="${currentPage < totalPages}"
                    th:href="@{/instructor/journals(page=${currentPage + 1}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                    class="text-slate-500 hover:text-sky-500 flex items-center gap-1">
                    다음 <i class="fa-solid fa-chevron-right text-xs"></i>
                </a>
                <span th:unless="${currentPage < totalPages}" class="text-slate-300 flex items-center gap-1">
                    다음 <i class="fa-solid fa-chevron-right text-xs"></i>
                </span>
            </div>

        </div>

        <!-- ── 우측: 상세 / 폼 패널 ── -->
        <div class="journal-detail-pane">

            <!-- (1) 초기 상태 -->
            <div th:if="${mode == 'none'}" class="empty-hint">
                <i class="fa-regular fa-file-lines"></i>
                <p>일지를 선택하거나 새 일지를 작성하세요.</p>
            </div>

            <!-- (2) 읽기 모드 -->
            <div th:if="${mode == 'view'}">
                <div class="detail-header">
                    <div class="detail-title" th:text="${selected.jrnlTitle}">제목</div>
                    <div th:if="${isOwner}" class="flex items-center gap-2 flex-shrink-0">
                        <a th:href="@{/instructor/journals(jrnlSn=${selected.jrnlSn}, edit=true, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                            class="hm-btn-secondary text-xs px-3 py-1.5">
                            <i class="fa-solid fa-pen mr-1"></i>수정
                        </a>
                        <form id="form-delete" th:action="@{/instructor/journals/{sn}/delete(sn=${selected.jrnlSn})}" method="post">
                            <button type="button" class="hm-btn-danger text-xs px-3 py-1.5" onclick="openDeleteModal()">
                                <i class="fa-solid fa-trash mr-1"></i>삭제
                            </button>
                        </form>
                    </div>
                </div>
                <div class="detail-meta">
                    <span><i class="fa-regular fa-calendar mr-1"></i><span th:text="${selected.jrnlDt}"></span></span>
                    <span th:if="${isViewer}">
                        <i class="fa-solid fa-user mr-1"></i>
                        <span style="font-weight:600; color:#0369a1;" th:text="${selected.instrUserNm}"></span>
                    </span>
                    <span th:if="${selected.mdfcnDt != null}" style="color:#cbd5e1;">
                        수정: <span th:text="${selected.mdfcnDt}"></span>
                    </span>
                </div>
                <div class="detail-content" th:utext="${selected.jrnlCont}">내용</div>
                <script>
                    document.querySelectorAll('.detail-content img[data-file-id]').forEach(function(img) {
                        img.src = '/admin/files/' + img.dataset.fileId + '/view';
                    });
                </script>
            </div>

            <!-- (3) 새 일지 작성 폼 -->
            <div th:if="${mode == 'new'}">
                <h2 class="text-base font-bold text-slate-700 mb-4">
                    <i class="fa-solid fa-plus-circle mr-1 text-sky-400"></i>새 일지 작성
                </h2>
                <form id="form-create" th:action="@{/instructor/journals/create}" method="post" novalidate>
                    <div class="form-group">
                        <label class="form-label">제목 *</label>
                        <input type="text" id="create-title" name="jrnlTitle" class="hm-input hm-input-sky"
                            placeholder="일지 제목을 입력하세요" maxlength="200" />
                        <div class="form-hint"><span id="create-title-count">0</span> / 200</div>
                        <div class="form-error" id="create-title-error">제목을 입력해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">업무 날짜 *</label>
                        <input type="date" id="create-dt" name="jrnlDt" class="hm-input hm-input-sky"
                            th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" />
                        <div class="form-error" id="create-dt-error">날짜를 선택해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">내용 *</label>
                        <div id="editor-create">
                            <div class="editor-skeleton"></div>
                        </div>
                        <input type="hidden" name="jrnlCont" id="create-cont" />
                        <div class="form-error" id="create-cont-error">내용을 입력해주세요.</div>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <a th:href="@{/instructor/journals(selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                            class="hm-btn-secondary">취소</a>
                        <button type="submit" class="hm-btn-primary hm-btn-sky">
                            <i class="fa-solid fa-floppy-disk mr-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>

            <!-- (4) 수정 폼 -->
            <div th:if="${mode == 'edit'}">
                <h2 class="text-base font-bold text-slate-700 mb-4">
                    <i class="fa-solid fa-pen mr-1 text-sky-400"></i>일지 수정
                </h2>
                <form id="form-edit" th:action="@{/instructor/journals/{sn}/update(sn=${selected.jrnlSn})}"
                    method="post" novalidate>
                    <div class="form-group">
                        <label class="form-label">제목 *</label>
                        <input type="text" id="edit-title" name="jrnlTitle" class="hm-input hm-input-sky"
                            th:value="${selected.jrnlTitle}" maxlength="200" />
                        <div class="form-hint"><span id="edit-title-count"
                                th:text="${#strings.length(selected.jrnlTitle)}">0</span> / 200</div>
                        <div class="form-error" id="edit-title-error">제목을 입력해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">업무 날짜 *</label>
                        <input type="date" id="edit-dt" name="jrnlDt" class="hm-input hm-input-sky"
                            th:value="${selected.jrnlDt}" />
                        <div class="form-error" id="edit-dt-error">날짜를 선택해주세요.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">내용 *</label>
                        <div id="editor-edit">
                            <div class="editor-skeleton"></div>
                        </div>
                        <input type="hidden" name="jrnlCont" id="edit-cont" />
                        <input type="hidden" id="edit-cont-init" th:value="${selected.jrnlCont}" />
                        <div class="form-error" id="edit-cont-error">내용을 입력해주세요.</div>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <a th:href="@{/instructor/journals(jrnlSn=${selected.jrnlSn}, selectedInstrId=${selectedInstrId}, keyword=${keyword}, fromDt=${fromDt}, toDt=${toDt})}"
                            class="hm-btn-secondary">취소</a>
                        <button type="submit" class="hm-btn-primary hm-btn-sky">
                            <i class="fa-solid fa-floppy-disk mr-1"></i>저장
                        </button>
                    </div>
                </form>
            </div>

        </div><!-- /detail-pane -->
    </div><!-- /journal-layout -->

    <!-- 삭제 확인 모달 -->
    <div id="modal-delete-journal" class="fixed inset-0 bg-black/40 z-50 hidden items-center justify-center p-4">
        <div class="hm-modal-inner max-w-sm">
            <div class="p-6 text-center">
                <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-trash text-red-500 text-2xl"></i>
                </div>
                <h3 class="font-bold text-slate-800 mb-2 text-lg">일지 삭제</h3>
                <p class="text-sm text-slate-500 mb-6">이 일지를 삭제하시겠습니까?<br>삭제한 일지는 복구할 수 없습니다.</p>
                <div class="flex gap-3 justify-center">
                    <button type="button" onclick="closeDeleteModal()" class="hm-btn-secondary flex-1">취소</button>
                    <button type="button" onclick="confirmDelete()" class="hm-btn-danger flex-1">삭제</button>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="pageJs">
    <th:block th:if="${mode == 'new' or mode == 'edit'}">
        <script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
    </th:block>
    <script defer th:src="@{/js/instructor/instructorJournal.js}"></script>
</th:block>
