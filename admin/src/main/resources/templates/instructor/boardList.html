<div class="p-6">
  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">강사 게시판</h1>
      <p class="mt-1 text-sm text-slate-500">
        강의 관련 공지 및 문의사항을 확인합니다.
      </p>
    </div>
    <a
      href="/instructor/board/insertForm"
      class="hm-btn-primary hm-btn-sky text-base"
    >
      <i class="fa-solid fa-pen-to-square"></i>
      글쓰기
    </a>
  </div>

  <!-- 게시글 테이블 -->
  <div
    class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
  >
    <table class="w-full text-base">
      <thead>
        <tr class="border-b border-slate-200 bg-slate-50">
          <th
            class="w-24 px-6 py-4 text-left text-sm font-semibold text-slate-500"
          >
            번호
          </th>
          <th
            class="w-28 px-6 py-4 text-left text-sm font-semibold text-slate-500"
          >
            분류
          </th>
          <th class="px-6 py-4 text-left text-sm font-semibold text-slate-500">
            제목
          </th>
          <th
            class="w-36 px-6 py-4 text-left text-sm font-semibold text-slate-500"
          >
            작성자
          </th>
          <th
            class="w-40 px-6 py-4 text-left text-sm font-semibold text-slate-500"
          >
            등록일
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr
          th:each="board : ${boardList}"
          th:with="detailUrl=@{/instructor/board/detail/{postSn}(postSn=${board.postSn})}"
          th:classappend="${board.useYn == 'N'} ? 'opacity-50' : 'hover:bg-sky-50'"
          class="transition-colors"
        >
          <td class="text-base text-slate-400">
            <a
              th:href="${detailUrl}"
              class="block px-6 py-4"
              th:text="${board.postSn}"
            ></a>
          </td>
          <td class="text-base">
            <a th:href="${detailUrl}" class="block px-6 py-4">
              <span th:if="${board.boardTypeCd == '02'}" class="inline-block rounded-full bg-sky-100 px-2 py-0.5 text-xs font-semibold text-sky-700"    th:text="${board.boardTypeNm}"></span>
              <span th:if="${board.boardTypeCd == '03'}" class="inline-block rounded-full bg-amber-100 px-2 py-0.5 text-xs font-semibold text-amber-700"  th:text="${board.boardTypeNm}"></span>
              <span th:if="${board.boardTypeCd == '04'}" class="inline-block rounded-full bg-emerald-100 px-2 py-0.5 text-xs font-semibold text-emerald-700" th:text="${board.boardTypeNm}"></span>
            </a>
          </td>
          <td class="text-base font-medium text-slate-800">
            <a th:href="${detailUrl}" class="block px-6 py-4">
              <span th:if="${board.useYn == 'N'}" class="mr-1 inline-block rounded-full bg-red-100 px-2 py-0.5 text-xs font-semibold text-red-500">삭제됨</span>
              <span th:classappend="${board.useYn == 'N'} ? 'line-through text-slate-400'" th:text="${board.title}"></span>
            </a>
          </td>
          <td class="text-base text-slate-600">
            <a
              th:href="${detailUrl}"
              class="block px-6 py-4"
              th:text="${board.userName}"
            ></a>
          </td>
          <td class="text-base text-slate-500">
            <a
              th:href="${detailUrl}"
              class="block px-6 py-4"
              th:text="${board.regDt}"
            ></a>
          </td>
        </tr>
        <!-- 게시글이 없을 때 -->
        <tr th:if="${#lists.isEmpty(boardList)}">
          <td
            colspan="5"
            class="px-6 py-16 text-center text-base text-slate-400"
          >
            <i class="fa-regular fa-folder-open mb-2 block text-3xl"></i>
            등록된 게시글이 없습니다.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
