<!doctype html>
<html
  th:fragment="layout(pageTitle, classroom, activeTab, pageContent)"
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
>
  <!--
  클래스룸 공통 레이아웃 프래그먼트
  ====================================================
  사용법 (각 탭 페이지):

    <html th:replace="~{instructor/classroom-fragments :: layout(
        ${classroom.classNm} + ' | {탭명}',
        ${classroom},
        '{activeTab}',
        ~{:: #content}
    )}" ...>
    <head></head>
    <body>
      <div id="content">
        이 페이지 고유 컨텐츠만 여기 작성
      </div>
    </body>
    </html>

  activeTab 값: home | notice | lectures | assignments | qna | grades | members

  참고:
    - calendarDays 는 home 컨트롤러에서만 주입됨 → aside의 캘린더가 home 탭에서만 표시됨.
    - noticeCount / assignmentCount 는 home 컨트롤러에서만 주입됨.
      다른 탭에서는 null이므로 배지가 자동 비표시 처리됨.
  ====================================================
-->

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle}">클래스룸</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col bg-white overflow-hidden">
    <!-- ── 상단 헤더 ───────────────────────────────────────────── -->
    <header
      class="h-12 bg-white border-b border-slate-200 flex items-center px-6 gap-4 flex-shrink-0"
    >
      <a
        href="/instructor/classroom/list"
        class="text-slate-400 hover:text-slate-600 transition-colors text-xs flex items-center gap-1"
      >
        <i class="fa-solid fa-chevron-left text-[10px]"></i> 클래스 목록
      </a>
      <div class="w-px h-4 bg-slate-200"></div>
      <span
        class="text-sm font-bold text-slate-700"
        th:text="${classroom.classNm}"
        >클래스룸</span
      >
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- ── 좌측 패널 ─────────────────────────────────────────── -->
      <aside class="w-64 bg-white border-r border-slate-200 p-5 flex flex-col gap-6 flex-shrink-0 overflow-y-auto">
        <div class="flex flex-col items-center">
          <div class="w-20 h-20 rounded-[2rem] bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-2xl font-bold shadow-xl shadow-blue-100 mb-3 rotate-3 hover:rotate-0 transition-transform cursor-pointer select-none"
               th:text="${#strings.substring(classroom.instrNm, 0, 1)}">김</div>
          <h3 class="font-bold text-slate-800 text-base" th:text="${classroom.instrNm + ' 강사'}">강사</h3>
          <span class="text-blue-500 text-xs font-bold bg-blue-50 px-2 py-0.5 rounded-md mt-1"
                th:text="${classroom.classNm}">반 이름</span>
          <button class="w-full mt-4 py-2 bg-slate-50 hover:bg-blue-50 text-slate-600 hover:text-blue-600 text-[11px] font-bold rounded-xl transition-all border border-slate-100 hover:border-blue-100">
            강사 페이지 방문
          </button>
        </div>
        <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
        <div class="space-y-3">
          <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Information</h4>
          <div class="bg-slate-50/50 rounded-2xl p-3 space-y-2 border border-slate-100">
            <div class="flex justify-between text-[11px] font-bold">
              <span class="text-slate-400">📚 강좌</span>
              <span class="text-slate-700" th:text="${classroom.courseNm}">강좌명</span>
            </div>
            <div class="flex justify-between text-[11px] font-bold">
              <span class="text-slate-400">👥 수강 인원</span>
              <span class="text-slate-700" th:text="${classroom.memberCount + '명'}">0명</span>
            </div>
            <div class="flex justify-between text-[11px] font-bold">
              <span class="text-slate-400">📅 수강 시작</span>
              <span class="text-slate-700" th:text="${classroom.enrlStrtYmd}">2026.03.02</span>
            </div>
          </div>
        </div>
        <!-- 캘린더: home 탭에서만 calendarDays가 주입되므로 자동 표시/비표시 -->
        <th:block th:if="${calendarDays != null}">
          <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>
          <div>
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1 mb-3">Calendar</h4>
            <div class="bg-white border border-blue-50 rounded-2xl p-4 shadow-sm hover:shadow-md transition-all cursor-pointer">
              <div class="text-center mb-3">
                <span class="text-[13px] font-black text-slate-700 tracking-tight"
                      th:text="${calendarYear + '년 ' + calendarMonth + '월'}">2026년 5월</span>
              </div>
              <div class="grid grid-cols-7 gap-1">
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">일</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">월</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">화</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">수</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">목</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">금</div>
                <div class="text-[10px] text-slate-400 text-center font-bold pb-1">토</div>
                <div th:each="pad : ${calendarPadding}"
                     class="h-6 flex items-center justify-center text-[10px] text-slate-200"
                     th:text="${pad}"></div>
                <div th:each="day : ${calendarDays}"
                     th:class="${day.today} ? 'h-6 flex items-center justify-center text-[10px] rounded-lg font-bold bg-blue-600 text-white shadow-sm'
                               : (${day.classDay} ? 'h-6 flex items-center justify-center text-[10px] rounded-lg font-bold bg-blue-50 text-blue-500'
                                                 : 'h-6 flex items-center justify-center text-[10px] rounded-lg font-bold text-slate-600')"
                     th:text="${day.day}"></div>
              </div>
            </div>
          </div>
        </th:block>
      </aside>

      <!-- ── 메인 영역 ─────────────────────────────────────────── -->
      <main class="flex-1 overflow-y-auto p-6 bg-[#F8FAFC]">
        <div class="max-w-[1000px] w-full flex flex-col gap-5">
          <!-- 탭 네비게이션 -->
          <nav
            class="flex items-center gap-1 bg-slate-200/60 p-1 rounded-xl w-fit border border-slate-200/10"
          >
            <a
              th:href="@{/instructor/classroom/detail/{sn}(sn=${classroom.classSn})}"
              th:class="${activeTab == 'home'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
              >홈</a
            >

            <a
              th:href="@{/instructor/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
              th:class="${activeTab == 'notice'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
            >
              공지사항
              <span
                th:if="${noticeCount != null and noticeCount > 0}"
                class="text-[10px] px-1.5 py-0.5 rounded font-bold leading-none bg-red-50 text-red-500"
                th:text="${noticeCount}"
                >1</span
              >
            </a>

            <a
              th:href="@{/instructor/classroom/detail/{sn}/lectures(sn=${classroom.classSn})}"
              th:class="${activeTab == 'lectures'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
              >온라인 강의</a
            >

            <a
              th:href="@{/instructor/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
              th:class="${activeTab == 'assignments'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
            >
              과제 제출
              <span
                th:if="${assignmentCount != null and assignmentCount > 0}"
                class="text-[10px] px-1.5 py-0.5 rounded font-bold leading-none bg-red-50 text-red-500"
                th:text="${assignmentCount}"
                >2</span
              >
            </a>

            <a
              th:href="@{/instructor/classroom/detail/{sn}/qna(sn=${classroom.classSn})}"
              th:class="${activeTab == 'qna'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
              >Q&amp;A</a
            >

            <a
              th:href="@{/instructor/classroom/detail/{sn}/grades(sn=${classroom.classSn})}"
              th:class="${activeTab == 'grades'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
              >성적 관리</a
            >

            <a
              th:href="@{/instructor/classroom/detail/{sn}/members(sn=${classroom.classSn})}"
              th:class="${activeTab == 'members'}
                       ? 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20'
                       : 'px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors'"
              >수강생 목록</a
            >
          </nav>

          <!-- 페이지 고유 컨텐츠 삽입 위치 -->
          <th:block th:replace="${pageContent}" />
        </div>
      </main>
    </div>
  </body>
</html>
