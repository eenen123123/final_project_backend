<div>
    <!-- 페이지 헤더 -->
    <div class="flex justify-between items-start mb-6">
        <div>
            <div class="flex items-center gap-2 mb-1">
                <div class="w-1 h-7 rounded-full bg-sky-500"></div>
                <h1 class="text-2xl font-bold text-slate-800">나의 강좌</h1>
            </div>
            <p class="text-sm text-slate-500 ml-3">
                본인에게 배정된 강좌 목록과 클래스룸 현황을 확인할 수 있습니다.
            </p>
        </div>
        <span
            class="text-xs font-semibold bg-sky-100 text-sky-700 rounded-full px-3 py-1.5 flex items-center gap-1.5"
        >
            <i class="fa-solid fa-chalkboard-user"></i>
            총 <span th:text="${#lists.size(courseList)}">0</span>개 강좌
        </span>
    </div>

    <!-- 강좌 없을 때 -->
    <div
        th:if="${#lists.isEmpty(courseList)}"
        class="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center py-24"
    >
        <div class="w-16 h-16 rounded-2xl bg-slate-100 flex items-center justify-center mb-4">
            <i class="fa-solid fa-chalkboard text-2xl text-slate-300"></i>
        </div>
        <p class="text-sm font-semibold text-slate-500">배정된 강좌가 없습니다.</p>
        <p class="text-xs text-slate-400 mt-1">행정팀에 강좌 개설을 요청해보세요.</p>
    </div>

    <!-- 강좌 카드 목록 -->
    <div
        th:if="${not #lists.isEmpty(courseList)}"
        class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"
    >
        <div
            th:each="course : ${courseList}"
            class="bg-white rounded-xl border border-slate-200 shadow-sm hover:shadow-md hover:border-sky-200 transition-all duration-200 flex flex-col overflow-hidden"
        >
            <!-- 카드 상단 컬러 바 -->
            <div class="h-1.5 bg-gradient-to-r from-sky-400 to-sky-600"></div>

            <div class="p-5 flex flex-col flex-1">
                <!-- 제작방식 배지 -->
                <div class="flex items-center gap-2 mb-3">
                    <span
                        th:if="${course.prodMthdCd != null}"
                        class="text-xs font-medium bg-slate-100 text-slate-500 rounded-full px-2.5 py-0.5"
                        th:text="${course.prodMthdCd}"
                    ></span>
                </div>

                <!-- 강좌명 -->
                <h2 class="text-base font-bold text-slate-800 mb-1 leading-snug"
                    th:text="${course.courseNm}">강좌 제목</h2>

                <!-- 강좌 설명 -->
                <p class="text-xs text-slate-400 line-clamp-2 mb-4 flex-1"
                   th:text="${course.courseExplnCn} ?: '강좌 설명이 없습니다.'">
                    강좌 설명
                </p>

                <!-- 하단 정보 -->
                <div class="flex items-center justify-between pt-3 border-t border-slate-100">
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <span th:if="${course.totLrnTimeCnt != null}" class="flex items-center gap-1">
                            <i class="fa-regular fa-clock text-slate-300"></i>
                            <span th:text="${course.totLrnTimeCnt}">00:00:00</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
