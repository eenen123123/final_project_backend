<!DOCTYPE html>
<html th:replace="~{instructor/classroom-fragments :: layout(
    ${classroom.classNm} + ' | 클래스룸',
    ${classroom},
    'home',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">
  <style>
    @keyframes growBar { from { height: 4%; } to { height: var(--h); } }
    .bar-anim { animation: growBar 0.8s ease-out forwards; }
  </style>

  <div class="flex flex-col gap-4">

    <!-- 오늘의 문제 배너 -->
    <div th:if="${todayQuestion != null}"
         class="bg-blue-50 border border-blue-100 rounded-xl p-3.5 flex items-center gap-3 cursor-pointer hover:bg-blue-100/70 transition-colors">
      <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white text-base flex-shrink-0">💡</div>
      <div class="flex-1 min-w-0">
        <p class="text-[11px] text-blue-500 font-bold"
           th:text="'오늘의 문제 · ' + ${todayQuestion.subject}">오늘의 문제 · 영어</p>
        <p class="text-sm font-bold text-blue-900 mt-0.5 truncate"
           th:text="${todayQuestion.content}">관계대명사 who와 which의 차이를 설명하시오</p>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">

      <!-- 주간 강의 완료 현황 바 차트 -->
      <div class="col-span-2 bg-white border border-slate-200/80 rounded-2xl flex flex-col justify-between shadow-sm overflow-hidden">
        <div class="bg-sky-50/60 px-5 py-3.5 border-b border-slate-200/40">
          <h3 class="text-xs font-black text-slate-800 tracking-tight">이번 주 강의 완료 현황</h3>
          <p class="text-[11px] text-slate-400 mt-0.5">
            지난주 대비 <span class="text-blue-600 font-bold" th:text="${weeklyCompareText}">3강 더</span> 완료했어요
          </p>
        </div>
        <div class="p-5 pt-7 flex items-end justify-between px-7" style="height:8.5rem;">
          <div th:each="day, stat : ${weeklyData}" class="flex flex-col items-center gap-2 flex-1 group">
            <div class="w-full max-w-[28px] bg-slate-100 rounded-t-md h-full flex items-end overflow-hidden">
              <div class="w-full rounded-t-md bar-anim"
                   th:style="'--h:' + ${day.heightPct} + '%; height:4%; animation-delay:' + ${stat.index * 0.05} + 's;'
                             + (${day.isMax} ? 'background:linear-gradient(to top,#2563eb,#6366f1);' : '')
                             + (${day.isEmpty and !day.isMax} ? 'background:#e2e8f0;' : (!${day.isMax} ? 'background:#3b82f6;' : ''))"></div>
            </div>
            <span class="text-[11px] font-bold text-slate-400" th:text="${day.label}">월</span>
          </div>
        </div>
      </div>

      <!-- 학습 달성률 도넛 -->
      <div class="bg-white border border-slate-200/80 rounded-2xl flex flex-col justify-between shadow-sm overflow-hidden">
        <div class="bg-sky-50/60 px-5 py-3.5 border-b border-slate-200/40">
          <h3 class="text-xs font-black text-slate-800 tracking-tight">학습 달성률</h3>
          <p class="text-[11px] text-slate-400 mt-0.5"
             th:text="${calendarMonth + '월 달성 현황'}">5월 달성 현황</p>
        </div>
        <div class="grid grid-cols-3 gap-1 p-5 py-5">
          <div th:each="item, stat : ${achievements}" class="flex flex-col items-center gap-2.5">
            <div class="relative flex items-center justify-center w-14 h-14">
              <svg class="w-full h-full" style="transform:rotate(-90deg);" viewBox="0 0 56 56">
                <circle cx="28" cy="28" r="20" stroke="#F1F5F9" stroke-width="4.5" fill="transparent"/>
                <circle cx="28" cy="28" r="20" stroke-width="4.5" fill="transparent"
                  stroke-dasharray="125.66"
                  stroke-dashoffset="125.66"
                  stroke-linecap="round"
                  th:attr="stroke=${item.color}, data-offset=${item.dashOffset}, data-delay=${stat.index * 100}"/>
              </svg>
              <span class="absolute text-[10px] font-black text-slate-800 tracking-tighter"
                    th:text="${item.pct} + '%'">85%</span>
            </div>
            <span class="text-[10px] font-bold text-slate-400 text-center whitespace-nowrap"
                  th:text="${item.label}">과제 제출</span>
          </div>
        </div>
      </div>

    </div>

    <!-- 액션 아이템 -->
    <div th:if="${unansweredQnaCount > 0 or pendingGradeCount > 0 or inactiveStudentCount > 0}" class="flex flex-col gap-2">
      <div th:if="${unansweredQnaCount > 0}"
           class="bg-amber-50 border border-amber-100 rounded-xl p-3.5 flex items-center gap-3">
        <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-500 text-sm flex-shrink-0">
          <i class="fa-solid fa-comment-dots"></i>
        </div>
        <p class="flex-1 text-xs font-bold text-amber-800">
          답변 대기 중인 Q&A가 <span class="text-amber-600" th:text="${unansweredQnaCount}">0</span>건 있습니다.
        </p>
        <a th:href="@{/instructor/classroom/detail/{sn}/qna(sn=${classroom.classSn})}"
           class="text-[11px] font-bold text-amber-600 hover:underline flex-shrink-0">확인 →</a>
      </div>
      <div th:if="${pendingGradeCount > 0}"
           class="bg-indigo-50 border border-indigo-100 rounded-xl p-3.5 flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-100 rounded-lg flex items-center justify-center text-indigo-500 text-sm flex-shrink-0">
          <i class="fa-solid fa-pen-to-square"></i>
        </div>
        <p class="flex-1 text-xs font-bold text-indigo-800">
          채점 대기 중인 과제가 <span class="text-indigo-600" th:text="${pendingGradeCount}">0</span>건 있습니다.
        </p>
        <a th:href="@{/instructor/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
           class="text-[11px] font-bold text-indigo-600 hover:underline flex-shrink-0">확인 →</a>
      </div>
      <div th:if="${inactiveStudentCount > 0}"
           class="bg-rose-50 border border-rose-100 rounded-xl p-3.5 flex items-center gap-3">
        <div class="w-8 h-8 bg-rose-100 rounded-lg flex items-center justify-center text-rose-500 text-sm flex-shrink-0">
          <i class="fa-solid fa-user-clock"></i>
        </div>
        <p class="flex-1 text-xs font-bold text-rose-800">
          이번 주 강의를 수강하지 않은 학생이 <span class="text-rose-600" th:text="${inactiveStudentCount}">0</span>명 있습니다.
        </p>
        <a th:href="@{/instructor/classroom/detail/{sn}/members(sn=${classroom.classSn})}"
           class="text-[11px] font-bold text-rose-600 hover:underline flex-shrink-0">확인 →</a>
      </div>
    </div>

    <!-- 최근 공지사항 -->
    <div th:if="${recentNotice != null}"
         class="bg-white border border-slate-200/80 rounded-2xl p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-xs font-black text-slate-800 tracking-tight">최근 공지사항</h3>
        <button class="text-[11px] font-bold text-blue-600 hover:underline">전체보기</button>
      </div>
      <div class="bg-slate-50 rounded-xl p-3 border border-slate-100 cursor-pointer hover:bg-slate-100/50 transition-colors">
        <div class="flex items-center gap-2">
          <span th:if="${recentNotice.urgent}"
                class="text-[9px] bg-red-50 text-red-500 px-1.5 py-0.5 rounded font-bold">필독</span>
          <h4 class="text-xs font-bold text-slate-700 truncate flex-1"
              th:text="${recentNotice.title}">5월 중간고사 일정 및 고사장 안내</h4>
        </div>
        <p class="text-[10px] text-slate-400 mt-1.5 font-medium"
           th:text="${recentNotice.date + ' · ' + recentNotice.author}">2026.05.15 · 김민준 선생님</p>
      </div>
    </div>

  </div>

  <script>
    document.querySelectorAll('.bar-anim').forEach(el => {
      const h = getComputedStyle(el).getPropertyValue('--h').trim();
      el.animate([{ height: '4%' }, { height: h }], {
        duration: 800, easing: 'ease-out', fill: 'forwards',
        delay: parseFloat(getComputedStyle(el).animationDelay || '0') * 1000
      });
    });
    const C = 2 * Math.PI * 20;
    document.querySelectorAll('[data-offset]').forEach(el => {
      const offset = parseFloat(el.dataset.offset);
      const delay  = parseInt(el.dataset.delay || '0', 10);
      el.animate(
        [{ strokeDashoffset: C }, { strokeDashoffset: offset }],
        { duration: 1000, easing: 'ease-out', fill: 'forwards', delay }
      );
    });
  </script>
</div>
</body>
</html>
