<div class="overview-container">
    <style>
        .stat-card {
            background: #ffffff;
            border-radius: 0.75rem;
            border: 1px solid #cbd5e1;
            box-shadow: 0 2px 8px 0 rgba(0,0,0,0.06);
            padding: 1.25rem 1.5rem;
        }
        .stat-card .stat-label { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card .stat-value { font-size: 1.75rem; font-weight: 700; color: #0f172a; margin-top: 0.25rem; }
        .stat-card .stat-sub   { font-size: 0.75rem; color: #94a3b8; margin-top: 0.125rem; }

        .overview-table { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
        .overview-table thead th {
            background: #f8fafc;
            color: #475569;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.625rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        .overview-table thead th.text-center { text-align: center; }
        .overview-table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
        }
        .overview-table tbody tr:hover { background: #f8fafc; }
        .overview-table tbody td { padding: 0.75rem 1rem; color: #334155; vertical-align: middle; }
        .overview-table tbody td.text-center { text-align: center; }

        .progress-bar-wrap { background: #e2e8f0; border-radius: 9999px; height: 6px; width: 100px; display: inline-block; vertical-align: middle; }
        .progress-bar-fill { height: 6px; border-radius: 9999px; background: #38bdf8; }
        .progress-bar-fill.high { background: #22c55e; }
        .progress-bar-fill.mid  { background: #f59e0b; }
        .progress-bar-fill.low  { background: #e2e8f0; }

        .stat-pill { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.7rem; font-weight: 600; border-radius: 9999px; padding: 0.1rem 0.5rem; }
        .pill-active    { background: #dbeafe; color: #1d4ed8; }
        .pill-completed { background: #dcfce7; color: #15803d; }

        .class-stat-badge { font-size: 0.7rem; font-weight: 600; border-radius: 0.375rem; padding: 0.15rem 0.5rem; }
        .badge-RECRUITING { background: #dbeafe; color: #1e40af; }
        .badge-ACTIVE     { background: #dcfce7; color: #166534; }
        .badge-CLOSED     { background: #f1f5f9; color: #475569; }
        .badge-WAITING    { background: #fef9c3; color: #92400e; }

        .filter-tab { display: inline-block; padding: 0.35rem 0.875rem; border-radius: 9999px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: background 0.15s; color: #64748b; }
        .filter-tab:hover { background: #e0f2fe; color: #0369a1; }
        .filter-tab.active { background: #0ea5e9; color: #ffffff; }

        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; font-size: 0.875rem; }
    </style>

    <!-- 페이지 헤더 -->
    <div class="flex justify-between items-start mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">전체 학습 현황</h1>
            <p class="text-sm text-slate-500 mt-1">담당 클래스별 수강생 이수율 및 평균 진도율을 확인합니다.</p>
        </div>
    </div>

    <!-- 요약 카드 -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="stat-card">
            <div class="stat-label"><i class="fa-solid fa-chalkboard mr-1 text-sky-400"></i>담당 클래스</div>
            <div class="stat-value" id="summary-classes" th:text="${#lists.size(overviewList)}">0</div>
            <div class="stat-sub">개</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><i class="fa-solid fa-users mr-1 text-sky-400"></i>총 수강생</div>
            <div class="stat-value" id="summary-students">0</div>
            <div class="stat-sub">명 (수강중 + 이수완료)</div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><i class="fa-solid fa-circle-check mr-1 text-sky-400"></i>평균 이수율</div>
            <div class="stat-value" id="summary-completion">0</div>
            <div class="stat-sub">% (전체 클래스 기준)</div>
        </div>
    </div>

    <!-- 필터 탭 -->
    <div class="flex items-center gap-2 mb-3">
        <span class="filter-tab active" data-stat="all"        onclick="filterTable('all', this)">전체</span>
        <span class="filter-tab" data-stat="RECRUITING" onclick="filterTable('RECRUITING', this)">모집중</span>
        <span class="filter-tab" data-stat="ACTIVE"     onclick="filterTable('ACTIVE', this)">운영중</span>
        <span class="filter-tab" data-stat="CLOSED"     onclick="filterTable('CLOSED', this)">종료</span>
        <span class="filter-tab" data-stat="WAITING"    onclick="filterTable('WAITING', this)">대기</span>
    </div>

    <!-- 클래스 현황 테이블 -->
    <div class="panel-card overflow-hidden">
        <div th:if="${#lists.isEmpty(overviewList)}" class="empty-state">
            <i class="fa-solid fa-inbox text-3xl mb-2 text-slate-300"></i>
            <p>담당 클래스가 없습니다.</p>
        </div>
        <table th:unless="${#lists.isEmpty(overviewList)}" class="overview-table">
            <thead>
                <tr>
                    <th>클래스명</th>
                    <th>강좌명</th>
                    <th>수강 기간</th>
                    <th class="text-center">수강중</th>
                    <th class="text-center">이수완료</th>
                    <th class="text-center">이수율</th>
                    <th class="text-center">평균 진도율</th>
                    <th class="text-center">상태</th>
                </tr>
            </thead>
            <tbody id="overview-tbody">
                <tr th:each="row : ${overviewList}"
                    th:attr="data-stat=${row.classStatCd}">
                    <td>
                        <div class="font-semibold text-slate-700" th:text="${row.classNm}">클래스명</div>
                    </td>
                    <td class="text-slate-500" th:text="${row.courseNm}">강좌명</td>
                    <td class="text-slate-400 whitespace-nowrap">
                        <span th:if="${row.enrlStrtYmd != null}" th:text="${row.enrlStrtYmd}">-</span>
                        <span th:if="${row.enrlStrtYmd != null}"> ~ </span>
                        <span th:if="${row.enrlEndYmd != null}" th:text="${row.enrlEndYmd}">-</span>
                        <span th:if="${row.enrlStrtYmd == null and row.enrlEndYmd == null}" class="text-slate-300">미설정</span>
                    </td>
                    <td class="text-center">
                        <span class="stat-pill pill-active" th:text="${row.activeStudents} + '명'">0명</span>
                    </td>
                    <td class="text-center">
                        <span class="stat-pill pill-completed" th:text="${row.completedStudents} + '명'">0명</span>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill"
                                     th:classappend="${row.completionRate >= 80 ? 'high' : (row.completionRate >= 40 ? 'mid' : 'low')}"
                                     th:style="'width:' + ${row.completionRate} + '%'"></div>
                            </div>
                            <span class="text-xs font-semibold text-slate-600"
                                  th:text="${row.completionRate} + '%'">0%</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            <div class="progress-bar-wrap">
                                <div class="progress-bar-fill"
                                     th:classappend="${row.avgProgressRate >= 80 ? 'high' : (row.avgProgressRate >= 40 ? 'mid' : 'low')}"
                                     th:style="'width:' + ${row.avgProgressRate} + '%'"></div>
                            </div>
                            <span class="text-xs font-semibold text-slate-600"
                                  th:text="${row.avgProgressRate} + '%'">0%</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <span class="class-stat-badge"
                              th:classappend="'badge-' + ${row.classStatCd.name()}"
                              th:text="${row.classStatCd.label}">-</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        const overviewList = /*[[${overviewList}]]*/ [];

        // 요약 카드 계산
        (function() {
            const totalStudents = overviewList.reduce((s, r) => s + r.totalStudents, 0);
            const totalCompleted = overviewList.reduce((s, r) => s + r.completedStudents, 0);
            const avgCompletion = totalStudents === 0 ? 0
                : Math.round(totalCompleted / totalStudents * 1000) / 10;

            document.getElementById('summary-students').textContent = totalStudents;
            document.getElementById('summary-completion').textContent = avgCompletion;
        })();

        // 상태 필터
        function filterTable(stat, el) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            document.querySelectorAll('#overview-tbody tr').forEach(tr => {
                const show = stat === 'all' || tr.dataset.stat === stat;
                tr.style.display = show ? '' : 'none';
            });
        }
    </script>
</div>
