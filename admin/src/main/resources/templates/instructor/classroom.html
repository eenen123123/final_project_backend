<div class="space-y-6">
  <!-- 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <div class="mb-1">
        <a href="/classroom/list" class="text-slate-400 hover:text-slate-600 transition-colors text-sm">
          <i class="fa-solid fa-chevron-left"></i> 클래스 목록
        </a>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
        <i class="fa-solid fa-chalkboard text-sky-500"></i>
        <span th:text="${classroom.classNm}">클래스룸 이름</span>
      </h1>
      <p class="text-sm text-slate-500 mt-1" th:text="${classroom.courseNm}">강좌명</p>
    </div>

    <!-- 클래스룸 메타 정보 -->
    <div class="flex items-center gap-2 flex-wrap">
      <span th:if="${classroom.classStatCd == '01'}"
            class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-sky-50 text-sky-600">
        <i class="fa-solid fa-circle-dot text-[8px]"></i> 모집중
      </span>
      <span th:if="${classroom.classStatCd == '02'}"
            class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-600">
        <i class="fa-solid fa-circle-dot text-[8px]"></i> 운영중
      </span>
      <span th:if="${classroom.classStatCd == '03'}"
            class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-500">
        <i class="fa-solid fa-circle text-[8px]"></i> 종료
      </span>
      <span th:if="${classroom.classStatCd == '04'}"
            class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-600">
        <i class="fa-solid fa-circle-dot text-[8px]"></i> 대기
      </span>
      <span class="text-xs text-slate-400 font-mono">
        <th:block th:text="${classroom.enrlStrtYmd}">-</th:block>
        ~
        <th:block th:text="${classroom.enrlEndYmd != null ? classroom.enrlEndYmd : '무기한'}">-</th:block>
      </span>
    </div>
  </div>

  <!-- 강의 목록 없을 때 -->
  <div
    th:if="${#lists.isEmpty(classroom.lectures)}"
    class="bg-white rounded-2xl border border-slate-100 shadow-sm p-16 flex flex-col items-center justify-center text-center gap-3"
  >
    <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-2xl">
      <i class="fa-solid fa-chalkboard-user"></i>
    </div>
    <p class="text-sm font-medium text-slate-500">등록된 강의가 없습니다.</p>
  </div>

  <!-- 강의 목록 -->
  <div
    th:unless="${#lists.isEmpty(classroom.lectures)}"
    class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden"
  >
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">강의 목록</h2>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider uppercase">
            <th class="py-4 px-6">연도</th>
            <th class="py-4 px-6">기간</th>
            <th class="py-4 px-6">수강 인원</th>
            <th class="py-4 px-6">학습 시간</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <tr
            th:each="lecture : ${classroom.lectures}"
            class="hover:bg-slate-50/50 transition-colors"
          >
            <td class="py-4 px-6 font-semibold text-slate-900" th:text="${lecture.lectYear}">-</td>
            <td class="py-4 px-6 text-xs text-slate-500 font-mono">
              <th:block th:text="${lecture.lectStrtYmd}">-</th:block>
              ~
              <th:block th:text="${lecture.lectEndYmd != null ? lecture.lectEndYmd : '미정'}">-</th:block>
            </td>
            <td class="py-4 px-6">
              <span class="text-sm font-medium text-slate-700" th:text="${lecture.curEnrlCnt} + '명'">0명</span>
            </td>
            <td class="py-4 px-6 text-xs text-slate-400 font-mono" th:text="${lecture.lrnTimeCnt}">-</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="border-t border-slate-100 px-6 py-3 bg-slate-50/50">
      <p class="text-xs text-slate-400">
        전체
        <span class="font-semibold text-slate-600" th:text="${#lists.size(classroom.lectures)}">0</span>개
        강의
      </p>
    </div>
  </div>

  <!-- 학생 명단 없을 때 -->
  <div
    th:if="${#lists.isEmpty(classroom.members)}"
    class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden"
  >
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">학생 명단</h2>
    </div>
    <div class="p-16 flex flex-col items-center justify-center text-center gap-3">
      <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-2xl">
        <i class="fa-solid fa-user-graduate"></i>
      </div>
      <p class="text-sm font-medium text-slate-500">등록된 학생이 없습니다.</p>
    </div>
  </div>

  <!-- 학생 명단 -->
  <div
    th:unless="${#lists.isEmpty(classroom.members)}"
    class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden"
  >
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">학생 명단</h2>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider uppercase">
            <th class="py-4 px-6 pl-20">학생</th>
            <th class="py-4 px-6">수강 상태</th>
            <th class="py-4 px-6">등록일</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <tr
            th:each="member : ${classroom.members}"
            class="hover:bg-slate-50/50 transition-colors"
          >
            <!-- 학생 정보 -->
            <td class="py-4 px-6">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 text-base shrink-0">
                  <i class="fa-solid fa-user"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-900" th:text="${member.userName}">학생 이름</p>
                  <p class="text-xs text-slate-400 mt-0.5 font-mono" th:text="${member.userId}">아이디</p>
                </div>
              </div>
            </td>

            <!-- 수강 상태 배지 -->
            <td class="py-4 px-6">
              <span th:if="${member.enrlStatCd == '01'}"
                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-600">
                <i class="fa-solid fa-circle-dot text-[8px]"></i> 수강중
              </span>
              <span th:if="${member.enrlStatCd == '02'}"
                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-sky-50 text-sky-600">
                <i class="fa-solid fa-circle-check text-[8px]"></i> 수강완료
              </span>
              <span th:if="${member.enrlStatCd == '03'}"
                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-500">
                <i class="fa-solid fa-circle-xmark text-[8px]"></i> 중도탈퇴
              </span>
              <span th:if="${member.enrlStatCd == '04'}"
                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-500">
                <i class="fa-solid fa-circle text-[8px]"></i> 등록취소
              </span>
            </td>

            <!-- 등록일 -->
            <td class="py-4 px-6 text-xs text-slate-400 font-mono" th:text="${member.formattedRegDt}">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 하단 요약 -->
    <div class="border-t border-slate-100 px-6 py-3 bg-slate-50/50">
      <p class="text-xs text-slate-400">
        전체
        <span class="font-semibold text-slate-600" th:text="${#lists.size(classroom.members)}">0</span>명
      </p>
    </div>
  </div>
</div>
