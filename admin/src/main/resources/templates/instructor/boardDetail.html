<div class="p-6">

  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-800">게시글 상세</h1>
    <a href="/instructor/board/list" class="hm-btn-primary hm-btn-sky text-base">
      <i class="fa-solid fa-list"></i>
      목록으로
    </a>
  </div>

  <!-- 게시글 상세 카드 -->
  <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">

    <!-- 제목 영역 -->
    <div class="border-b border-slate-100 px-8 py-6">
      <h2 class="text-xl font-semibold text-slate-800" th:text="${board.title}"></h2>
      <div class="mt-3 flex items-center gap-6 text-sm text-slate-500">
        <span>
          <i class="fa-regular fa-user mr-1"></i>
          <span th:text="${board.userName}"></span>
        </span>
        <span>
          <i class="fa-regular fa-calendar mr-1"></i>
          <span th:text="${board.regDt}"></span>
        </span>
      </div>
    </div>

    <!-- 본문 영역 -->
    <div class="min-h-64 px-8 py-6 text-base leading-relaxed text-slate-700" th:text="${board.content}"></div>

  </div>

</div>
