<div class="p-6">
  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-800">게시글 상세</h1>
    <div class="flex gap-2">
      <!-- 활성 게시글: 수정 + 삭제 버튼 -->
      <th:block th:if="${board.useYn != 'N'}">
        <a
          th:href="@{/instructor/board/updateForm/{postSn}(postSn=${board.postSn})}"
          class="hm-btn-primary hm-btn-sky text-base"
        >
          <i class="fa-solid fa-pen"></i>
          수정
        </a>
        <form
          id="deleteForm"
          th:action="@{/instructor/board/delete/{postSn}(postSn=${board.postSn})}"
          method="post"
        >
          <button
            type="button"
            onclick="openDeleteModal()"
            class="hm-btn-danger bg-red-500 hover:bg-red-600 text-base"
          >
            <i class="fa-solid fa-trash"></i>
            삭제
          </button>
        </form>
      </th:block>
      <!-- 삭제된 게시글: 복구 버튼 -->
      <th:block th:if="${board.useYn == 'N'}">
        <form
          th:action="@{/instructor/board/restore/{postSn}(postSn=${board.postSn})}"
          method="post"
        >
          <button type="submit" class="hm-btn-primary hm-btn-emerald text-base">
            <i class="fa-solid fa-rotate-left"></i>
            복구
          </button>
        </form>
      </th:block>
      <a href="/instructor/board/list" class="hm-btn-secondary text-base">
        <i class="fa-solid fa-list"></i>
        목록으로
      </a>
    </div>
  </div>

  <!-- 성공 메시지 -->
  <div
    th:if="${successMessage}"
    class="mb-4 rounded-xl border border-green-200 bg-green-50 px-5 py-3 text-sm text-green-600"
  >
    <i class="fa-solid fa-circle-check mr-1"></i>
    <span th:text="${successMessage}"></span>
  </div>

  <!-- 게시글 상세 카드 -->
  <div
    class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
    th:classappend="${board.useYn == 'N'} ? 'opacity-60'"
  >
    <!-- 제목 영역 -->
    <div class="border-b border-slate-100 px-8 py-6">
      <div class="flex items-center gap-3">
        <span
          th:if="${board.useYn == 'N'}"
          class="inline-block rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-500"
          >삭제됨</span
        >
        <h2
          class="text-xl font-semibold text-slate-800"
          th:classappend="${board.useYn == 'N'} ? 'line-through text-slate-400'"
          th:text="${board.title}"
        ></h2>
      </div>
      <div class="mt-3 flex items-center gap-4 text-sm text-slate-500">
        <span
          th:if="${board.boardTypeCd == '02'}"
          class="inline-block rounded-full bg-sky-100 px-2.5 py-0.5 text-xs font-semibold text-sky-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span
          th:if="${board.boardTypeCd == '03'}"
          class="inline-block rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-semibold text-amber-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span
          th:if="${board.boardTypeCd == '04'}"
          class="inline-block rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-semibold text-emerald-700"
          th:text="${board.boardTypeNm}"
        ></span>
        <span>
          <i class="fa-regular fa-user mr-1"></i>
          <span th:text="${board.userName}"></span>
        </span>
        <span>
          <i class="fa-regular fa-calendar mr-1"></i>
          <span th:text="${board.regDt}"></span>
        </span>
      </div>
    </div>

    <!-- 본문 영역 -->
    <div
      class="min-h-64 px-8 py-6 text-base leading-relaxed text-slate-700"
      th:utext="${board.content}"
    ></div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div
  id="deleteModal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm"
>
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="mb-4 flex items-center gap-3">
      <div
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-100"
      >
        <i class="fa-solid fa-triangle-exclamation text-red-500"></i>
      </div>
      <h3 class="text-base font-semibold text-slate-800">게시글 삭제</h3>
    </div>
    <p class="mb-6 text-sm text-slate-500">
      삭제된 게시글은 목록에서 숨겨지며,<br />상세 페이지에서 복구할 수
      있습니다.
    </p>
    <div class="flex justify-end gap-2">
      <button
        type="button"
        onclick="closeDeleteModal()"
        class="hm-btn-secondary bg-slate-200 text-slate-700 hover:bg-slate-300 text-sm"
      >
        취소
      </button>
      <button
        type="button"
        onclick="document.getElementById('deleteForm').submit()"
        class="hm-btn-danger bg-red-500 hover:bg-red-600 text-sm"
      >
        <i class="fa-solid fa-trash"></i>
        삭제
      </button>
    </div>
  </div>
</div>

<script>
  function openDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }
  function closeDeleteModal() {
    const modal = document.getElementById("deleteModal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }
  document
    .getElementById("deleteModal")
    .addEventListener("click", function (e) {
      if (e.target === this) closeDeleteModal();
    });
</script>
