<div class="p-6">
  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">담당 클래스 관리</h1>
      <p class="mt-1 text-sm text-slate-500">담당 클래스룸 목록과 수강 현황을 확인합니다.</p>
    </div>
    <span class="flex items-center gap-1.5 rounded-full bg-sky-100 px-3 py-1.5 text-xs font-semibold text-sky-700">
      <i class="fa-solid fa-chalkboard"></i>
      총 <span th:text="${#lists.size(classroomList)}">0</span>개 클래스룸
    </span>
  </div>

  <!-- 클래스룸 테이블 -->
  <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
    <table class="w-full text-base">
      <thead>
        <tr class="border-b border-slate-200 bg-slate-50">
          <th class="px-6 py-4 text-left text-sm font-semibold text-slate-500">클래스룸 이름</th>
          <th class="px-6 py-4 text-left text-sm font-semibold text-slate-500">강좌명</th>
          <th class="w-28 px-6 py-4 text-left text-sm font-semibold text-slate-500">상태</th>
          <th class="w-32 px-6 py-4 text-left text-sm font-semibold text-slate-500">수강중 학생</th>
          <th class="w-44 px-6 py-4 text-left text-sm font-semibold text-slate-500">생성일</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        <tr th:each="classroom : ${classroomList}"
            class="transition-colors hover:bg-sky-50">
          <td class="px-6 py-4 font-medium text-slate-800" th:text="${classroom.classNm}"></td>
          <td class="px-6 py-4 text-sm text-slate-500" th:text="${classroom.courseNm}"></td>
          <td class="px-6 py-4">
            <span th:if="${classroom.classStatCd == '01'}"
                  class="inline-block rounded-full bg-sky-100 px-2.5 py-0.5 text-xs font-semibold text-sky-700">모집중</span>
            <span th:if="${classroom.classStatCd == '02'}"
                  class="inline-block rounded-full bg-emerald-100 px-2.5 py-0.5 text-xs font-semibold text-emerald-700">운영중</span>
            <span th:if="${classroom.classStatCd == '03'}"
                  class="inline-block rounded-full bg-slate-100 px-2.5 py-0.5 text-xs font-semibold text-slate-500">종료</span>
            <span th:if="${classroom.classStatCd == '04'}"
                  class="inline-block rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-semibold text-amber-700">대기</span>
          </td>
          <td class="px-6 py-4 text-sm text-slate-600">
            <span th:text="${classroom.studentCount}">0</span>명
          </td>
          <td class="px-6 py-4 text-sm text-slate-500" th:text="${classroom.formattedRegDt}"></td>
        </tr>
        <!-- 클래스룸이 없을 때 -->
        <tr th:if="${#lists.isEmpty(classroomList)}">
          <td colspan="5" class="px-6 py-16 text-center text-sm text-slate-400">
            <i class="fa-solid fa-chalkboard mb-2 block text-3xl text-slate-200"></i>
            담당 클래스룸이 없습니다.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
