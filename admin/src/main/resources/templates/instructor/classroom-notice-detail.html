<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${classroom.classNm} + ' | 공지 상세'">공지 상세</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }</style>
</head>
<body class="h-screen flex flex-col bg-white overflow-hidden">

  <header class="h-12 bg-white border-b border-slate-200 flex items-center px-6 gap-4 flex-shrink-0">
    <a href="/instructor/classroom/list"
       class="text-slate-400 hover:text-slate-600 transition-colors text-xs flex items-center gap-1">
      <i class="fa-solid fa-chevron-left text-[10px]"></i> 클래스 목록
    </a>
    <div class="w-px h-4 bg-slate-200"></div>
    <span class="text-sm font-bold text-slate-700" th:text="${classroom.classNm}">클래스룸</span>
  </header>

  <div class="flex flex-1 overflow-hidden">

    <!-- ===================== LEFT PANEL ===================== -->
    <aside class="w-64 bg-white border-r border-slate-200 p-5 flex flex-col gap-6 flex-shrink-0 overflow-y-auto">

      <div class="flex flex-col items-center">
        <div class="w-20 h-20 rounded-[2rem] bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-2xl font-bold shadow-xl shadow-blue-100 mb-3 rotate-3 hover:rotate-0 transition-transform cursor-pointer select-none"
             th:text="${#strings.substring(classroom.instrNm, 0, 1)}">김</div>
        <h3 class="font-bold text-slate-800 text-base" th:text="${classroom.instrNm + ' 강사'}">김민준 강사</h3>
        <span class="text-blue-500 text-xs font-bold bg-blue-50 px-2 py-0.5 rounded-md mt-1"
              th:text="${classroom.classNm}">영어 A반</span>
      </div>

      <div class="h-px bg-gradient-to-r from-transparent via-slate-200 to-transparent"></div>

      <div class="space-y-3">
        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest pl-1">Information</h4>
        <div class="bg-slate-50/50 rounded-2xl p-3 space-y-2 border border-slate-100">
          <div class="flex justify-between text-[11px] font-bold">
            <span class="text-slate-400">📚 강좌</span>
            <span class="text-slate-700" th:text="${classroom.courseNm}">수능 영어</span>
          </div>
          <div class="flex justify-between text-[11px] font-bold">
            <span class="text-slate-400">👥 수강 인원</span>
            <span class="text-slate-700" th:text="${classroom.memberCount + '명'}">32명</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="flex-1 overflow-y-auto p-6 bg-[#F8FAFC]">
      <div class="max-w-[1000px] w-full flex flex-col gap-5">

        <!-- 탭 네비게이션 -->
        <nav class="flex items-center gap-1 bg-slate-200/60 p-1 rounded-xl w-fit border border-slate-200/10">
          <a th:href="@{/instructor/classroom/detail/{sn}(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors">홈</a>
          <a th:href="@{/instructor/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 bg-blue-600 text-white shadow-sm shadow-blue-500/20">공지사항</a>
          <a th:href="@{/instructor/classroom/detail/{sn}/lectures(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors">온라인 강의</a>
          <a th:href="@{/instructor/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors">과제 제출</a>
          <a th:href="@{/instructor/classroom/detail/{sn}/qna(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors">1:1 Q&amp;A</a>
          <a th:href="@{/instructor/classroom/detail/{sn}/grades(sn=${classroom.classSn})}"
             class="px-4 py-1.5 text-xs font-bold rounded-lg flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors">성적 관리</a>
        </nav>

        <!-- 공지 상세 -->
        <div th:if="${notice != null}" class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
          <div class="px-6 py-5 border-b border-slate-100">
            <h1 class="text-base font-bold text-slate-800" th:text="${notice.postSj}">공지 제목</h1>
            <div class="flex items-center gap-3 mt-2 text-xs text-slate-400">
              <span th:text="${notice.memberDto != null ? notice.memberDto.userName : notice.wrtrUserId}">작성자</span>
              <span class="w-px h-3 bg-slate-200"></span>
              <span th:text="${notice.regDt != null ? #temporals.format(notice.regDt, 'yyyy-MM-dd HH:mm') : '-'}">2026-06-01 09:00</span>
              <span class="w-px h-3 bg-slate-200"></span>
              <span>조회 <span th:text="${notice.inqCnt}">0</span></span>
            </div>
          </div>
          <div class="px-6 py-6 text-sm text-slate-700 leading-relaxed whitespace-pre-wrap min-h-[200px]"
               th:text="${notice.postCn}">공지 내용</div>
          <div class="px-6 py-4 border-t border-slate-100 bg-slate-50/50 flex justify-between items-center">
            <a th:href="@{/instructor/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
               class="text-xs font-bold text-slate-500 hover:text-slate-700 flex items-center gap-1 transition-colors">
              <i class="fa-solid fa-chevron-left text-[10px]"></i> 목록으로
            </a>
            <form th:action="@{/instructor/classroom/detail/{sn}/notice/{postSn}/delete(sn=${classroom.classSn},postSn=${notice.postSn})}"
                  method="post"
                  onsubmit="return confirm('삭제하시겠습니까?')">
              <button type="submit"
                      class="text-xs font-bold text-rose-400 hover:text-rose-600 transition-colors">삭제</button>
            </form>
          </div>
        </div>

        <!-- notice가 null인 경우 -->
        <div th:unless="${notice != null}"
             class="bg-white rounded-2xl border border-slate-200/80 shadow-sm p-16 flex flex-col items-center justify-center text-center gap-3">
          <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-2xl">
            <i class="fa-solid fa-circle-exclamation"></i>
          </div>
          <p class="text-sm font-medium text-slate-500">존재하지 않는 공지사항입니다.</p>
          <a th:href="@{/instructor/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
             class="text-xs font-bold text-blue-500 hover:text-blue-700 transition-colors">목록으로 돌아가기</a>
        </div>

      </div>
    </main>
  </div>

</body>
</html>
