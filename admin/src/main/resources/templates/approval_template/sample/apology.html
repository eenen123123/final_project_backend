<div class="doc-wrap">
<style>
  .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
  .doc-title { text-align: center; font-size: 26px; font-weight: bold; letter-spacing: 8px; margin: 4px 0 16px; }
  .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .doc-table th, .doc-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .th { background: #ddd; font-weight: bold; text-align: center; white-space: nowrap; }
  .doc-input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; }
  .doc-textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; resize: vertical; min-height: 200px; }
</style>

<div class="doc-title">시 말 서</div>

<table class="doc-table">
  <colgroup><col width="13%"><col width="20%"><col width="13%"><col width="20%"><col width="13%"><col></colgroup>
  <tr>
    <td class="th">기안부서</td>
    <td><input class="doc-input" type="text" name="dept"></td>
    <td class="th">기 안 일</td>
    <td><input class="doc-input" type="date" name="draftDate"></td>
    <td class="th">문서번호</td>
    <td><input class="doc-input" type="text" name="docNo"></td>
  </tr>
  <tr>
    <td class="th">기 안 자</td>
    <td><input class="doc-input" type="text" name="drafter"></td>
    <td class="th">보존연한</td>
    <td><input class="doc-input" type="text" name="preservePeriod" placeholder="5년"></td>
    <td class="th">비밀등급</td>
    <td><input class="doc-input" type="text" name="securityLevel" placeholder="1등급"></td>
  </tr>
  <tr>
    <td class="th">합의</td>
    <td colspan="5"><input class="doc-input" type="text" name="agreement"></td>
  </tr>
  <tr>
    <td class="th">제목</td>
    <td colspan="5"><input class="doc-input" type="text" name="subject" placeholder="시말서를 제출합니다."></td>
  </tr>
</table>

<table class="doc-table">
  <colgroup><col width="13%"><col width="37%"><col width="13%"><col></colgroup>
  <tr>
    <td class="th">부서</td>
    <td><input class="doc-input" type="text" name="mainDept"></td>
    <td class="th">직위</td>
    <td><input class="doc-input" type="text" name="position"></td>
  </tr>
  <tr>
    <td class="th">성명</td>
    <td colspan="3"><input class="doc-input" type="text" name="name"></td>
  </tr>
  <tr>
    <td class="th" style="vertical-align:top; padding-top:8px;">내용</td>
    <td colspan="3"><textarea class="doc-textarea" name="content" rows="14"></textarea></td>
  </tr>
</table>

<div style="text-align:center; margin-top:20px; font-size:13px;">
  <div style="margin-bottom:8px;"><input class="doc-input" type="text" name="submitDate" style="width:200px; text-align:center; border-bottom:1px solid #000;"></div>
  <table style="margin:0 auto; border-collapse:collapse; width:400px;">
    <tr>
      <td style="text-align:right; padding-right:12px;">작 성 자 :</td>
      <td style="border-bottom:1px solid #000; width:150px;"><input class="doc-input" type="text" name="writer"></td>
    </tr>
    <tr>
      <td style="text-align:right; padding-right:12px;">소속부서장 :</td>
      <td style="border-bottom:1px solid #000;"><input class="doc-input" type="text" name="deptHead"></td>
    </tr>
  </table>
</div>

<p style="text-align:center; font-size:12px; margin-top:16px;">상기 작성 내용에 허위가 없습니다.</p>
</div>
