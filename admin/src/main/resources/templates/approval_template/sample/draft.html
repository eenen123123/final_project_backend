<div class="doc-wrap">
<style>
  .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
  .doc-title { text-align: center; font-size: 26px; font-weight: bold; letter-spacing: 8px; margin: 4px 0 16px; }
  .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .doc-table th, .doc-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .th { background: #ddd; font-weight: bold; text-align: center; white-space: nowrap; }
  .doc-input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; }
  .doc-textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; resize: vertical; min-height: 300px; }
</style>

<div class="doc-title">기 안 용 지</div>

<table class="doc-table">
  <colgroup><col width="13%"><col width="20%"><col width="13%"><col width="20%"><col width="13%"><col></colgroup>
  <tr>
    <td class="th">문서번호</td>
    <td><input class="doc-input" type="text" name="docNo"></td>
    <td class="th">부서</td>
    <td><input class="doc-input" type="text" name="dept"></td>
    <td class="th">기 안 일</td>
    <td><input class="doc-input" type="date" name="draftDate"></td>
  </tr>
  <tr>
    <td class="th">기 안 자</td>
    <td><input class="doc-input" type="text" name="drafter"></td>
    <td class="th">시행일자</td>
    <td><input class="doc-input" type="date" name="executeDate"></td>
    <td class="th">결재내용</td>
    <td><input class="doc-input" type="text" name="approvalContent"></td>
  </tr>
</table>

<table class="doc-table">
  <colgroup><col width="13%"><col></colgroup>
  <tr>
    <td class="th">수 신</td>
    <td><input class="doc-input" type="text" name="recipient"></td>
  </tr>
  <tr>
    <td class="th">참 조</td>
    <td><input class="doc-input" type="text" name="cc"></td>
  </tr>
  <tr>
    <td class="th">합의부서</td>
    <td><input class="doc-input" type="text" name="agreementDept"></td>
  </tr>
  <tr>
    <td class="th">제 목</td>
    <td><input class="doc-input" type="text" name="subject"></td>
  </tr>
  <tr>
    <td colspan="2" class="th" style="text-align:center;">상 세 내 용</td>
  </tr>
  <tr>
    <td colspan="2"><textarea class="doc-textarea" name="content" rows="18"></textarea></td>
  </tr>
</table>
</div>
