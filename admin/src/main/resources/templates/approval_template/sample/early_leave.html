<div class="doc-wrap">
<style>
  .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
  .doc-title { text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 4px; margin: 4px 0 16px; }
  .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .doc-table th, .doc-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .th { background: #ddd; font-weight: bold; text-align: center; white-space: nowrap; }
  .doc-input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; }
  .doc-textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px; }
</style>

<div class="doc-title">조퇴신청서</div>

<div style="display:flex; gap:20px; margin-bottom:10px;">
  <table class="doc-table" style="width:300px; flex-shrink:0;">
    <colgroup><col width="90px"><col></colgroup>
    <tr>
      <td class="th">문서번호</td>
      <td><input class="doc-input" type="text" name="docNo"></td>
    </tr>
    <tr>
      <td class="th">기안팀</td>
      <td><input class="doc-input" type="text" name="dept"></td>
    </tr>
    <tr>
      <td class="th">기안자</td>
      <td><input class="doc-input" type="text" name="drafter"></td>
    </tr>
    <tr>
      <td class="th">기안일자</td>
      <td><input class="doc-input" type="date" name="draftDate"></td>
    </tr>
  </table>
</div>

<table class="doc-table">
  <colgroup><col width="13%"><col width="37%"><col width="13%"><col></colgroup>
  <tr>
    <td class="th">시행자</td>
    <td><input class="doc-input" type="text" name="applicant"></td>
    <td class="th">신청기간</td>
    <td>
      <input class="doc-input" type="date" name="periodFrom" style="width:auto; display:inline-block;">
      &nbsp;~&nbsp;
      <input class="doc-input" type="date" name="periodTo" style="width:auto; display:inline-block;">
    </td>
  </tr>
  <tr>
    <td class="th">부서</td>
    <td><input class="doc-input" type="text" name="mainDept"></td>
    <td class="th">직위</td>
    <td><input class="doc-input" type="text" name="position"></td>
  </tr>
  <tr>
    <td class="th">제목</td>
    <td colspan="3"><input class="doc-input" type="text" name="subject"></td>
  </tr>
</table>

<table class="doc-table">
  <colgroup><col width="13%"><col></colgroup>
  <tr>
    <td class="th">조퇴날짜 및 시간</td>
    <td>
      From&nbsp;
      <input class="doc-input" type="date" name="leaveFrom" style="width:auto; display:inline-block;">
      &nbsp;
      <input class="doc-input" type="time" name="leaveFromTime" style="width:auto; display:inline-block;">
      &nbsp;~ To&nbsp;
      <input class="doc-input" type="date" name="leaveTo" style="width:auto; display:inline-block;">
      &nbsp;
      <input class="doc-input" type="time" name="leaveToTime" style="width:auto; display:inline-block;">
      &nbsp;(총&nbsp;<input class="doc-input" type="text" name="totalHours" style="width:60px; display:inline-block;">시간)
    </td>
  </tr>
  <tr>
    <td class="th" style="vertical-align:top; padding-top:8px;">조퇴사유</td>
    <td><textarea class="doc-textarea" name="reason" rows="4"></textarea></td>
  </tr>
  <tr>
    <td class="th">행선지</td>
    <td><input class="doc-input" type="text" name="destination"></td>
  </tr>
  <tr>
    <td class="th">긴급연락처</td>
    <td><input class="doc-input" type="text" name="emergencyContact"></td>
  </tr>
</table>

<p style="text-align:center; margin:12px 0 6px;">상기와 같이 조퇴를 신청합니다.</p>
<table style="margin:0 auto; border-collapse:collapse; width:340px;">
  <tr>
    <td style="padding-right:10px;">신청일자 :</td>
    <td style="border-bottom:1px solid #000;"><input class="doc-input" type="date" name="submitDate"></td>
  </tr>
  <tr style="margin-top:4px;">
    <td style="padding-right:10px;">신청인성명 :</td>
    <td style="border-bottom:1px solid #000;"><input class="doc-input" type="text" name="submitName"></td>
  </tr>
</table>
</div>
