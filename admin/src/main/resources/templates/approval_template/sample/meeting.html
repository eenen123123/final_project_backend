<div class="doc-wrap">
<style>
  .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
  .doc-title { font-size: 26px; font-weight: bold; margin: 4px 0 12px; }
  .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .doc-table th, .doc-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .th { background: #ddd; font-weight: bold; text-align: center; white-space: nowrap; }
  .doc-input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; }
  .doc-textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; resize: vertical; min-height: 200px; }
</style>

<div class="doc-title">회 의 록</div>

<table class="doc-table">
  <colgroup><col width="13%"><col width="20%"><col width="13%"><col width="20%"><col width="13%"><col></colgroup>
  <tr>
    <td class="th">문서번호</td>
    <td><input class="doc-input" type="text" name="docNo"></td>
    <td class="th">보안등급</td>
    <td><input class="doc-input" type="text" name="securityLevel" placeholder="1등급"></td>
    <td class="th">기안일시</td>
    <td><input class="doc-input" type="date" name="draftDate"></td>
  </tr>
  <tr>
    <td class="th">기안자</td>
    <td><input class="doc-input" type="text" name="drafter"></td>
    <td class="th">부서</td>
    <td><input class="doc-input" type="text" name="dept"></td>
    <td class="th">보존연한</td>
    <td><input class="doc-input" type="text" name="preservePeriod" placeholder="5년"></td>
  </tr>
  <tr>
    <td class="th">협조</td>
    <td colspan="5"><input class="doc-input" type="text" name="collaborator"></td>
  </tr>
</table>

<table class="doc-table">
  <colgroup><col width="13%"><col></colgroup>
  <tr>
    <td class="th">주관(팀)부서</td>
    <td><input class="doc-input" type="text" name="mainDept"></td>
  </tr>
  <tr>
    <td class="th">회의일자</td>
    <td><input class="doc-input" type="date" name="meetingDate"></td>
  </tr>
  <tr>
    <td class="th">회의장소</td>
    <td><input class="doc-input" type="text" name="meetingPlace"></td>
  </tr>
  <tr>
    <td class="th">작성자</td>
    <td><input class="doc-input" type="text" name="writer"></td>
  </tr>
  <tr>
    <td class="th">회의참석자</td>
    <td><input class="doc-input" type="text" name="attendees"></td>
  </tr>
  <tr>
    <td class="th">주제</td>
    <td><input class="doc-input" type="text" name="subject"></td>
  </tr>
  <tr>
    <td class="th" style="vertical-align:top; padding-top:8px;">내용</td>
    <td><textarea class="doc-textarea" name="content" rows="14"></textarea></td>
  </tr>
</table>
</div>
