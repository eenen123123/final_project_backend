<div class="doc-wrap">
<style>
  .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
  .doc-title { text-align: center; font-size: 26px; font-weight: bold; letter-spacing: 6px; margin: 4px 0 16px; }
  .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
  .doc-table th, .doc-table td { border: 1px solid #000; padding: 5px 8px; vertical-align: middle; }
  .th { background: #ddd; font-weight: bold; text-align: center; white-space: nowrap; }
  .tc { text-align: center; }
  .tr { text-align: right; }
  .doc-input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; }
  .doc-textarea { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 13px; resize: vertical; }
  .btn-sm { padding: 2px 8px; font-size: 12px; cursor: pointer; border: 1px solid #999; background: #f5f5f5; border-radius: 3px; }
  .btn-del { background: #fee2e2; border-color: #fca5a5; }
</style>

<div class="doc-title">지 출 품 의 서</div>

<div style="display:flex; gap:20px; margin-bottom:10px;">
  <table class="doc-table" style="width:300px; flex-shrink:0;">
    <colgroup><col width="90px"><col></colgroup>
    <tr>
      <td class="th">기안자</td>
      <td><input class="doc-input" type="text" name="drafter"></td>
    </tr>
    <tr>
      <td class="th">소속</td>
      <td><input class="doc-input" type="text" name="dept"></td>
    </tr>
    <tr>
      <td class="th">기안일</td>
      <td><input class="doc-input" type="date" name="draftDate"></td>
    </tr>
    <tr>
      <td class="th">문서번호</td>
      <td><input class="doc-input" type="text" name="docNo"></td>
    </tr>
  </table>
</div>

<table class="doc-table">
  <colgroup><col width="13%"><col></colgroup>
  <tr>
    <td class="th">제목</td>
    <td><input class="doc-input" type="text" name="subject"></td>
  </tr>
  <tr>
    <td class="th">작성일자</td>
    <td style="display:flex; align-items:center; gap:20px;">
      <span>작성일자 <input class="doc-input" type="date" name="writeDate" style="width:150px; display:inline-block;"></span>
      <span>지급요청일 <input class="doc-input" type="date" name="payRequestDate" style="width:150px; display:inline-block;"></span>
    </td>
  </tr>
  <tr>
    <td class="th">내용</td>
    <td><input class="doc-input" type="text" name="description"></td>
  </tr>
</table>

<div style="text-align:right; margin-bottom:4px;">
  <button type="button" class="btn-sm" onclick="addExpenseRow()">추가</button>
  <button type="button" class="btn-sm btn-del" onclick="removeExpenseRow()">삭제</button>
</div>

<table class="doc-table" id="expenseTable">
  <colgroup><col width="22%"><col width="12%"><col width="8%"><col width="12%"><col width="14%"><col width="12%"><col></colgroup>
  <thead>
    <tr>
      <td class="th">품명</td>
      <td class="th">규격</td>
      <td class="th">수량</td>
      <td class="th">단가</td>
      <td class="th">금액</td>
      <td class="th">세액</td>
      <td class="th">비고</td>
    </tr>
  </thead>
  <tbody id="expenseBody">
    <tr>
      <td><input class="doc-input" type="text" name="itemName[]"></td>
      <td><input class="doc-input" type="text" name="itemSpec[]"></td>
      <td><input class="doc-input tc" type="number" name="itemQty[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="number" name="itemPrice[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="text" name="itemAmount[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemTax[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemNote[]"></td>
    </tr>
    <tr>
      <td><input class="doc-input" type="text" name="itemName[]"></td>
      <td><input class="doc-input" type="text" name="itemSpec[]"></td>
      <td><input class="doc-input tc" type="number" name="itemQty[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="number" name="itemPrice[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="text" name="itemAmount[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemTax[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemNote[]"></td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td colspan="4" class="th tc">합계</td>
      <td id="totalAmount" style="text-align:right; font-weight:bold; padding:5px 8px;">0</td>
      <td id="totalTax" style="text-align:right; font-weight:bold; padding:5px 8px;">0</td>
      <td id="totalSum" style="text-align:right; font-weight:bold; padding:5px 8px;">0</td>
    </tr>
  </tfoot>
</table>

<table class="doc-table">
  <tr>
    <td class="th" style="width:13%;">기타</td>
    <td><textarea class="doc-textarea" name="etc" rows="3"></textarea></td>
  </tr>
</table>

<script>
  function calcRow(input) {
    const row = input.closest('tr');
    const qty = parseFloat(row.querySelector('[name="itemQty[]"]').value) || 0;
    const price = parseFloat(row.querySelector('[name="itemPrice[]"]').value) || 0;
    const amount = qty * price;
    const tax = Math.round(amount * 0.1);
    row.querySelector('[name="itemAmount[]"]').value = amount.toLocaleString();
    row.querySelector('[name="itemTax[]"]').value = tax.toLocaleString();
    calcTotal();
  }

  function calcTotal() {
    let totalAmt = 0, totalTax = 0;
    document.querySelectorAll('[name="itemAmount[]"]').forEach(el => {
      totalAmt += parseFloat(el.value.replace(/,/g,'')) || 0;
    });
    document.querySelectorAll('[name="itemTax[]"]').forEach(el => {
      totalTax += parseFloat(el.value.replace(/,/g,'')) || 0;
    });
    document.getElementById('totalAmount').textContent = totalAmt.toLocaleString();
    document.getElementById('totalTax').textContent = totalTax.toLocaleString();
    document.getElementById('totalSum').textContent = (totalAmt + totalTax).toLocaleString();
  }

  function addExpenseRow() {
    const tbody = document.getElementById('expenseBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input class="doc-input" type="text" name="itemName[]"></td>
      <td><input class="doc-input" type="text" name="itemSpec[]"></td>
      <td><input class="doc-input" type="number" name="itemQty[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="number" name="itemPrice[]" min="0" oninput="calcRow(this)" style="text-align:right;"></td>
      <td><input class="doc-input" type="text" name="itemAmount[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemTax[]" readonly style="text-align:right; background:#f9f9f9;"></td>
      <td><input class="doc-input" type="text" name="itemNote[]"></td>`;
    tbody.appendChild(tr);
  }

  function removeExpenseRow() {
    const tbody = document.getElementById('expenseBody');
    if (tbody.rows.length > 1) { tbody.deleteRow(tbody.rows.length - 1); calcTotal(); }
  }
</script>
</div>
