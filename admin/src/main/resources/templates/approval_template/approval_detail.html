<th:block th:fragment="pageCss">
  <style>
    .step-approved {
      border-color: #059669;
      color: #059669;
      background: #d1fae5;
    }
    .step-progress {
      border-color: #7c3aed;
      color: #7c3aed;
      background: #ede9fe;
    }
    .step-waiting {
      border-color: #e2e8f0;
      color: #94a3b8;
      background: #f8fafc;
    }
    .step-rejected {
      border-color: #dc2626;
      color: #dc2626;
      background: #fee2e2;
    }
    .step-skipped {
      border-color: #e2e8f0;
      color: #cbd5e1;
      background: #f8fafc;
    }

    .connector-done {
      background: #059669;
    }
    .connector-wait {
      background: #e2e8f0;
    }

    .line-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      min-width: 5rem;
    }
    .line-step-circle {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      border: 2px solid;
    }
    .line-connector {
      flex: 1;
      height: 2px;
      margin-top: 1.25rem;
    }

    /* 공문서 양식 스타일 */
    .doc-wrap { font-family: '맑은 고딕', 'Malgun Gothic', dotum, sans-serif; font-size: 13px; color: #000; }
    .doc-title { text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 8px; margin: 4px 0 14px; }
    .doc-table { border-collapse: collapse; width: 100%; margin-bottom: 10px; }
    .doc-table th, .doc-table td { border: 1px solid #555; padding: 5px 10px; vertical-align: middle; }
    .doc-th { background: #e8e8e8; font-weight: bold; text-align: center; white-space: nowrap; }
    .doc-section-head { background: #d0d0d0; font-weight: bold; text-align: center; font-size: 12px; letter-spacing: 2px; }
    .doc-changed { background: #fffbeb; }
    .doc-changed-val { color: #b45309; font-weight: bold; }
    .doc-col-head { background: #ececec; font-weight: bold; text-align: center; font-size: 11px; }
  </style>
</th:block>

<title th:fragment="pageTitle" th:text="${doc.aprvlDocSj + ' | HERMES'}">
  결재 상세 | HERMES
</title>

<div class="space-y-5 max-w-7xl mx-auto">
  <!-- ───────── 브레드크럼 ───────── -->
  <div class="flex items-center gap-2 text-md text-slate-400">
    <a href="/admin/approval" class="hover:text-violet-600 transition-colors"
      >전자결재</a
    >
    <i class="fa-solid fa-chevron-right text-xs"></i>
    <span class="text-slate-600 font-medium">결재 상세</span>
  </div>

  <!-- ───────── 문서 헤더 ───────── -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <div class="flex items-start justify-between gap-4 flex-wrap">
      <div>
        <div class="flex items-center gap-2 mb-2">
          <span
            class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-violet-50 text-violet-700"
            th:text="${doc.tmplCd}"
            >유형</span
          >
          <span
            th:switch="${doc.aprvlPrgrsCd.name()}"
            class="flex items-center gap-1"
          >
            <span
              th:case="'DRAFT'"
              class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-slate-100 text-slate-500"
              >임시저장</span
            >
            <span
              th:case="'PENDING'"
              class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-amber-50 text-amber-600"
              >결재 진행 중</span
            >
            <span
              th:case="'APPROVED'"
              class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-emerald-50 text-emerald-700"
              >최종 승인</span
            >
            <span
              th:case="'REJECTED'"
              class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-red-50 text-red-600"
              >반려</span
            >
            <span
              th:case="'CANCELLED'"
              class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-slate-100 text-slate-400"
              >취소됨</span
            >
          </span>
        </div>
        <h1
          class="text-xl font-bold text-slate-800 mb-2"
          th:text="${doc.aprvlDocSj}"
        >
          문서 제목
        </h1>
        <div class="flex items-center gap-4 text-xs text-slate-400">
          <span
            ><i class="fa-solid fa-user mr-1"></i>기안자:
            <span class="text-slate-600 font-medium" th:text="${doc.drftUserId}"
              >기안자</span
            ></span
          >
          <span
            ><i class="fa-regular fa-calendar mr-1"></i>기안일:
            <span
              class="text-slate-600"
              th:text="${#temporals.format(doc.drftRegDt, 'yyyy-MM-dd')}"
              >2026-05-29</span
            ></span
          >
          <span
            th:if="${doc.aprvlPrgrsCd.name() == 'APPROVED' or doc.aprvlPrgrsCd.name() == 'REJECTED'}"
          >
            <i class="fa-regular fa-calendar-check mr-1"></i>처리일:
            <span
              class="text-slate-600"
              th:text="${#temporals.format(doc.mdfcnDt, 'yyyy-MM-dd')}"
              >2026-05-30</span
            >
          </span>
        </div>
      </div>

      <!-- 기안자 회수 버튼 -->
      <form
        th:if="${isDrafter and doc.aprvlPrgrsCd.name() == 'PENDING' and canCancel}"
        th:action="@{/admin/approval/{sn}/cancel(sn=${doc.aprvlDocSn})}"
        method="post"
      >
        <button
          type="submit"
          onclick="return confirm('결재를 회수하시겠습니까?');"
          class="px-4 py-2 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
        >
          <i class="fa-solid fa-rotate-left mr-1"></i>회수
        </button>
      </form>

      <!-- 기안자 삭제 버튼 -->
      <form
        th:if="${isDrafter and doc.aprvlPrgrsCd.name() == 'DRAFT' and canDelete}"
        th:action="@{/admin/approval/{sn}/delete(sn=${doc.aprvlDocSn})}"
        method="post"
      >
        <button
          type="submit"
          onclick="return confirm('결재 문서를 삭제하시겠습니까?');"
          class="px-4 py-2 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
        >
          <i class="fa-solid fa-trash mr-1"></i>삭제
        </button>
      </form>
    </div>
  </div>

  <!-- ───────── 결재선 현황 ───────── -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 flex items-center gap-2 mb-5">
      <i class="fa-solid fa-route text-violet-500"></i> 결재선 현황
    </h2>

    <div class="flex items-start overflow-x-auto pb-2">
      <div class="line-step shrink-0">
        <div class="line-step-circle step-approved">
          <i class="fa-solid fa-check"></i>
        </div>
        <p class="text-xs font-semibold text-slate-700">기안</p>
        <p class="text-xs text-slate-400" th:text="${doc.drftUserId}">기안자</p>
        <p
          class="text-xs text-slate-300"
          th:text="${#temporals.format(doc.drftRegDt, 'MM/dd')}"
        >
          05/29
        </p>
      </div>

      <th:block th:each="line, stat : ${lines}">
        <div
          th:classappend="${line.aprvlPrgrsCd.name() == 'APPROVED' ? 'connector-done' : 'connector-wait'}"
          class="line-connector shrink-0"
        ></div>
        <div class="line-step shrink-0">
          <div
            th:classappend="${'step-' + line.aprvlPrgrsCd.name().toLowerCase()}"
            class="line-step-circle"
          >
            <i
              th:class="${line.aprvlPrgrsCd.name() == 'APPROVED'    ? 'fa-solid fa-check'                      :
                           line.aprvlPrgrsCd.name() == 'IN_PROGRESS' ? 'fa-solid fa-hourglass-half animate-pulse' :
                           line.aprvlPrgrsCd.name() == 'REJECTED'    ? 'fa-solid fa-xmark'                      :
                           line.aprvlPrgrsCd.name() == 'SKIPPED'     ? 'fa-solid fa-minus'                      :
                                                                 'fa-solid fa-clock'}"
            ></i>
          </div>
          <p
            class="text-xs font-semibold text-slate-700"
            th:text="${stat.index + 1 + '차 결재'}"
          >
            1차 결재
          </p>
          <p class="text-xs text-slate-500" th:text="${line.aprvrUserId}">
            결재자
          </p>
          <p
            th:if="${line.aprvlDt != null}"
            class="text-xs text-slate-300"
            th:text="${#temporals.format(line.aprvlDt, 'MM/dd')}"
          >
            05/30
          </p>
          <p
            th:if="${line.aprvlDt == null}"
            class="text-xs"
            th:classappend="${line.aprvlPrgrsCd.name() == 'IN_PROGRESS' ? 'text-violet-400 font-semibold' : 'text-slate-300'}"
            th:text="${line.aprvlPrgrsCd.name() == 'IN_PROGRESS' ? '결재 대기' :
                        line.aprvlPrgrsCd.name() == 'WAITING'     ? '대기'     :
                        line.aprvlPrgrsCd.name() == 'SKIPPED'     ? '스킵'     : ''}"
          >
            대기
          </p>
        </div>
      </th:block>

      <div
        th:classappend="${doc.aprvlPrgrsCd.name() == 'APPROVED' ? 'connector-done' : 'connector-wait'}"
        class="line-connector shrink-0"
      ></div>
      <div class="line-step shrink-0">
        <div
          th:classappend="${doc.aprvlPrgrsCd.name() == 'APPROVED' ? 'step-approved' : 'step-waiting'}"
          class="line-step-circle"
        >
          <i class="fa-solid fa-flag-checkered"></i>
        </div>
        <p
          th:classappend="${doc.aprvlPrgrsCd.name() == 'APPROVED' ? 'text-slate-700' : 'text-slate-300'}"
          class="text-xs font-semibold"
        >
          완료
        </p>
      </div>
    </div>

    <!-- 결재자 코멘트 -->
    <div th:if="${#lists.size(lines) > 0}" class="mt-5 space-y-2">
      <th:block th:each="line : ${lines}">
        <div
          th:if="${line.aprvlRsnCn != null and !#strings.isEmpty(line.aprvlRsnCn)}"
          th:classappend="${line.aprvlPrgrsCd.name() == 'REJECTED' ? 'bg-red-50 border-red-100 text-red-700' : 'bg-slate-50 border-slate-100 text-slate-600'}"
          class="border rounded-xl px-4 py-3 text-sm"
        >
          <p
            class="text-xs font-bold mb-1"
            th:text="${line.aprvrUserId + ' · ' + #temporals.format(line.aprvlDt, 'yyyy-MM-dd HH:mm')}"
          >
            결재자
          </p>
          <p th:text="${line.aprvlRsnCn}">의견</p>
        </div>
      </th:block>
    </div>
  </div>

  <!-- ───────── 기안 내용 ───────── -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 flex items-center gap-2 mb-4">
      <i class="fa-solid fa-file-lines text-violet-500"></i> 기안 내용
    </h2>
    <div class="bg-slate-50 rounded-xl p-6 flex justify-center">
      <div
        id="aprvlDocCn"
        class="w-full max-w-2xl text-sm text-slate-700 leading-relaxed"
        th:utext="${doc.aprvlDocCn}"
      >
        기안 내용이 여기에 표시됩니다.
      </div>
    </div>
  </div>

  <!-- ───────── 결재 처리 영역 (내 차례일 때만 표시) ───────── -->
  <div
    th:if="${isApprover and myLine != null and myLine.aprvlPrgrsCd.name() == 'IN_PROGRESS'}"
    class="bg-white rounded-2xl border-2 border-violet-200 shadow-sm p-6"
  >
    <h2 class="text-sm font-bold text-violet-700 flex items-center gap-2 mb-4">
      <i class="fa-solid fa-stamp"></i> 결재 처리
    </h2>

    <div class="mb-4">
      <label class="block text-xs font-medium text-slate-500 mb-1.5"
        >의견 <span class="text-slate-300">(선택)</span></label
      >
      <textarea
        class="hm-input resize-none"
        id="aprvlComment"
        rows="3"
        placeholder="승인 또는 반려 사유를 입력하세요."
      ></textarea>
    </div>

    <div class="flex gap-3">
      <button
        type="button"
        onclick="processApproval('reject')"
        class="flex-1 py-2.5 text-sm font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-xl border border-red-100 transition-colors"
      >
        <i class="fa-solid fa-xmark mr-1.5"></i>반려
      </button>
      <button
        type="button"
        onclick="processApproval('approve')"
        class="flex-1 py-2.5 text-sm font-semibold text-white bg-violet-600 hover:bg-violet-700 rounded-xl transition-colors"
      >
        <i class="fa-solid fa-check mr-1.5"></i>승인
      </button>
    </div>
  </div>

  <!-- ───────── 하단 버튼 ───────── -->
  <div class="flex justify-between items-center pb-6">
    <a
      href="/admin/approval"
      class="px-5 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
    >
      <i class="fa-solid fa-arrow-left mr-1"></i>목록으로
    </a>
    <a
      th:if="${doc.aprvlPrgrsCd.name() == 'DRAFT'}"
      th:href="@{/admin/approval/{sn}/edit(sn=${doc.aprvlDocSn})}"
      class="hm-btn-primary"
    >
      <i class="fa-solid fa-pen"></i><span>이어 작성</span>
    </a>
  </div>
</div>

<script th:inline="javascript">
  const docSn = /*[[${doc.aprvlDocSn}]]*/ 0;

  function processApproval(action) {
    const comment = document.getElementById("aprvlComment").value.trim();
    const label = action === "approve" ? "승인" : "반려";
    if (action === "reject" && !comment) {
      if (!confirm("반려 사유를 입력하지 않았습니다. 계속하시겠습니까?"))
        return;
    }
    if (!confirm(`결재를 ${label}하시겠습니까?`)) return;

    fetch(`/admin/approval/${docSn}/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ aprvlRsnCn: comment }),
    }).then((r) => {
      if (r.ok) location.reload();
      else
        r.json().then((e) =>
          alert("오류: " + (e.message || "처리에 실패했습니다.")),
        );
    });
  }

  /* ── systemPayload 시각화 ── */
  const ACTION_CONFIG = {
    EMPLOYEE_REGISTER: { label: '직원 신규 등록', color: 'bg-emerald-100 text-emerald-700', border: 'border-emerald-200', icon: 'fa-user-plus',     dot: 'bg-emerald-500' },
    EMPLOYEE_UPDATE:   { label: '직원 정보 수정', color: 'bg-sky-100 text-sky-700',         border: 'border-sky-200',     icon: 'fa-pen-to-square', dot: 'bg-sky-500'     },
    EMPLOYEE_RETIRE:   { label: '직원 퇴사 처리', color: 'bg-red-100 text-red-700',         border: 'border-red-200',     icon: 'fa-user-minus',    dot: 'bg-red-500'     },
    STUDENT_REGISTER:  { label: '학생 신규 등록', color: 'bg-violet-100 text-violet-700',   border: 'border-violet-200',  icon: 'fa-user-plus',     dot: 'bg-violet-500'  },
    STUDENT_UPDATE:    { label: '학생 정보 수정', color: 'bg-amber-100 text-amber-700',     border: 'border-amber-200',   icon: 'fa-pen-to-square', dot: 'bg-amber-500'   },
    STUDENT_RETIRE:    { label: '학생 탈퇴 처리', color: 'bg-slate-100 text-slate-600',     border: 'border-slate-200',   icon: 'fa-user-minus',    dot: 'bg-slate-400'   },
  };

  const SECTION_CONFIG = {
    memberDto:         { label: '기본 회원 정보', icon: 'fa-user',         color: 'text-violet-500' },
    employeeInfoDto:   { label: '직원 근무 정보', icon: 'fa-id-badge',     color: 'text-sky-500'    },
    employeeSalaryDto: { label: '급여 정보',      icon: 'fa-won-sign',     color: 'text-emerald-500'},
    studentDto:        { label: '학생 정보',      icon: 'fa-user-graduate',color: 'text-violet-500' },
  };

  const FIELD_LABELS = {
    userId: '사용자 ID', userName: '이름', userGndrCd: '성별', userBrdt: '생년월일',
    userTelno: '연락처', userEmailAddr: '이메일', userZip: '우편번호',
    userAddr: '주소', userDaddr: '상세주소',
    deptCd: '부서 코드', deptNm: '부서명', jbgrCd: '직급 코드', jbgrNm: '직급명',
    joinYmd: '입사일', retmtYmd: '퇴사일', retmtRsn: '퇴사 사유',
    emplStatCd: '재직 상태', emplTypeCd: '고용 유형', chrgDutyCn: '담당 업무',
    baseSalary: '기본급 (만원)', applyYmd: '급여 적용일',
    studentId: '학번', grade: '학년', classNm: '반',
  };

  const FIELD_TRANSFORMS = {
    userGndrCd:  v => v === 'M' ? '남성' : v === 'F' ? '여성' : v,
    emplStatCd:  v => ({ '01':'재직', '02':'퇴직', '03':'휴직' }[v] || v),
    emplTypeCd:  v => ({ '01':'정규직', '02':'계약직', '03':'아르바이트' }[v] || v),
    userTelno:   v => {
      const d = String(v).replace(/-/g, '');
      if (d.length === 11) return d.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
      if (d.length === 10) return d.replace(/(\d{3})(\d{3})(\d{4})/, '$1-$2-$3');
      return v;
    },
  };

  function fmt(key, val) {
    if (val === null || val === undefined || val === '') return '-';
    return FIELD_TRANSFORMS[key] ? FIELD_TRANSFORMS[key](String(val)) : String(val);
  }

  function renderSystemPayload(payload) {
    const cfg = ACTION_CONFIG[payload.actionType] || {
      label: payload.actionType, color: 'bg-slate-100 text-slate-600',
      border: 'border-slate-200', icon: 'fa-file-lines', dot: 'bg-slate-400'
    };
    const data = payload.data || {};

    let html = `<div class="doc-wrap">
      <div class="doc-title">${cfg.label}</div>
      <table class="doc-table">
        <colgroup><col width="12%"><col width="38%"><col width="12%"><col></colgroup>
        <tbody>
          <tr>
            <td class="doc-th">기안자</td>
            <td>${payload.actorUserId || '-'}</td>
            <td class="doc-th">처리 유형</td>
            <td>${cfg.label}</td>
          </tr>
          <tr>
            <td class="doc-th">처리 대상</td>
            <td colspan="3">${payload.displayText || '-'}</td>
          </tr>
        </tbody>
      </table>`;

    if (data.before && data.after) {
      /* ── 수정: 변경 전/후 비교표 ── */
      const before = data.before;
      const after  = data.after;
      const sectionKeys = [...new Set([...Object.keys(before), ...Object.keys(after)])];

      sectionKeys.forEach(dtoKey => {
        const bDto = before[dtoKey] || {};
        const aDto = after[dtoKey]  || {};
        const sec  = SECTION_CONFIG[dtoKey] || { label: dtoKey };

        /* after에 실제 제출된 키만 표시 (미제출 필드는 제외) */
        const visibleKeys = Object.keys(aDto).filter(k => {
          const av = aDto[k];
          return av !== null && av !== '' && av !== undefined;
        });
        if (visibleKeys.length === 0) return;

        html += `
        <table class="doc-table">
          <colgroup><col width="15%"><col><col></colgroup>
          <tbody>
            <tr><td class="doc-section-head" colspan="3">[ ${sec.label} ]</td></tr>
            <tr>
              <td class="doc-col-head">항목</td>
              <td class="doc-col-head">변경 전</td>
              <td class="doc-col-head">변경 후</td>
            </tr>`;

        visibleKeys.forEach(key => {
          const bVal   = fmt(key, bDto[key]);
          const aVal   = fmt(key, aDto[key]);
          const changed = bVal !== aVal;
          html += `
            <tr${changed ? ' class="doc-changed"' : ''}>
              <td class="doc-th">${FIELD_LABELS[key] || key}</td>
              <td>${bVal}</td>
              <td${changed ? ' class="doc-changed-val"' : ''}>${changed ? '→ ' : ''}${aVal}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
      });

    } else {
      /* ── 등록/퇴사: 단순 목록표 ── */
      Object.entries(data).forEach(([dtoKey, dtoVal]) => {
        if (!dtoVal || typeof dtoVal !== 'object') return;
        const sec    = SECTION_CONFIG[dtoKey] || { label: dtoKey };
        const fields = Object.entries(dtoVal).filter(([, v]) => v !== null && v !== '' && v !== undefined);
        if (fields.length === 0) return;

        html += `
        <table class="doc-table">
          <colgroup><col width="20%"><col></colgroup>
          <tbody>
            <tr><td class="doc-section-head" colspan="2">[ ${sec.label} ]</td></tr>`;

        fields.forEach(([key, val]) => {
          html += `
            <tr>
              <td class="doc-th">${FIELD_LABELS[key] || key}</td>
              <td>${fmt(key, val)}</td>
            </tr>`;
        });

        html += `</tbody></table>`;
      });
    }

    html += `</div>`;
    return html;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const aprvlDocCn = document.getElementById("aprvlDocCn");
    const raw = aprvlDocCn.textContent.trim();

    try {
      const parsed = JSON.parse(raw);
      if (parsed.systemPayload === true) {
        aprvlDocCn.innerHTML = renderSystemPayload(parsed);
        return; /* 시각화 완료 — 폼 비활성 불필요 */
      }
    } catch (_) { /* JSON이 아닌 일반 HTML 내용이면 그대로 표시 */ }

    /* 일반 결재 문서: 입력 필드만 비활성화 */
    aprvlDocCn.querySelectorAll("input, textarea, select").forEach((el) => {
      el.setAttribute("disabled", "disabled");
    });
  });
</script>
