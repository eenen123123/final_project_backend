<title th:fragment="pageTitle">영상 관리 | HERMES</title>

<div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
  <div
    class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-slate-100"
  >
    <h2 class="text-sm font-bold text-slate-700">
      <i class="fa-solid fa-film text-orange-500 mr-2"></i>게시된 영상 관리
    </h2>
    <div class="flex items-center gap-3 w-full max-w-md">
      <div class="relative w-48">
        <input type="text"
               class="hm-input hm-input-orange"
               id="courseAcInput"
               placeholder="전체 강좌"
               autocomplete="off" />
        <div id="courseAcDropdown"
             class="absolute z-20 w-full bg-white border border-slate-200 rounded-xl shadow-lg mt-1 hidden overflow-y-auto p-1"
             style="max-height:200px;"></div>
        <input type="hidden" id="courseAcValue" />
      </div>
      <!-- <div class="w-32">
          <select
            class="hm-input hm-input-orange"
            onchange="filterVideos('type', this.value)"
          >
            <option value="">전체 유형</option>
            <option value="원본">원본</option>
            <option value="편집본">편집본</option>
          </select>
        </div> -->
      <div class="w-32">
        <select
          class="hm-input hm-input-orange"
          onchange="filterVideos('status', this.value)"
        >
          <option value="">공개 전체</option>
          <option value="공개">공개</option>
          <option value="비공개">비공개</option>
        </select>
      </div>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr
          class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider"
        >
          <th class="py-4 px-6 w-28">썸네일</th>
          <th class="py-4 px-6">강의 정보</th>
          <th class="py-4 px-6 w-24">유형</th>
          <th class="py-4 px-6 w-28">파일 크기</th>
          <th class="py-4 px-6 w-32 text-center">학생 공개 여부</th>
          <th class="py-4 px-6 w-36 text-center">제어</th>
        </tr>
      </thead>
      <tbody
        id="videoTableBody"
        class="divide-y divide-slate-50 text-sm text-slate-700"
      ></tbody>
    </table>
  </div>

  <div
    class="flex items-center justify-between px-6 py-4 border-t border-slate-50"
  >
    <p class="text-xs text-slate-400" id="videoCount">총 0건</p>
    <div class="flex items-center gap-1">
      <button
        class="w-8 h-8 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 text-xs flex items-center justify-center"
      >
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <button
        class="w-8 h-8 rounded-lg bg-orange-500 text-white text-xs flex items-center justify-center font-bold"
      >
        1
      </button>
      <button
        class="w-8 h-8 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 text-xs flex items-center justify-center"
      >
        2
      </button>
      <button
        class="w-8 h-8 rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 text-xs flex items-center justify-center"
      >
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </div>
</div>

<script th:inline="javascript">
  /* ── 강좌 데이터 (서버) ── */
  const courseData = /*[[${courseOptions}]]*/ [];

  /* ── 더미 영상 데이터 (API 연동 전) ── */
  let videoData = [
    { id:1, classNm:"고등수학A", title:"2026 수학1 - 14강 삼각함수의 정의",     type:"원본",  size:"2.14 GB", date:"2026-06-05", status:"공개",  hasThumbnail:true  },
    { id:2, classNm:"고등수학A", title:"2026 수학1 - 14강 삼각함수의 정의 (편집)", type:"편집본",size:"1.08 GB", date:"2026-06-05", status:"공개",  hasThumbnail:true  },
    { id:3, classNm:"고등수학B", title:"2026 수학2 - 8강 수열의 극한",           type:"원본",  size:"1.83 GB", date:"2026-06-05", status:"공개",  hasThumbnail:false },
    { id:4, classNm:"중등수학A", title:"2026 중등수학 - 11강 일차방정식 활용",   type:"원본",  size:"1.97 GB", date:"2026-06-04", status:"비공개",hasThumbnail:true  },
    { id:5, classNm:"고등영어",  title:"수능 영어 독해 - 빈칸 추론 전략 4",      type:"편집본",size:"0.84 GB", date:"2026-06-04", status:"공개",  hasThumbnail:true  },
    { id:6, classNm:"고등수학A", title:"2026 수학1 - 13강 지수함수와 로그함수",  type:"원본",  size:"2.32 GB", date:"2026-06-03", status:"공개",  hasThumbnail:true  },
    { id:7, classNm:"고등수학B", title:"2026 수학2 - 7강 급수와 수렴",           type:"원본",  size:"1.91 GB", date:"2026-06-02", status:"비공개",hasThumbnail:false },
    { id:8, classNm:"중등수학A", title:"2026 중등수학 - 10강 연립방정식",        type:"편집본",size:"1.21 GB", date:"2026-06-01", status:"공개",  hasThumbnail:true  },
  ];
  let displayData = [...videoData];
  let filterState = { course: '', status: '' };

  /* ── 유형 배지 ── */
  function typeBadge(type) {
    return type === '원본'
      ? `<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-orange-50 text-orange-600">원본</span>`
      : `<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-sky-50 text-sky-600">편집본</span>`;
  }

  /* ── 테이블 렌더링 ── */
  function renderVideoTable(data) {
    const tbody = document.getElementById('videoTableBody');
    document.getElementById('videoCount').textContent = `총 ${data.length}건`;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-slate-300 text-sm">게시된 영상이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(v => `
      <tr class="hover:bg-slate-50/50 transition-colors">
        <td class="py-4 px-6">
          <div class="w-20 h-12 bg-slate-900 rounded-lg flex items-center justify-center overflow-hidden border border-slate-200">
            ${v.hasThumbnail
              ? `<div class="w-full h-full bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center"><i class="fa-solid fa-image text-white/20 text-xs"></i></div>`
              : `<i class="fa-solid fa-image text-white/20 text-xs"></i>`}
          </div>
        </td>
        <td class="py-4 px-6">
          <div class="font-bold text-slate-900 truncate max-w-xs">${v.title}</div>
          <div class="text-xs text-slate-400 mt-0.5 flex items-center gap-2">
            <span>${v.classNm}</span>
            <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
            <span>${v.date}</span>
          </div>
        </td>
        <td class="py-4 px-6">${typeBadge(v.type)}</td>
        <td class="py-4 px-6 font-mono text-xs text-slate-500">${v.size}</td>
        <td class="py-4 px-6 text-center">
          <div class="flex items-center justify-center gap-2">
            <input type="checkbox" class="hm-switch hm-switch-orange"
              ${v.status === '공개' ? 'checked' : ''}
              onchange="toggleStatus(${v.id}, this.checked)" />
            <span class="text-xs font-semibold ${v.status === '공개' ? 'text-emerald-600' : 'text-slate-400'}" id="statusLabel-${v.id}">
              ${v.status}
            </span>
          </div>
        </td>
        <td class="py-4 px-6 text-center">
          <button onclick="confirmDelete(${v.id})"
            class="p-1.5 text-slate-400 hover:text-red-500 transition-colors" title="삭제">
            <i class="fa-solid fa-trash text-sm"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  /* ── 공개 여부 토글 ── */
  function toggleStatus(id, checked) {
    const item = videoData.find(v => v.id === id);
    if (!item) return;
    item.status = checked ? '공개' : '비공개';
    const label = document.getElementById(`statusLabel-${id}`);
    if (label) {
      label.textContent = item.status;
      label.className = `text-xs font-semibold ${item.status === '공개' ? 'text-emerald-600' : 'text-slate-400'}`;
    }
    showHermesToast(item.status === '공개' ? '학생에게 영상이 공개되었습니다.' : '영상이 비공개로 전환되었습니다.', 'success');
  }

  /* ── 삭제 ── */
  function confirmDelete(id) {
    const item = videoData.find(v => v.id === id);
    if (!item) return;
    if (confirm(`"${item.title}"\n이 영상을 삭제하시겠습니까?`)) {
      videoData = videoData.filter(v => v.id !== id);
      applyFilter();
      showHermesToast('영상이 삭제되었습니다.', 'error');
    }
  }

  /* ── 필터 적용 ── */
  function applyFilter() {
    displayData = videoData.filter(v =>
      (!filterState.course || v.classNm === filterState.course) &&
      (!filterState.status || v.status === filterState.status)
    );
    renderVideoTable(displayData);
  }

  function filterVideos(key, value) {
    filterState[key] = value;
    applyFilter();
  }

  /* ── 강좌 Autocomplete ── */
  (function () {
    const input    = document.getElementById('courseAcInput');
    const dropdown = document.getElementById('courseAcDropdown');
    const hidden   = document.getElementById('courseAcValue');

    const ALL = { sn: '', nm: '전체 강좌' };
    const options = [ALL, ...courseData];

    function render(query) {
      const q = query.trim().toLowerCase();
      const matched = q ? options.filter(c => c.nm.toLowerCase().includes(q)) : options;

      if (matched.length === 0) {
        dropdown.innerHTML = '<div class="px-4 py-3 text-xs text-slate-400">검색 결과가 없습니다.</div>';
      } else {
        dropdown.innerHTML = matched.map(c => `
          <div class="px-3 py-2 text-sm rounded-lg cursor-pointer hover:bg-orange-50 hover:text-orange-600 transition-colors"
               data-sn="${c.sn}" data-nm="${c.nm}">${c.nm}</div>
        `).join('');
        dropdown.querySelectorAll('[data-nm]').forEach(el => {
          el.addEventListener('mousedown', e => {
            e.preventDefault();
            const nm = el.dataset.nm;
            const sn = el.dataset.sn;
            input.value  = nm === '전체 강좌' ? '' : nm;
            hidden.value = sn;
            filterState.course = nm === '전체 강좌' ? '' : nm;
            applyFilter();
            dropdown.classList.add('hidden');
            input.placeholder = nm === '전체 강좌' ? '전체 강좌' : nm;
          });
        });
      }
      dropdown.classList.remove('hidden');
    }

    input.addEventListener('focus', () => render(input.value));
    input.addEventListener('input', () => {
      if (input.value === '') {
        hidden.value = '';
        filterState.course = '';
        applyFilter();
      }
      render(input.value);
    });
    input.addEventListener('blur', () => setTimeout(() => dropdown.classList.add('hidden'), 150));
  })();

  /* ── 초기 렌더링 ── */
  renderVideoTable(videoData);
</script>
