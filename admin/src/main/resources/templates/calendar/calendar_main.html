<div>
  <style>
    .cal-cell {
      min-height: 96px;
    }

    .event-bar {
      font-size: 10px;
      line-height: 1.3;
      padding: 1px 5px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-bar.type-holiday {
      background: #fee2e2;
      color: #dc2626;
      cursor: default;
    }

    .event-bar.type-event {
      background: #ffedd5;
      color: #c2410c;
      cursor: pointer;
    }

    .event-bar.type-academic {
      background: #dbeafe;
      color: #1d4ed8;
      cursor: pointer;
    }

    .event-bar.type-event:hover {
      filter: brightness(0.95);
    }

    .event-bar.type-academic:hover {
      filter: brightness(0.95);
    }

    .today-cell {
      background: #f0f9ff !important;
    }

    .selected-cell {
      outline: 1px solid #1e293b;
      outline-offset: -1px;
    }

    .other-month {
      background: #f8fafc !important;
    }

    .sun-bg {

    }

    /* 유형 버튼 선택 효과 */

      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      transition: all 0.2s;
      background: #f8fafc;
    }

    .type-btn:hover {

      border-color: #cbd5e1;

    .type-btn.selected-event {
      border-color: #f97316;
      background: #fff;

    .type-btn.selected-event span.label {

      color: #2563eb;
      font-weight: 700;

      </div>

  <form id="hidden-edit-form" method="post" style="display:none;">

    <input type="hidden" name="eventTitle" id="he-event-title" />
    <input type="hidden" name="eventCont" id="he-event-cont" />

    <input type="hidden" name="endDt" id="he-end-dt" />
  </form>
  <form id="hidden-delete-form" method="post" style="display:none;"></form>

  <script th:inline="javascript">
    const ALL_EVENTS = /*[[${eventList}]]*/[];
    let curYear = new Date().getFullYear();
    let curMonth = new Date().getMonth();
    let pickerYear = curYear;
    let selectedDate = null;

    // ── 유틸 ────────────────────────────────────────────
    function toStr(y, m, d) {
      return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    }

    function getEventsForDate(dateStr) {
      const order = { holiday: 0, event: 1, academic: 2 };
      return ALL_EVENTS
        .filter(ev => new Date(dateStr) >= new Date(ev.startDt) && new Date(dateStr) <= new Date(ev.endDt))
        .sort((a, b) => (order[a.eventType] ?? 9) - (order[b.eventType] ?? 9));
    }

    function formatDateKo(dateStr) {
      const d = new Date(dateStr);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    // ── 유형 버튼 선택 효과 ──────────────────────────────
    function selectRegType(type) {
      document.querySelector('input[name="regEventType"][value="' + type + '"]').checked = true;
      document.getElementById('btn-type-event').className = 'type-btn' + (type === 'event' ? ' selected-event' : '');
      document.getElementById('btn-type-academic').className = 'type-btn' + (type === 'academic' ? ' selected-academic' : '');
    }

    function selectEditType(type) {
      document.querySelector('input[name="editEventType"][value="' + type + '"]').checked = true;
      document.getElementById('modal-btn-type-event').className = 'type-btn' + (type === 'event' ? ' selected-event' : '');
      document.getElementById('modal-btn-type-academic').className = 'type-btn' + (type === 'academic' ? ' selected-academic' : '');
    }

    // ── 달력 렌더링 ──────────────────────────────────────
    function renderCalendar() {
      document.getElementById('cal-year').textContent = curYear;
      document.getElementById('cal-month').textContent = String(curMonth + 1).padStart(2, '0');
      document.getElementById('event-list-title').textContent = (curMonth + 1) + '월에 등록된 주요 일정';

      const today = new Date();
      const todayStr = toStr(today.getFullYear(), today.getMonth(), today.getDate());
      const firstDay = new Date(curYear, curMonth, 1).getDay();
      const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
      const daysInPrev = new Date(curYear, curMonth, 0).getDate();

      const cells = [];
      for (let i = firstDay - 1; i >= 0; i--) {
        cells.push({ day: daysInPrev - i, year: curMonth === 0 ? curYear - 1 : curYear, month: curMonth === 0 ? 11 : curMonth - 1, other: true });
      }
      for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, year: curYear, month: curMonth, other: false });
      const rem = 42 - cells.length;
      for (let d = 1; d <= rem; d++) {
        cells.push({ day: d, year: curMonth === 11 ? curYear + 1 : curYear, month: curMonth === 11 ? 0 : curMonth + 1, other: true });
      }

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      cells.forEach((cell, idx) => {
        const dateStr = toStr(cell.year, cell.month, cell.day);
        const isSun = idx % 7 === 0;
        const isSat = idx % 7 === 6;
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate;
        const dayEvents = cell.other ? [] : getEventsForDate(dateStr);

        const div = document.createElement('div');
        div.className = 'cal-cell border-r border-b border-slate-100 p-1.5 flex flex-col gap-0.5 transition-colors';
        if (cell.other) div.classList.add('other-month');
        else {
          div.classList.add('cursor-pointer', 'hover:bg-sky-50/40');
          if (isSun) div.classList.add('sun-bg');
          if (isToday) div.classList.add('today-cell');
          if (isSelected) div.classList.add('selected-cell');
          div.onclick = () => onDateClick(dateStr, div);
        }

        const dateDiv = document.createElement('div');
        dateDiv.className = 'flex items-center gap-1 mb-0.5';
        const span = document.createElement('span');
        span.className = 'text-xs font-medium';
        span.textContent = cell.day;
        if (cell.other) span.classList.add('text-slate-300');
        else if (isSun) span.classList.add('text-red-400');
        else if (isSat) span.classList.add('text-blue-400');
        else span.classList.add('text-slate-700');
        dateDiv.appendChild(span);
        if (isToday && !cell.other) {
          const tb = document.createElement('span');
          tb.className = 'text-[10px] font-bold px-1.5 py-0.5 rounded-full bg-sky-500 text-white leading-none';
          tb.textContent = 'Today';
          dateDiv.appendChild(tb);
        }
        div.appendChild(dateDiv);

        dayEvents.slice(0, 3).forEach(ev => {
          const bar = document.createElement('div');
          bar.className = 'event-bar type-' + ev.eventType;
          bar.textContent = ev.eventTitle.length > 14 ? ev.eventTitle.slice(0, 14) + '...' : ev.eventTitle;
          if (ev.eventType !== 'holiday') {
            bar.onclick = (e) => { e.stopPropagation(); openEditModal(ev); };
          }
          div.appendChild(bar);
        });
        if (dayEvents.length > 3) {
          const more = document.createElement('span');
          more.className = 'text-[10px] text-slate-400';
          more.textContent = '+' + (dayEvents.length - 3) + '개';
          div.appendChild(more);
        }
        grid.appendChild(div);
      });

      renderEventList();
    }

    // ── 날짜 클릭 ────────────────────────────────────────
    function onDateClick(dateStr, el) {
      selectedDate = dateStr;
      // 기간 자동 세팅
      document.getElementById('reg-start-dt').value = dateStr;
      document.getElementById('reg-end-dt').value = dateStr;
      // 달력 선택 표시
      document.querySelectorAll('.selected-cell').forEach(c => c.classList.remove('selected-cell'));
      el.classList.add('selected-cell');
      // 선택 날짜 일정 패널 업데이트
      renderSelectedDayPanel(dateStr);
    }

    // ── 선택 날짜 일정 패널 ──────────────────────────────
    function renderSelectedDayPanel(dateStr) {
      const panel = document.getElementById('selected-day-panel');
      const list = document.getElementById('selected-day-list');
      const title = document.getElementById('selected-day-title');

      title.textContent = formatDateKo(dateStr) + ' 일정';
      list.innerHTML = '';

      const dayEvents = getEventsForDate(dateStr);
      if (dayEvents.length === 0) {
        list.innerHTML = '<li class="py-6 text-center text-xs text-slate-400">이 날의 일정이 없습니다.</li>';
      } else {
        dayEvents.forEach(ev => {
          const li = document.createElement('li');
          li.className = 'px-4 py-2.5 flex items-center gap-2.5' + (ev.eventType !== 'holiday' ? ' hover:bg-slate-50 cursor-pointer transition-colors' : '');

          const colorMap = { holiday: 'bg-red-400', event: 'bg-orange-400', academic: 'bg-blue-400' };
          const dot = `<span class="w-2 h-2 rounded-full flex-shrink-0 ${colorMap[ev.eventType] || 'bg-slate-400'}"></span>`;
          const title_text = ev.eventTitle.length > 16 ? ev.eventTitle.slice(0, 16) + '...' : ev.eventTitle;
          const range = ev.startDt === ev.endDt ? '' : `<span class="text-[10px] text-slate-400 flex-shrink-0">${ev.startDt}~${ev.endDt}</span>`;
          const lock = ev.eventType === 'holiday' ? '<i class="fa-solid fa-lock text-[9px] text-slate-300 flex-shrink-0"></i>' : '';

          li.innerHTML = `${dot}<span class="text-xs font-medium text-slate-700 flex-1 truncate">${title_text}</span>${range}${lock}`;

          if (ev.eventType !== 'holiday') {
            li.onclick = () => openEditModal(ev);
          }
          list.appendChild(li);
        });
      }
      panel.style.display = '';
    }

    // ── 등록된 일정 목록 렌더링 (공휴일 제외) ─────────────
    function renderEventList() {
      const list = document.getElementById('event-list');
      const empty = document.getElementById('event-list-empty');
      const filterType = document.getElementById('type-filter').value;
      const monthStr = curYear + '-' + String(curMonth + 1).padStart(2, '0');
      const filtered = ALL_EVENTS.filter(ev =>
        ev.eventType !== 'holiday' &&
        (!filterType || ev.eventType === filterType) &&
        (ev.startDt.startsWith(monthStr) || ev.endDt.startsWith(monthStr) ||
          (ev.startDt <= monthStr + '-31' && ev.endDt >= monthStr + '-01'))
      );

      document.getElementById('event-count').textContent = filtered.length;
      list.querySelectorAll('.event-list-item').forEach(el => el.remove());

      if (filtered.length === 0) { empty.style.display = ''; return; }
      empty.style.display = 'none';

      filtered.forEach(ev => {
        const li = document.createElement('li');
        li.className = 'event-list-item px-4 py-3 hover:bg-slate-50 cursor-pointer transition-colors';
        li.onclick = () => openEditModal(ev);
        const badge = ev.eventType === 'event'
          ? '<span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-orange-50 text-orange-500">혜택</span>'
          : '<span class="flex-shrink-0 text-[10px] font-bold px-1.5 py-0.5 rounded bg-blue-50 text-blue-500">학사</span>';
        li.innerHTML = `<div class="flex items-center gap-3">${badge}<p class="text-xs font-semibold text-slate-700 flex-1 truncate">${ev.eventTitle}</p><p class="text-[10px] text-slate-400 flex-shrink-0">${ev.startDt} ~ ${ev.endDt}</p></div>`;
        list.appendChild(li);
      });
    }

    // ── 수정/삭제 모달 ────────────────────────────────────
    function openEditModal(ev) {
      document.getElementById('edit-event-sn').value = ev.eventSn;
      document.getElementById('edit-event-title').value = ev.eventTitle || '';
      document.getElementById('edit-event-cont').value = ev.eventCont || '';
      document.getElementById('edit-start-dt').value = ev.startDt || '';
      document.getElementById('edit-end-dt').value = ev.endDt || '';
      selectEditType(ev.eventType);
      document.getElementById('edit-modal').classList.remove('hidden');
      document.getElementById('edit-modal').classList.add('flex');
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.add('hidden');
      document.getElementById('edit-modal').classList.remove('flex');
    }

    function submitEditForm() {
      const sn = document.getElementById('edit-event-sn').value;
      const type = document.querySelector('input[name="editEventType"]:checked')?.value;
      const title = document.getElementById('edit-event-title').value.trim();
      const cont = document.getElementById('edit-event-cont').value.trim();
      const start = document.getElementById('edit-start-dt').value;
      const end = document.getElementById('edit-end-dt').value;
      if (!type) return alert('유형을 선택해주세요.');
      if (!title) return alert('제목을 입력해주세요.');
      if (!start || !end) return alert('기간을 입력해주세요.');
      if (start > end) return alert('종료일이 시작일보다 빠릅니다.');
      const form = document.getElementById('hidden-edit-form');
      form.action = '/admin/calendar/edit/' + sn;
      document.getElementById('he-event-type').value = type;
      document.getElementById('he-event-title').value = title;
      document.getElementById('he-event-cont').value = cont;
      document.getElementById('he-start-dt').value = start;
      document.getElementById('he-end-dt').value = end;
      form.submit();
    }

    function submitDeleteForm() {
      const sn = document.getElementById('edit-event-sn').value;
      if (!confirm('이 일정을 삭제하시겠습니까?')) return;
      const form = document.getElementById('hidden-delete-form');
      form.action = '/admin/calendar/delete/' + sn;
      form.submit();
    }

    // ── 일정 등록 ─────────────────────────────────────────
    function submitRegForm() {
      const type = document.querySelector('input[name="regEventType"]:checked')?.value;
      const title = document.getElementById('reg-event-title').value.trim();
      const cont = document.getElementById('reg-event-cont').value.trim();
      const start = document.getElementById('reg-start-dt').value;
      const end = document.getElementById('reg-end-dt').value;
      if (!type) return alert('유형을 선택해주세요.');
      if (!title) return alert('제목을 입력해주세요.');
      if (!start || !end) return alert('기간을 입력해주세요.');
      if (start > end) return alert('종료일이 시작일보다 빠릅니다.');
      document.getElementById('h-event-type').value = type;
      document.getElementById('h-event-title').value = title;
      document.getElementById('h-event-cont').value = cont;
      document.getElementById('h-start-dt').value = start;
      document.getElementById('h-end-dt').value = end;
      document.getElementById('hidden-write-form').submit();
    }

    // ── 필터 / 달력 이동 / 피커 ──────────────────────────
    function filterEvents() { renderEventList(); }
    function movePrev() { if (curMonth === 0) { curYear--; curMonth = 11; } else curMonth--; selectedDate = null; renderCalendar(); }
    function moveNext() { if (curMonth === 11) { curYear++; curMonth = 0; } else curMonth++; selectedDate = null; renderCalendar(); }
    function togglePicker() { const p = document.getElementById('month-picker'); p.classList.toggle('hidden'); pickerYear = curYear; renderPickerMonths(); }
    function renderPickerMonths() {
      document.getElementById('picker-year').textContent = pickerYear;
      const c = document.getElementById('picker-months'); c.innerHTML = '';
      for (let m = 0; m < 12; m++) {
        const btn = document.createElement('button');
        btn.textContent = (m + 1) + '월';
        btn.className = 'py-1.5 rounded-lg text-xs font-medium transition-colors cursor-pointer ' + (pickerYear === curYear && m === curMonth ? 'bg-slate-800 text-white' : 'hover:bg-slate-100 text-slate-700');
        btn.onclick = () => { curYear = pickerYear; curMonth = m; document.getElementById('month-picker').classList.add('hidden'); selectedDate = null; renderCalendar(); };
        c.appendChild(btn);
      }
    }
    function pickerPrevYear() { pickerYear--; renderPickerMonths(); }
    function pickerNextYear() { pickerYear++; renderPickerMonths(); }
    document.addEventListener('click', (e) => {
      const picker = document.getElementById('month-picker');
      const btn = document.getElementById('month-picker-btn');
      if (!picker.contains(e.target) && !btn.contains(e.target)) picker.classList.add('hidden');
    });

    renderCalendar();
  </script>
</div>
