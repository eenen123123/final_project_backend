<title th:fragment="pageTitle">배송 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">배송 관리</h1>
    <p class="text-sm text-slate-500 mt-1">교재 포함 주문의 배송 현황을 조회하고 송장번호를 등록합니다.</p>
  </div>

  <!-- ② 요약 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <a th:href="@{/admin/shipping}"
       th:classappend="${param.dlvryStatCd == null or param.dlvryStatCd == ''} ? 'border-blue-300 bg-blue-50' : 'border-slate-100 bg-white hover:border-blue-200'"
       class="rounded-2xl border shadow-sm p-5 transition-all block cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-truck"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">전체 배송</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" th:text="${totalCount + '건'}">0건</p>
    </a>
    <a th:href="@{/admin/shipping(dlvryStatCd='READY')}"
       th:classappend="${param.dlvryStatCd == 'READY'} ? 'border-amber-300 bg-amber-50' : 'border-slate-100 bg-white hover:border-amber-200'"
       class="rounded-2xl border shadow-sm p-5 transition-all block cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-box"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">준비중</p>
      </div>
      <p class="text-2xl font-bold text-amber-500" th:text="${(statusSummary['READY_COUNT'] ?: 0) + '건'}">0건</p>
    </a>
    <a th:href="@{/admin/shipping(dlvryStatCd='SHIPPING')}"
       th:classappend="${param.dlvryStatCd == 'SHIPPING'} ? 'border-blue-300 bg-blue-50' : 'border-slate-100 bg-white hover:border-blue-200'"
       class="rounded-2xl border shadow-sm p-5 transition-all block cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-truck-fast"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">배송중</p>
      </div>
      <p class="text-2xl font-bold text-blue-500" th:text="${(statusSummary['SHIPPING_COUNT'] ?: 0) + '건'}">0건</p>
    </a>
    <a th:href="@{/admin/shipping(dlvryStatCd='DELIVERED')}"
       th:classappend="${param.dlvryStatCd == 'DELIVERED'} ? 'border-emerald-300 bg-emerald-50' : 'border-slate-100 bg-white hover:border-emerald-200'"
       class="rounded-2xl border shadow-sm p-5 transition-all block cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">배송완료</p>
      </div>
      <p class="text-2xl font-bold text-emerald-500" th:text="${(statusSummary['DELIVERED_COUNT'] ?: 0) + '건'}">0건</p>
    </a>
  </div>

  <!-- ③ 검색 + 테이블 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">

    <!-- 검색바 -->
    <div class="flex items-center gap-4 px-5 py-4 border-b border-slate-100">
      <form th:action="@{/admin/shipping}" method="get" class="flex items-center gap-2">
        <input type="text" name="keyword" th:value="${param.keyword}"
          class="hm-input" style="width:16rem;" placeholder="주문자명 또는 수령인명 검색..." />
        <select name="dlvryStatCd" class="hm-input cursor-pointer" style="width:9rem;">
          <option value="">상태 전체</option>
          <option value="READY"     th:selected="${param.dlvryStatCd == 'READY'}">준비중</option>
          <option value="SHIPPING"  th:selected="${param.dlvryStatCd == 'SHIPPING'}">배송중</option>
          <option value="DELIVERED" th:selected="${param.dlvryStatCd == 'DELIVERED'}">배송완료</option>
          <option value="CANCELED"  th:selected="${param.dlvryStatCd == 'CANCELED'}">취소</option>
        </select>
        <button type="submit" class="hm-btn-primary" style="padding:0.65rem 1.25rem; white-space:nowrap;">검색</button>
        <a th:href="@{/admin/shipping}"
          style="display:inline-flex; align-items:center; gap:0.375rem; padding:0.65rem 0.75rem; border-radius:0.75rem; font-size:0.875rem; font-weight:500; color:#94a3b8; white-space:nowrap; cursor:pointer; transition:all 0.15s ease;"
          onmouseover="this.style.color='#475569'; this.style.backgroundColor='#f1f5f9';"
          onmouseout="this.style.color='#94a3b8'; this.style.backgroundColor='transparent';">
          <i class="fa-solid fa-rotate-left" style="font-size:0.75rem;"></i>초기화
        </a>
      </form>
    </div>

    <!-- 테이블 -->
    <div class="overflow-x-auto">
      <table style="width:100%; table-layout:fixed; border-collapse:collapse; text-align:left;">
        <colgroup>
          <col style="width:30%" />
          <col style="width:20%" />
          <col style="width:20%" />
          <col style="width:18%" />
          <col style="width:12%" />
        </colgroup>
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider">
            <th style="padding:1rem 1.25rem;">주문번호 (orderId)</th>
            <th style="padding:1rem 1.25rem;">구매자</th>
            <th style="padding:1rem 1.25rem;">송장번호</th>
            <th style="padding:1rem 1.25rem; text-align:center;">배송상태</th>
            <th style="padding:1rem 1.25rem; text-align:center;">등록일</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">

          <tr th:if="${#lists.isEmpty(shippingList)}">
            <td colspan="5" class="py-20 text-center text-slate-400 text-sm">
              <i class="fa-solid fa-truck text-2xl text-slate-200 mb-3 block"></i>
              배송 정보가 없습니다.
            </td>
          </tr>

          <tr th:each="s : ${shippingList}"
              th:data-ord-sn="${s.ordSn}"
              th:data-ord-id="${s.ordId}"
              th:data-ord-nm="${s.ordNm}"
              th:data-buyer-nm="${s.buyerNm}"
              th:data-buyer-tel="${s.buyerTel}"
              th:data-buyer-email="${s.buyerEmail}"
              th:data-receiver-nm="${s.receiverNm}"
              th:data-receiver-tel="${s.receiverTel}"
              th:data-receiver-tel2="${s.receiverTel2}"
              th:data-zip-cd="${s.zipCd}"
              th:data-addr-road="${s.addrRoad}"
              th:data-addr-dtl="${s.addrDtl}"
              th:data-delivery-msg="${s.deliveryMsg}"
              th:data-status="${s.dlvryStatCd?.name()}"
              th:data-invoice-no="${s.invoiceNo}"
              onclick="openDetailModal(this)"
              class="hover:bg-slate-50/50 transition-colors cursor-pointer">
            <td style="padding:1rem 1.25rem; max-width:0;">
              <span class="text-xs font-mono text-slate-500 block truncate"
                    th:text="${s.ordId}" th:title="${s.ordId}">-</span>
            </td>
            <td style="padding:1rem 1.25rem;">
              <p class="font-semibold text-slate-800 truncate" th:text="${s.buyerNm}">-</p>
              <p class="text-xs text-slate-400 truncate" th:text="${s.buyerTel}">-</p>
            </td>
            <td style="padding:1rem 1.25rem;">
              <span th:if="${s.invoiceNo != null and s.invoiceNo != ''}"
                    class="text-xs font-mono text-slate-600" th:text="${s.invoiceNo}">-</span>
              <span th:unless="${s.invoiceNo != null and s.invoiceNo != ''}"
                    class="text-xs text-amber-500 font-medium">입력이 필요합니다</span>
            </td>
            <td style="padding:1rem 1.25rem; text-align:center;">
              <span th:switch="${s.dlvryStatCd?.name()}">
                <span th:case="'READY'"     class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-amber-50 text-amber-600">준비중</span>
                <span th:case="'SHIPPING'"  class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-blue-50 text-blue-600">배송중</span>
                <span th:case="'DELIVERED'" class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-emerald-50 text-emerald-600">배송완료</span>
                <span th:case="'CANCELED'"  class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-rose-50 text-rose-600">취소</span>
              </span>
            </td>
            <td style="padding:1rem 1.25rem; text-align:center;">
              <span class="text-xs text-slate-500" th:text="${#temporals.format(s.regDt, 'yyyy.MM.dd')}">-</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 페이지네이션 -->
    <div th:if="${paginationInfo.totalPage > 1}"
      class="flex items-center justify-center gap-1 py-5 border-t border-slate-100">
      <a th:href="@{/admin/shipping(page=${paginationInfo.startPage - 1}, keyword=${param.keyword}, dlvryStatCd=${param.dlvryStatCd})}"
        th:classappend="${paginationInfo.startPage == 1} ? 'pointer-events-none opacity-30' : ''"
        class="w-8 h-8 flex items-center justify-center border border-slate-200 rounded text-slate-400 hover:bg-slate-50 text-sm">‹</a>

      <th:block th:each="p : ${#numbers.sequence(paginationInfo.startPage, paginationInfo.endPage)}">
        <a th:href="@{/admin/shipping(page=${p}, keyword=${param.keyword}, dlvryStatCd=${param.dlvryStatCd})}"
          th:text="${p}"
          th:classappend="${p == paginationInfo.page} ? 'bg-blue-950 text-white border-blue-950' : 'text-slate-500 border-slate-200 hover:bg-slate-50'"
          class="w-8 h-8 flex items-center justify-center border rounded text-xs font-medium transition-colors">1</a>
      </th:block>

      <a th:href="@{/admin/shipping(page=${paginationInfo.endPage + 1}, keyword=${param.keyword}, dlvryStatCd=${param.dlvryStatCd})}"
        th:classappend="${paginationInfo.endPage >= paginationInfo.totalPage} ? 'pointer-events-none opacity-30' : ''"
        class="w-8 h-8 flex items-center justify-center border border-slate-200 rounded text-slate-400 hover:bg-slate-50 text-sm">›</a>
    </div>

  </div>
</div>


<!-- ===== 배송 상세 + 상태 변경 모달 ===== -->
<div id="detailModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDetailModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl mx-4 flex flex-col max-h-[92vh]">

    <div class="flex items-center justify-between px-7 py-4 border-b border-slate-100 shrink-0">
      <div>
        <h3 class="text-base font-bold text-slate-800">배송 상세</h3>
        <p class="text-xs text-slate-400 mt-0.5 font-mono" id="dOrdId">-</p>
      </div>
      <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <div class="p-7">
      <input type="hidden" id="modalOrdSn" />

      <!-- 구매자 / 수령인 2컬럼 -->
      <div class="grid grid-cols-2 gap-5 mb-6">

        <!-- 구매자 정보 -->
        <div class="bg-slate-50 rounded-xl p-5">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">
            <i class="fa-solid fa-user mr-1.5"></i>구매자 정보
          </p>
          <div class="space-y-2 text-sm">
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">이름</span>
              <span id="dBuyerNm" class="text-slate-800 font-semibold">-</span>
            </div>
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">연락처</span>
              <span id="dBuyerTel" class="text-slate-700">-</span>
            </div>
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">이메일</span>
              <span id="dBuyerEmail" class="text-slate-700 break-all">-</span>
            </div>
            <div class="flex gap-2 pt-2 border-t border-slate-200 mt-1">
              <span class="w-14 text-slate-400 shrink-0">상품명</span>
              <span id="dOrdNm" class="text-slate-700 break-words flex-1">-</span>
            </div>
          </div>
        </div>

        <!-- 수령인 정보 -->
        <div class="bg-slate-50 rounded-xl p-5">
          <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">
            <i class="fa-solid fa-location-dot mr-1.5"></i>수령인 정보
          </p>
          <div class="space-y-2 text-sm">
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">이름</span>
              <span id="dReceiverNm" class="text-slate-800 font-semibold">-</span>
            </div>
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">연락처</span>
              <span id="dReceiverTel" class="text-slate-700">-</span>
            </div>
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">주소</span>
              <div>
                <p id="dAddrRoad" class="text-slate-700">-</p>
                <p id="dAddrDtl" class="text-slate-500 text-xs mt-0.5"></p>
              </div>
            </div>
            <div class="flex gap-2">
              <span class="w-14 text-slate-400 shrink-0">메모</span>
              <span id="dDeliveryMsg" class="text-slate-500 text-xs">-</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 배송 상태 변경 -->
      <div class="border border-slate-200 rounded-xl p-5">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">
          <i class="fa-solid fa-truck mr-1.5"></i>배송 상태 변경
        </p>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">배송 상태 <span class="text-red-400">*</span></label>
            <select id="modalStatus" class="hm-input" onchange="onStatusChange()">
              <option value="READY">준비중</option>
              <option value="SHIPPING">배송중</option>
              <option value="DELIVERED">배송완료</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">
              송장번호
              <span class="relative inline-block group ml-1 align-middle">
                <i class="fa-solid fa-circle-info text-slate-300 hover:text-slate-500 cursor-help text-xs"></i>
                <span class="hidden group-hover:block absolute bottom-6 right-0 z-20 w-52 bg-white text-slate-600 text-xs rounded-lg px-3 py-2 whitespace-nowrap shadow-lg border border-slate-200">
                  10 ~ 14 자리의 송장 번호를 입력해주세요
                </span>
              </span>
            </label>
            <input type="text" id="modalInvoiceNo" class="hm-input" placeholder="송장번호를 입력하세요" />
          </div>
        </div>
      </div>
    </div>

    <div class="flex gap-3 px-7 py-4 border-t border-slate-100 shrink-0">
      <button class="flex-1 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors"
        onclick="closeDetailModal()">닫기</button>
      <button class="flex-1 hm-btn-primary" onclick="saveStatus()">
        <i class="fa-solid fa-floppy-disk"></i><span>저장</span>
      </button>
    </div>
  </div>
</div>


<script>
  function openDetailModal(row) {
    const d = row.dataset;
    document.getElementById('modalOrdSn').value         = d.ordSn;
    document.getElementById('dOrdId').textContent   = d.ordId  || '-';
    const ordNmEl = document.getElementById('dOrdNm');
    const ordNm = d.ordNm || '-';
    ordNmEl.textContent = ordNm.length > 40
      ? ordNm.slice(0, 40) + '\n' + ordNm.slice(40)
      : ordNm;
    ordNmEl.style.whiteSpace = 'pre-wrap';
    document.getElementById('dBuyerNm').textContent     = d.buyerNm    || '-';
    document.getElementById('dBuyerTel').textContent   = d.buyerTel   || '-';
    document.getElementById('dBuyerEmail').textContent = d.buyerEmail  || '-';
    document.getElementById('dReceiverNm').textContent  = d.receiverNm  || '-';
    document.getElementById('dReceiverTel').textContent = d.receiverTel || '-';
    document.getElementById('dAddrRoad').textContent    = d.addrRoad    || '-';
    document.getElementById('dAddrDtl').textContent     = d.addrDtl     || '';
    document.getElementById('dDeliveryMsg').textContent = d.deliveryMsg  || '-';
    document.getElementById('modalStatus').value    = d.status    || 'READY';
    document.getElementById('modalInvoiceNo').value = d.invoiceNo || '';
    onStatusChange();
    document.getElementById('detailModal').classList.remove('hidden');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
  }

  function onStatusChange() {}

  function saveStatus() {
    const ordSn      = document.getElementById('modalOrdSn').value;
    const dlvryStatCd = document.getElementById('modalStatus').value;
    const invoiceNo   = document.getElementById('modalInvoiceNo').value.trim();

    if (dlvryStatCd === 'SHIPPING' && !invoiceNo) {
      alert('배송중 상태로 변경 시 송장번호는 필수입니다.');
      return;
    }

    const params = new URLSearchParams({ dlvryStatCd });
    if (invoiceNo) params.append('invoiceNo', invoiceNo);

    fetch(`/admin/shipping/api/${ordSn}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString()
    })
    .then(res => {
      if (!res.ok) return res.text().then(t => { throw new Error(t); });
      closeDetailModal();
      location.reload();
    })
    .catch(err => alert('상태 변경에 실패했습니다.\n' + err.message));
  }
</script>
