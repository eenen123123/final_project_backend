<div>
  <!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">고객센터 관리</h1>
      <p class="text-sm text-slate-500 mt-1">FAQ, 공지사항, QnA, 자료실을 통합 관리합니다.</p>
    </div>
  </div>

  <!-- 탭 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div class="flex border-b border-slate-100 px-6">
      <button class="cs-tab-btn active py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-faq', this)">
        <i class="fa-solid fa-circle-question mr-1.5"></i>FAQ
      </button>
      <button class="cs-tab-btn py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-notice', this)">
        <i class="fa-solid fa-bullhorn mr-1.5"></i>공지사항
      </button>
      <button class="cs-tab-btn py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-qna', this)">
        <i class="fa-solid fa-comments mr-1.5"></i>QnA
      </button>
      <button class="cs-tab-btn py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-dataroom', this)">
        <i class="fa-solid fa-folder-open mr-1.5"></i>자료실
      </button>
    </div>

    <!-- ══ FAQ 탭 ══ -->
    <div id="tab-faq" class="cs-tab-panel active p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="flex gap-3">
          <select id="faq-filter-ctg" onchange="loadFaq(1, true)" class="hm-input" style="width: 130px;">
            <option value="">전체 대분류</option>
            <option value="01">강의/교재</option>
            <option value="02">결제</option>
            <option value="03">학습기기</option>
            <option value="04">동영상</option>
            <option value="05">도서</option>
          </select>
          <div class="relative">
            <input type="text" id="faq-search" placeholder="제목 검색..." class="hm-input pr-9" style="width: 300px;"
              onkeydown="if(event.key==='Enter') loadFaq(1, true)" />
            <button onclick="loadFaq(1, true)"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-600 transition-colors cursor-pointer">
              <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </button>
          </div>
        </div>
        <a href="/admin/board/faq/write" class="hm-btn-primary text-sm">
          <i class="fa-solid fa-plus mr-1"></i>FAQ 등록
        </a>
      </div>
      <div class="overflow-x-auto rounded-xl border border-slate-100">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-500 text-xs">
              <th class="text-center py-3 px-4 font-semibold w-16">번호</th>
              <th class="text-center py-3 px-4 font-semibold w-32">대분류</th>
              <th class="text-center py-3 px-4 font-semibold w-28">중분류</th>
              <th class="text-left py-3 px-4 font-semibold">제목</th>
              <th class="text-center py-3 px-4 font-semibold w-16">BEST</th>
              <th class="text-center py-3 px-4 font-semibold w-28">등록일</th>
              <th class="text-center py-3 px-4 font-semibold w-24">관리</th>
            </tr>
          </thead>
          <tbody id="faq-table-body" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
      <div id="faq-pagination"></div>
    </div>

    <!-- ══ 공지사항 탭 ══ -->
    <div id="tab-notice" class="cs-tab-panel p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="flex gap-3">
          <select id="notice-filter-type" onchange="loadNotice(1, true)" class="hm-input w-36">
            <option value="">전체 유형</option>
            <option value="01">일반공지</option>
            <option value="02">이벤트</option>
            <option value="03">점검</option>
          </select>
          <div class="relative">
            <input type="text" id="notice-search" placeholder="제목 검색..." class="hm-input pr-9" style="width: 300px;"
              onkeydown="if(event.key==='Enter') loadNotice(1, true)" />
            <button onclick="loadNotice(1, true)"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-600 transition-colors cursor-pointer">
              <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </button>
          </div>
        </div>
        <a href="/admin/board/notice/write" class="hm-btn-primary text-sm">
          <i class="fa-solid fa-plus mr-1"></i>공지사항 등록
        </a>
      </div>
      <div class="overflow-x-auto rounded-xl border border-slate-100">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-500 text-xs">
              <th class="text-center py-3 px-4 font-semibold w-16">번호</th>
              <th class="text-center py-3 px-4 font-semibold w-24">유형</th>
              <th class="text-left py-3 px-4 font-semibold">제목</th>
              <th class="text-center py-3 px-4 font-semibold w-16">팝업</th>
              <th class="text-center py-3 px-4 font-semibold w-28">등록일</th>
              <th class="text-center py-3 px-4 font-semibold w-24">관리</th>
            </tr>
          </thead>
          <tbody id="notice-table-body" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
      <div id="notice-pagination"></div>
    </div>

    <!-- ══ QnA 탭 ══ -->
    <div id="tab-qna" class="cs-tab-panel p-6">
      <div class="flex gap-3 mb-4">
        <select id="qna-filter-stat" onchange="loadQna(1, true)" class="hm-input" style="width: 130px;">
          <option value="">전체 상태</option>
          <option value="01">답변대기</option>
          <option value="02">답변완료</option>
        </select>
        <select id="qna-filter-ctg" onchange="loadQna(1, true)" class="hm-input" style="width: 130px;">
          <option value="">전체 카테고리</option>
          <option value="01">수강문의</option>
          <option value="02">결제문의</option>
          <option value="03">기타</option>
        </select>
        <div class="relative">
          <input type="text" id="qna-search" placeholder="제목 검색..." class="hm-input pr-9" style="width: 300px;"
            onkeydown="if(event.key==='Enter') loadQna(1, true)" />
          <button onclick="loadQna(1, true)"
            class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-600 transition-colors cursor-pointer">
            <i class="fa-solid fa-magnifying-glass text-sm"></i>
          </button>
        </div>
      </div>
      <div class="overflow-x-auto rounded-xl border border-slate-100">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-500 text-xs">
              <th class="text-center py-3 px-4 font-semibold w-16">번호</th>
              <th class="text-center py-3 px-4 font-semibold w-24">카테고리</th>
              <th class="text-left py-3 px-4 font-semibold">제목</th>
              <th class="text-center py-3 px-4 font-semibold w-20">비공개</th>
              <th class="text-center py-3 px-4 font-semibold w-24">답변상태</th>
              <th class="text-center py-3 px-4 font-semibold w-28">등록일</th>
            </tr>
          </thead>
          <tbody id="qna-table-body" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
      <div id="qna-pagination"></div>
    </div>

    <!-- ══ 자료실 탭 ══ -->
    <div id="tab-dataroom" class="cs-tab-panel p-6">
      <div class="flex justify-between items-center mb-4">
        <div class="flex gap-3">
          <select id="dataroom-filter-ctg" onchange="loadDataRoom(1, true)" class="hm-input" style="width: 130px;">
            <option value="">전체 카테고리</option>
            <option value="01">공지/안내자료</option>
            <option value="02">입시정보</option>
            <option value="03">학습자료</option>
            <option value="04">기타</option>
          </select>
          <div class="relative">
            <input type="text" id="dataroom-search" placeholder="제목 검색..." class="hm-input pr-9" style="width: 300px;"
              onkeydown="if(event.key==='Enter') loadDataRoom(1, true)" />
            <button onclick="loadDataRoom(1, true)"
              class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-violet-600 transition-colors cursor-pointer">
              <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </button>
          </div>
        </div>
        <a href="/admin/board/dataroom/write" class="hm-btn-primary text-sm">
          <i class="fa-solid fa-plus mr-1"></i>자료실 등록
        </a>
      </div>
      <div class="overflow-x-auto rounded-xl border border-slate-100">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-500 text-xs">
              <th class="text-center py-3 px-4 font-semibold w-16">번호</th>
              <th class="text-center py-3 px-4 font-semibold w-28">카테고리</th>
              <th class="text-left py-3 px-4 font-semibold">제목</th>
              <th class="text-center py-3 px-4 font-semibold w-24">접근권한</th>
              <th class="text-center py-3 px-4 font-semibold w-20">첨부파일</th>
              <th class="text-center py-3 px-4 font-semibold w-28">등록일</th>
              <th class="text-center py-3 px-4 font-semibold w-24">관리</th>
            </tr>
          </thead>
          <tbody id="dataroom-table-body" class="divide-y divide-slate-50"></tbody>
        </table>
      </div>
      <div id="dataroom-pagination"></div>
    </div>

  </div>
</div>

<style>
  .cs-tab-btn {
    transition: all .18s;
  }

  .cs-tab-btn.active {
    color: #7c3aed;
    border-bottom: 2px solid #7c3aed;
    font-weight: 700;
  }

  .cs-tab-panel {
    display: none;
  }

  .cs-tab-panel.active {
    display: block;
    animation: cs-fade-in .2s ease-out;
  }

  @keyframes cs-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cs-skeleton {
    display: inline-block;
    height: .875rem;
    border-radius: .375rem;
    background: #f1f5f9;
    animation: cs-pulse 1.5s ease-in-out infinite;
  }

  @keyframes cs-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .45; }
  }
</style>

<th:block th:fragment="pageJs">
  <script th:src="@{/js/board/customer-service.js}"></script>
</th:block>
