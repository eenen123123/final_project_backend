<div class="p-6">
  <!-- Toast UI Editor CSS (로컬) -->
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/tui-color-picker.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-color-syntax.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-code-syntax-highlight.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-table-merged-cell.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-chart.min.css}" />

  <style>
    .toastui-editor-defaultUI {
      border: 1px solid #0ea5e9;
      border-radius: 0.75rem;
      overflow: hidden;
      transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toastui-editor-defaultUI:focus-within {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.08);
    }
    .toastui-editor-toolbar {
      border-radius: 0.75rem 0.75rem 0 0;
    }
    .toastui-editor-contents,
    .toastui-editor .ProseMirror {
      font-family: "Noto Sans KR", sans-serif;
    }
  </style>

  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-slate-800">자료실 등록</h1>
      <p class="mt-1 text-sm text-slate-500">새로운 자료를 등록합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-dataroom"
      class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 등록 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <form action="/admin/board/dataroom/write" method="post"
      enctype="multipart/form-data"
      onsubmit="return confirm('자료를 등록하시겠습니까?')">

      <!-- 에디터 내용 hidden input -->
      <input type="hidden" name="postCn" id="postCnHidden" />

      <div class="divide-y divide-slate-100">

        <!-- 카테고리 + 접근권한 -->
        <div class="grid grid-cols-2 gap-6 px-8 py-5">
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              카테고리 <span class="text-red-400">*</span>
            </label>
            <select name="dataCtg" class="hm-input" required>
              <option value="">-- 선택 --</option>
              <option value="01">공지/안내자료</option>
              <option value="02">입시정보</option>
              <option value="03">학습자료</option>
              <option value="04">기타</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              접근권한 <span class="text-red-400">*</span>
            </label>
            <select name="accsLmtCd" class="hm-input" required>
              <option value="01">전체공개</option>
              <option value="02">회원전용</option>
            </select>
          </div>
        </div>

        <!-- 작성자 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">작성자</label>
          <input type="text" name="wrtrUserId" class="hm-input bg-slate-50"
            th:value="${currentUser}" readonly />
        </div>

        <!-- 제목 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">
            제목 <span class="text-red-400">*</span>
          </label>
          <input type="text" name="postSj" placeholder="제목을 입력하세요."
            class="hm-input" required />
        </div>

        <!-- 내용 (에디터) -->
        <div class="flex px-8 py-5">
          <label class="w-28 shrink-0 pt-1 text-xs font-semibold text-slate-600">
            내용 <span class="text-red-400">*</span>
          </label>
          <div id="editor" class="flex-1"></div>
        </div>

        <!-- 파일 첨부 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">파일 첨부</label>
          <div class="flex-1">
            <input type="file" name="attachFile" id="attachFile"
              class="block w-full text-sm text-slate-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-xl file:border-0
                file:text-xs file:font-semibold
                file:bg-violet-50 file:text-violet-600
                hover:file:bg-violet-100 file:cursor-pointer" />
            <p class="mt-1.5 text-xs text-slate-400">PDF, ZIP, DOCX, 이미지 등 업로드 가능</p>
          </div>
        </div>

      </div>

      <!-- 버튼 영역 -->
      <div class="flex justify-center gap-3 border-t border-slate-100 bg-slate-50 px-8 py-4">
        <a href="/admin/board/customer-service?tab=tab-dataroom"
          onclick="return confirm('작성한 내용이 모두 사라집니다.\n취소하시겠습니까?')"
          class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer">
          취소
        </a>
        <button type="submit" class="hm-btn-primary px-8 py-2.5 cursor-pointer">
          등록
        </button>
      </div>

    </form>
  </div>

  <!-- Toast UI Editor JS -->
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-all.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/ko-kr.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/tui-color-picker.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-color-syntax.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-code-syntax-highlight-all.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-table-merged-cell.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-chart.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-chart.min.js}"></script>

  <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
      const { Editor } = toastui;
      const { colorSyntax, codeSyntaxHighlight, tableMergedCell, chart } = Editor.plugin;

      const editor = new Editor({
        el: document.querySelector("#editor"),
        height: "500px",
        initialEditType: "wysiwyg",
        previewStyle: "tab",
        language: "ko-KR",
        usageStatistics: false,
        plugins: [colorSyntax, codeSyntaxHighlight, tableMergedCell, chart].filter(Boolean),
        hooks: {
          addImageBlobHook: async (blob, callback) => {
            const formData = new FormData();
            formData.append('image', blob);
            const res = await fetch('/admin/board/upload/editor-image', { method: 'POST', body: formData });
            const { url } = await res.json();
            callback(url, '이미지');
          }
        },
      });

      // 폼 submit 시 에디터 내용 hidden input에 복사
      document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("postCnHidden").value = editor.getHTML();
      });
    });
  </script>
</div>
