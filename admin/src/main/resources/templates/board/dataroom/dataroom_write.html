<div class="p-6">

  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-slate-800">자료실 등록</h1>
      <p class="mt-1 text-sm text-slate-500">새로운 자료를 등록합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-dataroom"
      class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 등록 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <form action="/admin/board/dataroom/write" method="post"
      enctype="multipart/form-data"
      onsubmit="return confirm('자료를 등록하시겠습니까?')">

      <!-- 에디터 내용 hidden input -->
      <input type="hidden" name="postCn" id="postCnHidden" />

      <div class="divide-y divide-slate-100">

        <!-- 카테고리 + 접근권한 -->
        <div class="grid grid-cols-2 gap-6 px-8 py-5">
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              카테고리 <span class="text-red-400">*</span>
            </label>
            <select name="dataCtg" class="hm-input hm-input-blue" required>
              <option value="">-- 선택 --</option>
              <option value="01">공지/안내자료</option>
              <option value="02">입시정보</option>
              <option value="03">학습자료</option>
              <option value="04">기타</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              접근권한 <span class="text-red-400">*</span>
            </label>
            <select name="accsLmtCd" class="hm-input hm-input-blue" required>
              <option value="01">전체공개</option>
              <option value="02">회원전용</option>
            </select>
          </div>
        </div>

        <!-- 작성자 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">작성자</label>
          <input type="text" name="wrtrUserId" class="hm-input hm-input-blue bg-slate-50"
            th:value="${currentUser}" readonly />
        </div>

        <!-- 제목 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">
            제목 <span class="text-red-400">*</span>
          </label>
          <input type="text" name="postSj" placeholder="제목을 입력하세요."
            class="hm-input hm-input-blue" required />
        </div>

        <!-- 내용 (에디터) -->
        <div class="flex px-8 py-5">
          <label class="w-28 shrink-0 pt-1 text-xs font-semibold text-slate-600">
            내용 <span class="text-red-400">*</span>
          </label>
          <div id="editor" class="flex-1"></div>
        </div>

        <!-- 파일 첨부 -->
        <div class="flex items-start px-8 py-5">
          <label class="w-28 shrink-0 pt-2 text-xs font-semibold text-slate-600">파일 첨부</label>
          <div class="flex-1">
            <!-- 파일 선택 버튼 -->
            <div class="flex items-center gap-3">
              <label for="attachFile"
                class="inline-flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg text-xs font-semibold text-slate-600 bg-white hover:bg-slate-50 cursor-pointer transition-colors">
                <i class="fa-solid fa-paperclip"></i>
                파일 선택
              </label>
              <span class="text-xs text-slate-400">최대 5개 · PDF, ZIP, DOCX, HWPX, 이미지 등</span>
              <input type="file" name="attachFiles" id="attachFile" class="hidden"
                multiple onchange="handleFileSelect(this)" />
            </div>

            <!-- 첨부 파일 카드 목록 -->
            <div id="fileCards" class="mt-3 flex flex-wrap gap-2"></div>
          </div>
        </div>

      </div>

      <!-- 버튼 영역 -->
      <div class="flex justify-center gap-3 border-t border-slate-100 bg-slate-50 px-8 py-4">
        <a href="/admin/board/customer-service?tab=tab-dataroom"
          onclick="return confirm('작성한 내용이 모두 사라집니다.\n취소하시겠습니까?')"
          class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer">
          취소
        </a>
        <button type="submit" class="hm-btn-primary hm-btn-blue px-8 py-2.5 cursor-pointer">
          등록
        </button>
      </div>

    </form>
  </div>

  <script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
  <script>
    const FILE_ICONS = {
      pdf:  'fa-file-pdf text-red-500',
      zip:  'fa-file-zipper text-yellow-500',
      docx: 'fa-file-word text-blue-600',
      doc:  'fa-file-word text-blue-600',
      hwp:  'fa-file-lines text-teal-500',
      hwpx: 'fa-file-lines text-teal-500',
      xlsx: 'fa-file-excel text-green-600',
      xls:  'fa-file-excel text-green-600',
      pptx: 'fa-file-powerpoint text-orange-500',
      ppt:  'fa-file-powerpoint text-orange-500',
      jpg:  'fa-file-image text-pink-500',
      jpeg: 'fa-file-image text-pink-500',
      png:  'fa-file-image text-pink-500',
    };

    let selectedFiles = [];

    function handleFileSelect(input) {
      const newFiles = Array.from(input.files);
      const combined = [...selectedFiles, ...newFiles];
      if (combined.length > 5) {
        alert('파일은 최대 5개까지 첨부 가능합니다.');
        input.value = '';
        return;
      }
      selectedFiles = combined;
      input.value = '';
      renderFileCards();
      syncFileInput();
    }

    function removeFile(idx) {
      selectedFiles.splice(idx, 1);
      renderFileCards();
      syncFileInput();
    }

    function renderFileCards() {
      const container = document.getElementById('fileCards');
      container.innerHTML = selectedFiles.map((f, i) => {
        const ext = f.name.split('.').pop().toLowerCase();
        const icon = FILE_ICONS[ext] || 'fa-file text-slate-400';
        const size = (f.size / 1024 / 1024).toFixed(2);
        return `<div class="inline-flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-xl shadow-sm">
          <i class="fa-solid ${icon}"></i>
          <div class="min-w-0">
            <p class="text-xs font-semibold text-slate-700 truncate max-w-[180px]">${f.name}</p>
            <p class="text-[11px] text-slate-400">${size} MB</p>
          </div>
          <button type="button" onclick="removeFile(${i})"
            class="w-4 h-4 flex items-center justify-center rounded-full bg-slate-100 hover:bg-red-100 hover:text-red-500 text-slate-400 transition-colors cursor-pointer text-[10px]">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>`;
      }).join('');
    }

    function syncFileInput() {
      const dt = new DataTransfer();
      selectedFiles.forEach(f => dt.items.add(f));
      document.getElementById('attachFile').files = dt.files;
    }
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      TipTapEditor.mount('editor', {
        editable: true,
        outputInputId: 'postCnHidden',
        imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
      });
      document.querySelector('form').addEventListener('submit', function () {
        const el = document.querySelector('#editor .tiptap');
        if (el && el.editor) document.getElementById('postCnHidden').value = el.editor.getHTML();
      });
    });
  </script>
</div>
