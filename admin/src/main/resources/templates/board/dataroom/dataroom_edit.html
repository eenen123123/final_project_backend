<div class="p-6">

  <!-- 페이지 헤더 -->
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-slate-800">자료실 수정</h1>
      <p class="mt-1 text-sm text-slate-500">자료 내용을 수정합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-dataroom"
      class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 수정 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <form th:action="@{/admin/board/dataroom/edit/{postSn}(postSn=${dataRoom.postSn})}" method="post"
      enctype="multipart/form-data"
      onsubmit="return confirm('변경사항을 저장하시겠습니까?')">

      <!-- 에디터 내용 hidden input -->
      <input type="hidden" name="postCn" id="postCnHidden" />

      <div class="divide-y divide-slate-100">

        <!-- 카테고리 + 접근권한 -->
        <div class="grid grid-cols-2 gap-6 px-8 py-5">
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              카테고리 <span class="text-red-400">*</span>
            </label>
            <select name="dataCtg" class="hm-input" required>
              <option value="01" th:selected="${dataRoom.dataCtg == '01'}">공지/안내자료</option>
              <option value="02" th:selected="${dataRoom.dataCtg == '02'}">입시정보</option>
              <option value="03" th:selected="${dataRoom.dataCtg == '03'}">학습자료</option>
              <option value="04" th:selected="${dataRoom.dataCtg == '04'}">기타</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
              접근권한 <span class="text-red-400">*</span>
            </label>
            <select name="accsLmtCd" class="hm-input" required>
              <option value="01" th:selected="${dataRoom.accsLmtCd == '01'}">전체공개</option>
              <option value="02" th:selected="${dataRoom.accsLmtCd == '02'}">회원전용</option>
            </select>
          </div>
        </div>

        <!-- 작성자 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">작성자</label>
          <input type="text" class="hm-input bg-slate-50"
            th:value="${dataRoom.wrtrUserId}" readonly />
        </div>

        <!-- 제목 -->
        <div class="flex items-center px-8 py-5">
          <label class="w-28 shrink-0 text-xs font-semibold text-slate-600">
            제목 <span class="text-red-400">*</span>
          </label>
          <input type="text" name="postSj" th:value="${dataRoom.postSj}"
            placeholder="제목을 입력하세요." class="hm-input" required />
        </div>

        <!-- 내용 (에디터) -->
        <div class="flex px-8 py-5">
          <label class="w-28 shrink-0 pt-1 text-xs font-semibold text-slate-600">
            내용 <span class="text-red-400">*</span>
          </label>
          <div id="editor" class="flex-1"></div>
        </div>

        <!-- 파일 첨부 -->
        <div class="flex items-start px-8 py-5">
          <label class="w-28 shrink-0 pt-1 text-xs font-semibold text-slate-600">파일 첨부</label>
          <div class="flex-1">
            <!-- 기존 첨부파일 -->
            <div th:if="${dataRoom.orgnFileNm != null}" class="flex items-center gap-2 mb-3 p-3 bg-slate-50 rounded-xl">
              <i class="fa-solid fa-paperclip text-slate-400 text-xs"></i>
              <span class="text-sm text-slate-600" th:text="${dataRoom.orgnFileNm}"></span>
              <a th:href="${dataRoom.savePathNm}" target="_blank"
                class="ml-auto text-xs font-semibold text-violet-600 hover:underline">
                <i class="fa-solid fa-download mr-1"></i>다운로드
              </a>
            </div>
            <!-- 새 파일 업로드 -->
            <input type="file" name="attachFile" id="attachFile"
              class="block w-full text-sm text-slate-500
                file:mr-4 file:py-2 file:px-4
                file:rounded-xl file:border-0
                file:text-xs file:font-semibold
                file:bg-violet-50 file:text-violet-600
                hover:file:bg-violet-100 file:cursor-pointer" />
            <p class="mt-1.5 text-xs text-slate-400">새 파일을 선택하면 기존 파일이 교체됩니다.</p>
          </div>
        </div>

      </div>

      <!-- 버튼 영역 -->
      <div class="flex justify-center gap-3 border-t border-slate-100 bg-slate-50 px-8 py-4">
        <a href="/admin/board/customer-service?tab=tab-dataroom"
          onclick="return confirm('변경사항은 저장되지 않습니다.\n취소하시겠습니까?')"
          class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer">
          취소
        </a>
        <button type="submit" class="hm-btn-primary px-8 py-2.5 cursor-pointer">
          수정 완료
        </button>
      </div>

    </form>
  </div>

  <script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
      const savedContent = /*[[${dataRoom.postCn}]]*/ null;
      let initialForMount = '';
      let htmlToRestore = null;
      if (savedContent) {
        try { JSON.parse(savedContent); initialForMount = savedContent; }
        catch { htmlToRestore = savedContent; }
      }
      TipTapEditor.mount('editor', {
        editable: true,
        outputInputId: 'postCnHidden',
        initialContent: initialForMount,
        imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
      });
      if (htmlToRestore) {
        const t = setInterval(() => {
          const el = document.querySelector('#editor .tiptap');
          if (el && el.editor) { el.editor.commands.setContent(htmlToRestore); clearInterval(t); }
        }, 50);
        setTimeout(() => clearInterval(t), 3000);
      }
      document.querySelector('form').addEventListener('submit', function () {
        const el = document.querySelector('#editor .tiptap');
        if (el && el.editor) document.getElementById('postCnHidden').value = el.editor.getHTML();
      });
    });
  </script>
</div>
