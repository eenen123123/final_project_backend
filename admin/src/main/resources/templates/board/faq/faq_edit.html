<div>
  <!-- Toast UI Editor CSS -->
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/tui-color-picker.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-color-syntax.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-code-syntax-highlight.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-editor-plugin-table-merged-cell.min.css}" />
  <link rel="stylesheet" th:href="@{/css/vendor/toast-ui/toastui-chart.min.css}" />

  <style>
    .toastui-editor-defaultUI {
      border: 1px solid #0ea5e9;
      border-radius: 0.75rem;
      overflow: hidden;
      transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .toastui-editor-defaultUI:focus-within {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.08);
    }
    .toastui-editor-toolbar { border-radius: 0.75rem 0.75rem 0 0; }
    .toastui-editor-contents, .toastui-editor .ProseMirror {
      font-family: "Noto Sans KR", sans-serif;
    }
  </style>

  <!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">FAQ 수정</h1>
      <p class="text-sm text-slate-500 mt-0.5">FAQ 내용을 수정합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-faq" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 수정 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
    <form th:action="@{/admin/board/faq/edit/{postSn}(postSn=${faq.postSn})}" method="post"
      onsubmit="return confirm('변경사항을 저장하시겠습니까?')">

      <input type="hidden" name="postCn" id="postCnHidden" />

      <div class="grid grid-cols-2 gap-6 mb-6">
        <!-- 대분류 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
            대분류 <span class="text-red-400">*</span>
          </label>
          <select name="faqCtgCd" id="faqCtgCd" onchange="updateSubCtg()" class="hm-input">
            <option value="01" th:selected="${faq.faqCtgCd == '01'}">강의/교재</option>
            <option value="02" th:selected="${faq.faqCtgCd == '02'}">결제</option>
            <option value="03" th:selected="${faq.faqCtgCd == '03'}">학습기기</option>
            <option value="04" th:selected="${faq.faqCtgCd == '04'}">동영상</option>
            <option value="05" th:selected="${faq.faqCtgCd == '05'}">도서</option>
          </select>
        </div>

        <!-- 중분류 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
            중분류 <span class="text-red-400">*</span>
          </label>
          <select name="faqSubCtgCd" id="faqSubCtgCd" class="hm-input"></select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6 mb-6">
        <!-- 작성자 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">작성자</label>
          <input type="text" name="wrtrUserId" class="hm-input bg-slate-50"
                 th:value="${faq.wrtrUserId}" readonly />
        </div>

        <!-- BEST 여부 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">BEST 고정</label>
          <div class="flex items-center gap-3 h-10">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="topFixYn" value="Y"
                     th:checked="${faq.topFixYn == 'Y'}" class="accent-blue-600" /> Y (고정)
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="topFixYn" value="N"
                     th:checked="${faq.topFixYn == 'N'}" class="accent-blue-600" /> N (미고정)
            </label>
          </div>
        </div>
      </div>

      <!-- 제목 -->
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          제목 <span class="text-red-400">*</span>
        </label>
        <input type="text" name="postSj" th:value="${faq.postSj}"
               placeholder="FAQ 제목을 입력하세요." class="hm-input" required />
      </div>

      <!-- 내용 (에디터) -->
      <div class="mb-8">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          내용 <span class="text-red-400">*</span>
        </label>
        <div id="editor"></div>
      </div>

      <!-- 버튼 -->
      <div class="flex justify-center gap-3">
        <a href="/admin/board/customer-service?tab=tab-faq" onclick="return confirm('변경사항은 저장되지 않습니다.\n취소하시겠습니까?')"
          class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer">
          취소
        </a>
        <button type="submit" class="hm-btn-primary px-8 py-2.5 cursor-pointer">
          수정 완료
        </button>
      </div>

    </form>
  </div>

  <!-- hidden input으로 현재 중분류 값 전달 -->
  <input type="hidden" id="currentSubCtg" th:value="${faq.faqSubCtgCd}" />

  <!-- Toast UI Editor JS -->
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-all.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/ko-kr.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/tui-color-picker.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-color-syntax.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-code-syntax-highlight-all.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-table-merged-cell.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-chart.min.js}"></script>
  <script defer th:src="@{/js/vendor/toast-ui/toastui-editor-plugin-chart.min.js}"></script>

  <script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
      const { Editor } = toastui;
      const { colorSyntax, codeSyntaxHighlight, tableMergedCell, chart } = Editor.plugin;

      const editor = new Editor({
        el: document.querySelector("#editor"),
        height: "500px",
        initialEditType: "wysiwyg",
        previewStyle: "tab",
        language: "ko-KR",
        usageStatistics: false,
        plugins: [colorSyntax, codeSyntaxHighlight, tableMergedCell, chart].filter(Boolean),
      });

      const savedContent = /*[[${faq.postCn}]]*/ '';
      if (savedContent) editor.setHTML(savedContent);

      document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("postCnHidden").value = editor.getHTML();
      });

      const SUB_CATEGORIES = {
        '01': [{ val: '01', label: '수강신청' }, { val: '02', label: '수강기간' }, { val: '03', label: '교재' }, { val: '04', label: '환불/취소' }],
        '02': [{ val: '05', label: '결제수단' }, { val: '06', label: '영수증' }, { val: '07', label: '쿠폰/포인트' }],
        '03': [{ val: '08', label: '기기등록' }, { val: '09', label: '앱설치' }, { val: '10', label: '오류' }],
        '04': [{ val: '11', label: '플레이어 기능' }, { val: '12', label: '플레이어 설치' }, { val: '13', label: '플레이어 재생' }],
        '05': [{ val: '14', label: '주문' }, { val: '15', label: '배송' }, { val: '16', label: '반품/교환' }],
      };

      window.updateSubCtg = function () {
        const ctg = document.getElementById('faqCtgCd').value;
        const subSel = document.getElementById('faqSubCtgCd');
        const currentSub = document.getElementById('currentSubCtg').value;
        subSel.innerHTML = '';
        (SUB_CATEGORIES[ctg] || []).forEach(({ val, label }) => {
          const opt = document.createElement('option');
          opt.value = val;
          opt.textContent = label;
          if (val === currentSub) opt.selected = true;
          subSel.appendChild(opt);
        });
      };

      updateSubCtg();
    });
  </script>
</div>
