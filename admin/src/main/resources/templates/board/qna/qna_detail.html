<div>
  <!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">QnA 답변</h1>
      <p class="text-sm text-slate-500 mt-0.5">사용자 문의에 답변을 등록합니다.</p>
    </div>
    <a href="/admin/board/qna" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 질문 영역 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 mb-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-xs bg-blue-50 text-blue-600 font-semibold px-2 py-0.5 rounded-full"
            th:text="${qna.qnaCtgNm}"></span>
      <span th:if="${qna.secrYn == 'Y'}"
            class="text-xs bg-slate-100 text-slate-500 font-semibold px-2 py-0.5 rounded-full">
        <i class="fa-solid fa-lock text-[10px]"></i> 비공개
      </span>
      <span th:if="${qna.answStatCd == '01'}"
            class="text-xs bg-amber-50 text-amber-600 font-semibold px-2 py-0.5 rounded-full">답변대기</span>
      <span th:if="${qna.answStatCd == '02'}"
            class="text-xs bg-emerald-50 text-emerald-600 font-semibold px-2 py-0.5 rounded-full">답변완료</span>
    </div>

    <h2 class="text-lg font-bold text-slate-800 mb-2" th:text="${qna.postSj}"></h2>

    <div class="flex items-center gap-3 text-xs text-slate-400 mb-4">
      <span>작성자: <span class="font-semibold text-slate-600" th:text="${qna.wrtrUserId}"></span></span>
      <span>등록일: <span th:text="${#temporals.format(qna.regDt, 'yyyy-MM-dd HH:mm')}"></span></span>
    </div>

    <div class="bg-slate-50 rounded-xl p-4 text-sm text-slate-700 leading-relaxed whitespace-pre-line"
         th:text="${qna.postCn}"></div>
  </div>

  <!-- 기존 답변 표시 -->
  <div th:if="${qna.answStatCd == '02'}"
       class="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 mb-6">
    <div class="flex items-center gap-2 mb-3">
      <i class="fa-solid fa-circle-check text-emerald-500"></i>
      <span class="text-sm font-bold text-emerald-700">답변 완료</span>
      <span class="text-xs text-slate-400 ml-auto"
            th:text="${#temporals.format(qna.answDt, 'yyyy-MM-dd HH:mm')}"></span>
    </div>
    <div class="text-sm text-slate-700 leading-relaxed whitespace-pre-line"
         th:text="${qna.answCn}"></div>
    <p class="text-xs text-slate-400 mt-3">
      답변자: <span class="font-semibold" th:text="${qna.answrUserId}"></span>
    </p>
  </div>

  <!-- 답변 등록 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h3 class="text-sm font-bold text-slate-700 mb-4">
      <i class="fa-solid fa-pen mr-1 text-violet-500"></i>
      <span th:if="${qna.answStatCd == '01'}">답변 등록</span>
      <span th:if="${qna.answStatCd == '02'}">답변 수정</span>
    </h3>

    <form th:action="@{/admin/board/qna/{postSn}/answer(postSn=${qna.postSn})}" method="post">
      <input type="hidden" name="answrUserId" th:value="${session.userId}" />

      <div class="mb-4">
        <textarea name="answCn" rows="8"
                  placeholder="답변 내용을 입력하세요."
                  class="hm-input resize-none"
                  th:text="${qna.answCn}"
                  required></textarea>
      </div>

      <div class="flex justify-center gap-3">
        <a href="/admin/board/qna"
           class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
          취소
        </a>
        <button type="submit" class="hm-btn-primary px-8 py-2.5">
          <span th:if="${qna.answStatCd == '01'}">답변 등록</span>
          <span th:if="${qna.answStatCd == '02'}">답변 수정</span>
        </button>
      </div>
    </form>
  </div>
</div>
