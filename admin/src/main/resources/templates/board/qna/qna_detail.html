<div>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">QnA 상세</h1>
      <p class="text-sm text-slate-500 mt-0.5">문의 내용과 답변을 관리합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-qna" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
    <!-- 질문 정보 -->
    <div class="mb-6 pb-6 border-b border-slate-100">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">질문 정보</p>
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">카테고리</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${qna.qnaCtgNm}" readonly />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">공개 여부</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${qna.secrYn == 'Y' ? '비공개' : '공개'}" readonly />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">작성자</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${qna.wrtrUserId}" readonly />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">등록일</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${#temporals.format(qna.regDt, 'yyyy-MM-dd')}" readonly />
        </div>
      </div>
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">제목</label>
        <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${qna.postSj}" readonly />
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">내용</label>
        <textarea rows="5" class="hm-input hm-input-blue bg-slate-50 resize-none" th:text="${qna.postCn}" readonly></textarea>
      </div>
    </div>

    <!-- 답변 완료인 경우 -->
    <div th:if="${qna.answStatCd == '02'}" class="mb-6 pb-6 border-b border-slate-100">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">답변 내용</p>
      <div class="bg-blue-50 rounded-xl p-4">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs font-bold text-blue-600">관리자 답변</span>
          <span class="text-xs text-slate-400" th:text="${#temporals.format(qna.answDt, 'yyyy-MM-dd')}"></span>
        </div>
        <div class="text-sm text-slate-600 leading-relaxed whitespace-pre-line" th:text="${qna.answCn}"></div>
      </div>
    </div>

    <!-- 답변 대기인 경우 - 답변 입력 폼 -->
    <div th:if="${qna.answStatCd == '01'}" class="mb-8">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">답변 작성</p>
      <form th:action="@{/admin/board/qna/{postSn}/answer(postSn=${qna.postSn})}" method="post">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">답변 내용 <span class="text-red-400">*</span></label>
        <textarea name="answCn" rows="6" placeholder="답변 내용을 입력하세요."
          class="hm-input hm-input-blue resize-none mb-3" required
          oninvalid="this.setCustomValidity('답변 내용을 입력해주세요.')"
          oninput="this.setCustomValidity('')"></textarea>
        <div class="flex justify-end">
          <button type="submit" class="hm-btn-primary hm-btn-blue text-sm cursor-pointer">답변 등록</button>
        </div>
      </form>
    </div>

    <!-- 하단 버튼 -->
    <div class="flex justify-between mt-4">
      <a href="/admin/board/customer-service?tab=tab-qna"
        class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
        목록
      </a>
      <div class="flex gap-3">
        <a th:if="${qna.answStatCd == '02'}" th:href="@{/admin/board/qna/edit/{postSn}(postSn=${qna.postSn})}"
          class="px-6 py-2.5 border border-blue-200 rounded-xl text-sm font-semibold text-blue-600 hover:bg-blue-50 transition-colors">
          수정
        </a>
        <form th:action="@{/admin/board/qna/delete/{postSn}(postSn=${qna.postSn})}" method="post"
          onsubmit="return confirm('삭제하시겠습니까?')" class="m-0">
          <button type="submit"
            class="px-6 py-2.5 border border-red-200 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 transition-colors cursor-pointer">
            삭제
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
