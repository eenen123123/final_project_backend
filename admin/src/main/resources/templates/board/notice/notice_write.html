<div>

  <!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">공지사항 등록</h1>
      <p class="text-sm text-slate-500 mt-0.5">새로운 공지사항을 등록합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-notice" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 등록 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
    <form action="/admin/board/notice/write" method="post" onsubmit="return confirm('공지사항을 등록하시겠습니까?')">

      <input type="hidden" name="postCn" id="postCnHidden" />

      <div class="grid grid-cols-2 gap-6 mb-6">
        <!-- 공지 유형 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
            공지 유형 <span class="text-red-400">*</span>
          </label>
          <select name="noticeTypeCd" class="hm-input hm-input-blue">
            <option value="01">일반공지</option>
            <option value="02">이벤트</option>
            <option value="03">점검</option>
          </select>
        </div>

        <!-- 팝업 노출 여부 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">팝업 노출</label>
          <div class="flex items-center gap-3 h-10">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="popupExpsYn" value="Y" class="accent-blue-600" /> Y (노출)
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="popupExpsYn" value="N" checked class="accent-blue-600" /> N (미노출)
            </label>
          </div>
        </div>
      </div>

      <!-- 작성자 -->
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">작성자</label>
        <input type="text" name="wrtrUserId" class="hm-input hm-input-blue bg-slate-50"
               th:value="${currentUser}" readonly />
      </div>

      <!-- 제목 -->
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          제목 <span class="text-red-400">*</span>
        </label>
        <input type="text" name="postSj" placeholder="공지사항 제목을 입력하세요."
               class="hm-input hm-input-blue" required />
      </div>

      <!-- 내용 (에디터) -->
      <div class="mb-8">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          내용 <span class="text-red-400">*</span>
        </label>
        <div id="editor"></div>
      </div>

      <!-- 버튼 -->
      <div class="flex justify-center gap-3">
        <a href="/admin/board/customer-service?tab=tab-notice" onclick="return confirm('작성한 내용이 모두 사라집니다.\n취소하시겠습니까?')"
          class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors cursor-pointer">
          취소
        </a>
        <button type="submit" class="hm-btn-primary hm-btn-blue hm-btn-blue hm-btn-blue px-8 py-2.5 cursor-pointer">
          등록
        </button>
      </div>

    </form>
  </div>

  <script defer th:src="@{/js/tiptap/tiptap-editor.iife.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      TipTapEditor.mount('editor', {
        editable: true,
        outputInputId: 'postCnHidden',
        imageUrlResolver: (fileId) => `/admin/files/${fileId}/view`,
      });
      document.querySelector('form').addEventListener('submit', function () {
        const el = document.querySelector('#editor .tiptap');
        if (el && el.editor) document.getElementById('postCnHidden').value = el.editor.getHTML();
      });
    });
  </script>
</div>
