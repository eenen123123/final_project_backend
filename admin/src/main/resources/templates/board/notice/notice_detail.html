<div>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">공지사항 상세</h1>
      <p class="text-sm text-slate-500 mt-0.5">공지사항 상세 내용을 확인합니다.</p>
    </div>
    <a href="/admin/board/customer-service?tab=tab-notice" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
    <div class="mb-6 pb-6 border-b border-slate-100">
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">유형</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${notice.noticeTypeNm}" readonly />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">팝업 노출</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${notice.popupExpsYn == 'Y' ? '예' : '아니오'}" readonly />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">등록자</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${notice.wrtrUserId}" readonly />
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">등록일</label>
          <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${#temporals.format(notice.regDt, 'yyyy-MM-dd')}" readonly />
        </div>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">제목</label>
        <input type="text" class="hm-input hm-input-blue bg-slate-50" th:value="${notice.postSj}" readonly />
      </div>
    </div>

    <div class="mb-8">
      <label class="text-xs font-semibold text-slate-600 mb-1.5 block">내용</label>
      <div class="bg-slate-50 rounded-xl p-4 text-sm text-slate-600 leading-relaxed min-h-32" th:utext="${notice.postCn}"></div>
    </div>

    <div class="flex justify-center gap-3">
      <a href="/admin/board/customer-service?tab=tab-notice"
        class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
        목록
      </a>
      <a th:href="@{/admin/board/notice/edit/{postSn}(postSn=${notice.postSn})}"
        class="px-6 py-2.5 border border-blue-200 rounded-xl text-sm font-semibold text-blue-600 hover:bg-blue-50 transition-colors">
        수정
      </a>
      <form th:action="@{/admin/board/notice/delete/{postSn}(postSn=${notice.postSn})}" method="post"
        onsubmit="return confirm('삭제하시겠습니까?')" class="m-0">
        <button type="submit"
          class="px-6 py-2.5 border border-red-200 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 transition-colors cursor-pointer">
          삭제
        </button>
      </form>
    </div>
  </div>
</div>
