<div>
  <!-- 페이지 헤더 -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-xl font-bold text-slate-800">공지사항 수정</h1>
      <p class="text-sm text-slate-500 mt-0.5">공지사항 내용을 수정합니다.</p>
    </div>
    <a href="/admin/board/notice" class="text-sm text-slate-500 hover:text-slate-700 font-semibold">
      <i class="fa-solid fa-arrow-left mr-1"></i> 목록으로
    </a>
  </div>

  <!-- 수정 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-8">
    <form th:action="@{/admin/board/notice/edit/{postSn}(postSn=${notice.postSn})}" method="post">

      <div class="grid grid-cols-2 gap-6 mb-6">
        <!-- 공지 유형 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
            공지 유형 <span class="text-red-400">*</span>
          </label>
          <select name="noticeTypeCd" class="hm-input">
            <option value="01" th:selected="${notice.noticeTypeCd == '01'}">일반공지</option>
            <option value="02" th:selected="${notice.noticeTypeCd == '02'}">이벤트</option>
            <option value="03" th:selected="${notice.noticeTypeCd == '03'}">점검</option>
          </select>
        </div>

        <!-- 팝업 노출 여부 -->
        <div>
          <label class="text-xs font-semibold text-slate-600 mb-1.5 block">팝업 노출</label>
          <div class="flex items-center gap-3 h-10">
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="popupExpsYn" value="Y"
                     th:checked="${notice.popupExpsYn == 'Y'}" class="accent-blue-600" /> Y (노출)
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
              <input type="radio" name="popupExpsYn" value="N"
                     th:checked="${notice.popupExpsYn == 'N'}" class="accent-blue-600" /> N (미노출)
            </label>
          </div>
        </div>
      </div>

      <!-- 작성자 -->
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">작성자</label>
        <input type="text" name="wrtrUserId" class="hm-input bg-slate-50"
               th:value="${notice.wrtrUserId}" readonly />
      </div>

      <!-- 제목 -->
      <div class="mb-6">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          제목 <span class="text-red-400">*</span>
        </label>
        <input type="text" name="postSj" th:value="${notice.postSj}"
               placeholder="공지사항 제목을 입력하세요." class="hm-input" required />
      </div>

      <!-- 내용 -->
      <div class="mb-8">
        <label class="text-xs font-semibold text-slate-600 mb-1.5 block">
          내용 <span class="text-red-400">*</span>
        </label>
        <textarea name="postCn" rows="12" placeholder="공지사항 내용을 입력하세요."
                  class="hm-input resize-none" th:text="${notice.postCn}" required></textarea>
      </div>

      <!-- 버튼 -->
      <div class="flex justify-center gap-3">
        <a href="/admin/board/notice"
           class="px-6 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
          취소
        </a>
        <button type="submit" class="hm-btn-primary px-8 py-2.5">
          수정 완료
        </button>
      </div>

    </form>
  </div>
</div>
