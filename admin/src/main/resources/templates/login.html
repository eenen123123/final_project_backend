<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HERMES Admin Login</title>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Noto Sans KR", sans-serif;
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#0f0f12] flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- 로고 -->
      <div class="flex flex-col items-center mb-8">
        <div
          class="w-14 h-14 bg-violet-600 rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-lg shadow-violet-500/30 mb-4"
        >
          H
        </div>
        <h1 class="text-white font-bold text-2xl tracking-tight">
          HERMES
          <span class="text-violet-500 text-sm font-semibold">ADMIN</span>
        </h1>
      </div>

      <!-- 에러 메시지 -->
      <div
        th:if="${param.error}"
        class="mb-4 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm flex items-center gap-2"
      >
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <div
        th:if="${param.logout}"
        class="mb-4 p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm flex items-center gap-2"
      >
        <i class="fa-solid fa-circle-check"></i>
        <span>로그아웃 되었습니다.</span>
      </div>

      <!-- 로그인 카드 -->
      <div class="bg-white/5 border border-white/10 rounded-2xl p-8 shadow-xl">
        <form th:action="@{/login}" method="post" class="space-y-5">
          <div>
            <label
              for="username"
              class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
            >
              아이디
            </label>
            <div class="relative">
              <i
                class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"
              ></i>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="관리자 아이디"
                required
                autofocus
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500 focus:bg-white/10 transition-all"
              />
            </div>
          </div>

          <div>
            <label
              for="password"
              class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2"
            >
              비밀번호
            </label>
            <div class="relative">
              <i
                class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"
              ></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="비밀번호"
                required
                class="w-full bg-white/5 border border-white/10 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-violet-500 focus:bg-white/10 transition-all"
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white font-semibold text-sm py-3 rounded-xl transition-all shadow-lg shadow-violet-500/20 flex items-center justify-center gap-2 mt-2"
          >
            <i class="fa-solid fa-right-to-bracket text-xs opacity-80"></i>
            로그인
          </button>

          <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->
        </form>
      </div>
      <div class="text-center text-sm text-gray-500 my-12">
        <table class="w-[700px] border-collapse mx-auto mt-10 absolute text-center left-1/2 -translate-x-1/2 font-bold">
          <thead class="bg-gray-200">
            <tr class="border">
              <th class="px-4 py-2 border">아이디</th>
              <th class="px-4 py-2 border">이름</th>
              <th class="px-4 py-2 border">Role</th>
              <th class="px-4 py-2 border">부서</th>
              <th class="px-4 py-2 border">직급</th>
            </tr>
          </thead>
          <tbody id="account-info">
          </tbody>
        </table>
        <script>
          document.addEventListener("DOMContentLoaded",async () => {
            const accountInfo = document.getElementById("account-info");
            try {
              const res = await fetch("/api/temp/accounts");
              const data = await res.json();
              data.forEach(account => {
                let bgColorClass = "bg-gray-100";
                if (account.department === "행정팀") {
                  bgColorClass = "bg-blue-100";
                } else if (account.department === "강사팀") {
                  bgColorClass = "bg-green-100";
                } else if (account.department === "PD팀") {
                  bgColorClass = "bg-yellow-100";
                }
                const tr = document.createElement("tr");
                tr.classList.add("border", bgColorClass);
                tr.innerHTML = `
                  <td class="px-4 py-2 border">${account.userId}</td>
                  <td class="px-4 py-2 border">${account.userName}</td>
                  <td class="px-4 py-2 border text-[12px]">${account.userRole}</td>
                  <td class="px-4 py-2 border">${account.department}</td>
                  <td class="px-4 py-2 border">${account.jobGrade}</td>
                `;
                accountInfo.appendChild(tr);
              });
            } catch (error) {
              console.error("계정 정보를 불러오는 중 오류 발생:", error);
            }
          })
        </script>
      </div>

      <!-- 하단 안내 -->
      <p class="text-center text-slate-600 text-xs mt-6">
        <i class="fa-solid fa-shield-halved mr-1"></i>
      </p>
    </div>
  </body>
</html>
