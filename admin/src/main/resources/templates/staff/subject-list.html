<title th:fragment="pageTitle">과목 관리 | HERMES</title>

<div class="flex flex-col h-full gap-6">
  <!-- 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shrink-0">
    <div>
      <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
        <span class="text-sky-500 font-medium">과목 관리</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">과목 관리</h1>
      <p class="text-sm text-slate-500 mt-1">과목 대분류와 세부 과목을 관리합니다.</p>
    </div>
    <button type="button" onclick="openCreateForm()"
            id="header-create-btn"
            class="hm-btn-primary hm-btn-sky shrink-0">
      <i class="fa-solid fa-plus"></i>
      <span>대분류 등록</span>
    </button>
  </div>

  <!-- 2단 패널 -->
  <div class="flex gap-6 flex-1 min-h-0">
    <!-- ── 좌측: 대분류 목록 ──────────────────────────────── -->
    <div class="w-96 shrink-0 flex flex-col gap-3 overflow-y-auto pr-1">
      <!-- 대분류 등록 폼 (기본 숨김) -->
      <div id="create-form-card"
           class="hidden bg-white rounded-2xl border border-sky-200 shadow-sm p-5 space-y-4">
        <p class="text-xs font-bold text-sky-600">
          <i class="fa-solid fa-plus mr-1.5"></i>새 대분류 등록
        </p>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1.5">
            대분류명 <span class="text-red-400">*</span>
          </label>
          <input type="text" id="create-subjClNm" class="hm-input w-full"
                 placeholder="대분류명을 입력하세요" maxlength="100" />
        </div>
        <div id="create-error"
             class="hidden text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2"></div>
        <div class="flex gap-2 pt-1">
          <button type="button" onclick="closeCreateForm()"
                  class="flex-1 hm-btn-secondary justify-center">취소</button>
          <button type="button" onclick="submitCreate()" id="create-submit-btn"
                  class="flex-1 hm-btn-primary hm-btn-sky justify-center">
            <i class="fa-solid fa-check mr-1"></i>등록
          </button>
        </div>
      </div>

      <!-- 목록 없을 때 -->
      <div th:if="${classificationList == null or classificationList.isEmpty()}"
           class="flex flex-col items-center gap-3 text-slate-300 py-16 text-center">
        <i class="fa-solid fa-folder-open text-4xl"></i>
        <p class="text-sm">등록된 대분류가 없습니다.</p>
      </div>

      <!-- 대분류 카드 목록 -->
      <div th:each="cl : ${classificationList}"
           th:id="'card-' + ${cl.subjClId}"
           class="classification-card bg-white rounded-2xl border-2 border-slate-100 shadow-sm transition-colors duration-200">
        <!-- 카드 기본 뷰 -->
        <div class="card-view p-4 cursor-pointer hover:bg-slate-50/60 transition-colors rounded-2xl"
             th:data-id="${cl.subjClId}"
             onclick="selectClassification(Number(this.dataset.id))">
          <div class="flex items-center gap-2.5 mb-2.5">
            <div class="w-8 h-8 rounded-xl bg-sky-50 flex items-center justify-center shrink-0">
              <i class="fa-solid fa-folder text-sky-400 text-xs"></i>
            </div>
            <p class="font-semibold text-slate-800 text-sm truncate card-cl-nm"
               th:text="${cl.subjClNm}">대분류명</p>
          </div>
          <!-- 수정/삭제 버튼 -->
          <div class="flex gap-1.5 mt-1 ml-10" onclick="event.stopPropagation()">
            <button type="button"
                    th:data-id="${cl.subjClId}"
                    th:data-nm="${cl.subjClNm}"
                    onclick="openEditForm(this)"
                    class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium text-sky-600 hover:bg-sky-50 transition-colors border border-sky-100">
              <i class="fa-solid fa-pen mr-1"></i>수정
            </button>
            <button type="button"
                    th:data-id="${cl.subjClId}"
                    th:data-nm="${cl.subjClNm}"
                    onclick="openDeleteModal(this)"
                    class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium text-red-500 hover:bg-red-50 transition-colors border border-red-100">
              <i class="fa-solid fa-trash mr-1"></i>삭제
            </button>
          </div>
        </div>

        <!-- 카드 수정 폼 (기본 숨김) -->
        <div class="edit-form hidden p-5 space-y-4 bg-sky-50/30 border-t border-sky-100 rounded-b-2xl">
          <p class="text-xs font-bold text-sky-600">
            <i class="fa-solid fa-pen mr-1.5"></i>대분류 수정
          </p>
          <div>
            <label class="block text-xs font-semibold text-slate-500 mb-1.5">
              대분류명 <span class="text-red-400">*</span>
            </label>
            <input type="text" class="edit-subjClNm hm-input w-full" maxlength="100" />
          </div>
          <div class="edit-error hidden text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2"></div>
          <div class="flex gap-2 pt-1">
            <button type="button" onclick="closeEditForm(this)"
                    class="flex-1 hm-btn-secondary justify-center">취소</button>
            <button type="button" onclick="submitEdit(this)"
                    class="edit-submit-btn flex-1 hm-btn-primary hm-btn-sky justify-center">
              <i class="fa-solid fa-check mr-1"></i>저장
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 우측: 과목 목록 패널 ──────────────────────────── -->
    <div class="flex-1 min-w-0 flex flex-col gap-4 overflow-y-auto">
      <!-- 미선택 안내 -->
      <div id="panel-empty"
           class="flex flex-col items-center justify-center gap-4 text-slate-300 h-full min-h-[300px] bg-white rounded-2xl border border-slate-100 shadow-sm">
        <i class="fa-solid fa-folder text-5xl"></i>
        <p class="text-sm">좌측에서 대분류를 선택하세요.</p>
      </div>

      <!-- 선택 후 패널 -->
      <div id="panel-content" class="hidden flex-col gap-4">
        <!-- 패널 헤더 -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm px-6 py-5">
          <p class="text-xs text-slate-400 mb-1">선택된 대분류</p>
          <h2 id="panel-title" class="text-xl font-bold text-slate-800">-</h2>
        </div>

        <!-- 과목 목록 카드 -->
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
          <div class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-slate-100">
            <div class="flex items-center gap-2.5">
              <i class="fa-solid fa-book text-sky-500"></i>
              <h3 class="text-sm font-bold text-slate-700">
                과목 목록
                <span id="subject-count"
                      class="ml-1.5 text-xs font-normal text-slate-400">불러오는 중...</span>
              </h3>
            </div>
            <button type="button" onclick="toggleSubjectCreatePanel()"
                    id="add-subject-btn"
                    class="hm-btn-primary hm-btn-sky"
                    style="padding: 0.35rem 0.9rem; font-size: 0.75rem">
              <i class="fa-solid fa-plus mr-1"></i>과목 추가
            </button>
          </div>

          <!-- 과목 등록 인라인 폼 (기본 숨김) -->
          <div id="subject-create-panel"
               class="hidden p-5 space-y-3 bg-sky-50/30 border-b border-sky-100">
            <p class="text-xs font-bold text-sky-600">
              <i class="fa-solid fa-plus mr-1.5"></i>새 과목 등록
            </p>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5">
                과목명 <span class="text-red-400">*</span>
              </label>
              <input type="text" id="subject-create-nm" class="hm-input w-full"
                     placeholder="과목명을 입력하세요" maxlength="100" />
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 mb-1.5">설명</label>
              <textarea id="subject-create-expln" class="hm-input w-full resize-none"
                        rows="2" maxlength="4000" placeholder="과목 설명 (선택)"></textarea>
            </div>
            <div id="subject-create-error"
                 class="hidden text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2"></div>
            <div class="flex gap-2 pt-1">
              <button type="button" onclick="toggleSubjectCreatePanel()"
                      class="flex-1 hm-btn-secondary justify-center">취소</button>
              <button type="button" onclick="submitCreateSubject()" id="subject-create-btn"
                      class="flex-1 hm-btn-primary hm-btn-sky justify-center">
                <i class="fa-solid fa-check mr-1"></i>등록
              </button>
            </div>
          </div>

          <div id="subject-list" class="p-4 space-y-2 min-h-[60px]"></div>

          <div id="subject-list-empty" class="hidden px-6 pb-10 pt-4 text-center">
            <div class="flex flex-col items-center gap-2 text-slate-300">
              <i class="fa-solid fa-book text-3xl"></i>
              <p class="text-xs">등록된 과목이 없습니다.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── 대분류 삭제 확인 모달 ──────────────────────── -->
<div id="delete-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center">
  <div class="absolute inset-0 bg-black/40" onclick="closeDeleteModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
    <div class="flex flex-col items-center gap-3 text-center">
      <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center">
        <i class="fa-solid fa-triangle-exclamation text-red-500 text-xl"></i>
      </div>
      <h3 class="text-base font-bold text-slate-800">대분류를 삭제하시겠습니까?</h3>
      <p class="text-sm text-slate-500">
        <span id="delete-nm" class="font-semibold text-slate-700"></span>
        이(가) 삭제됩니다.
      </p>
      <p class="text-xs text-red-400">소속 과목이 있으면 삭제할 수 없습니다.</p>
    </div>
    <div class="flex gap-2 mt-5">
      <button type="button" onclick="closeDeleteModal()"
              class="flex-1 hm-btn-secondary justify-center">취소</button>
      <button type="button" onclick="submitDelete()" id="delete-confirm-btn"
              class="flex-1 hm-btn-primary bg-red-500 hover:bg-red-600 text-white justify-center">삭제</button>
    </div>
  </div>
</div>

<!-- ── 과목 삭제 확인 모달 ────────────────────────── -->
<div id="delete-subject-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center">
  <div class="absolute inset-0 bg-black/40" onclick="closeDeleteSubjectModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
    <div class="flex flex-col items-center gap-3 text-center">
      <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center">
        <i class="fa-solid fa-triangle-exclamation text-red-500 text-xl"></i>
      </div>
      <h3 class="text-base font-bold text-slate-800">과목을 삭제하시겠습니까?</h3>
      <p class="text-sm text-slate-500">
        <span id="delete-subject-nm" class="font-semibold text-slate-700"></span>
        이(가) 삭제됩니다.
      </p>
      <p class="text-xs text-red-400">연결된 강좌가 있으면 삭제할 수 없습니다.</p>
    </div>
    <div class="flex gap-2 mt-5">
      <button type="button" onclick="closeDeleteSubjectModal()"
              class="flex-1 hm-btn-secondary justify-center">취소</button>
      <button type="button" onclick="submitDeleteSubject()" id="delete-subject-confirm-btn"
              class="flex-1 hm-btn-primary bg-red-500 hover:bg-red-600 text-white justify-center">삭제</button>
    </div>
  </div>
</div>

<th:block th:fragment="pageJs">
<script>
  /* ── 상태 ── */
  let selectedClId = null;
  let deletingClId = null;
  let deletingSubjId = null;

  function escapeHtml(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  /* ══════════════════════════════════════════════
     대분류 선택
  ══════════════════════════════════════════════ */
  function selectClassification(clId) {
    selectedClId = clId;

    document.querySelectorAll(".classification-card").forEach((el) => {
      el.classList.remove("border-sky-400", "bg-sky-50/40");
      el.classList.add("border-slate-100");
    });
    const card = document.getElementById("card-" + clId);
    if (card) {
      card.classList.remove("border-slate-100");
      card.classList.add("border-sky-400", "bg-sky-50/40");
    }

    document.getElementById("panel-title").textContent =
      card.querySelector(".card-cl-nm").textContent;

    document.getElementById("panel-empty").classList.add("hidden");
    const panelContent = document.getElementById("panel-content");
    panelContent.classList.remove("hidden");
    panelContent.classList.add("flex");

    document.getElementById("subject-create-panel").classList.add("hidden");
    loadSubjects();
  }

  /* ══════════════════════════════════════════════
     과목 목록 로드
  ══════════════════════════════════════════════ */
  async function loadSubjects() {
    const listEl = document.getElementById("subject-list");
    const emptyEl = document.getElementById("subject-list-empty");
    const countEl = document.getElementById("subject-count");

    listEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">불러오는 중...</p>';
    emptyEl.classList.add("hidden");

    try {
      const res = await fetch(`/admin/subject/classification/${selectedClId}/subjects`);
      if (!res.ok) {
        listEl.innerHTML = `<p class="text-sm text-red-400 text-center py-4">과목 목록을 불러오지 못했습니다. (${res.status})</p>`;
        return;
      }
      const subjects = await res.json();
      countEl.textContent = `총 ${subjects.length}개`;

      if (subjects.length === 0) {
        listEl.innerHTML = "";
        emptyEl.classList.remove("hidden");
      } else {
        emptyEl.classList.add("hidden");
        listEl.innerHTML = subjects.map(buildSubjectRow).join("");
      }
    } catch (e) {
      listEl.innerHTML = '<p class="text-sm text-red-400 text-center py-4">과목 목록을 불러오지 못했습니다.</p>';
    }
  }

  function buildSubjectRow(s) {
    const nm = escapeHtml(s.subjNm) || "-";
    const expln = s.subjExplnCn
      ? `<p class="text-xs text-slate-400 mt-0.5 truncate">${escapeHtml(s.subjExplnCn)}</p>`
      : "";
    return `
    <div class="subject-row flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-100 bg-slate-50/50 hover:bg-white hover:shadow-sm transition-all"
         data-subj-id="${s.subjId}">
      <div class="w-7 h-7 rounded-lg bg-sky-50 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-book text-sky-400 text-xs"></i>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-slate-800 truncate subj-nm-text">${nm}</p>
        ${expln}
      </div>
      <div class="flex gap-1.5 shrink-0">
        <button type="button"
                data-subj-id="${s.subjId}"
                data-nm="${escapeHtml(s.subjNm)}"
                data-expln="${escapeHtml(s.subjExplnCn ?? '')}"
                onclick="openSubjectEditInline(this)"
                class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium text-sky-600 hover:bg-sky-50 transition-colors border border-sky-100">
          <i class="fa-solid fa-pen mr-1"></i>수정
        </button>
        <button type="button"
                data-subj-id="${s.subjId}"
                data-nm="${escapeHtml(s.subjNm)}"
                onclick="openDeleteSubjectModal(Number(this.dataset.subjId), this.dataset.nm)"
                class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-medium text-red-500 hover:bg-red-50 transition-colors border border-red-100">
          <i class="fa-solid fa-trash mr-1"></i>삭제
        </button>
      </div>
    </div>
    <div class="subject-edit-form hidden px-4 pb-3 pt-2 space-y-3 bg-sky-50/30 border border-sky-100 rounded-xl -mt-2"
         data-for-subj="${s.subjId}">
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1">과목명 <span class="text-red-400">*</span></label>
        <input type="text" class="subj-edit-nm hm-input w-full" maxlength="100" />
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-500 mb-1">설명</label>
        <textarea class="subj-edit-expln hm-input w-full resize-none" rows="2" maxlength="4000"></textarea>
      </div>
      <div class="subj-edit-error hidden text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2"></div>
      <div class="flex gap-2">
        <button type="button" onclick="closeSubjectEditInline(this)"
                class="flex-1 hm-btn-secondary justify-center">취소</button>
        <button type="button" onclick="submitSubjectEdit(this)"
                class="subj-edit-submit flex-1 hm-btn-primary hm-btn-sky justify-center">
          <i class="fa-solid fa-check mr-1"></i>저장
        </button>
      </div>
    </div>`;
  }

  /* ══════════════════════════════════════════════
     과목 인라인 수정
  ══════════════════════════════════════════════ */
  function openSubjectEditInline(btn) {
    const subjId = btn.dataset.subjId;
    /* 다른 수정 폼 닫기 */
    document.querySelectorAll(".subject-edit-form").forEach((f) => f.classList.add("hidden"));

    const form = document.querySelector(`.subject-edit-form[data-for-subj="${subjId}"]`);
    form.querySelector(".subj-edit-nm").value = btn.dataset.nm ?? "";
    form.querySelector(".subj-edit-expln").value = btn.dataset.expln ?? "";
    form.querySelector(".subj-edit-error").classList.add("hidden");
    form.classList.remove("hidden");
    form.querySelector(".subj-edit-nm").focus();
  }

  function closeSubjectEditInline(btn) {
    btn.closest(".subject-edit-form").classList.add("hidden");
  }

  async function submitSubjectEdit(btn) {
    const form = btn.closest(".subject-edit-form");
    const subjId = form.dataset.forSubj;
    const nm = form.querySelector(".subj-edit-nm").value.trim();
    const errorEl = form.querySelector(".subj-edit-error");

    if (!nm) {
      errorEl.textContent = "과목명은 필수 입력 항목입니다.";
      errorEl.classList.remove("hidden");
      return;
    }
    btn.disabled = true;

    const params = new URLSearchParams();
    params.append("subjNm", nm);
    params.append("subjExplnCn", form.querySelector(".subj-edit-expln").value);

    try {
      const res = await fetch(`/admin/subject/classification/${selectedClId}/${subjId}/update`, {
        method: "POST", body: params,
      });
      const data = await res.json();
      if (data.success) {
        /* 수정 버튼 data 속성 갱신 */
        const editBtn = document.querySelector(`.subject-row[data-subj-id="${subjId}"] button[data-subj-id="${subjId}"]`);
        if (editBtn) {
          editBtn.dataset.nm = nm;
          editBtn.dataset.expln = form.querySelector(".subj-edit-expln").value;
        }
        /* 과목명 텍스트 즉시 갱신 */
        const row = document.querySelector(`.subject-row[data-subj-id="${subjId}"]`);
        if (row) row.querySelector(".subj-nm-text").textContent = nm;
        btn.disabled = false;
        form.classList.add("hidden");
      } else {
        errorEl.textContent = data.message || "수정에 실패했습니다.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
      }
    } catch (e) {
      errorEl.textContent = "서버 오류가 발생했습니다.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
    }
  }

  /* ══════════════════════════════════════════════
     과목 등록 인라인 폼 토글
  ══════════════════════════════════════════════ */
  function toggleSubjectCreatePanel() {
    const panel = document.getElementById("subject-create-panel");
    if (!panel.classList.contains("hidden")) {
      panel.classList.add("hidden");
      return;
    }
    document.getElementById("subject-create-nm").value = "";
    document.getElementById("subject-create-expln").value = "";
    document.getElementById("subject-create-error").classList.add("hidden");
    panel.classList.remove("hidden");
    document.getElementById("subject-create-nm").focus();
  }

  async function submitCreateSubject() {
    const nm = document.getElementById("subject-create-nm").value.trim();
    const errorEl = document.getElementById("subject-create-error");
    if (!nm) {
      errorEl.textContent = "과목명은 필수 입력 항목입니다.";
      errorEl.classList.remove("hidden");
      return;
    }
    const btn = document.getElementById("subject-create-btn");
    btn.disabled = true;

    const params = new URLSearchParams();
    params.append("subjNm", nm);
    params.append("subjExplnCn", document.getElementById("subject-create-expln").value);

    try {
      const res = await fetch(`/admin/subject/classification/${selectedClId}/create`, {
        method: "POST", body: params,
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById("subject-create-panel").classList.add("hidden");
        loadSubjects();
      } else {
        errorEl.textContent = data.message || "등록에 실패했습니다.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
      }
    } catch (e) {
      errorEl.textContent = "서버 오류가 발생했습니다.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
    }
  }

  /* ══════════════════════════════════════════════
     대분류 등록 폼
  ══════════════════════════════════════════════ */
  function openCreateForm() {
    document.getElementById("create-form-card").classList.remove("hidden");
    document.getElementById("header-create-btn").classList.add("hidden");
    document.getElementById("create-subjClNm").focus();
  }
  function closeCreateForm() {
    document.getElementById("create-form-card").classList.add("hidden");
    document.getElementById("header-create-btn").classList.remove("hidden");
    document.getElementById("create-subjClNm").value = "";
    document.getElementById("create-error").classList.add("hidden");
  }
  async function submitCreate() {
    const nm = document.getElementById("create-subjClNm").value.trim();
    const errorEl = document.getElementById("create-error");
    if (!nm) {
      errorEl.textContent = "대분류명은 필수 입력 항목입니다.";
      errorEl.classList.remove("hidden");
      return;
    }
    const btn = document.getElementById("create-submit-btn");
    btn.disabled = true;

    const params = new URLSearchParams();
    params.append("subjClNm", nm);

    try {
      const res = await fetch("/admin/subject/classification/create", {
        method: "POST", body: params,
      });
      const data = await res.json();
      if (data.success) {
        location.reload();
      } else {
        errorEl.textContent = data.message || "등록에 실패했습니다.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
      }
    } catch (e) {
      errorEl.textContent = "서버 오류가 발생했습니다.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
    }
  }

  /* ══════════════════════════════════════════════
     대분류 수정 폼
  ══════════════════════════════════════════════ */
  function openEditForm(btn) {
    const card = btn.closest(".classification-card");
    const editDiv = card.querySelector(".edit-form");

    document.querySelectorAll(".edit-form").forEach((f) => {
      if (f !== editDiv) f.classList.add("hidden");
    });

    editDiv.querySelector(".edit-subjClNm").value = btn.dataset.nm ?? "";
    editDiv.querySelector(".edit-error").classList.add("hidden");
    editDiv.classList.remove("hidden");
    editDiv.querySelector(".edit-subjClNm").focus();
  }
  function closeEditForm(btn) {
    btn.closest(".edit-form").classList.add("hidden");
  }
  async function submitEdit(btn) {
    const editDiv = btn.closest(".edit-form");
    const card = editDiv.closest(".classification-card");
    const clId = card.id.replace("card-", "");
    const nm = editDiv.querySelector(".edit-subjClNm").value.trim();
    const errorEl = editDiv.querySelector(".edit-error");

    if (!nm) {
      errorEl.textContent = "대분류명은 필수 입력 항목입니다.";
      errorEl.classList.remove("hidden");
      return;
    }
    btn.disabled = true;

    const params = new URLSearchParams();
    params.append("subjClNm", nm);

    try {
      const res = await fetch(`/admin/subject/classification/${clId}/update`, {
        method: "POST", body: params,
      });
      const data = await res.json();
      if (data.success) {
        card.querySelector(".card-cl-nm").textContent = nm;
        const editBtn = card.querySelector('[onclick="openEditForm(this)"]');
        editBtn.dataset.nm = nm;
        if (selectedClId === Number(clId)) {
          document.getElementById("panel-title").textContent = nm;
        }
        btn.disabled = false;
        editDiv.classList.add("hidden");
      } else {
        errorEl.textContent = data.message || "수정에 실패했습니다.";
        errorEl.classList.remove("hidden");
        btn.disabled = false;
      }
    } catch (e) {
      errorEl.textContent = "서버 오류가 발생했습니다.";
      errorEl.classList.remove("hidden");
      btn.disabled = false;
    }
  }

  /* ══════════════════════════════════════════════
     대분류 삭제 모달
  ══════════════════════════════════════════════ */
  function openDeleteModal(btn) {
    deletingClId = btn.dataset.id;
    document.getElementById("delete-nm").textContent = btn.dataset.nm;
    document.getElementById("delete-modal").classList.replace("hidden", "flex");
  }
  function closeDeleteModal() {
    deletingClId = null;
    document.getElementById("delete-modal").classList.replace("flex", "hidden");
  }
  async function submitDelete() {
    if (!deletingClId) return;
    const btn = document.getElementById("delete-confirm-btn");
    btn.disabled = true;
    try {
      const res = await fetch(`/admin/subject/classification/${deletingClId}/delete`, {
        method: "POST",
      });
      const data = await res.json();
      if (data.success) {
        const card = document.getElementById("card-" + deletingClId);
        if (card) card.remove();
        if (selectedClId === Number(deletingClId)) {
          selectedClId = null;
          document.getElementById("panel-empty").classList.remove("hidden");
          const panelContent = document.getElementById("panel-content");
          panelContent.classList.add("hidden");
          panelContent.classList.remove("flex");
        }
        btn.disabled = false;
        closeDeleteModal();
      } else {
        alert(data.message || "삭제에 실패했습니다.");
        btn.disabled = false;
        closeDeleteModal();
      }
    } catch (e) {
      alert("서버 오류가 발생했습니다.");
      btn.disabled = false;
      closeDeleteModal();
    }
  }

  /* ══════════════════════════════════════════════
     과목 삭제 모달
  ══════════════════════════════════════════════ */
  function openDeleteSubjectModal(subjId, subjNm) {
    deletingSubjId = subjId;
    document.getElementById("delete-subject-nm").textContent = subjNm;
    document.getElementById("delete-subject-modal").classList.replace("hidden", "flex");
  }
  function closeDeleteSubjectModal() {
    deletingSubjId = null;
    document.getElementById("delete-subject-modal").classList.replace("flex", "hidden");
  }
  async function submitDeleteSubject() {
    if (!deletingSubjId) return;
    const btn = document.getElementById("delete-subject-confirm-btn");
    btn.disabled = true;
    try {
      const res = await fetch(`/admin/subject/classification/${selectedClId}/${deletingSubjId}/delete`, {
        method: "POST",
      });
      const data = await res.json();
      if (data.success) {
        btn.disabled = false;
        closeDeleteSubjectModal();
        loadSubjects();
      } else {
        alert(data.message || "삭제에 실패했습니다.");
        btn.disabled = false;
        closeDeleteSubjectModal();
      }
    } catch (e) {
      alert("서버 오류가 발생했습니다.");
      btn.disabled = false;
      closeDeleteSubjectModal();
    }
  }
</script>
</th:block>
