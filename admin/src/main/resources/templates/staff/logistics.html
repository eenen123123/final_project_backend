<title th:fragment="pageTitle">교재 및 물류 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">교재 및 물류 관리</h1>
      <p class="text-sm text-slate-500 mt-1">교재 재고 현황을 파악하고 학생별 지급·수령 내역을 기록합니다.</p>
    </div>
    <div class="flex items-center gap-3">
      <button class="px-4 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors flex items-center gap-2"
        onclick="openStockModal(null)">
        <i class="fa-solid fa-boxes-stacked"></i>
        <span>교재 입고 등록</span>
      </button>
      <button class="hm-btn-primary" onclick="openDistributeModal(null)">
        <i class="fa-solid fa-hand-holding-box"></i>
        <span>교재 지급</span>
      </button>
    </div>
  </div>

  <!-- ② 재고 현황 요약 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-book"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">교재 종류</p>
      </div>
      <p class="text-2xl font-bold text-slate-800">18종</p>
      <p class="text-xs text-slate-400 mt-0.5">전체 등록 교재</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-boxes-stacked"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">총 재고</p>
      </div>
      <p class="text-2xl font-bold text-slate-800">342권</p>
      <p class="text-xs text-slate-400 mt-0.5">전체 보유 수량</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">재고 부족</p>
      </div>
      <p class="text-2xl font-bold text-amber-500">3종</p>
      <p class="text-xs text-slate-400 mt-0.5">안전 재고 미달</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-sky-50 text-sky-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-hand-holding-box"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">이번 달 지급</p>
      </div>
      <p class="text-2xl font-bold text-slate-800">47권</p>
      <p class="text-xs text-slate-400 mt-0.5">5월 지급 합계</p>
    </div>
  </div>

  <!-- ③ 탭 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">

    <div class="flex items-center gap-1 px-5 pt-4 border-b border-slate-100 overflow-x-auto no-scrollbar">
      <button class="lg-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-stock" onclick="switchLgTab('tab-stock', this)">
        <i class="fa-solid fa-warehouse mr-1.5"></i>재고 현황
        <span class="ml-1 px-1.5 py-0.5 bg-amber-400 text-white text-xs rounded-full">3</span>
      </button>
      <button class="lg-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-inbound" onclick="switchLgTab('tab-inbound', this)">
        <i class="fa-solid fa-truck-ramp-box mr-1.5"></i>입고 이력
      </button>
      <button class="lg-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-distribute" onclick="switchLgTab('tab-distribute', this)">
        <i class="fa-solid fa-hand-holding-box mr-1.5"></i>지급·수령 내역
      </button>
    </div>

    <!-- ── 탭 1: 재고 현황 ── -->
    <div id="tab-stock" class="lg-tab-panel p-5">

      <div class="flex flex-wrap gap-3 mb-4">
        <div class="w-44">
          <input type="text" class="hm-input" placeholder="교재명 검색..." oninput="filterStock(this.value)">
        </div>
        <div class="w-36">
          <select class="hm-input" onchange="filterStockCategory(this.value)">
            <option value="">전체 분류</option>
            <option value="수학">수학</option>
            <option value="영어">영어</option>
            <option value="과학">과학</option>
            <option value="소모품">소모품</option>
          </select>
        </div>
        <div class="w-36">
          <select class="hm-input" id="stockStatusFilter" onchange="filterStockStatus(this.value)">
            <option value="">전체 상태</option>
            <option value="부족">재고 부족</option>
            <option value="정상">정상</option>
            <option value="충분">충분</option>
          </select>
        </div>
      </div>

      <!-- 재고 그리드 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4" id="stockGrid"></div>
    </div>

    <!-- ── 탭 2: 입고 이력 ── -->
    <div id="tab-inbound" class="lg-tab-panel hidden p-5">

      <div class="flex flex-wrap gap-3 mb-4">
        <div class="w-44">
          <input type="text" class="hm-input" placeholder="교재명 검색..." oninput="filterInbound(this.value)">
        </div>
        <div class="flex items-center gap-2 ml-auto">
          <input type="date" class="hm-input w-36" id="inboundFrom" value="2026-05-01">
          <span class="text-slate-300">~</span>
          <input type="date" class="hm-input w-36" id="inboundTo"   value="2026-05-26">
          <button onclick="showHermesToast('기간 조회를 실행합니다.', 'info')" class="px-4 py-2 text-xs font-semibold text-violet-600 bg-violet-50 hover:bg-violet-100 rounded-xl transition-colors">
            조회
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">입고일</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">교재명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">분류</th>
              <th class="text-center py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">입고 수량</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">단가</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">합계</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">공급처</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">담당자</th>
            </tr>
          </thead>
          <tbody id="inboundTableBody"></tbody>
        </table>
      </div>

      <!-- 합계 -->
      <div class="flex justify-end items-center gap-4 mt-4 pt-4 border-t border-slate-50 text-sm">
        <span class="text-slate-400">이번 달 입고 합계</span>
        <span class="font-bold text-slate-800">178권 · 5,450,000원</span>
      </div>
    </div>

    <!-- ── 탭 3: 지급·수령 내역 ── -->
    <div id="tab-distribute" class="lg-tab-panel hidden p-5">

      <div class="flex flex-wrap gap-3 mb-4">
        <div class="w-44">
          <input type="text" class="hm-input" placeholder="학생명 / 교재명..." oninput="filterDistribute(this.value)">
        </div>
        <div class="w-36">
          <select class="hm-input" onchange="filterDistributeClass(this.value)">
            <option value="">전체 반</option>
            <option value="고등수학A">고등수학A</option>
            <option value="고등수학B">고등수학B</option>
            <option value="중등수학A">중등수학A</option>
            <option value="중등수학B">중등수학B</option>
            <option value="고등영어">고등영어</option>
            <option value="과학기초">과학기초</option>
          </select>
        </div>
        <div class="w-32">
          <select class="hm-input" onchange="filterDistributeStatus(this.value)">
            <option value="">전체 상태</option>
            <option value="지급완료">지급 완료</option>
            <option value="미수령">미수령</option>
          </select>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">지급일</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학생명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">담당반</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">교재명</th>
              <th class="text-center py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수량</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">교재비</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">결제</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수령 상태</th>
              <th class="py-2 px-3"></th>
            </tr>
          </thead>
          <tbody id="distributeTableBody"></tbody>
        </table>
      </div>

      <!-- 페이징 -->
      <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-50">
        <p class="text-xs text-slate-400">총 47건</p>
        <div class="flex items-center gap-1">
          <button class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 text-xs flex items-center justify-center"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="w-8 h-8 rounded-lg bg-violet-600 text-white text-xs font-bold flex items-center justify-center">1</button>
          <button class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 text-xs flex items-center justify-center">2</button>
          <button class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 text-xs flex items-center justify-center">3</button>
          <button class="w-8 h-8 rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 text-xs flex items-center justify-center"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== 교재 입고 등록 모달 ===== -->
<div id="stockModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeStockModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-base font-bold text-slate-800" id="stockModalTitle">교재 입고 등록</h3>
      <button onclick="closeStockModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">교재 선택 <span class="text-red-400">*</span></label>
        <select class="hm-input" id="stockBook">
          <option value="">교재를 선택하거나 신규 등록</option>
          <option value="1">수학의 정석 (고등수학A)</option>
          <option value="2">개념원리 중등수학 2</option>
          <option value="3">EBS 수능특강 수학</option>
          <option value="4">Grammar Zone 고급</option>
          <option value="5">능률영어 고1</option>
          <option value="new">+ 신규 교재 등록</option>
        </select>
      </div>

      <!-- 신규 교재 입력 (선택 시 노출) -->
      <div id="newBookSection" class="hidden space-y-3 p-3 bg-slate-50 rounded-xl">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">교재명 <span class="text-red-400">*</span></label>
            <input type="text" class="hm-input" id="newBookName" placeholder="교재명 입력">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">분류</label>
            <select class="hm-input" id="newBookCategory">
              <option value="수학">수학</option>
              <option value="영어">영어</option>
              <option value="과학">과학</option>
              <option value="소모품">소모품</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">담당반</label>
          <select class="hm-input" id="newBookClass">
            <option value="">전체 공용</option>
            <option value="고등수학A">고등수학A</option>
            <option value="고등수학B">고등수학B</option>
            <option value="중등수학A">중등수학A</option>
            <option value="중등수학B">중등수학B</option>
            <option value="고등영어">고등영어</option>
            <option value="과학기초">과학기초</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">단가 (원)</label>
            <input type="number" class="hm-input" id="newBookPrice" placeholder="0">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">안전 재고 수량</label>
            <input type="number" class="hm-input" id="newBookSafeQty" placeholder="10">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">입고 수량 <span class="text-red-400">*</span></label>
          <input type="number" class="hm-input" id="stockQty" placeholder="0" min="1">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">입고일 <span class="text-red-400">*</span></label>
          <input type="date" class="hm-input" id="stockDate">
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">공급처</label>
        <input type="text" class="hm-input" id="stockSupplier" placeholder="출판사 또는 공급처명">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">메모</label>
        <input type="text" class="hm-input" id="stockMemo" placeholder="특이사항 (선택)">
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button class="flex-1 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors" onclick="closeStockModal()">취소</button>
      <button class="flex-1 hm-btn-primary" onclick="saveStock()">
        <i class="fa-solid fa-truck-ramp-box"></i>
        <span>입고 등록</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== 교재 지급 모달 ===== -->
<div id="distributeModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDistributeModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-base font-bold text-slate-800">교재 지급</h3>
      <button onclick="closeDistributeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">교재 선택 <span class="text-red-400">*</span></label>
        <select class="hm-input" id="distBook" onchange="updateDistStock()">
          <option value="">교재를 선택하세요</option>
          <option value="1" data-stock="42">수학의 정석 (고등수학A) — 재고 42권</option>
          <option value="2" data-stock="18">개념원리 중등수학 2 — 재고 18권</option>
          <option value="3" data-stock="5">EBS 수능특강 수학 — 재고 5권</option>
          <option value="4" data-stock="30">Grammar Zone 고급 — 재고 30권</option>
          <option value="5" data-stock="22">능률영어 고1 — 재고 22권</option>
        </select>
        <p class="text-xs mt-1" id="distStockInfo"></p>
      </div>

      <!-- 지급 대상: 개인 or 반 전체 -->
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">지급 방식</label>
        <div class="flex gap-2">
          <button type="button" onclick="selectDistType('individual', this)"
            class="dist-type-btn flex-1 py-2 text-xs font-semibold rounded-xl border-2 border-violet-400 bg-violet-50 text-violet-700 transition-colors">
            <i class="fa-solid fa-user mr-1"></i>개인 지급
          </button>
          <button type="button" onclick="selectDistType('class', this)"
            class="dist-type-btn flex-1 py-2 text-xs font-semibold rounded-xl border-2 border-slate-200 text-slate-500 hover:border-violet-300 transition-colors">
            <i class="fa-solid fa-users mr-1"></i>반 전체 지급
          </button>
        </div>
      </div>

      <!-- 개인 선택 -->
      <div id="distIndividual">
        <label class="block text-xs font-medium text-slate-500 mb-1.5">학생 선택 <span class="text-red-400">*</span></label>
        <select class="hm-input" id="distStudent">
          <option value="">학생을 선택하세요</option>
          <option value="1">김민준 (고등수학A)</option>
          <option value="2">이서연 (중등수학B)</option>
          <option value="3">박지호 (고등영어)</option>
          <option value="4">최유진 (중등수학A)</option>
          <option value="5">정하은 (고등수학B)</option>
          <option value="6">한도현 (고등수학A)</option>
        </select>
      </div>

      <!-- 반 전체 선택 -->
      <div id="distClass" class="hidden">
        <label class="block text-xs font-medium text-slate-500 mb-1.5">반 선택 <span class="text-red-400">*</span></label>
        <select class="hm-input" id="distClassSelect">
          <option value="">반을 선택하세요</option>
          <option value="고등수학A" data-count="20">고등수학A (20명)</option>
          <option value="고등수학B" data-count="18">고등수학B (18명)</option>
          <option value="중등수학A" data-count="16">중등수학A (16명)</option>
          <option value="중등수학B" data-count="15">중등수학B (15명)</option>
          <option value="고등영어"  data-count="14">고등영어 (14명)</option>
          <option value="과학기초"  data-count="12">과학기초 (12명)</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">지급 수량 <span class="text-red-400">*</span></label>
          <input type="number" class="hm-input" id="distQty" placeholder="1" min="1" value="1">
        </div>

    { id:3, date:'2026-05-15', name:'개념원리 중등수학 2', category:'수학', qty:20, price:14000, supplier:'개념원리', handler:'이담임' },

    { id:7, date:'2026-05-05', name:'수능 영어 독해 연습', category:'영어', qty:20, price:12000, supplier:'메가스터디', handler:'오행정' },

  const distributeData = [
    { id:1,  date:'2026-05-26', student:'김민준', classNm:'고등수학A', book:'수학의 정석 (고등수학A)', qty:1, price:18000, payment:'수납포함', receiveStatus:'지급완료' },

    { id:3,  date:'2026-05-25', student:'이서연', classNm:'중등수학B', book:'개념원리 중등수학 2',    qty:1, price:14000, payment:'별도수납',  receiveStatus:'지급완료' },
    { id:4,  date:'2026-05-25', student:'박지호', classNm:'고등영어',  book:'Grammar Zone 고급',      qty:1, price:16000, payment:'수납포함', receiveStatus:'미수령' },
    { id:5,  date:'2026-05-24', student:'정하은', classNm:'고등수학B', book:'EBS 수능특강 수학',      qty:1, price:9000,  payment:'무료제공', receiveStatus:'지급완료' },
    { id:6,  date:'2026-05-24', student:'최유진', classNm:'중등수학A', book:'개념원리 중등수학 2',    qty:1, price:14000, payment:'수납포함', receiveStatus:'미수령' },
    { id:7,  date:'2026-05-23', student:'강수현', classNm:'고등수학A', book:'수학의 정석 (고등수학A)', qty:1, price:18000, payment:'수납포함', receiveStatus:'지급완료' },
    { id:8,  date:'2026-05-22', student:'오지수', classNm:'중등수학B', book:'능률영어 고1',            qty:1, price:13000, payment:'별도수납',  receiveStatus:'지급완료' },

  let distType    = 'individual';
  let distPayment = '';

  /* ── 탭 전환 ── */
  function switchLgTab(tabId, btn) {
    document.querySelectorAll('.lg-tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.lg-tab-btn').forEach(b => {
      b.classList.remove('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
      b.classList.add('text-slate-500', 'border-transparent');
    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
  }

  /* ── 재고 상태 계산 ── */
  function stockStatus(item) {
    if (item.stock === 0)              return { label: '소진', cls: 'bg-red-100 text-red-700',    bar: 'bg-red-400',    width: 0 };
    if (item.stock < item.safeQty)     return { label: '부족', cls: 'bg-amber-100 text-amber-700', bar: 'bg-amber-400',  width: Math.round((item.stock / item.safeQty) * 60) };
    if (item.stock < item.safeQty * 2) return { label: '정상', cls: 'bg-emerald-50 text-emerald-700', bar: 'bg-emerald-400', width: Math.min(100, Math.round((item.stock / (item.safeQty * 2)) * 100)) };
    return { label: '충분', cls: 'bg-sky-50 text-sky-700', bar: 'bg-sky-400', width: 100 };
  }

  function categoryIcon(cat) {
    const map = { '수학': 'fa-square-root-variable', '영어': 'fa-language', '과학': 'fa-flask', '소모품': 'fa-box' };
    return map[cat] || 'fa-book';
  }

  /* ── 재고 그리드 렌더링 ── */
  function renderStockGrid(data) {
    const grid = document.getElementById('stockGrid');
    if (data.length === 0) {
      grid.innerHTML = `<div class="col-span-3 py-16 text-center text-slate-300"><i class="fa-solid fa-book text-4xl mb-3 block"></i><p class="text-sm">해당하는 교재가 없습니다.</p></div>`;
      return;
    }
    grid.innerHTML = data.map(item => {
      const st = stockStatus(item);
      const pct = Math.min(100, item.safeQty > 0 ? Math.round((item.stock / Math.max(item.stock, item.safeQty * 2)) * 100) : 100);
      return `
        <div class="bg-white border ${item.stock < item.safeQty ? 'border-amber-200' : 'border-slate-100'} rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-2">
              <div class="w-9 h-9 rounded-xl bg-violet-50 text-violet-500 flex items-center justify-center text-sm shrink-0">
                <i class="fa-solid ${categoryIcon(item.category)}"></i>
              </div>
              <div>
                <p class="text-sm font-bold text-slate-800 leading-snug">${item.name}</p>
                <p class="text-xs text-slate-400">${item.category} · ${item.classNm}</p>
              </div>
            </div>
            <span class="px-2 py-0.5 rounded-full text-xs font-bold ${st.cls} shrink-0 ml-1">${st.label}</span>
          </div>

          <!-- 재고 게이지 -->
          <div class="mb-3">
            <div class="flex justify-between text-xs mb-1">
              <span class="text-slate-400">현재 재고</span>
              <span class="font-bold ${item.stock < item.safeQty ? 'text-amber-600' : 'text-slate-700'}">${item.stock}권 <span class="font-normal text-slate-400">/ 안전 재고 ${item.safeQty}권</span></span>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${st.bar} transition-all" style="width:${pct}%"></div>
            </div>
          </div>

          <div class="flex items-center justify-between text-xs text-slate-400">
            <span>단가 ${item.price.toLocaleString()}원 · 최근 입고 ${item.lastIn}</span>
          </div>

          <div class="flex gap-2 mt-3">
            <button onclick="openStockModal(${item.id})"
              class="flex-1 py-1.5 text-xs font-semibold text-violet-600 bg-violet-50 hover:bg-violet-100 rounded-lg transition-colors">
              <i class="fa-solid fa-plus mr-1"></i>입고
            </button>
            <button onclick="openDistributeModal(${item.id})"
              class="flex-1 py-1.5 text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-lg transition-colors">
              <i class="fa-solid fa-hand-holding-box mr-1"></i>지급
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterStock(keyword) {
    const data = keyword ? stockData.filter(s => s.name.includes(keyword)) : stockData;
    renderStockGrid(data);
  }

  function filterStockCategory(cat) {
    const data = cat ? stockData.filter(s => s.category === cat) : stockData;
    renderStockGrid(data);
  }

  function filterStockStatus(status) {
    if (!status) { renderStockGrid(stockData); return; }
    const data = stockData.filter(s => {
      const st = stockStatus(s).label;
      if (status === '부족') return st === '부족' || st === '소진';
      return st === status;
    });
    renderStockGrid(data);
  }

  /* ── 입고 이력 테이블 ── */
  function renderInboundTable(data) {
    const tbody = document.getElementById('inboundTableBody');
    const catBadge = cat => {
      const map = { '수학': 'bg-violet-50 text-violet-700', '영어': 'bg-sky-50 text-sky-700', '과학': 'bg-emerald-50 text-emerald-700', '소모품': 'bg-slate-100 text-slate-500' };
      return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[cat] || 'bg-slate-100 text-slate-500'}">${cat}</span>`;
    };
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">조회된 입고 이력이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 text-slate-500 whitespace-nowrap">${r.date}</td>
        <td class="py-3 px-3 font-medium text-slate-800">${r.name}</td>
        <td class="py-3 px-3">${catBadge(r.category)}</td>
        <td class="py-3 px-3 text-center">
          <span class="px-2.5 py-0.5 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold">+${r.qty}권</span>
        </td>
        <td class="py-3 px-3 text-right text-slate-600">${r.price.toLocaleString()}원</td>
        <td class="py-3 px-3 text-right font-semibold text-slate-800">${(r.qty * r.price).toLocaleString()}원</td>
        <td class="py-3 px-3 text-slate-500">${r.supplier}</td>
        <td class="py-3 px-3 text-slate-500">${r.handler}</td>
      </tr>
    `).join('');
  }

  function filterInbound(keyword) {
    const data = keyword ? inboundData.filter(r => r.name.includes(keyword)) : inboundData;
    renderInboundTable(data);
  }

  /* ── 지급 내역 테이블 ── */
  function renderDistributeTable(data) {
    const tbody = document.getElementById('distributeTableBody');
    const payBadge = p => {
      const map = { '수납포함': 'bg-violet-50 text-violet-700', '별도수납': 'bg-sky-50 text-sky-700', '무료제공': 'bg-emerald-50 text-emerald-700' };
      return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[p] || 'bg-slate-100 text-slate-500'}">${p}</span>`;
    };
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="py-10 text-center text-slate-300 text-sm">조회된 내역이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 text-slate-500 whitespace-nowrap">${r.date}</td>
        <td class="py-3 px-3 font-medium text-slate-800">${r.student}</td>
        <td class="py-3 px-3 text-xs text-slate-500">${r.classNm}</td>
        <td class="py-3 px-3 text-slate-700 max-w-40 truncate">${r.book}</td>
        <td class="py-3 px-3 text-center text-slate-600">${r.qty}권</td>
        <td class="py-3 px-3 text-right text-slate-600">${r.payment === '무료제공' ? '<span class="text-emerald-600 font-semibold">무료</span>' : r.price.toLocaleString() + '원'}</td>
        <td class="py-3 px-3">${payBadge(r.payment)}</td>
        <td class="py-3 px-3">
          ${r.receiveStatus === '지급완료'
            ? `<span class="px-2.5 py-0.5 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold">지급완료</span>`
            : `<span class="px-2.5 py-0.5 bg-amber-50 text-amber-600 rounded-full text-xs font-bold">미수령</span>`}
        </td>
        <td class="py-3 px-3">
          ${r.receiveStatus === '미수령'
            ? `<button onclick="markReceived(${r.id})" class="text-xs font-semibold text-emerald-600 hover:text-emerald-800 whitespace-nowrap">수령 확인</button>`
            : ''}
        </td>
      </tr>
    `).join('');
  }

  function filterDistribute(keyword) {
    const data = keyword ? distributeData.filter(r => r.student.includes(keyword) || r.book.includes(keyword)) : distributeData;
    renderDistributeTable(data);
  }

  function filterDistributeClass(classNm) {
    const data = classNm ? distributeData.filter(r => r.classNm === classNm) : distributeData;
    renderDistributeTable(data);
  }

  function filterDistributeStatus(status) {
    const data = status ? distributeData.filter(r => r.receiveStatus === status) : distributeData;
    renderDistributeTable(data);
  }

  function markReceived(id) {
    const r = distributeData.find(r => r.id === id);
    if (r) r.receiveStatus = '지급완료';
    renderDistributeTable(distributeData);
    showHermesToast('수령 확인 처리되었습니다.', 'success');
  }

  /* ── 입고 모달 ── */
  function openStockModal(bookId) {
    document.getElementById('stockDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('stockQty').value  = '';
    document.getElementById('stockSupplier').value = '';
    document.getElementById('stockMemo').value = '';
    document.getElementById('newBookSection').classList.add('hidden');
    if (bookId) {
      const s = stockData.find(s => s.id === bookId);
      document.getElementById('stockBook').value = bookId;
      document.getElementById('stockSupplier').value = s ? s.supplier : '';
    } else {
      document.getElementById('stockBook').value = '';
    }
    document.getElementById('stockModal').classList.remove('hidden');
  }

  function closeStockModal() { document.getElementById('stockModal').classList.add('hidden'); }

  document.getElementById('stockBook')?.addEventListener('change', function () {
    document.getElementById('newBookSection').classList.toggle('hidden', this.value !== 'new');
  });

  function saveStock() {
    const book = document.getElementById('stockBook').value;
    const qty  = document.getElementById('stockQty').value;
    const date = document.getElementById('stockDate').value;
    if (!book) { showHermesToast('교재를 선택해 주세요.', 'error'); return; }
    if (!qty || qty < 1) { showHermesToast('입고 수량을 입력해 주세요.', 'error'); return; }
    if (!date) { showHermesToast('입고일을 선택해 주세요.', 'error'); return; }
    closeStockModal();
    showHermesToast('입고 등록이 완료되었습니다.', 'success');
  }

  /* ── 지급 모달 ── */
  function openDistributeModal(bookId) {
    distType    = 'individual';
    distPayment = '';
    document.getElementById('distDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('distQty').value  = '1';
    document.getElementById('distMemo').value = '';
    document.getElementById('distStockInfo').textContent = '';
    document.getElementById('distIndividual').classList.remove('hidden');
    document.getElementById('distClass').classList.add('hidden');
    document.querySelectorAll('.dist-type-btn').forEach((b, i) => {
      b.classList.toggle('border-violet-400', i === 0);
      b.classList.toggle('bg-violet-50',      i === 0);
      b.classList.toggle('text-violet-700',   i === 0);
      b.classList.toggle('border-slate-200',  i !== 0);
      b.classList.toggle('text-slate-500',    i !== 0);
    });
    document.querySelectorAll('.dist-pay-btn').forEach(b => {
      b.classList.remove('border-violet-400', 'bg-violet-50', 'text-violet-700');
      b.classList.add('border-slate-200', 'text-slate-500');
    });
    if (bookId) {
      document.getElementById('distBook').value = bookId;
      updateDistStock();
    } else {
      document.getElementById('distBook').value = '';
    }
    document.getElementById('distributeModal').classList.remove('hidden');
  }

  function closeDistributeModal() { document.getElementById('distributeModal').classList.add('hidden'); }

  function updateDistStock() {
    const sel = document.getElementById('distBook');
    const opt = sel.options[sel.selectedIndex];
    const stock = parseInt(opt?.dataset?.stock);
    const info  = document.getElementById('distStockInfo');
    if (stock !== undefined) {
      const color = stock <= 5 ? 'text-red-500' : stock <= 15 ? 'text-amber-500' : 'text-emerald-600';
      info.className = 'text-xs mt-1 font-semibold ' + color;
      info.textContent = '현재 재고: ' + stock + '권';
    } else {
      info.textContent = '';
    }
  }

  function selectDistType(type, btn) {
    distType = type;
    document.querySelectorAll('.dist-type-btn').forEach(b => {
      b.classList.remove('border-violet-400', 'bg-violet-50', 'text-violet-700');
      b.classList.add('border-slate-200', 'text-slate-500');
    });
    btn.classList.remove('border-slate-200', 'text-slate-500');
    btn.classList.add('border-violet-400', 'bg-violet-50', 'text-violet-700');
    document.getElementById('distIndividual').classList.toggle('hidden', type !== 'individual');
    document.getElementById('distClass').classList.toggle('hidden',      type !== 'class');
  }

  function selectDistPayment(payment, btn) {
    distPayment = payment;
    document.querySelectorAll('.dist-pay-btn').forEach(b => {
      b.classList.remove('border-violet-400', 'bg-violet-50', 'text-violet-700');
      b.classList.add('border-slate-200', 'text-slate-500');
    });
    btn.classList.remove('border-slate-200', 'text-slate-500');
    btn.classList.add('border-violet-400', 'bg-violet-50', 'text-violet-700');
  }

  function saveDistribute() {
    const book = document.getElementById('distBook').value;
    const qty  = document.getElementById('distQty').value;
    if (!book) { showHermesToast('교재를 선택해 주세요.', 'error'); return; }
    if (!qty || qty < 1) { showHermesToast('지급 수량을 입력해 주세요.', 'error'); return; }
    if (distType === 'individual' && !document.getElementById('distStudent').value) {
      showHermesToast('학생을 선택해 주세요.', 'error'); return;
    }
    if (distType === 'class' && !document.getElementById('distClassSelect').value) {
      showHermesToast('반을 선택해 주세요.', 'error'); return;
    }
    closeDistributeModal();
    showHermesToast('교재 지급이 처리되었습니다.', 'success');
  }

  /* ── 초기 렌더링 ── */
  renderStockGrid(stockData);
  renderInboundTable(inboundData);
  renderDistributeTable(distributeData);

  /* ── 탭 초기화 (렌더링 이후에 실행) ── */
  (function () {
    const firstBtn = document.querySelector('.lg-tab-btn[data-tab="tab-stock"]');
    if (firstBtn) switchLgTab('tab-stock', firstBtn);
  })();
</script>
