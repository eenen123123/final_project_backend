<title th:fragment="pageTitle">증명서 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-slate-800">증명서 관리</h1>
      <p class="text-sm text-slate-500 mt-0.5">직원이 셀프 발급한 재직·경력의 전체 발급 현황을 조회합니다.</p>
    </div>
  </div>

  <!-- ② 검색 필터 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
    <div class="flex flex-wrap gap-3 items-end">
      <div class="relative min-w-48">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input type="text" id="cm-keyword" class="hm-input pl-10 w-52" placeholder="직원 이름 검색..."
               onkeydown="if(event.key==='Enter') loadCerts(1)" />
      </div>
      <select class="hm-input w-36" id="cm-type" onchange="loadCerts(1)">
        <option value="">전체 종류</option>
        <option th:each="t : ${certTypes}" th:value="${t.comCd}" th:text="${t.comCdNm}"></option>
      </select>
      <select class="hm-input w-32" id="cm-prn" onchange="loadCerts(1)">
        <option value="">전체 상태</option>
        <option value="N">미출력</option>
        <option value="Y">출력완료</option>
      </select>
      <input type="date" class="hm-input w-40" id="cm-from" onchange="loadCerts(1)" />
      <span class="text-slate-400">~</span>
      <input type="date" class="hm-input w-40" id="cm-to" onchange="loadCerts(1)" />
      <button onclick="loadCerts(1)" class="hm-btn-primary px-5 py-2.5"><i class="fa-solid fa-magnifying-glass mr-1.5"></i>조회</button>
    </div>
  </div>

  <!-- ③ 발급 이력 테이블 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div class="flex items-center justify-between p-5 border-b border-slate-100">
      <p class="text-sm font-bold text-slate-700">발급 이력 <span class="text-slate-400 font-normal">(<span id="cm-total">0</span>건)</span></p>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-slate-50 text-slate-500 text-xs">
            <th class="text-left py-3 px-4 font-semibold">발급일시</th>
            <th class="text-left py-3 px-4 font-semibold">신청자</th>
            <th class="text-left py-3 px-4 font-semibold">부서 / 직급</th>
            <th class="text-left py-3 px-4 font-semibold">증명서 종류</th>
            <th class="text-left py-3 px-4 font-semibold">제출처</th>
            <th class="text-left py-3 px-4 font-semibold">필요 사유</th>
            <th class="text-left py-3 px-4 font-semibold">상태</th>
          </tr>
        </thead>
        <tbody id="cm-tbody" class="divide-y divide-slate-50"></tbody>
      </table>
    </div>
    <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50/50">
      <p class="text-xs text-slate-400" id="cm-pagination-info"></p>
      <div id="cm-pagination" class="flex items-center gap-1"></div>
    </div>
  </div>
</div>

<!-- Tailwind safelist: 동적 JS 클래스 인식용 -->
<div class="hidden w-8 h-8 rounded-lg text-xs items-center justify-center bg-blue-500 text-white font-bold text-slate-400 hover:bg-slate-100"></div>

<th:block th:fragment="pageJs">
  <script th:src="@{/js/staff/certificates.js}"></script>
</th:block>
