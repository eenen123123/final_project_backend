  }

  function categoryBadge(cat) {
    const map = { '인건비': 'bg-violet-50 text-violet-700', '교재/소모품': 'bg-sky-50 text-sky-700', '시설/유지': 'bg-amber-50 text-amber-700', '행정/운영': 'bg-slate-100 text-slate-600', '식대/간식': 'bg-emerald-50 text-emerald-700', '기타': 'bg-slate-100 text-slate-500' };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[cat] || 'bg-slate-100 text-slate-500'}">${cat}</span>`;
  }

  function payMethodBadge(method) {
    const map = { '법인카드': 'bg-violet-50 text-violet-700', '현금': 'bg-emerald-50 text-emerald-700', '계좌이체': 'bg-sky-50 text-sky-700', '개인카드': 'bg-orange-50 text-orange-700' };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[method] || 'bg-slate-100 text-slate-500'}">${method}</span>`;
  }

  /* ── 카드 뷰 렌더링 ── */
  function renderCardView(data) {
    const grid = document.getElementById('expenseCardView');
    if (data.length === 0) {
      grid.innerHTML = `<div class="col-span-2 py-16 text-center text-slate-300"><i class="fa-solid fa-receipt text-4xl mb-3 block"></i><p class="text-sm">등록된 지출 내역이 없습니다.</p></div>`;
      return;
    }
    grid.innerHTML = data.map(e => `
      <div class="bg-white rounded-2xl border ${e.status === '대기' ? 'border-amber-200' : 'border-slate-100'} shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer group"
        onclick="openExpenseModal(${e.id})">

        <!-- 카드 헤더 -->
        <div class="flex items-start justify-between mb-3">
          <div>
            <div class="flex items-center gap-1.5 mb-1">
              ${categoryBadge(e.category)}
              ${e.status === '대기' ? `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-50 text-amber-600">승인 대기</span>` : ''}
            </div>
            <p class="text-sm font-bold text-slate-800 leading-snug">${e.title}</p>
          </div>
          <p class="text-base font-bold text-slate-800 whitespace-nowrap ml-2">${e.amount.toLocaleString()}<span class="text-xs font-normal text-slate-400 ml-0.5">원</span></p>
        </div>

        <!-- 영수증 썸네일 -->
        ${e.hasReceipt ? `
          <div class="mb-3 relative overflow-hidden rounded-xl border border-slate-100 bg-slate-50 h-24 flex items-center justify-center group-hover:border-violet-200 transition-colors"
            onclick="event.stopPropagation(); openImageModal('${e.receiptName}', '${e.title}')">
            <div class="w-full h-full flex items-center justify-center gap-3">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-lg" style="background-color:${e.receiptColor}">
                <i class="fa-solid ${e.receiptName.endsWith('.pdf') ? 'fa-file-pdf' : 'fa-file-image'}"></i>
              </div>
              <div>
                <p class="text-xs font-medium text-slate-700 max-w-28 truncate">${e.receiptName}</p>
                <p class="text-xs text-violet-500 mt-0.5"><i class="fa-solid fa-eye mr-1"></i>클릭하여 보기</p>
              </div>
            </div>
          </div>
        ` : `
          <div class="mb-3 rounded-xl border-2 border-dashed border-slate-200 h-24 flex flex-col items-center justify-center gap-1 cursor-pointer hover:border-violet-300 transition-colors"
            onclick="event.stopPropagation(); openExpenseModal(${e.id})">
            <i class="fa-solid fa-upload text-slate-300"></i>
            <p class="text-xs text-slate-300">영수증 없음 · 클릭하여 추가</p>
          </div>
        `}

        <!-- 카드 푸터 -->
        <div class="flex items-center justify-between text-xs text-slate-400">
          <div class="flex items-center gap-2">
            <span>${e.date}</span>
            <span class="text-slate-200">·</span>
            ${payMethodBadge(e.payMethod)}
          </div>
          <span>${e.handler}</span>
        </div>
      </div>
    `).join('');
  }

  /* ── 테이블 뷰 렌더링 ── */
  function renderTableView(data) {
    const tbody = document.getElementById('expenseTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="py-10 text-center text-slate-300 text-sm">등록된 지출 내역이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(e => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors cursor-pointer" onclick="openExpenseModal(${e.id})">
        <td class="py-3 px-4 text-slate-500 text-xs whitespace-nowrap">${e.date}</td>
        <td class="py-3 px-4">
          <p class="font-medium text-slate-800">${e.title}</p>
          ${e.memo ? `<p class="text-xs text-slate-400 truncate max-w-xs">${e.memo}</p>` : ''}
        </td>
        <td class="py-3 px-4">${categoryBadge(e.category)}</td>
        <td class="py-3 px-4 text-right font-semibold text-slate-800 whitespace-nowrap">${e.amount.toLocaleString()}원</td>
        <td class="py-3 px-4">
          ${e.hasReceipt
            ? `<button onclick="event.stopPropagation(); openImageModal('${e.receiptName}', '${e.title}')"
                class="flex items-center gap-1 text-xs text-violet-600 hover:text-violet-800 font-semibold">
                <i class="fa-solid fa-file-image"></i> 보기
              </button>`
            : `<span class="text-xs text-slate-300">없음</span>`}
        </td>
        <td class="py-3 px-4">${statusBadge(e.status)}</td>
        <td class="py-3 px-4">
          <button onclick="event.stopPropagation(); openExpenseModal(${e.id})"
            class="text-xs text-slate-400 hover:text-violet-600 transition-colors">
            <i class="fa-solid fa-pen-to-square"></i>
          </button>
        </td>
      </tr>
    `).join('');
  }

  /* ── 뷰 모드 전환 ── */
  function setViewMode(mode, btn) {
    currentViewMode = mode;
    document.querySelectorAll('.view-mode-btn').forEach(b => {
      b.classList.remove('bg-violet-50', 'text-violet-600');
      b.classList.add('border-slate-200', 'text-slate-400');
    });
    btn.classList.remove('border-slate-200', 'text-slate-400');
    btn.classList.add('bg-violet-50', 'text-violet-600');

    document.getElementById('expenseCardView').classList.toggle('hidden', mode !== 'card');
    document.getElementById('expenseTableView').classList.toggle('hidden', mode !== 'table');
  }

  /* ── 필터 ── */
  function applyFilters() {
    renderCardView(filteredData);
    renderTableView(filteredData);
  }

  function filterExpenses(keyword) {
    filteredData = keyword ? expenseData.filter(e => e.title.includes(keyword) || e.memo.includes(keyword)) : [...expenseData];
    applyFilters();
  }

  function filterExpenseCategory(cat) {
    filteredData = cat ? expenseData.filter(e => e.category === cat) : [...expenseData];
    applyFilters();
  }

  function filterExpenseStatus(status) {
    filteredData = status ? expenseData.filter(e => e.status === status) : [...expenseData];
    applyFilters();
  }

  /* ── 분류별 통계 ── */
  function renderCategoryStats() {
    const total = categoryStats.reduce((s, c) => s + c.amount, 0);
    const container = document.getElementById('categoryStats');
    container.innerHTML = categoryStats.map(c => {
      const pct = Math.round((c.amount / total) * 100);
      return `
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-slate-600">${c.label}</span>
            <span class="font-semibold text-slate-700">${(c.amount / 10000).toLocaleString()}만원 <span class="text-slate-400 font-normal">(${pct}%)</span></span>
          </div>
          <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full rounded-full ${c.color}" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ── 등록/수정 모달 ── */
  let editingId = null;
  let modalFiles = [];

  function openExpenseModal(id) {
    editingId = id;
    modalFiles = [];
    document.getElementById('modalFilePreview').innerHTML = '';
    document.getElementById('modalFilePreview').classList.add('hidden');
    document.getElementById('modalAmountDisplay').textContent = '';

    if (id) {
      const e = expenseData.find(e => e.id === id);
      document.getElementById('expenseModalTitle').textContent = '지출 내역 수정';
      document.getElementById('expCategory').value   = e.category;
      document.getElementById('expDate').value        = e.date;
      document.getElementById('expTitle').value       = e.title;
      document.getElementById('expAmount').value      = e.amount;
      document.getElementById('expPayMethod').value   = e.payMethod;
      document.getElementById('expMemo').value        = e.memo;
      updateModalAmountDisplay();
      if (e.hasReceipt) {
        document.getElementById('modalFilePreview').classList.remove('hidden');
        document.getElementById('modalFilePreview').innerHTML = `
          <div class="relative aspect-[3/4] rounded-xl overflow-hidden border border-slate-100 bg-slate-50 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-violet-300 transition-colors"
            onclick="openImageModal('${e.receiptName}', '${e.title}')">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white" style="background-color:${e.receiptColor}">
              <i class="fa-solid ${e.receiptName.endsWith('.pdf') ? 'fa-file-pdf' : 'fa-file-image'} text-xl"></i>
            </div>
            <p class="text-xs text-slate-500 text-center px-2 truncate w-full">${e.receiptName}</p>
            <p class="text-xs text-violet-500"><i class="fa-solid fa-eye mr-1"></i>보기</p>
          </div>
        `;
      }
    } else {
      document.getElementById('expenseModalTitle').textContent = '지출 내역 등록';
      ['expCategory','expDate','expTitle','expMemo'].forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('expAmount').value = '';
      document.getElementById('expPayMethod').value = '법인카드';
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('expDate').value = today;
    }
    document.getElementById('expenseModal').classList.remove('hidden');
  }

  function closeExpenseModal() {
    document.getElementById('expenseModal').classList.add('hidden');
    editingId = null;
    modalFiles = [];
  }

  function updateModalAmountDisplay() {
    const val = parseInt(document.getElementById('expAmount').value) || 0;
    document.getElementById('modalAmountDisplay').textContent = val > 0 ? val.toLocaleString() + '원' : '';
  }

  function saveExpense() {
    const cat    = document.getElementById('expCategory').value;
    const date   = document.getElementById('expDate').value;
    const title  = document.getElementById('expTitle').value.trim();
    const amount = document.getElementById('expAmount').value;
    if (!cat)    { showHermesToast('분류를 선택해 주세요.', 'error'); return; }
    if (!date)   { showHermesToast('지출일을 선택해 주세요.', 'error'); return; }
    if (!title)  { showHermesToast('내역명을 입력해 주세요.', 'error'); return; }
    if (!amount) { showHermesToast('금액을 입력해 주세요.', 'error'); return; }
    closeExpenseModal();
    showHermesToast(editingId ? '지출 내역이 수정되었습니다.' : '지출 내역이 등록되었습니다.', 'success');
  }

  /* ── 파일 업로드 (모달) ── */
  function triggerModalUpload() { document.getElementById('modalFileInput').click(); }

  function handleModalFiles(input) {
    const files = [...input.files];
    if (files.length === 0) return;
    modalFiles = files.slice(0, 3);
    renderModalPreviews();
  }

  function renderModalPreviews() {
    const container = document.getElementById('modalFilePreview');
    container.classList.remove('hidden');
    container.innerHTML = modalFiles.map((f, i) => {
      const isImage = f.type.startsWith('image/');
      const url = isImage ? URL.createObjectURL(f) : null;
      return `
        <div class="relative aspect-[3/4] rounded-xl overflow-hidden border border-slate-100 bg-slate-50">
          ${isImage
            ? `<img src="${url}" class="receipt-thumb w-full h-full cursor-pointer" onclick="openImageModal('${f.name}', '${f.name}')">`
            : `<div class="w-full h-full flex flex-col items-center justify-center gap-2"><i class="fa-solid fa-file-pdf text-red-400 text-2xl"></i><p class="text-xs text-slate-500 text-center px-2 truncate w-full">${f.name}</p></div>`}
          <button onclick="removeModalFile(${i})"
            class="absolute top-1 right-1 w-5 h-5 rounded-full bg-black/50 text-white flex items-center justify-center text-xs hover:bg-black/70">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      `;
    }).join('');

    if (modalFiles.length < 3) {
      container.innerHTML += `
        <div class="aspect-[3/4] rounded-xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center gap-1 cursor-pointer hover:border-violet-300 transition-colors"
          onclick="triggerModalUpload()">
          <i class="fa-solid fa-plus text-slate-300 text-xl"></i>
          <p class="text-xs text-slate-300">추가</p>
        </div>
      `;
    }
  }

  function removeModalFile(idx) {
    modalFiles.splice(idx, 1);
    if (modalFiles.length === 0) {
      document.getElementById('modalFilePreview').classList.add('hidden');
      document.getElementById('modalFilePreview').innerHTML = '';
    } else {
      renderModalPreviews();
    }
  }

  /* ── 파일 업로드 (빠른 등록) ── */
  function triggerQuickUpload() { document.getElementById('quickFileInput').click(); }

  function handleQuickFile(input) {
    if (!input.files[0]) return;
    const f = input.files[0];
    document.getElementById('quickDropZone').classList.add('hidden');
    document.getElementById('quickPreview').classList.remove('hidden');
    document.getElementById('quickFileName').textContent = f.name;
  }

  function clearQuickUpload() {
    document.getElementById('quickFileInput').value = '';
    document.getElementById('quickDropZone').classList.remove('hidden');
    document.getElementById('quickPreview').classList.add('hidden');
  }

  function saveQuickExpense() {
    const cat    = document.getElementById('quickCategory').value;
    const title  = document.getElementById('quickTitle').value.trim();
    const amount = document.getElementById('quickAmount').value;
    if (!cat)    { showHermesToast('분류를 선택해 주세요.', 'error'); return; }
    if (!title)  { showHermesToast('내역명을 입력해 주세요.', 'error'); return; }
    if (!amount) { showHermesToast('금액을 입력해 주세요.', 'error'); return; }
    ['quickCategory','quickTitle','quickAmount'].forEach(id => { document.getElementById(id).value = ''; });
    clearQuickUpload();
    showHermesToast('지출 내역이 등록되었습니다.', 'success');
  }

  /* ── 드래그 앤 드롭 ── */
  function handleDragOver(e, zoneId) {
    e.preventDefault();
    document.getElementById(zoneId)?.classList.add('drag-over');
  }

  function handleDragLeave(zoneId) {
    document.getElementById(zoneId)?.classList.remove('drag-over');
  }

  function handleDrop(e, target) {
    e.preventDefault();
    const zoneId = target === 'quick' ? 'quickDropZone' : 'modalDropZone';
    document.getElementById(zoneId)?.classList.remove('drag-over');
    const files = [...e.dataTransfer.files];
    if (target === 'quick' && files[0]) {
      document.getElementById('quickDropZone').classList.add('hidden');
      document.getElementById('quickPreview').classList.remove('hidden');
      document.getElementById('quickFileName').textContent = files[0].name;
    } else if (target === 'modal') {
      modalFiles = files.slice(0, 3);
      renderModalPreviews();
    }
  }

  /* ── 이미지 뷰어 모달 ── */
  function openImageModal(filename, caption) {
    document.getElementById('imageModalSrc').src = 'https://placehold.co/400x560/f8f9fa/94a3b8?text=영수증+이미지';
    document.getElementById('imageModalCaption').textContent = filename + ' · ' + caption;
    document.getElementById('imageModal').classList.remove('hidden');
  }

  function closeImageModal() {
    document.getElementById('imageModal').classList.add('hidden');
  }

  /* ── 초기 렌더링 ── */
  renderCardView(expenseData);
  renderTableView(expenseData);
  renderCategoryStats();
</script>
