<title th:fragment="pageTitle">원비 및 수납 관리 | HERMES</title>

<div class="space-y-6"
     th:with="today=${today}">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">원비 및 수납 관리</h1>
      <p class="text-sm text-slate-500 mt-1">오프라인 학생의 원비 수납·미납 현황과 수납 이력을 관리합니다.</p>
    </div>
    <div class="flex items-center gap-3">
      <input type="file" id="excelFile" accept=".xlsx,.xls" class="hidden" onchange="uploadExcel(this)">
      <button class="hm-btn-primary hm-btn-blue" onclick="document.getElementById('excelFile').click()">
        <i class="fa-solid fa-file-excel"></i>
        <span>외부 결제 프로그램 Excel 업로드</span>
      </button>
    </div>
  </div>

  <!-- ② 오늘 수납 현황 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-won-sign"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">오늘 수납액</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" id="sumTodayAmt"
         th:text="${#numbers.formatInteger(summary.todayAmt,0,'COMMA')}">0</p>
      <p class="text-xs text-slate-400 mt-0.5">원 · <span id="sumTodayCnt" th:text="${summary.todayCnt}">0</span>건</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-circle-exclamation"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">미납 인원</p>
      </div>
      <p class="text-2xl font-bold text-red-500"><span id="sumUnpaidCnt" th:text="${summary.unpaidCnt}">0</span>명</p>
      <p class="text-xs text-slate-400 mt-0.5">총 <span id="sumUnpaidAmt"
         th:text="${#numbers.formatInteger(summary.unpaidTotalAmt,0,'COMMA')}">0</span>원</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-credit-card"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">카드 수납</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" id="sumCardAmt"
         th:text="${#numbers.formatInteger(summary.cardAmt,0,'COMMA')}">0</p>
      <p class="text-xs text-slate-400 mt-0.5">원 · <span id="sumCardCnt" th:text="${summary.cardCardCnt}">0</span>건</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-sky-50 text-sky-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-mobile-screen-button"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">간편결제</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" id="sumTransferAmt"
         th:text="${#numbers.formatInteger(summary.transferAmt,0,'COMMA')}">0</p>
      <p class="text-xs text-slate-400 mt-0.5">카카오·토스 · <span id="sumTransferCnt" th:text="${summary.transferCnt}">0</span>건</p>
    </div>
  </div>

  <!-- ③ 탭 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">

    <div class="flex items-center gap-1 px-5 pt-4 border-b border-slate-100 overflow-x-auto no-scrollbar">
      <button class="bl-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-receipt" onclick="switchBlTab('tab-receipt', this)">
        <i class="fa-solid fa-receipt mr-1.5"></i>일일 수납 내역
      </button>
      <button class="bl-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-unpaid" onclick="switchBlTab('tab-unpaid', this)">
        <i class="fa-solid fa-circle-exclamation mr-1.5"></i>미납자 관리
        <span class="ml-1 px-1.5 py-0.5 bg-red-500 text-white text-xs rounded-full"
              th:text="${summary.unpaidCnt}">0</span>
      </button>
      <button class="bl-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap"
        data-tab="tab-history" onclick="switchBlTab('tab-history', this)">
        <i class="fa-solid fa-clock-rotate-left mr-1.5"></i>수납 이력 조회
      </button>
    </div>

    <!-- ── 탭 1: 일일 수납 내역 ── -->
    <div id="tab-receipt" class="bl-tab-panel p-5">
      <div class="flex flex-wrap items-center gap-3 mb-4">
        <input type="date" class="hm-input hm-input-blue w-40" id="receiptDate" th:value="${today}">
        <input type="text" class="hm-input hm-input-blue w-44" id="receiptKeyword" placeholder="학생명·결제ID 검색...">
        <select class="hm-input hm-input-blue w-36" id="receiptMethod">
          <option value="">전체 수단</option>
          <option th:each="c : ${methodCodes}" th:value="${#strings.trim(c.comCd)}" th:text="${c.comCdNm}"></option>
        </select>
        <select class="hm-input hm-input-blue w-32" id="receiptStat">
          <option value="">전체 상태</option>
          <option th:each="c : ${payStatCodes}" th:value="${#strings.trim(c.comCd)}" th:text="${c.comCdNm}"></option>
        </select>
        <button onclick="loadReceipts(1)" class="hm-btn-primary hm-btn-blue">조회</button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학생명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">결제ID</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">항목</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">금액</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">결제수단</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">상태</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수납일시</th>
            </tr>
          </thead>
          <tbody id="receiptTableBody"></tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-4 border-t border-slate-100 bg-slate-50/50 py-4">
        <p class="text-xs text-slate-400">총 <strong id="receiptTotal">0</strong>건</p>
        <div class="flex items-center gap-1" id="receiptPaging"></div>
      </div>
    </div>

    <!-- ── 탭 2: 미납자 관리 ── -->
    <div id="tab-unpaid" class="bl-tab-panel hidden p-5">
      <div class="flex flex-wrap gap-3 mb-4">
        <input type="text" class="hm-input hm-input-blue w-44" id="unpaidKeyword" placeholder="학생명 검색...">
        <select class="hm-input hm-input-blue w-36" id="unpaidOverdue">
          <option value="">전체 연체</option>
          <option value="1">1회 이상</option>
          <option value="2">2회 이상</option>
          <option value="3">3회 이상</option>
        </select>
        <button onclick="loadUnpaid(1)" class="hm-btn-primary hm-btn-blue">조회</button>
        <div class="ml-auto flex items-center gap-2">
          <button onclick="sendBulkNotice()" class="px-4 py-2 text-xs font-semibold text-white bg-blue-500 hover:bg-blue-600 rounded-xl transition-colors flex items-center gap-2">
            <i class="fa-solid fa-paper-plane"></i>선택 안내 발송
          </button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="py-2 px-3 w-8"><input type="checkbox" id="unpaidSelectAll" onchange="toggleSelectAll(this.checked)"></th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학생명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학부모</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">연락처</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">미납액</th>
              <th class="text-center py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">연체</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">최근 안내</th>
              <th class="py-2 px-3"></th>
            </tr>
          </thead>
          <tbody id="unpaidTableBody"></tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-4 border-t border-slate-100 bg-slate-50/50 py-4">
        <p class="text-xs text-slate-400">총 <strong id="unpaidTotal">0</strong>명</p>
        <div class="flex items-center gap-1" id="unpaidPaging"></div>
      </div>
    </div>

    <!-- ── 탭 3: 수납 이력 조회 ── -->
    <div id="tab-history" class="bl-tab-panel hidden p-5">
      <div class="flex flex-wrap gap-3 mb-4">
        <input type="text" class="hm-input hm-input-blue w-44" id="historyKeyword" placeholder="학생명·결제ID 검색...">
        <select class="hm-input hm-input-blue w-32" id="historyMethod">
          <option value="">전체 수단</option>
          <option th:each="c : ${methodCodes}" th:value="${#strings.trim(c.comCd)}" th:text="${c.comCdNm}"></option>
        </select>
        <select class="hm-input hm-input-blue w-36" id="historyItem">
          <option value="">전체 항목</option>
          <option th:each="c : ${itemCodes}" th:value="${#strings.trim(c.comCd)}" th:text="${c.comCdNm}"></option>
        </select>
        <div class="flex items-center gap-2 ml-auto">
          <input type="date" class="hm-input hm-input-blue w-36" id="historyFrom">
          <span class="text-slate-300">~</span>
          <input type="date" class="hm-input hm-input-blue w-36" id="historyTo" th:value="${today}">
          <button onclick="loadHistory(1)" class="hm-btn-primary hm-btn-blue w-35">조회</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학생명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">결제ID</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">항목</th>
              <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">금액</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">결제수단</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수납일시</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>
      <div class="flex items-center justify-between mt-4 border-t border-slate-100 bg-slate-50/50 py-4">
        <p class="text-xs text-slate-400">총 <strong id="historyTotal">0</strong>건</p>
        <div class="flex items-center gap-1" id="historyPaging"></div>
      </div>
    </div>

  </div>
</div>

<!-- ===== 미납 안내 메시지 모달 ===== -->
<div id="msgModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeMsgModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-base font-bold text-slate-800">미납 안내 메시지 발송</h3>
      <button onclick="closeMsgModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="space-y-3">
      <div class="bg-slate-50 rounded-xl p-3">
        <p class="text-xs text-slate-500 mb-1">발송 대상</p>
        <p class="text-sm font-semibold text-slate-800" id="msgTarget">-</p>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">메시지 내용</label>
        <textarea class="hm-input hm-input-blue resize-none" id="msgContent" rows="5"></textarea>
      </div>
    </div>
    <div class="flex gap-3 mt-5">
      <button class="flex-1 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors" onclick="closeMsgModal()">취소</button>
      <button class="flex-1 hm-btn-primary hm-btn-blue" onclick="sendNotice()">
        <i class="fa-solid fa-paper-plane"></i><span>발송</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== 페이지 스크립트 ===== -->
<script th:inline="javascript">
  const BILLING_BASE = /*[[@{/admin/billing}]]*/ '/admin/billing';

  let unpaidSelected = new Set();

  /* ── 탭 전환 ── */
  function switchBlTab(tabId, btn) {
    document.querySelectorAll('.bl-tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.bl-tab-btn').forEach(b => {
      b.classList.remove('text-blue-600', 'border-blue-500', 'bg-blue-50/60');
      b.classList.add('text-slate-500', 'border-transparent');
    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-blue-600', 'border-blue-500', 'bg-blue-50/60');
  }

  /* ── 공통 유틸 ── */
  const won = n => (n == null ? 0 : n).toLocaleString();
  const esc = s => (s == null ? '' : String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
  function qs(obj) {
    return Object.entries(obj).filter(([,v]) => v != null && v !== '')
      .map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  }

  function methodBadge(name) {
    const map = { '카드':'bg-blue-50 text-blue-700', '카카오페이':'bg-amber-50 text-amber-700', '토스페이':'bg-sky-50 text-sky-700' };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[name] || 'bg-slate-100 text-slate-500'}">${esc(name)}</span>`;
  }
  function statBadge(name) {
    const cls = name === '완료' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700';
    return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${cls}">${esc(name)}</span>`;
  }
  function overdueBadge(cnt) {
    const cls = cnt >= 3 ? 'bg-red-100 text-red-700' : cnt >= 2 ? 'bg-amber-100 text-amber-700' : 'bg-orange-50 text-orange-600';
    return `<span class="px-2 py-0.5 rounded-full text-xs font-bold ${cls}">${cnt}회</span>`;
  }
  // 결제수단 셀: 카드면 'OO카드 · N개월' 보조표기
  function methodCell(r) {
    let extra = '';
    if (r.payMthdNm === '카드' && r.cardNm) {
      extra = `<span class="ml-1 text-xs text-slate-400">${esc(r.cardNm)}${r.installmentMm > 0 ? ' · ' + r.installmentMm + '개월' : ''}</span>`;
    }
    return methodBadge(r.payMthdNm) + extra;
  }
  const fmtDt = s => s ? String(s).replace('T', ' ').substring(0, 16) : '-';

  /* ── 페이징 버튼 렌더 (블록 5) ── */
  function renderPaging(containerId, total, page, screenSize, onMove) {
    const totalPage = Math.max(1, Math.ceil(total / screenSize));
    const block = 5;
    const start = Math.floor((page - 1) / block) * block + 1;
    const end = Math.min(start + block - 1, totalPage);
    const box = document.getElementById(containerId);
    const BASE = 'w-8 h-8 rounded-lg text-xs flex items-center justify-center';
    let html = '';
    if (page > 1) html += `<button onclick="${onMove}(${page - 1})" class="${BASE} text-slate-400 hover:bg-slate-100">‹</button>`;
    for (let p = start; p <= end; p++) {
      const cls = p === page ? 'bg-blue-500 text-white font-bold' : 'text-slate-400 hover:bg-slate-100';
      html += `<button onclick="${onMove}(${p})" class="${BASE} ${cls}">${p}</button>`;
    }
    if (page < totalPage) html += `<button onclick="${onMove}(${page + 1})" class="${BASE} text-slate-400 hover:bg-slate-100">›</button>`;
    box.innerHTML = html;
  }

  /* ── 오늘 수납 현황 새로고침 ── */
  function refreshSummary(baseDate) {
    fetch(`${BILLING_BASE}/summary?baseDate=${encodeURIComponent(baseDate)}`)
      .then(r => r.json()).then(s => {
        document.getElementById('sumTodayAmt').textContent     = won(s.todayAmt);
        document.getElementById('sumTodayCnt').textContent     = s.todayCnt;
        document.getElementById('sumUnpaidCnt').textContent    = s.unpaidCnt;
        document.getElementById('sumUnpaidAmt').textContent    = won(s.unpaidTotalAmt);
        document.getElementById('sumCardAmt').textContent      = won(s.cardAmt);
        document.getElementById('sumCardCnt').textContent      = s.cardCardCnt;
        document.getElementById('sumTransferAmt').textContent  = won(s.transferAmt);
        document.getElementById('sumTransferCnt').textContent  = s.transferCnt;
      });
  }

  /* ── 탭 1: 일일 수납 내역 ── */
  const RECEIPT_SIZE = 10;
  function loadReceipts(page) {
    const params = {
      baseDate:  document.getElementById('receiptDate').value,
      keyword:   document.getElementById('receiptKeyword').value,
      payMthdCd: document.getElementById('receiptMethod').value,
      payStatCd: document.getElementById('receiptStat').value,
      page: page, screenSize: RECEIPT_SIZE
    };
    fetch(`${BILLING_BASE}/receipts?${qs(params)}`).then(r => r.json()).then(d => {
      const tbody = document.getElementById('receiptTableBody');
      document.getElementById('receiptTotal').textContent = d.totalCount;
      if (!d.items.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="py-10 text-center text-slate-300 text-sm">수납 내역이 없습니다.</td></tr>`;
      } else {
        tbody.innerHTML = d.items.map(r => `
          <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-3 font-medium text-slate-800">${esc(r.studentNm)}</td>
            <td class="py-3 px-3 text-xs text-slate-400">${esc(r.extPayId)}</td>
            <td class="py-3 px-3 text-slate-600">${esc(r.payItemNm)}</td>
            <td class="py-3 px-3 text-right font-semibold text-slate-800">${won(r.payAmt)}원</td>
            <td class="py-3 px-3">${methodCell(r)}</td>
            <td class="py-3 px-3">${statBadge(r.payStatNm)}</td>
            <td class="py-3 px-3 text-xs text-slate-500 whitespace-nowrap">${fmtDt(r.payDt)}</td>
          </tr>`).join('');
      }
      renderPaging('receiptPaging', d.totalCount, page, RECEIPT_SIZE, 'loadReceipts');
      refreshSummary(params.baseDate);
    });
  }

  /* ── 탭 2: 미납자 관리 ── */
  const UNPAID_SIZE = 10;
  function loadUnpaid(page) {
    const params = {
      keyword:    document.getElementById('unpaidKeyword').value,
      minOverdue: document.getElementById('unpaidOverdue').value,
      page: page, screenSize: UNPAID_SIZE
    };
    fetch(`${BILLING_BASE}/unpaid?${qs(params)}`).then(r => r.json()).then(d => {
      const tbody = document.getElementById('unpaidTableBody');
      document.getElementById('unpaidTotal').textContent = d.totalCount;
      document.getElementById('unpaidSelectAll').checked = false;
      if (!d.items.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">미납자가 없습니다.</td></tr>`;
      } else {
        tbody.innerHTML = d.items.map(u => `
          <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors ${u.overdueCnt >= 3 ? 'bg-red-50/30' : ''}">
            <td class="py-3 px-3"><input type="checkbox" class="unpaid-check" data-id="${esc(u.userId)}" data-nm="${esc(u.studentNm)}"
                  onchange="toggleUnpaidSelect('${esc(u.userId)}', this.checked)" ${unpaidSelected.has(u.userId) ? 'checked' : ''}></td>
            <td class="py-3 px-3 font-medium text-slate-800">${esc(u.studentNm)}</td>
            <td class="py-3 px-3 text-slate-600">${esc(u.parentNm) || '-'}</td>
            <td class="py-3 px-3 text-slate-500 text-xs">${esc(u.parentTel) || '-'}</td>
            <td class="py-3 px-3 text-right font-bold text-red-600">${won(u.unpaidAmt)}원</td>
            <td class="py-3 px-3 text-center">${overdueBadge(u.overdueCnt)}</td>
            <td class="py-3 px-3 text-xs text-slate-400">${fmtDt(u.lastNoticeDt)}</td>
            <td class="py-3 px-3">
              <button onclick="openMsgModal(['${esc(u.userId)}'])" class="text-xs font-semibold text-blue-500 hover:text-blue-700 whitespace-nowrap">
                <i class="fa-solid fa-comment"></i> 안내
              </button>
            </td>
          </tr>`).join('');
      }
      renderPaging('unpaidPaging', d.totalCount, page, UNPAID_SIZE, 'loadUnpaid');
    });
  }
  function toggleUnpaidSelect(id, checked) { checked ? unpaidSelected.add(id) : unpaidSelected.delete(id); }
  function toggleSelectAll(checked) {
    document.querySelectorAll('.unpaid-check').forEach(c => {
      c.checked = checked;
      toggleUnpaidSelect(c.dataset.id, checked);
    });
  }
  function sendBulkNotice() {
    const ids = [...document.querySelectorAll('.unpaid-check:checked')].map(c => c.dataset.id);
    if (!ids.length) { showHermesToast('발송할 학생을 선택해 주세요.', 'error'); return; }
    openMsgModal(ids);
  }

  /* ── 탭 3: 수납 이력 조회 ── */
  const HISTORY_SIZE = 10;
  function loadHistory(page) {
    const params = {
      keyword:   document.getElementById('historyKeyword').value,
      payMthdCd: document.getElementById('historyMethod').value,
      payItemCd: document.getElementById('historyItem').value,
      fromDt:    document.getElementById('historyFrom').value,
      toDt:      document.getElementById('historyTo').value,
      page: page, screenSize: HISTORY_SIZE
    };
    fetch(`${BILLING_BASE}/history?${qs(params)}`).then(r => r.json()).then(d => {
      const tbody = document.getElementById('historyTableBody');
      document.getElementById('historyTotal').textContent = d.totalCount;
      if (!d.items.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="py-10 text-center text-slate-300 text-sm">조회된 내역이 없습니다.</td></tr>`;
      } else {
        tbody.innerHTML = d.items.map(r => `
          <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-3 font-medium text-slate-800">${esc(r.studentNm)}</td>
            <td class="py-3 px-3 text-xs text-slate-400">${esc(r.extPayId)}</td>
            <td class="py-3 px-3 text-slate-600">${esc(r.payItemNm)}</td>
            <td class="py-3 px-3 text-right font-semibold text-slate-800">${won(r.payAmt)}원</td>
            <td class="py-3 px-3">${methodCell(r)}</td>
            <td class="py-3 px-3 text-xs text-slate-500 whitespace-nowrap">${fmtDt(r.payDt)}</td>
          </tr>`).join('');
      }
      renderPaging('historyPaging', d.totalCount, page, HISTORY_SIZE, 'loadHistory');
    });
  }

  /* ── 안내 메시지 모달 ── */
  let msgTargetIds = [];
  function openMsgModal(ids) {
    msgTargetIds = ids;
    const names = [...document.querySelectorAll('.unpaid-check')]
      .filter(c => ids.includes(c.dataset.id)).map(c => c.dataset.nm);
    document.getElementById('msgTarget').textContent = names.join(', ') || (ids.length + '명');
    document.getElementById('msgContent').value =
      `[HERMES학원] 원비가 미납되어 있습니다. 빠른 시일 내 납부 부탁드립니다.`;
    document.getElementById('msgModal').classList.remove('hidden');
  }
  function closeMsgModal() { document.getElementById('msgModal').classList.add('hidden'); }
  function sendNotice() {
    // 발송 연동(NOTIFICATION)은 알림 발송 기능과 연계 — 추후 구현
    closeMsgModal();
    showHermesToast(msgTargetIds.length + '명에게 안내가 발송되었습니다.', 'success');
  }

  /* ── Excel 업로드 (외부 결제 프로그램 수납내역 적재) ── */
  function uploadExcel(input) {
    if (!input.files.length) return;
    const fd = new FormData();
    fd.append('file', input.files[0]);
    showHermesToast('업로드 중입니다...', 'info');
    fetch(`${BILLING_BASE}/upload`, { method: 'POST', body: fd })
      .then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || '업로드에 실패했습니다.');
        return d;
      })
      .then(d => {
        let msg = `적재 ${d.inserted}건`
          + (d.skipped ? ` · 중복 스킵 ${d.skipped}건` : '')
          + (d.failed ? ` · 실패 ${d.failed}건` : '');
        showHermesToast(msg, d.failed ? 'error' : 'success');
        if (d.errors && d.errors.length) console.warn('[Excel 업로드 오류]', d.errors);
        loadReceipts(1); loadUnpaid(1); loadHistory(1);
      })
      .catch(e => showHermesToast(e.message, 'error'))
      .finally(() => { input.value = ''; });
  }

  /* ── 초기화 ── */
  (function () {
    const hash = location.hash.replace('#', '') || 'tab-receipt';
    const initBtn = document.querySelector(`.bl-tab-btn[data-tab="${hash}"]`)
                 || document.querySelector('.bl-tab-btn[data-tab="tab-receipt"]');
    switchBlTab(initBtn.dataset.tab, initBtn);
    loadReceipts(1);
    loadUnpaid(1);
    loadHistory(1);
  })();
</script>
