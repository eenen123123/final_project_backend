<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>근태 및 휴가 관리</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/admin-core.css" />
  <style>
    /* 행정(blue) 테마 탭 */
    .hl-tab-btn { transition: all .18s; }
    .hl-tab-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; font-weight: 700; }
    .hl-tab-panel { display: none; }
    .hl-tab-panel.active { display: block; }

    .leave-bar-track { height: .5rem; background: #f1f5f9; border-radius: 9999px; overflow: hidden; }
    .leave-bar-fill  { height: 100%; border-radius: 9999px; transition: width .4s; }

    /* 휴가 유형 배지 (공통코드 코드값 기준 색상 — 미정 코드는 기본 회색) */
    .type-badge { font-size: .68rem; font-weight: 700; padding: .15rem .55rem; border-radius: .4rem; background:#eff6ff; color:#1d4ed8; }
  </style>
</head>
<body>

<!-- ───────────────── 페이지 헤더 ───────────────── -->
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-xl font-bold text-slate-800">근태 및 휴가 관리</h1>
    <p class="text-sm text-slate-500 mt-0.5">전자결재로 승인된 휴가 사용 현황과 직급별 잔여 연차를 조회합니다.</p>
  </div>
</div>

<!-- ───────────────── 요약 카드 4개 ───────────────── -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">
      <i class="fa-solid fa-calendar-day text-blue-600"></i>
    </div>
    <div>
      <p class="text-xs text-slate-500">오늘 휴가자</p>
      <p class="text-xl font-bold text-slate-800" th:text="${leaveSummary != null ? leaveSummary.TODAY_CNT : 0}">0</p>
    </div>
  </div>
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center">
      <i class="fa-solid fa-calendar-check text-emerald-600"></i>
    </div>
    <div>
      <p class="text-xs text-slate-500">이번 달 휴가</p>
      <p class="text-xl font-bold text-slate-800" th:text="${leaveSummary != null ? leaveSummary.MONTH_CNT : 0}">0</p>
    </div>
  </div>
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-violet-100 flex items-center justify-center">
      <i class="fa-solid fa-layer-group text-violet-600"></i>
    </div>
    <div>
      <p class="text-xs text-slate-500">올해 누적</p>
      <p class="text-xl font-bold text-slate-800" th:text="${leaveSummary != null ? leaveSummary.YEAR_CNT : 0}">0</p>
    </div>
  </div>
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center">
      <i class="fa-solid fa-hourglass-half text-amber-600"></i>
    </div>
    <div>
      <p class="text-xs text-slate-500">예정된 휴가</p>
      <p class="text-xl font-bold text-slate-800" th:text="${leaveSummary != null ? leaveSummary.UPCOMING_CNT : 0}">0</p>
    </div>
  </div>
</div>

<!-- ───────────────── 탭 네비게이션 ───────────────── -->
<div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
  <div class="flex border-b border-slate-100 px-6">
    <button class="hl-tab-btn active py-3.5 px-4 text-sm text-slate-500 -mb-px" data-tab="hl-tab-history" onclick="switchHlTab('hl-tab-history',this)">
      <i class="fa-solid fa-plane-departure mr-1.5"></i>휴가 현황
    </button>
    <button class="hl-tab-btn py-3.5 px-4 text-sm text-slate-500 -mb-px" data-tab="hl-tab-balance" onclick="switchHlTab('hl-tab-balance',this)">
      <i class="fa-solid fa-scale-balanced mr-1.5"></i>잔여 연차 현황
    </button>
  </div>

  <!-- ══════ 탭1: 휴가 현황 ══════ -->
  <div id="hl-tab-history" class="hl-tab-panel active p-6">
    <!-- 필터 바 (검색·필터는 서버에서 처리) -->
    <div class="flex flex-wrap gap-3 mb-5 items-center">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input type="text" id="lv-search" placeholder="직원명 검색..." class="hm-input hm-input-blue pl-10" style="width:12rem"
               oninput="filterLeave()" />
      </div>
      <select class="hm-input hm-input-blue" id="lv-type" style="width:10rem" onchange="filterLeave()"
              data-cs-defer data-cl-code="221" data-all-label="전체 유형"></select>
      <select class="hm-input hm-input-blue" id="lv-dept" style="width:10rem" onchange="filterLeave()">
        <option value="">전체 부서</option>
        <option th:each="dept : ${departmentlist}" th:if="${dept.useYn == 'Y'}"
                th:value="${dept.deptCd}" th:text="${dept.deptNm}"></option>
      </select>
      <select class="hm-input hm-input-blue" id="lv-year" style="width:8rem" onchange="filterLeave()"></select>
      <input type="month" class="hm-input hm-input-blue" id="lv-month" style="width:10rem" onchange="filterLeave()" />
      <button type="button" onclick="resetLeaveFilter()" class="hm-btn-secondary text-sm px-3 py-2 whitespace-nowrap">
        <i class="fa-solid fa-rotate-left mr-1"></i>초기화
      </button>
    </div>

    <div class="overflow-x-auto rounded-xl border border-slate-100" style="min-height:28rem">
      <table class="w-full text-sm table-fixed">
        <colgroup>
          <col style="width:12%"><col style="width:11%"><col style="width:11%"><col style="width:10%">
          <col style="width:20%"><col style="width:8%"><col style="width:28%">
        </colgroup>
        <thead>
          <tr class="bg-slate-100 text-slate-500 text-xs">
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortLeave('name')">직원명</th>
            <th class="text-left py-3 px-4 font-semibold">부서</th>
            <th class="text-left py-3 px-4 font-semibold">직급</th>
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortLeave('type')">유형</th>
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortLeave('strt')">휴가 기간</th>
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortLeave('days')">일수</th>
            <th class="text-left py-3 px-4 font-semibold">사유</th>
          </tr>
        </thead>
        <tbody id="lv-table-body" class="divide-y divide-slate-50"></tbody>
      </table>
    </div>
    <div class="flex items-center justify-between px-2 py-4">
      <p class="text-xs text-slate-400" id="lv-page-info"></p>
      <div id="lv-pagination" class="flex items-center gap-1"></div>
    </div>
  </div>

  <!-- ══════ 탭2: 잔여 연차 현황 ══════ -->
  <div id="hl-tab-balance" class="hl-tab-panel p-6">
    <div class="flex flex-wrap gap-3 mb-5 items-center">
      <div class="relative">
        <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
        <input type="text" id="bal-search" placeholder="직원명 검색..." class="hm-input hm-input-blue pl-10" style="width:12rem"
               oninput="filterBalance()" />
      </div>
      <select class="hm-input hm-input-blue" id="bal-dept" style="width:10rem" onchange="filterBalance()">
        <option value="">전체 부서</option>
        <option th:each="dept : ${departmentlist}" th:if="${dept.useYn == 'Y'}"
                th:value="${dept.deptCd}" th:text="${dept.deptNm}"></option>
      </select>
      <select class="hm-input hm-input-blue" id="bal-year" style="width:8rem" onchange="filterBalance()"></select>
    </div>

    <div class="overflow-x-auto rounded-xl border border-slate-100" style="min-height:28rem">
      <table class="w-full text-sm table-fixed">
        <colgroup>
          <col style="width:16%"><col style="width:14%"><col style="width:14%"><col style="width:10%">
          <col style="width:10%"><col style="width:10%"><col style="width:26%">
        </colgroup>
        <thead>
          <tr class="bg-slate-100 text-slate-500 text-xs">
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortBalance('name')">직원명</th>
            <th class="text-left py-3 px-4 font-semibold">부서</th>
            <th class="text-left py-3 px-4 font-semibold">직급</th>
            <th class="text-left py-3 px-4 font-semibold">총 연차</th>
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortBalance('used')">사용</th>
            <th class="text-left py-3 px-4 font-semibold cursor-pointer select-none" onclick="sortBalance('remain')">잔여</th>
            <th class="text-left py-3 px-4 font-semibold">사용률</th>
          </tr>
        </thead>
        <tbody id="bal-table-body" class="divide-y divide-slate-50"></tbody>
      </table>
    </div>
    <div class="flex items-center justify-between px-2 py-4">
      <p class="text-xs text-slate-400" id="bal-page-info"></p>
      <div id="bal-pagination" class="flex items-center gap-1"></div>
    </div>

    <div class="mt-2 bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-start gap-2">
      <i class="fa-solid fa-triangle-exclamation text-amber-500 mt-0.5 text-sm"></i>
      <p class="text-xs text-amber-700">잔여 <strong>3일 이하</strong>는 황색, <strong>0일 이하</strong>는 적색으로 표시됩니다. (총 연차는 직급 기준 부여 일수)</p>
    </div>
  </div>
</div>

<script>
/* ─── 탭 전환 ─── */
function switchHlTab(tabId, btn) {
  document.querySelectorAll(".hl-tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".hl-tab-panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(tabId).classList.add("active");
  if (tabId === "hl-tab-balance" && !balanceLoaded) { balanceLoaded = true; doBalanceSearch(1); }
}

/* ─── 공통: 페이지네이션 렌더 ─── */
var HL_SCREEN_SIZE = 10;
var HL_BLOCK_SIZE = 5;

function renderPager(containerId, infoId, totalCount, page, goFnName) {
  const box  = document.getElementById(containerId);
  const info = document.getElementById(infoId);
  const totalPages = Math.max(1, Math.ceil(totalCount / HL_SCREEN_SIZE));
  const start = totalCount === 0 ? 0 : (page - 1) * HL_SCREEN_SIZE + 1;
  const end   = Math.min(page * HL_SCREEN_SIZE, totalCount);
  info.textContent = `총 ${totalCount}건 중 ${start}-${end}`;

  const blockStart = Math.floor((page - 1) / HL_BLOCK_SIZE) * HL_BLOCK_SIZE + 1;
  const blockEnd   = Math.min(blockStart + HL_BLOCK_SIZE - 1, totalPages);
  let html = "";
  html += `<button class="emp-page-btn" ${page <= 1 ? "disabled" : ""} onclick="${goFnName}(${page - 1})"><i class="fa-solid fa-angle-left"></i></button>`;
  for (let p = blockStart; p <= blockEnd; p++) {
    html += `<button class="emp-page-btn ${p === page ? "active" : ""}" onclick="${goFnName}(${p})">${p}</button>`;
  }
  html += `<button class="emp-page-btn" ${page >= totalPages ? "disabled" : ""} onclick="${goFnName}(${page + 1})"><i class="fa-solid fa-angle-right"></i></button>`;
  box.innerHTML = html;
}

function fmtYmd(s) {
  if (!s || s.length < 8) return s || "-";
  return s.substring(0,4) + "-" + s.substring(4,6) + "-" + s.substring(6,8);
}
function fmtDays(d) {
  if (d == null) return "-";
  const n = Number(d);
  return (Number.isInteger(n) ? n : n.toFixed(1)) + "일";
}

/* ════════ 탭1: 휴가 현황 (서버 페이징/필터) ════════ */
var lvPage = 1, lvSortCol = null, lvSortAsc = false, lvDebounce = null;

function filterLeave() { clearTimeout(lvDebounce); lvDebounce = setTimeout(() => doLeaveSearch(1), 300); }
function sortLeave(col) {
  if (lvSortCol === col) lvSortAsc = !lvSortAsc; else { lvSortCol = col; lvSortAsc = true; }
  doLeaveSearch(1);
}
function goLeavePage(p) { doLeaveSearch(p); }

async function doLeaveSearch(page) {
  lvPage = page || 1;
  const params = new URLSearchParams();
  const kw = document.getElementById("lv-search").value.trim();
  const ty = document.getElementById("lv-type").value;
  const dp = document.getElementById("lv-dept").value;
  const yr = document.getElementById("lv-year").value;
  const mo = document.getElementById("lv-month").value;
  if (kw) params.set("keyword", kw);
  if (ty) params.set("type", ty);
  if (dp) params.set("deptCd", dp);
  if (yr) params.set("year", yr);
  if (mo) params.set("month", mo);
  if (lvSortCol) { params.set("orderBy", lvSortCol); params.set("orderDirection", lvSortAsc ? "ASC" : "DESC"); }
  params.set("page", lvPage);
  params.set("screenSize", HL_SCREEN_SIZE);

  try {
    const res = await fetch("/admin/hr/leave/search?" + params);
    const data = await res.json();
    renderLeaveTable(data.items, data.totalCount);
  } catch (e) { console.error("휴가 현황 조회 실패:", e); }
}

function renderLeaveTable(items, totalCount) {
  const tbody = document.getElementById("lv-table-body");
  if (!items || items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-sm text-slate-400">조회된 휴가 내역이 없습니다.</td></tr>';
    renderPager("lv-pagination", "lv-page-info", 0, 1, "goLeavePage");
    return;
  }
  tbody.innerHTML = items.map(it => `
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="py-3 px-4 font-semibold text-slate-800 truncate">${escHtml(it.userName || "-")}</td>
      <td class="py-3 px-4 text-slate-600 truncate">${escHtml(it.deptNm || "-")}</td>
      <td class="py-3 px-4 text-slate-600 truncate">${escHtml(it.jbgrNm || "-")}</td>
      <td class="py-3 px-4"><span class="type-badge">${escHtml(it.annTypeNm || it.annTypeCd || "-")}</span></td>
      <td class="py-3 px-4 text-slate-600 whitespace-nowrap">${fmtYmd(it.annStrtYmd)} ~ ${fmtYmd(it.annEndYmd)}</td>
      <td class="py-3 px-4 text-slate-700 font-semibold">${fmtDays(it.annReqDays)}</td>
      <td class="py-3 px-4 text-slate-500 truncate" title="${escHtml(it.annRsnCn || '')}">${escHtml(it.annRsnCn || "-")}</td>
    </tr>`).join("");
  renderPager("lv-pagination", "lv-page-info", totalCount, lvPage, "goLeavePage");
}

function resetLeaveFilter() {
  document.getElementById("lv-search").value = "";
  document.getElementById("lv-month").value = "";
  ["lv-type", "lv-dept", "lv-year"].forEach(id => {
    const el = document.getElementById(id);
    if (el.customSelect) el.customSelect.setValue(id === "lv-year" ? String(new Date().getFullYear()) : "");
    else el.value = id === "lv-year" ? String(new Date().getFullYear()) : "";
  });
  lvSortCol = null; lvSortAsc = false;
  doLeaveSearch(1);
}

/* ════════ 탭2: 잔여 연차 현황 (서버 페이징/필터) ════════ */
var balPage = 1, balSortCol = null, balSortAsc = true, balDebounce = null, balanceLoaded = false;

function filterBalance() { clearTimeout(balDebounce); balDebounce = setTimeout(() => doBalanceSearch(1), 300); }
function sortBalance(col) {
  if (balSortCol === col) balSortAsc = !balSortAsc; else { balSortCol = col; balSortAsc = true; }
  doBalanceSearch(1);
}
function goBalancePage(p) { doBalanceSearch(p); }

async function doBalanceSearch(page) {
  balPage = page || 1;
  const params = new URLSearchParams();
  const kw = document.getElementById("bal-search").value.trim();
  const dp = document.getElementById("bal-dept").value;
  const yr = document.getElementById("bal-year").value;
  if (kw) params.set("keyword", kw);
  if (dp) params.set("deptCd", dp);
  if (yr) params.set("year", yr);
  if (balSortCol) { params.set("orderBy", balSortCol); params.set("orderDirection", balSortAsc ? "ASC" : "DESC"); }
  params.set("page", balPage);
  params.set("screenSize", HL_SCREEN_SIZE);

  try {
    const res = await fetch("/admin/hr/leave/balance?" + params);
    const data = await res.json();
    renderBalanceTable(data.items, data.totalCount);
  } catch (e) { console.error("잔여 연차 조회 실패:", e); }
}

function renderBalanceTable(items, totalCount) {
  const tbody = document.getElementById("bal-table-body");
  if (!items || items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-sm text-slate-400">조회된 직원이 없습니다.</td></tr>';
    renderPager("bal-pagination", "bal-page-info", 0, 1, "goBalancePage");
    return;
  }
  tbody.innerHTML = items.map(it => {
    const total = Number(it.totalDays || 0);
    const used  = Number(it.usedDays || 0);
    const remain = Number(it.remainDays != null ? it.remainDays : total - used);
    const pct = total > 0 ? Math.min(100, Math.round(used / total * 100)) : 0;
    const remainCls = remain <= 0 ? "text-red-600" : (remain <= 3 ? "text-amber-600" : "text-slate-800");
    const barCls = remain <= 0 ? "bg-red-500" : (remain <= 3 ? "bg-amber-500" : "bg-blue-500");
    return `
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="py-3 px-4 font-semibold text-slate-800 truncate">${escHtml(it.userName || "-")}</td>
      <td class="py-3 px-4 text-slate-600 truncate">${escHtml(it.deptNm || "-")}</td>
      <td class="py-3 px-4 text-slate-600 truncate">${escHtml(it.jbgrNm || "-")}</td>
      <td class="py-3 px-4 text-slate-700">${fmtDays(total)}</td>
      <td class="py-3 px-4 text-slate-700">${fmtDays(used)}</td>
      <td class="py-3 px-4 font-bold ${remainCls}">${fmtDays(remain)}</td>
      <td class="py-3 px-4">
        <div class="flex items-center gap-2">
          <div class="leave-bar-track flex-1"><div class="leave-bar-fill ${barCls}" style="width:${pct}%"></div></div>
          <span class="text-xs text-slate-400 w-9 text-right">${pct}%</span>
        </div>
      </td>
    </tr>`;
  }).join("");
  renderPager("bal-pagination", "bal-page-info", totalCount, balPage, "goBalancePage");
}

/* ─── 연도 셀렉트 채우기 (현재년 포함 최근 4개) ─── */
function fillYearSelect(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const now = new Date().getFullYear();
  let html = "";
  for (let y = now; y >= now - 3; y--) html += `<option value="${y}" ${y === now ? "selected" : ""}>${y}년</option>`;
  el.innerHTML = html;
  // 이미 admin-core 가 커스텀셀렉트로 감쌌다면 옵션 변경을 반영
  if (el.customSelect && el.customSelect.refresh) el.customSelect.refresh();
}

/* ─── 초기화 ─── */
// admin-core.js(defer)·select 자동 래핑·initDeferredSelects 정의가 모두 끝난 load 시점에 실행
window.addEventListener("load", function () {
  fillYearSelect("lv-year");
  fillYearSelect("bal-year");
  // 공통코드 기반 select(휴가 유형 cl=221) 로드 + 커스텀셀렉트 초기화 후 첫 조회
  if (window.initDeferredSelects) {
    Promise.resolve(initDeferredSelects()).then(() => doLeaveSearch(1));
  } else {
    doLeaveSearch(1);
  }
});
</script>
</body>
</html>
