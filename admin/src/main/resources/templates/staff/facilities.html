<title th:fragment="pageTitle">시설 및 업체 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">시설 및 업체 관리</h1>
      <p class="text-sm text-slate-500 mt-1">시설 유지보수 업체의 계약 정보를 등록하고 계약 기간을 관리합니다.</p>
    </div>
    <button class="hm-btn-primary" onclick="openVendorModal(null)">
      <i class="fa-solid fa-plus"></i>
      <span>업체 등록</span>
    </button>
  </div>

  <!-- ② 요약 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-building"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">등록 업체</p>
      </div>
      <p class="text-2xl font-bold text-slate-800">12개</p>
      <p class="text-xs text-slate-400 mt-0.5">전체 계약 업체</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">계약 유효</p>
      </div>
      <p class="text-2xl font-bold text-emerald-600">9개</p>
      <p class="text-xs text-slate-400 mt-0.5">정상 계약 중</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">만료 임박</p>
      </div>
      <p class="text-2xl font-bold text-amber-500">2개</p>
      <p class="text-xs text-slate-400 mt-0.5">30일 이내 만료</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-circle-xmark"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">계약 만료</p>
      </div>
      <p class="text-2xl font-bold text-red-500">1개</p>
      <p class="text-xs text-slate-400 mt-0.5">갱신 필요</p>
    </div>
  </div>

  <!-- ③ 메인: 목록 + 사이드 -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- 업체 목록 (좌) -->
    <div class="lg:col-span-2 space-y-4">

      <!-- 필터 -->
      <div class="flex flex-wrap gap-3">
        <div class="w-48">
          <input type="text" class="hm-input" placeholder="업체명 검색..." oninput="filterVendors(this.value)">
        </div>
        <div class="w-36">
          <select class="hm-input" onchange="filterVendorCategory(this.value)">
            <option value="">전체 분류</option>
            <option value="전기">전기</option>
            <option value="소방">소방</option>
            <option value="냉난방">냉난방/에어컨</option>
            <option value="청소">청소</option>
            <option value="보안">보안/CCTV</option>
            <option value="엘리베이터">엘리베이터</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="w-36">
          <select class="hm-input" onchange="filterVendorStatus(this.value)">
            <option value="">계약 상태 전체</option>
            <option value="유효">계약 유효</option>
            <option value="임박">만료 임박</option>
            <option value="만료">계약 만료</option>
          </select>
        </div>
      </div>

      <!-- 업체 카드 목록 -->
      <div id="vendorCardList" class="space-y-3"></div>
    </div>

    <!-- 사이드: 빠른 등록 + 분류별 현황 -->
    <div class="space-y-4">

      <!-- 빠른 등록 -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
        <h3 class="text-sm font-bold text-slate-700 mb-4">
          <i class="fa-solid fa-bolt mr-1.5 text-violet-500"></i>빠른 등록
        </h3>
        <div class="space-y-3">
          <input type="text" class="hm-input" id="quickName" placeholder="업체명">
          <select class="hm-input" id="quickCategory">
            <option value="">분류 선택</option>
            <option value="전기">전기</option>
            <option value="소방">소방</option>
            <option value="냉난방">냉난방/에어컨</option>
            <option value="청소">청소</option>
            <option value="보안">보안/CCTV</option>
            <option value="엘리베이터">엘리베이터</option>
            <option value="기타">기타</option>
          </select>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs text-slate-400 mb-1">계약 시작일</label>
              <input type="date" class="hm-input text-xs" id="quickStartDate">
            </div>
            <div>
              <label class="block text-xs text-slate-400 mb-1">계약 종료일</label>
              <input type="date" class="hm-input text-xs" id="quickEndDate">
            </div>
          </div>
          <input type="text" class="hm-input" id="quickContact" placeholder="담당자 연락처">
        </div>
        <button class="hm-btn-primary w-full mt-3" onclick="saveQuickVendor()">
          <i class="fa-solid fa-floppy-disk"></i>
          <span>등록</span>
        </button>
      </div>

      <!-- 분류별 현황 -->
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
        <h3 class="text-sm font-bold text-slate-700 mb-4">
          <i class="fa-solid fa-chart-pie mr-1.5 text-violet-500"></i>분류별 계약 현황
        </h3>
        <div class="space-y-2.5" id="categoryStats"></div>
      </div>

      <!-- 만료 임박 알림 -->
      <div class="bg-amber-50 border border-amber-100 rounded-2xl p-5">
        <h3 class="text-sm font-bold text-amber-700 mb-3">
          <i class="fa-solid fa-bell mr-1.5"></i>만료 임박 알림
        </h3>
        <div class="space-y-2.5" id="expiringList"></div>
      </div>
    </div>
  </div>
</div>


<!-- ===== 업체 등록/수정 모달 ===== -->
<div id="vendorModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeVendorModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 flex flex-col max-h-[92vh]">

    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 shrink-0">
      <h3 class="text-base font-bold text-slate-800" id="vendorModalTitle">업체 등록</h3>
      <button onclick="closeVendorModal()" class="text-slate-400 hover:text-slate-600">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <div class="overflow-y-auto p-6 space-y-4 flex-1 no-scrollbar">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">업체명 <span class="text-red-400">*</span></label>
          <input type="text" class="hm-input" id="vName" placeholder="예) 한국전기설비">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">분류 <span class="text-red-400">*</span></label>
          <select class="hm-input" id="vCategory">
            <option value="">분류 선택</option>
            <option value="전기">전기</option>
            <option value="소방">소방</option>
            <option value="냉난방">냉난방/에어컨</option>
            <option value="청소">청소</option>
            <option value="보안">보안/CCTV</option>
            <option value="엘리베이터">엘리베이터</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">담당자명</label>
          <input type="text" class="hm-input" id="vManager" placeholder="이름">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">연락처 <span class="text-red-400">*</span></label>
          <input type="text" class="hm-input" id="vPhone" placeholder="010-0000-0000">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">계약 시작일 <span class="text-red-400">*</span></label>
          <input type="date" class="hm-input" id="vStartDate">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">계약 종료일 <span class="text-red-400">*</span></label>
          <input type="date" class="hm-input" id="vEndDate">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">계약 금액 (월)</label>
          <div class="relative">
            <input type="number" class="hm-input pr-8" id="vAmount" placeholder="0">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">원</span>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1.5">자동 갱신</label>
          <div class="flex items-center gap-3 h-[42px]">
            <input type="checkbox" class="hm-switch" id="vAutoRenew">
            <span class="text-xs text-slate-500" id="vAutoRenewLabel">비활성</span>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">점검 주기</label>
        <select class="hm-input" id="vInspectCycle">
          <option value="">선택 안 함</option>
          <option value="월 1회">월 1회</option>
          <option value="분기 1회">분기 1회</option>
          <option value="반기 1회">반기 1회</option>
          <option value="연 1회">연 1회</option>
          <option value="수시">수시</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1.5">메모</label>
        <textarea class="hm-input resize-none" id="vMemo" rows="2" placeholder="특이사항, 담당 구역 등 추가 메모"></textarea>
      </div>
    </div>

    <div class="flex gap-3 px-6 py-4 border-t border-slate-100 shrink-0">
      <button class="flex-1 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors" onclick="closeVendorModal()">취소</button>
      <button class="flex-1 hm-btn-primary" onclick="saveVendor()">
        <i class="fa-solid fa-floppy-disk"></i>
        <span>저장</span>
      </button>
    </div>
  </div>
</div>


<!-- ===== 페이지 스크립트 ===== -->
<script>
  /* ── 더미 데이터 ── */
  const vendorData = [
    { id: 1,  name: '한국전기설비(주)',  category: '전기',     manager: '김전기', phone: '02-1234-5678', startDate: '2025-01-01', endDate: '2026-06-30', amount: 150000,  autoRenew: true,  inspectCycle: '분기 1회', memo: '전기 안전점검 및 배전반 관리 담당' },
    { id: 2,  name: '안전소방시스템',    category: '소방',     manager: '이소방', phone: '02-2345-6789', startDate: '2025-03-01', endDate: '2026-02-28', amount: 200000,  autoRenew: true,  inspectCycle: '월 1회',   memo: '스프링클러·소화기 점검 계약' },
    { id: 3,  name: '쾌적냉난방',        category: '냉난방',   manager: '박에어', phone: '010-3456-7890', startDate: '2025-06-01', endDate: '2026-05-31', amount: 300000,  autoRenew: false, inspectCycle: '월 1회',   memo: '전 강의실 에어컨 8대 유지관리' },
    { id: 4,  name: '청결클리닝',        category: '청소',     manager: '최청소', phone: '010-4567-8901', startDate: '2025-01-01', endDate: '2026-12-31', amount: 500000,  autoRenew: true,  inspectCycle: '수시',     memo: '주 5회 전체 청소 (주말 제외)' },
    { id: 5,  name: '세이프가드보안',    category: '보안',     manager: '정보안', phone: '02-5678-9012', startDate: '2025-04-01', endDate: '2026-03-31', amount: 120000,  autoRenew: true,  inspectCycle: '연 1회',   memo: 'CCTV 12대 유지관리, 24시간 모니터링' },
    { id: 6,  name: '현대엘리베이터',    category: '엘리베이터', manager: '강승강', phone: '1588-0000',  startDate: '2024-07-01', endDate: '2025-06-30', amount: 180000,  autoRenew: false, inspectCycle: '월 1회',   memo: '' },
    { id: 7,  name: '그린환경설비',      category: '기타',     manager: '윤환경', phone: '02-6789-0123', startDate: '2025-09-01', endDate: '2026-08-31', amount: 80000,   autoRenew: false, inspectCycle: '반기 1회', memo: '정화조 및 급배수 설비 관리' },
  ];

  const categoryColors = {
    '전기':       { bg: 'bg-yellow-50',  text: 'text-yellow-700', icon: 'fa-bolt',             bar: 'bg-yellow-400'  },
    '소방':       { bg: 'bg-red-50',     text: 'text-red-700',    icon: 'fa-fire-extinguisher', bar: 'bg-red-400'     },
    '냉난방':     { bg: 'bg-sky-50',     text: 'text-sky-700',    icon: 'fa-snowflake',         bar: 'bg-sky-400'     },
    '청소':       { bg: 'bg-teal-50',    text: 'text-teal-700',   icon: 'fa-broom',             bar: 'bg-teal-400'    },
    '보안':       { bg: 'bg-violet-50',  text: 'text-violet-700', icon: 'fa-shield-halved',     bar: 'bg-violet-400'  },
    '엘리베이터': { bg: 'bg-orange-50',  text: 'text-orange-700', icon: 'fa-elevator',          bar: 'bg-orange-400'  },
    '기타':       { bg: 'bg-slate-50',   text: 'text-slate-600',  icon: 'fa-wrench',            bar: 'bg-slate-400'   },
  };

  let filteredData = [...vendorData];

  /* ── 계약 상태 계산 ── */
  function getContractStatus(endDate) {
    const today = new Date();
    const end   = new Date(endDate);
    const diff  = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
    if (diff < 0)  return { label: '계약 만료', cls: 'bg-red-50 text-red-600',    icon: 'fa-circle-xmark',      dday: `D+${Math.abs(diff)}` };
    if (diff <= 30) return { label: '만료 임박', cls: 'bg-amber-50 text-amber-600', icon: 'fa-triangle-exclamation', dday: `D-${diff}` };
    return { label: '계약 유효', cls: 'bg-emerald-50 text-emerald-700', icon: 'fa-circle-check', dday: `D-${diff}` };
  }

  /* ── 카드 렌더링 ── */
  function renderCards(data) {
    const list = document.getElementById('vendorCardList');
    if (data.length === 0) {
      list.innerHTML = `<div class="bg-white rounded-2xl border border-slate-100 shadow-sm py-16 text-center text-slate-300">
        <i class="fa-solid fa-building text-4xl mb-3 block"></i>
        <p class="text-sm">등록된 업체가 없습니다.</p>
      </div>`;
      return;
    }
    list.innerHTML = data.map(v => {
      const st  = getContractStatus(v.endDate);
      const clr = categoryColors[v.category] || categoryColors['기타'];
      const borderCls = st.label === '만료 임박' ? 'border-amber-200' : st.label === '계약 만료' ? 'border-red-200' : 'border-slate-100';
      return `
        <div class="bg-white rounded-2xl border ${borderCls} shadow-sm p-5 hover:shadow-md transition-shadow cursor-pointer"
          onclick="openVendorModal(${v.id})">
          <div class="flex items-start justify-between gap-3">

            <!-- 왼쪽: 업체 정보 -->
            <div class="flex items-start gap-4 flex-1 min-w-0">
              <div class="w-11 h-11 rounded-xl ${clr.bg} ${clr.text} flex items-center justify-center text-lg shrink-0 mt-0.5">
                <i class="fa-solid ${clr.icon}"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <p class="font-bold text-slate-800 text-sm">${v.name}</p>
                  <span class="text-xs font-medium px-2 py-0.5 rounded-full ${clr.bg} ${clr.text}">${v.category}</span>
                </div>
                <div class="flex items-center gap-3 mt-1.5 text-xs text-slate-400 flex-wrap">
                  <span><i class="fa-solid fa-user mr-1"></i>${v.manager || '—'}</span>
                  <span><i class="fa-solid fa-phone mr-1"></i>${v.phone}</span>
                  ${v.inspectCycle ? `<span><i class="fa-solid fa-rotate mr-1"></i>${v.inspectCycle}</span>` : ''}
                </div>
                ${v.memo ? `<p class="text-xs text-slate-400 mt-1.5 truncate">${v.memo}</p>` : ''}
              </div>
            </div>

            <!-- 오른쪽: 계약 기간 + 상태 -->
            <div class="text-right shrink-0">
              <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold ${st.cls}">
                <i class="fa-solid ${st.icon} text-[10px]"></i>${st.label}
              </span>
              <div class="mt-2 text-xs text-slate-400 space-y-0.5">
                <p class="font-mono">${v.startDate} ~</p>
                <p class="font-mono font-semibold text-slate-600">${v.endDate}</p>
                <p class="font-bold ${st.label === '계약 만료' ? 'text-red-500' : st.label === '만료 임박' ? 'text-amber-500' : 'text-emerald-500'}">${st.dday}</p>
              </div>
              ${v.amount ? `<p class="text-xs font-semibold text-slate-500 mt-2">${v.amount.toLocaleString()}원<span class="font-normal text-slate-400">/월</span></p>` : ''}
            </div>
          </div>

          <!-- 자동갱신 + 액션 -->
          <div class="flex items-center justify-between mt-4 pt-3.5 border-t border-slate-50">
            <div class="flex items-center gap-1.5 text-xs ${v.autoRenew ? 'text-emerald-600' : 'text-slate-400'}">
              <i class="fa-solid ${v.autoRenew ? 'fa-arrows-rotate' : 'fa-xmark'}"></i>
              <span>${v.autoRenew ? '자동 갱신' : '자동 갱신 없음'}</span>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="event.stopPropagation(); openVendorModal(${v.id})"
                class="text-xs text-slate-400 hover:text-violet-600 px-2.5 py-1 rounded-lg hover:bg-violet-50 transition-colors flex items-center gap-1">
                <i class="fa-regular fa-pen-to-square"></i> 수정
              </button>
              <button onclick="event.stopPropagation(); deleteVendor(${v.id})"
                class="text-xs text-slate-400 hover:text-red-500 px-2.5 py-1 rounded-lg hover:bg-red-50 transition-colors flex items-center gap-1">
                <i class="fa-regular fa-trash-can"></i> 삭제
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ── 분류별 통계 ── */
  function renderCategoryStats() {
    const counts = {};
    vendorData.forEach(v => { counts[v.category] = (counts[v.category] || 0) + 1; });
    const total = vendorData.length;
    const container = document.getElementById('categoryStats');
    container.innerHTML = Object.entries(counts).map(([cat, cnt]) => {
      const clr = categoryColors[cat] || categoryColors['기타'];
      const pct = Math.round((cnt / total) * 100);
      return `
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="flex items-center gap-1.5 ${clr.text}"><i class="fa-solid ${clr.icon} text-[10px]"></i>${cat}</span>
            <span class="font-semibold text-slate-700">${cnt}개 <span class="text-slate-400 font-normal">(${pct}%)</span></span>
          </div>
          <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
            <div class="h-full rounded-full ${clr.bar}" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ── 만료 임박 알림 ── */
  function renderExpiringList() {
    const alerts = vendorData
      .map(v => ({ ...v, st: getContractStatus(v.endDate) }))
      .filter(v => v.st.label === '만료 임박' || v.st.label === '계약 만료')
      .sort((a, b) => new Date(a.endDate) - new Date(b.endDate));

    const container = document.getElementById('expiringList');
    if (alerts.length === 0) {
      container.innerHTML = `<p class="text-xs text-amber-600">만료 임박 업체 없음</p>`;
      return;
    }
    container.innerHTML = alerts.map(v => `
      <div class="flex items-center justify-between gap-2">
        <div class="flex items-center gap-2 min-w-0">
          <span class="text-xs font-bold ${v.st.label === '계약 만료' ? 'text-red-500 bg-red-50' : 'text-amber-600 bg-amber-100'} px-1.5 py-0.5 rounded font-mono shrink-0">${v.st.dday}</span>
          <p class="text-xs font-medium text-amber-800 truncate">${v.name}</p>
        </div>
        <p class="text-xs text-amber-600 whitespace-nowrap">${v.endDate}</p>
      </div>
    `).join('');
  }

  /* ── 필터 ── */
  function filterVendors(keyword) {
    filteredData = keyword ? vendorData.filter(v => v.name.includes(keyword) || v.memo.includes(keyword)) : [...vendorData];
    renderCards(filteredData);
  }

  function filterVendorCategory(cat) {
    filteredData = cat ? vendorData.filter(v => v.category === cat) : [...vendorData];
    renderCards(filteredData);
  }

  function filterVendorStatus(status) {
    filteredData = status ? vendorData.filter(v => getContractStatus(v.endDate).label === (status === '임박' ? '만료 임박' : status === '유효' ? '계약 유효' : '계약 만료')) : [...vendorData];
    renderCards(filteredData);
  }

  /* ── 모달 ── */
  let editingId = null;

  function openVendorModal(id) {
    editingId = id;
    const autoRenewEl = document.getElementById('vAutoRenew');

    if (id) {
      const v = vendorData.find(v => v.id === id);
      document.getElementById('vendorModalTitle').textContent = '업체 정보 수정';
      document.getElementById('vName').value         = v.name;
      document.getElementById('vCategory').value     = v.category;
      document.getElementById('vManager').value      = v.manager;
      document.getElementById('vPhone').value        = v.phone;
      document.getElementById('vStartDate').value    = v.startDate;
      document.getElementById('vEndDate').value      = v.endDate;
      document.getElementById('vAmount').value       = v.amount || '';
      document.getElementById('vInspectCycle').value = v.inspectCycle || '';
      document.getElementById('vMemo').value         = v.memo;
      autoRenewEl.checked = v.autoRenew;
    } else {
      document.getElementById('vendorModalTitle').textContent = '업체 등록';
      ['vName','vManager','vPhone','vStartDate','vEndDate','vMemo'].forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('vCategory').value     = '';
      document.getElementById('vAmount').value       = '';
      document.getElementById('vInspectCycle').value = '';
      autoRenewEl.checked = false;
    }

    updateAutoRenewLabel();
    document.getElementById('vendorModal').classList.remove('hidden');
  }

  function closeVendorModal() {
    document.getElementById('vendorModal').classList.add('hidden');
    editingId = null;
  }

  function updateAutoRenewLabel() {
    const checked = document.getElementById('vAutoRenew').checked;
    document.getElementById('vAutoRenewLabel').textContent = checked ? '활성' : '비활성';
  }

  document.getElementById('vAutoRenew').addEventListener('change', updateAutoRenewLabel);

  function saveVendor() {
    const name     = document.getElementById('vName').value.trim();
    const category = document.getElementById('vCategory').value;
    const phone    = document.getElementById('vPhone').value.trim();
    const startDate = document.getElementById('vStartDate').value;
    const endDate   = document.getElementById('vEndDate').value;
    if (!name)      { showHermesToast('업체명을 입력해 주세요.', 'error'); return; }
    if (!category)  { showHermesToast('분류를 선택해 주세요.', 'error'); return; }
    if (!phone)     { showHermesToast('연락처를 입력해 주세요.', 'error'); return; }
    if (!startDate) { showHermesToast('계약 시작일을 입력해 주세요.', 'error'); return; }
    if (!endDate)   { showHermesToast('계약 종료일을 입력해 주세요.', 'error'); return; }
    closeVendorModal();
    showHermesToast(editingId ? '업체 정보가 수정되었습니다.' : '업체가 등록되었습니다.', 'success');
  }

  function deleteVendor(id) {
    const v = vendorData.find(v => v.id === id);
    showHermesToast(`"${v.name}" 업체가 삭제되었습니다.`, 'error');
  }

  /* ── 빠른 등록 ── */
  function saveQuickVendor() {
    const name      = document.getElementById('quickName').value.trim();
    const category  = document.getElementById('quickCategory').value;
    const startDate = document.getElementById('quickStartDate').value;
    const endDate   = document.getElementById('quickEndDate').value;
    const contact   = document.getElementById('quickContact').value.trim();
    if (!name)     { showHermesToast('업체명을 입력해 주세요.', 'error'); return; }
    if (!category) { showHermesToast('분류를 선택해 주세요.', 'error'); return; }
    if (!endDate)  { showHermesToast('계약 종료일을 입력해 주세요.', 'error'); return; }
    ['quickName','quickCategory','quickStartDate','quickEndDate','quickContact'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
    });
    showHermesToast('업체가 등록되었습니다.', 'success');
  }

  /* ── 초기 렌더링 ── */
  renderCards(vendorData);
  renderCategoryStats();
  renderExpiringList();
</script>
