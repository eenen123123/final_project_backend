<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>조직 관리</title>
</head>
<body>

<!-- ───────── 페이지 헤더 ───────── -->
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-xl font-bold text-slate-800">조직 관리</h1>
    <p class="text-sm text-slate-500 mt-0.5">부서·직급 구조 관리 및 사수-부하 직원 계층 배정</p>
  </div>
</div>

<!-- ───────── 탭 ───────── -->
<div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
  <div class="flex border-b border-slate-100 px-6">
    <button class="org-tab active py-3.5 px-4 text-sm -mb-px" onclick="switchTab('tab-dept',this)">
      <i class="fa-solid fa-building mr-1.5"></i>부서 관리
    </button>
    <button class="org-tab py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-grade',this)">
      <i class="fa-solid fa-layer-group mr-1.5"></i>직급 관리
    </button>
    <button class="org-tab py-3.5 px-4 text-sm text-slate-500 -mb-px" onclick="switchTab('tab-mapping',this)">
      <i class="fa-solid fa-sitemap mr-1.5"></i>사수 배정
    </button>
  </div>

  <!-- ══════ 탭1: 부서 관리 ══════ -->
  <div id="tab-dept" class="org-panel p-6">
    <div class="flex justify-between items-center mb-4">
      <p class="text-sm text-slate-500">부서 목록 · 총 <span id="dept-count" class="font-bold text-slate-700">0</span>개</p>
      <button onclick="openDeptModal()" class="hm-btn-primary text-sm px-4 py-2">
        <i class="fa-solid fa-plus mr-1"></i>부서 추가
      </button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-slate-100">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500">
          <tr>
            <th class="text-left py-3 px-4 font-semibold">부서 코드</th>
            <th class="text-left py-3 px-4 font-semibold">부서명</th>
            <th class="text-left py-3 px-4 font-semibold">상위 부서</th>
            <th class="text-left py-3 px-4 font-semibold">사무실 번호</th>
            <th class="text-left py-3 px-4 font-semibold">상태</th>
            <th class="text-left py-3 px-4 font-semibold">관리</th>
          </tr>
        </thead>
        <tbody id="dept-tbody" class="divide-y divide-slate-50">
          <tr th:each="d : ${deptList}" class="hover:bg-slate-50 transition-colors"
              th:data-cd="${d.deptCd}" th:data-nm="${d.deptNm}"
              th:data-prnt="${d.prntDeptCd}" th:data-tel="${d.intlTelNo}"
              th:data-use="${d.useYn}">
            <td class="py-3 px-4 font-mono text-slate-600" th:text="${d.deptCd}"></td>
            <td class="py-3 px-4 font-semibold text-slate-800" th:text="${d.deptNm}"></td>
            <td class="py-3 px-4 text-slate-500" th:text="${d.prntDeptCd != null ? d.prntDeptCd : '-'}"></td>
            <td class="py-3 px-4 text-slate-500" th:text="${d.intlTelNo != null ? d.intlTelNo : '-'}"></td>
            <td class="py-3 px-4">
              <span th:class="${d.useYn == 'Y'} ? 'px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700' : 'px-2 py-0.5 rounded-full text-xs font-bold bg-slate-100 text-slate-400'"
                    th:text="${d.useYn == 'Y'} ? '사용중' : '미사용'"></span>
            </td>
            <td class="py-3 px-4">
              <div class="flex items-center gap-2">
                <button onclick="openDeptModal(this.closest('tr'))" class="text-xs text-violet-500 hover:underline font-semibold">수정</button>
                <button th:data-cd="${d.deptCd}"
                        th:data-toggle="${d.useYn == 'Y' ? 'N' : 'Y'}"
                        onclick="toggleDept(this.dataset.cd, this.dataset.toggle)"
                        th:text="${d.useYn == 'Y'} ? '비활성화' : '활성화'"
                        class="text-xs text-slate-400 hover:underline"></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ══════ 탭2: 직급 관리 ══════ -->
  <div id="tab-grade" class="org-panel p-6 hidden">
    <div class="flex flex-wrap gap-3 mb-4 items-center justify-between">
      <div class="flex gap-3 items-center">
        <select id="grade-dept-filter" class="hm-input" style="width:11rem" onchange="loadGrades(1)">
          <option value="">전체 부서</option>
          <option th:each="d : ${deptList}" th:value="${d.deptCd}" th:text="${d.deptNm}"></option>
        </select>
        <select id="grade-use-filter" class="hm-input" style="width:9rem" onchange="loadGrades(1)">
          <option value="">전체 상태</option>
          <option value="Y">사용중</option>
          <option value="N">미사용</option>
        </select>
        <p class="text-sm text-slate-500">총 <span id="grade-count" class="font-bold text-slate-700">0</span>개</p>
      </div>
      <button onclick="openGradeModal()" class="hm-btn-primary text-sm px-4 py-2">
        <i class="fa-solid fa-plus mr-1"></i>직급 추가
      </button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-slate-100">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500">
          <tr>
            <th class="text-left py-3 px-4 font-semibold">직급 코드</th>
            <th class="text-left py-3 px-4 font-semibold">직급명</th>
            <th class="text-left py-3 px-4 font-semibold">소속 부서</th>
            <th class="text-left py-3 px-4 font-semibold">정렬 순서</th>
            <th class="text-left py-3 px-4 font-semibold">연차 일수</th>
            <th class="text-left py-3 px-4 font-semibold">상태</th>
            <th class="text-left py-3 px-4 font-semibold">관리</th>
          </tr>
        </thead>
        <tbody id="grade-tbody" class="divide-y divide-slate-50">
          <tr><td colspan="7" class="py-8 text-center text-slate-300 text-sm">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="grade-pagination" class="flex justify-center gap-1 mt-4"></div>
  </div>

  <!-- ══════ 탭3: 사수 배정 ══════ -->
  <div id="tab-mapping" class="org-panel p-6 hidden">

    <!-- 부서 필터 칩 -->
    <div class="flex gap-2 mb-4 flex-wrap items-center">
      <button class="mnt-dept-btn active" data-dept="" onclick="selectMntDept(this)">전체</button>
      <button th:each="d : ${deptList}"
              th:data-dept="${d.deptCd}"
              th:text="${d.deptNm}"
              onclick="selectMntDept(this)"
              class="mnt-dept-btn"></button>
      <span class="ml-auto text-xs text-slate-400">
        <i class="fa-solid fa-hand-pointer mr-1"></i>
        미배정 카드 드래그 → 팀 열에 놓기 · 팀원 드래그 → 왼쪽에 놓으면 배정 해제
      </span>
    </div>

    <!-- 좌우 패널 (높이 고정) -->
    <div class="flex gap-4" style="height:calc(93vh - 280px); min-height:600px">

      <!-- ◀ 왼쪽: 미배정 + 필터 -->
      <div class="flex flex-col rounded-xl border border-slate-200 bg-white overflow-hidden flex-shrink-0" style="width:290px">
        <!-- 필터 헤더 -->
        <div class="px-4 py-3 border-b border-slate-100 bg-slate-50 flex-shrink-0">
          <p class="font-bold text-sm text-slate-700 mb-3">
            <i class="fa-solid fa-user-slash text-slate-400 mr-1.5 text-xs"></i>미배정
            <span id="mnt-unassigned-count" class="ml-1 text-xs font-normal text-slate-400"></span>
          </p>
          <div class="flex flex-col gap-2">
            <input type="text" id="mnt-search" placeholder="이름 또는 ID 검색..."
                   class="hm-input" style="font-size:.78rem" oninput="renderUnassigned()">
            <select id="mnt-grade-filter" class="hm-input" style="font-size:.78rem" onchange="renderUnassigned()">
              <option value="">전체 직급</option>
              <option th:each="g : ${jobGradeList}"
                      th:value="${g.jbgrNm}"
                      th:text="${g.jbgrNm}"
                      th:data-dept="${g.deptCd}"
                      th:data-sort-ord="${g.sortOrd}"></option>
            </select>
            <select id="mnt-stat-filter" class="hm-input" style="font-size:.78rem" onchange="renderUnassigned()">
              <option value="">전체 상태</option>
              <option value="01">재직</option>
              <option value="02">휴직</option>
              <option value="03">퇴사</option>
            </select>
          </div>
        </div>
        <!-- 미배정 카드 목록 (드롭 시 배정 해제, 스크롤) -->
        <div id="mnt-unassigned-list"
             class="overflow-y-auto p-2 flex flex-col gap-1.5"
             style="flex:1; min-height:0"
             ondragover="event.preventDefault()"
             ondrop="onDropToUnassigned(event)">
          <p class="text-xs text-slate-300 text-center py-8">불러오는 중...</p>
        </div>
      </div>

      <!-- ▶ 오른쪽: 팀 현황 (가로 스크롤) -->
      <div class="flex-1 overflow-x-auto overflow-y-hidden">
        <div id="mnt-teams" class="flex gap-3 h-full items-start" style="min-width:max-content">
          <div class="text-slate-300 text-sm self-center px-4">불러오는 중...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ═══════ MODAL: 팀 추가 (사수 선택) ═══════ -->
<div id="modal-add-team" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
      <h2 class="font-bold text-slate-800"><i class="fa-solid fa-crown mr-2 text-violet-500"></i>사수 선택</h2>
      <button onclick="closeAddTeamModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="p-5 space-y-3">
      <p class="text-sm text-slate-500">팀을 이끌 사수(팀장)를 선택하면<br>빈 팀 열이 생성됩니다. 이후 왼쪽에서 팀원을 드래그하여 배정하세요.</p>
      <select id="add-team-select" class="hm-input w-full"></select>
    </div>
    <div class="px-5 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeAddTeamModal()" class="hm-btn-secondary px-4 py-2 text-sm">취소</button>
      <button onclick="confirmAddTeam()" class="hm-btn-primary px-5 py-2 text-sm">팀 열 추가</button>
    </div>
  </div>
</div>

<!-- ═══════ MODAL: 부서 추가/수정 ═══════ -->
<div id="modal-dept" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h2 class="font-bold text-slate-800" id="dept-modal-title"><i class="fa-solid fa-building mr-2 text-violet-500"></i>부서 추가</h2>
      <button onclick="closeDeptModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="dept-edit-cd">
      <div>
        <label class="form-label">부서 코드 <span class="required">*</span></label>
        <input type="text" id="dept-cd" class="hm-input" placeholder="D100" maxlength="10">
        <p class="text-xs text-slate-400 mt-1">수정 시 변경 불가</p>
      </div>
      <div>
        <label class="form-label">부서명 <span class="required">*</span></label>
        <input type="text" id="dept-nm" class="hm-input" placeholder="행정팀">
      </div>
      <div>
        <label class="form-label">상위 부서 코드</label>
        <input type="text" id="dept-prnt" class="hm-input" placeholder="없으면 비워두세요">
      </div>
      <div>
        <label class="form-label">사무실 번호</label>
        <input type="text" id="dept-tel" class="hm-input" placeholder="02-1234-5678">
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeDeptModal()" class="hm-btn-secondary px-5 py-2.5 text-sm">취소</button>
      <button onclick="saveDept()" class="hm-btn-primary px-6 py-2.5 text-sm">저장</button>
    </div>
  </div>
</div>

<!-- ═══════ MODAL: 직급 추가/수정 ═══════ -->
<div id="modal-grade" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h2 class="font-bold text-slate-800" id="grade-modal-title"><i class="fa-solid fa-layer-group mr-2 text-violet-500"></i>직급 추가</h2>
      <button onclick="closeGradeModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="grade-edit-cd">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">직급 코드 <span class="required">*</span></label>
          <input type="text" id="grade-cd" class="hm-input" placeholder="P001" maxlength="10">
        </div>
        <div>
          <label class="form-label">직급명 <span class="required">*</span></label>
          <input type="text" id="grade-nm" class="hm-input" placeholder="팀장">
        </div>
        <div>
          <label class="form-label">소속 부서 코드</label>
          <input type="text" id="grade-dept" class="hm-input" placeholder="D100">
        </div>
        <div>
          <label class="form-label">정렬 순서</label>
          <input type="number" id="grade-ord" class="hm-input" placeholder="1">
        </div>
        <div>
          <label class="form-label">연차 부여 일수</label>
          <input type="number" id="grade-days" class="hm-input" placeholder="15">
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeGradeModal()" class="hm-btn-secondary px-5 py-2.5 text-sm">취소</button>
      <button onclick="saveGrade()" class="hm-btn-primary px-6 py-2.5 text-sm">저장</button>
    </div>
  </div>
</div>

<style>
  .org-tab { border-bottom: 2px solid transparent; font-weight: 600; transition: all .15s; }
  .org-tab.active { border-color: #7c3aed; color: #7c3aed; }
  .org-tab:not(.active):hover { color: #475569; }
  .org-panel.hidden { display: none; }

  /* 사수 배정 */
  .mnt-dept-btn { padding: .35rem .85rem; border-radius: 9999px; font-size: .8rem; font-weight: 600; background: #f1f5f9; color: #64748b; border: none; cursor: pointer; transition: all .15s; }
  .mnt-dept-btn.active { background: #7c3aed; color: #fff; }
  .mnt-dept-btn:not(.active):hover { background: #e2e8f0; }
  .mnt-col { transition: box-shadow .15s, border-color .15s; }
  .mnt-col.drag-over { border-color: #7c3aed !important; box-shadow: 0 0 0 3px #ede9fe; }
  #mnt-unassigned-list.drag-over { background: #faf5ff; outline: 2px dashed #a78bfa; outline-offset: -4px; border-radius: .5rem; }
  .emp-card:active { cursor: grabbing; }

  /* ── Org Chart Tree (행정/PD 부서) ── */
  .org-tree-wrap { overflow: auto; width: 100%; min-height: 100%; padding: 1.5rem 1rem; }
  .org-tree { display: inline-flex; flex-direction: column; align-items: center; }
  .org-tree ul { display: flex; padding-top: 24px; position: relative; list-style: none; margin: 0; }
  .org-tree ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 1.5px solid #cbd5e1; height: 24px; }
  .org-tree > ul::before { display: none; }
  .org-tree li { display: flex; flex-direction: column; align-items: center; padding: 24px 10px 0; position: relative; list-style: none; }
  .org-tree li::before, .org-tree li::after { content: ''; position: absolute; top: 0; border-top: 1.5px solid #cbd5e1; width: 50%; height: 24px; }
  .org-tree li::before { right: 50%; border-right: 1.5px solid #cbd5e1; } /* 수직 drop line */
  .org-tree li::after  { left: 50%; }
  .org-tree li:only-child::before, .org-tree li:only-child::after { display: none; }
  .org-tree li:only-child { padding-top: 0; }
  .org-tree li:first-child::before { border-top-color: transparent; }  /* 수평선만 숨김, 수직 drop 유지 */
  .org-tree li:last-child::after   { border-color: transparent; }
  /* tree node card */
  .tree-node { padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: white; text-align: center; min-width: 88px; max-width: 108px; cursor: default; transition: border-color .15s, box-shadow .15s; }
  .tree-node:hover { border-color: #c4b5fd; }
  .tree-node.drag-over { border-color: #7c3aed !important; box-shadow: 0 0 0 3px #ede9fe; background: #faf5ff; }
  /* 루트 노드(팀장)만 원형 */
  .tree-node-root { border-radius: 9999px; border-color: #7c3aed; background: #f5f3ff; padding: 10px 20px; }
  /* 뷰 전환 배지 */
  .mnt-view-badge { font-size: .7rem; font-weight: 700; padding: .15rem .55rem; border-radius: 9999px; margin-left: .5rem; }
  .mnt-view-badge.tree  { background: #ede9fe; color: #7c3aed; }
  .mnt-view-badge.kanban { background: #f1f5f9; color: #64748b; }
</style>

<script>
  /* ── 탭 전환 ── */
  function switchTab(id, btn) {
    document.querySelectorAll('.org-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.org-tab').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.remove('hidden');
    btn.classList.add('active');
    if (id === 'tab-grade')   loadGradesOnce();
    if (id === 'tab-mapping') loadMntKanbanOnce();
  }

  /* ── 초기 카운트 + deptMap + 사수배정 직급 옵션 스냅샷 ── */
  const deptMap = {};
  let allMntGradeOpts = [];
  let gradeOrdMap    = {}; /* jbgrNm → sortOrd (직급 rank 조회용) */

  /* 스크립트가 body 하단에 위치하므로 DOM 파싱 완료 — 즉시 실행 가능 */
  function initMntGradeOpts() {
    const opts = document.querySelectorAll('#mnt-grade-filter option[value]:not([value=""])');
    if (opts.length > 0) {
      allMntGradeOpts = Array.from(opts).map(opt => ({
        value:   opt.value,
        text:    opt.textContent.trim(),
        dept:    (opt.dataset.dept || '').trim(),
        sortOrd: parseInt(opt.dataset.sortOrd || '999', 10)
      }));
      gradeOrdMap = Object.fromEntries(allMntGradeOpts.map(o => [o.value, o.sortOrd]));
    }
  }
  initMntGradeOpts(); /* 즉시 초기화 */

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dept-count').textContent = document.querySelectorAll('#dept-tbody tr').length;
    document.querySelectorAll('#grade-dept-filter option[value]').forEach(opt => {
      if (opt.value) deptMap[opt.value] = opt.textContent.trim();
    });
    if (allMntGradeOpts.length === 0) initMntGradeOpts(); /* 혹시 비어있으면 재시도 */
  });

  /* ─────────────── 직급 DB 페이징+필터 ─────────────── */
  let gradeCurPage = 1;
  let gradeLoaded  = false;
  const GRADE_SIZE = 10;

  function loadGradesOnce() {
    if (!gradeLoaded) { gradeLoaded = true; loadGrades(1); }
  }

  function loadGrades(page) {
    gradeCurPage = page;
    const deptCd = document.getElementById('grade-dept-filter').value;
    const useYn  = document.getElementById('grade-use-filter').value;
    const url = `/admin/org/grade/list?deptCd=${encodeURIComponent(deptCd)}&useYn=${encodeURIComponent(useYn)}&page=${page}&size=${GRADE_SIZE}`;
    fetch(url).then(r => r.json()).then(data => {
      renderGrades(data.list);
      document.getElementById('grade-count').textContent = data.total;
      renderGradePagination(data.page, data.totalPages);
    });
  }

  function renderGrades(list) {
    const tbody = document.getElementById('grade-tbody');
    if (!list || list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="py-8 text-center text-slate-400 text-sm">조회된 직급이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(g => {
      const deptNm   = deptMap[g.deptCd] || g.deptCd || '-';
      const days     = g.baseAnnLvDays != null ? g.baseAnnLvDays + '일' : '15일';
      const badge    = g.useYn === 'Y'
        ? '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">사용중</span>'
        : '<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-slate-100 text-slate-400">미사용</span>';
      const toggleTxt = g.useYn === 'Y' ? '비활성화' : '활성화';
      const toggleVal = g.useYn === 'Y' ? 'N' : 'Y';
      return `<tr class="hover:bg-slate-50 transition-colors"
                  data-cd="${esc(g.jbgrCd)}" data-nm="${esc(g.jbgrNm)}"
                  data-dept="${esc(g.deptCd || '')}" data-ord="${g.sortOrd ?? ''}"
                  data-days="${g.baseAnnLvDays ?? ''}" data-use="${g.useYn}">
        <td class="py-3 px-4 font-mono text-slate-600">${esc(g.jbgrCd)}</td>
        <td class="py-3 px-4 font-semibold text-slate-800">${esc(g.jbgrNm)}</td>
        <td class="py-3 px-4 text-slate-500">${esc(deptNm)}</td>
        <td class="py-3 px-4 text-slate-500">${g.sortOrd ?? '-'}</td>
        <td class="py-3 px-4 text-slate-500">${days}</td>
        <td class="py-3 px-4">${badge}</td>
        <td class="py-3 px-4">
          <div class="flex items-center gap-2">
            <button onclick="openGradeModal(this.closest('tr'))" class="text-xs text-violet-500 hover:underline font-semibold">수정</button>
            <button data-cd="${esc(g.jbgrCd)}" data-toggle="${toggleVal}"
                    onclick="toggleGrade(this.dataset.cd, this.dataset.toggle)"
                    class="text-xs text-slate-400 hover:underline">${toggleTxt}</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function renderGradePagination(cur, total) {
    const el = document.getElementById('grade-pagination');
    if (total <= 1) { el.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= total; i++) {
      const cls = i === cur
        ? 'bg-violet-600 text-white border-violet-600'
        : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50';
      html += `<button onclick="loadGrades(${i})" class="w-8 h-8 rounded-lg border text-xs font-semibold ${cls}">${i}</button>`;
    }
    el.innerHTML = html;
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─────────────── 부서 CRUD ─────────────── */
  function openDeptModal(row) {
    const isEdit = !!row;
    document.getElementById('dept-modal-title').innerHTML =
      `<i class="fa-solid fa-building mr-2 text-violet-500"></i>${isEdit ? '부서 수정' : '부서 추가'}`;
    document.getElementById('dept-edit-cd').value = isEdit ? row.dataset.cd : '';
    document.getElementById('dept-cd').value       = isEdit ? row.dataset.cd : '';
    document.getElementById('dept-cd').readOnly    = isEdit;
    document.getElementById('dept-nm').value       = isEdit ? row.dataset.nm : '';
    document.getElementById('dept-prnt').value     = isEdit ? (row.dataset.prnt || '') : '';
    document.getElementById('dept-tel').value      = isEdit ? (row.dataset.tel || '') : '';
    document.getElementById('modal-dept').classList.remove('hidden');
  }
  function closeDeptModal() { document.getElementById('modal-dept').classList.add('hidden'); }

  function saveDept() {
    const editCd = document.getElementById('dept-edit-cd').value;
    const isEdit = !!editCd;
    const body = {
      deptCd:     document.getElementById('dept-cd').value.trim(),
      deptNm:     document.getElementById('dept-nm').value.trim(),
      prntDeptCd: document.getElementById('dept-prnt').value.trim() || null,
      intlTelNo:  document.getElementById('dept-tel').value.trim() || null,
    };
    if (!body.deptNm) return alert('부서명을 입력하세요.');
    if (!isEdit && !body.deptCd) return alert('부서 코드를 입력하세요.');

    const url    = isEdit ? `/admin/org/dept/${editCd}` : '/admin/org/dept';
    const method = isEdit ? 'PUT' : 'POST';
    fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
      .then(r => r.json()).then(d => {
        if (d.result === 'success') { closeDeptModal(); location.reload(); }
        else alert('오류: ' + (d.message || '처리 실패'));
      });
  }

  function toggleDept(deptCd, newUseYn) {
    if (!confirm(`해당 부서를 ${newUseYn === 'Y' ? '활성화' : '비활성화'}하시겠습니까?`)) return;
    fetch(`/admin/org/dept/${deptCd}/toggle`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ useYn: newUseYn })
    }).then(r => r.json()).then(d => {
      if (d.result === 'success') location.reload();
      else alert('오류: ' + d.message);
    });
  }

  /* ─────────────── 직급 CRUD ─────────────── */
  function openGradeModal(row) {
    const isEdit = !!row;
    document.getElementById('grade-modal-title').innerHTML =
      `<i class="fa-solid fa-layer-group mr-2 text-violet-500"></i>${isEdit ? '직급 수정' : '직급 추가'}`;
    document.getElementById('grade-edit-cd').value = isEdit ? row.dataset.cd : '';
    document.getElementById('grade-cd').value       = isEdit ? row.dataset.cd : '';
    document.getElementById('grade-cd').readOnly    = isEdit;
    document.getElementById('grade-nm').value       = isEdit ? row.dataset.nm : '';
    document.getElementById('grade-dept').value     = isEdit ? (row.dataset.dept || '') : '';
    document.getElementById('grade-ord').value      = isEdit ? (row.dataset.ord || '') : '';
    document.getElementById('grade-days').value     = isEdit ? (row.dataset.days || '') : '';
    document.getElementById('modal-grade').classList.remove('hidden');
  }
  function closeGradeModal() { document.getElementById('modal-grade').classList.add('hidden'); }

  function saveGrade() {
    const editCd = document.getElementById('grade-edit-cd').value;
    const isEdit = !!editCd;
    const body = {
      jbgrCd:        document.getElementById('grade-cd').value.trim(),
      jbgrNm:        document.getElementById('grade-nm').value.trim(),
      deptCd:        document.getElementById('grade-dept').value.trim() || null,
      sortOrd:       parseInt(document.getElementById('grade-ord').value) || null,
      baseAnnLvDays: parseInt(document.getElementById('grade-days').value) || 15,
    };
    if (!body.jbgrNm) return alert('직급명을 입력하세요.');
    if (!isEdit && !body.jbgrCd) return alert('직급 코드를 입력하세요.');

    const url    = isEdit ? `/admin/org/grade/${editCd}` : '/admin/org/grade';
    const method = isEdit ? 'PUT' : 'POST';
    fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) })
      .then(r => r.json()).then(d => {
        if (d.result === 'success') {
          closeGradeModal();
          loadGrades(isEdit ? gradeCurPage : 1);
        } else alert('오류: ' + (d.message || '처리 실패'));
      });
  }

  function toggleGrade(jbgrCd, newUseYn) {
    if (!confirm(`해당 직급을 ${newUseYn === 'Y' ? '활성화' : '비활성화'}하시겠습니까?`)) return;
    fetch(`/admin/org/grade/${jbgrCd}/toggle`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ useYn: newUseYn })
    }).then(r => r.json()).then(d => {
      if (d.result === 'success') loadGrades(gradeCurPage);
      else alert('오류: ' + d.message);
    });
  }

  /* ═══════════════════════════════════════════
     사수 배정 — 좌(미배정+필터) / 우(팀 현황)
  ═══════════════════════════════════════════ */
  let mntDeptCd       = '';
  let mntViewMode     = 'kanban'; /* 'kanban' | 'tree' */
  let mntKanbanLoaded = false;
  let allEmps         = [];
  let extraSups       = []; /* "팀 추가"로 만든 임시 사수 열 */
  let dragUserId      = null;
  let dragCurMnt      = null;

  /* 트리 뷰 사용 부서 (행정팀 D100, PD팀 D200) */
  const TREE_VIEW_DEPTS = new Set(['D100', 'D200']);

  function selectMntDept(btn) {
    document.querySelectorAll('.mnt-dept-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mntDeptCd  = (btn.dataset.dept || '').trim();
    mntViewMode = TREE_VIEW_DEPTS.has(mntDeptCd) ? 'tree' : 'kanban';
    extraSups  = [];
    filterMntGradeByDept(mntDeptCd);
    loadMntKanban();
  }

  /* 부서 선택 시 직급 옵션 재구성 — employees.js updateHrRoleFilter()와 완전히 동일한 패턴 */
  function filterMntGradeByDept(deptCd) {
    if (allMntGradeOpts.length === 0) initMntGradeOpts();
    const trimmed = (deptCd || '').trim();
    const filtered = trimmed
      ? allMntGradeOpts.filter(o => o.dept === trimmed)
      : allMntGradeOpts;
    const ts = document.getElementById('mnt-grade-filter').tomselect;
    if (ts) {
      /* TomSelect가 적용된 경우 — innerHTML 교체는 반영 안 됨, API로 갱신 */
      ts.clear(true);
      ts.clearOptions();
      filtered.forEach(o => ts.addOption({ value: o.value, text: o.text }));
      ts.refreshOptions(false);
    } else {
      /* TomSelect 미적용 fallback */
      const sel = document.getElementById('mnt-grade-filter');
      sel.innerHTML = '<option value="">전체 직급</option>' +
        filtered.map(o => `<option value="${esc(o.value)}">${esc(o.text)}</option>`).join('');
      sel.value = '';
    }
    renderUnassigned();
  }

  function loadMntKanbanOnce() {
    if (!mntKanbanLoaded) { mntKanbanLoaded = true; loadMntKanban(); }
  }

  function loadMntKanban() {
    document.getElementById('mnt-unassigned-list').innerHTML =
      '<p class="text-xs text-slate-300 text-center py-8">불러오는 중...</p>';
    document.getElementById('mnt-teams').innerHTML =
      '<div class="text-slate-300 text-sm self-center px-4">불러오는 중...</div>';
    fetch(`/admin/org/mapping/employees?deptCd=${encodeURIComponent(mntDeptCd)}`)
      .then(r => {
        if (!r.ok) throw new Error(`서버 오류 ${r.status}`);
        return r.json();
      })
      .then(emps => {
        allEmps = emps;
        renderUnassigned();
        renderTeams();
      })
      .catch(err => {
        document.getElementById('mnt-unassigned-list').innerHTML =
          `<p class="text-xs text-red-400 text-center py-8">데이터 로드 실패<br>${err.message}</p>`;
        document.getElementById('mnt-teams').innerHTML =
          `<p class="text-sm text-red-400 self-center px-4">데이터 로드 실패: ${err.message}</p>`;
      });
  }

  /* ── 왼쪽: 미배정 목록 렌더 (필터 적용) ── */
  function renderUnassigned() {
    const kw    = (document.getElementById('mnt-search').value || '').trim().toLowerCase();
    const grade = document.getElementById('mnt-grade-filter').value;
    const stat  = document.getElementById('mnt-stat-filter').value;

    const list = allEmps.filter(e => {
      if (e.mntUserId) return false;
      if (kw    && !((e.userName||'').toLowerCase().includes(kw) || (e.userId||'').toLowerCase().includes(kw))) return false;
      if (grade && e.jbgrNm !== grade) return false;
      if (stat  && e.emplStatCd !== stat) return false;
      return true;
    });

    document.getElementById('mnt-unassigned-count').textContent = `${list.length}명`;
    const container = document.getElementById('mnt-unassigned-list');
    const savedScrollTop = container.scrollTop;
    if (!list.length) {
      container.innerHTML = '<p class="text-xs text-slate-400 text-center py-10">조건에 맞는<br>미배정 직원이 없습니다.</p>';
      return;
    }
    container.innerHTML = list.map(e => renderEmpCard(e)).join('');
    container.scrollTop = savedScrollTop;
  }

  /* ── 오른쪽: 뷰 모드에 따라 칸반 or 트리로 분기 ── */
  function renderTeams() {
    const teamsEl  = document.getElementById('mnt-teams');
    const wrapEl   = teamsEl.parentElement;

    /* 렌더 전 스크롤 위치 저장 */
    const treeWrap      = document.getElementById('org-tree-wrap');
    const savedTreeLeft = treeWrap ? treeWrap.scrollLeft : null;
    const savedTreeTop  = treeWrap ? treeWrap.scrollTop  : null;
    const savedWrapLeft = wrapEl.scrollLeft;

    const empMap = {};
    allEmps.forEach(e => { empMap[e.userId] = e; });

    const dbLeaders = allEmps.filter(e => e.mntUserId && e.mntUserId === e.userId).map(e => e.userId);
    const supIds    = [...new Set([...dbLeaders, ...extraSups])];
    supIds.sort((a, b) => ((empMap[a]?.userName)||a).localeCompare((empMap[b]?.userName)||b));

    if (mntViewMode === 'tree') {
      /* 트리 뷰: 스크롤 방향 양방향 */
      wrapEl.className  = 'flex-1 overflow-auto';
      teamsEl.className = 'h-full';
      teamsEl.removeAttribute('style');
      renderOrgTree(supIds, empMap, savedTreeLeft, savedTreeTop);
    } else {
      /* 칸반 뷰: 가로 스크롤 */
      wrapEl.className  = 'flex-1 overflow-x-auto overflow-y-hidden';
      teamsEl.className = 'flex gap-3 h-full items-start';
      teamsEl.style.minWidth = 'max-content';
      renderKanban(supIds, empMap);
      /* 칸반 스크롤 복원 */
      requestAnimationFrame(() => { wrapEl.scrollLeft = savedWrapLeft; });
    }
  }

  /* ── 칸반 뷰 (강사팀 / 전체) ── */
  function renderKanban(supIds, empMap) {
    const teamsEl = document.getElementById('mnt-teams');

    if (!supIds.length) {
      teamsEl.innerHTML = `
        <div class="mnt-col flex-shrink-0 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50
                     flex flex-col items-center justify-center cursor-pointer
                     hover:border-violet-300 hover:bg-violet-50 transition-colors"
             style="width:210px; min-height:240px"
             onclick="openAddTeamModal()"
             ondragover="event.preventDefault()"
             ondrop="onDropToNewTeam(event)">
          <i class="fa-solid fa-plus text-2xl text-slate-300 mb-2"></i>
          <p class="text-xs font-semibold text-slate-400">팀 추가</p>
          <p class="text-xs text-slate-300 mt-1 text-center px-4 leading-relaxed">사수를 선택하거나<br>카드를 여기에 놓으세요</p>
        </div>`;
      return;
    }

    teamsEl.innerHTML = supIds.map(sid => {
      const sup     = empMap[sid] || { userId: sid, userName: sid };
      const members = getTeamDescendants(sid);
      const avatar  = sup.userProfile && sup.userProfile.startsWith('http')
        ? `<img src="${esc(sup.userProfile)}" class="w-9 h-9 rounded-lg object-cover flex-shrink-0">`
        : `<div class="w-9 h-9 rounded-lg bg-violet-100 flex items-center justify-center text-sm font-bold text-violet-600 flex-shrink-0">${esc((sup.userName||'?').charAt(0))}</div>`;
      return `
        <div class="mnt-col flex-shrink-0 rounded-xl border border-slate-200 bg-white overflow-hidden"
             style="width:210px" data-sup-id="${esc(sid)}"
             ondragover="event.preventDefault()"
             ondrop="onDropToTeam(event,this)">
          <div class="bg-violet-50 border-b border-violet-100 px-3 py-3 flex items-center gap-2.5">
            ${avatar}
            <div class="min-w-0 flex-1">
              <p class="font-bold text-sm text-slate-800 truncate">${esc(sup.userName||sid)}</p>
              <p class="text-xs text-slate-400 truncate">${esc(sup.jbgrNm||'')}${sup.deptNm?' · '+esc(sup.deptNm):''}</p>
            </div>
            <span class="text-xs bg-violet-100 text-violet-600 font-bold px-1.5 py-0.5 rounded-md flex-shrink-0">${members.length}명</span>
            <button onclick="event.stopPropagation(); dissolveTeam('${esc(sid)}')"
                    title="팀 전체 해제"
                    class="flex-shrink-0 w-5 h-5 rounded-full bg-slate-200 hover:bg-red-100 hover:text-red-500
                           text-slate-400 text-xs flex items-center justify-center transition-colors ml-1">✕</button>
          </div>
          <div class="mnt-col-body p-2 flex flex-col gap-1.5" style="min-height:120px">
            ${members.map(e => renderEmpCard(e)).join('') ||
              '<p class="text-xs text-slate-300 text-center py-5">팀원 없음<br><span style="font-size:.7rem">카드를 드래그해서 놓으세요</span></p>'}
          </div>
        </div>`;
    }).join('') + `
      <div onclick="openAddTeamModal()"
           class="mnt-col flex-shrink-0 rounded-xl border-2 border-dashed border-slate-200 bg-slate-50
                  flex flex-col items-center justify-center cursor-pointer
                  hover:border-violet-300 hover:bg-violet-50 transition-colors"
           style="width:64px; height:80px; align-self:flex-start"
           ondragover="event.preventDefault()"
           ondrop="onDropToNewTeam(event)">
        <i class="fa-solid fa-plus text-lg text-slate-300"></i>
      </div>`;
  }

  /* ── 트리 뷰 (행정팀 / PD팀) ── */
  function renderOrgTree(supIds, empMap, savedScrollLeft, savedScrollTop) {
    const teamsEl = document.getElementById('mnt-teams');

    if (!supIds.length) {
      teamsEl.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full gap-3 text-slate-300">
          <div class="w-20 h-20 rounded-full border-2 border-dashed border-slate-200 bg-slate-50
                       flex flex-col items-center justify-center cursor-pointer
                       hover:border-violet-300 hover:bg-violet-50 transition-colors"
               onclick="openAddTeamModal()"
               ondragover="event.preventDefault()"
               ondrop="onDropToNewTeam(event)">
            <i class="fa-solid fa-plus text-xl text-slate-300"></i>
          </div>
          <p class="text-xs text-slate-400">팀장을 드래그하거나 클릭하여 추가</p>
        </div>`;
      return;
    }

    teamsEl.innerHTML = `
      <div class="org-tree-wrap" id="org-tree-wrap">
        ${supIds.map(sid => `
          <div class="org-tree">
            <ul>${buildTreeHtml(sid, empMap)}</ul>
          </div>
        `).join('')}
      </div>`;

    /* 스크롤 복원: 이전 위치가 있으면 복원, 최초 로드면 중앙 정렬 */
    requestAnimationFrame(() => {
      const wrap = document.getElementById('org-tree-wrap');
      if (!wrap) return;
      if (savedScrollLeft !== null && savedScrollLeft !== undefined) {
        wrap.scrollLeft = savedScrollLeft;
        wrap.scrollTop  = savedScrollTop ?? 0;
      } else {
        wrap.scrollLeft = (wrap.scrollWidth - wrap.clientWidth) / 2;
      }
    });
  }

  /* 재귀 트리 노드 HTML 생성 */
  function buildTreeHtml(userId, empMap) {
    const emp = empMap[userId];
    if (!emp) return '';
    const isRoot   = emp.mntUserId === emp.userId;
    const children = allEmps.filter(e => e.mntUserId === userId && e.userId !== userId);

    const avatar = emp.userProfile && emp.userProfile.startsWith('http')
      ? `<img src="${esc(emp.userProfile)}" class="w-8 h-8 rounded-full object-cover mx-auto mb-1">`
      : `<div class="w-8 h-8 rounded-full bg-violet-100 flex items-center justify-center text-sm font-bold text-violet-600 mx-auto mb-1">${esc((emp.userName||'?').charAt(0))}</div>`;

    const dissolveBtn = isRoot
      ? `<button onclick="event.stopPropagation(); dissolveTeam('${esc(userId)}')"
                 title="팀 전체 해제"
                 class="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full bg-slate-200 hover:bg-red-100
                        hover:text-red-500 text-slate-400 text-xs flex items-center justify-center
                        transition-colors leading-none">✕</button>`
      : '';

    const nodeHtml = `
      <div class="tree-node ${isRoot ? 'tree-node-root' : ''} relative"
           data-uid="${esc(userId)}"
           data-mnt="${esc(emp.mntUserId || '')}"
           ${!isRoot ? 'draggable="true"' : ''}
           style="${!isRoot ? 'cursor:grab;' : ''}"
           ondragover="event.preventDefault()"
           ondrop="onDropToTreeNode(event, this)">
        ${dissolveBtn}
        ${avatar}
        <p class="text-xs font-bold text-slate-800 truncate" style="max-width:84px">${esc(emp.userName||userId)}</p>
        <p class="text-xs text-slate-400 truncate" style="max-width:84px">${esc(emp.jbgrNm||'')}</p>
      </div>`;

    if (!children.length) return `<li>${nodeHtml}</li>`;

    return `<li>
      ${nodeHtml}
      <ul>${children.map(c => buildTreeHtml(c.userId, empMap)).join('')}</ul>
    </li>`;
  }

  /* 트리 노드에 드롭 → 해당 노드가 직접 사수 */
  function onDropToTreeNode(event, nodeEl) {
    event.preventDefault();
    event.stopPropagation();
    nodeEl.classList.remove('drag-over');
    if (!dragUserId) return;
    const targetId = nodeEl.dataset.uid;
    if (!targetId || dragUserId === targetId || dragCurMnt === targetId) return;
    /* 자신의 하위 직원에게 드롭 시 순환 참조 방지 */
    const descendants = getTeamDescendants(dragUserId);
    if (descendants.some(e => e.userId === targetId)) return;
    saveMntMapping(dragUserId, targetId);
  }

  /* ── 공통 직원 카드 ── */
  function renderEmpCard(emp) {
    const avatar = emp.userProfile && emp.userProfile.startsWith('http')
      ? `<img src="${esc(emp.userProfile)}" class="w-7 h-7 rounded-md object-cover flex-shrink-0">`
      : `<div class="w-7 h-7 rounded-md bg-violet-100 flex items-center justify-center text-xs font-bold text-violet-600 flex-shrink-0">${esc((emp.userName||'?').charAt(0))}</div>`;
    const statCls = emp.emplStatCd==='01' ? 'text-emerald-600' : emp.emplStatCd==='02' ? 'text-amber-500' : 'text-red-400';
    const statTxt = emp.emplStatCd==='01' ? '재직' : emp.emplStatCd==='02' ? '휴직' : '퇴사';
    return `
      <div class="emp-card bg-white border border-slate-100 hover:border-violet-200 hover:bg-violet-50
                  rounded-lg p-2 flex items-center gap-2 cursor-grab select-none transition-colors shadow-sm"
           draggable="true" data-uid="${esc(emp.userId)}" data-mnt="${esc(emp.mntUserId||'')}">
        ${avatar}
        <div class="min-w-0 flex-1">
          <p class="text-xs font-semibold text-slate-800 truncate">${esc(emp.userName||'-')}</p>
          <p class="text-xs text-slate-400 truncate">${esc(emp.jbgrNm||'-')}</p>
        </div>
        <span class="text-xs ${statCls} flex-shrink-0">${statTxt}</span>
      </div>`;
  }

  /* ── 팀 추가 모달 ── */
  function openAddTeamModal() {
    const existingSups = new Set([
      ...allEmps.filter(e => e.mntUserId).map(e => e.mntUserId),
      ...extraSups
    ]);
    const candidates = allEmps.filter(e => !existingSups.has(e.userId));
    if (!candidates.length) { alert('추가 가능한 사수 후보가 없습니다.'); return; }
    const ts = document.getElementById('add-team-select').tomselect;
    if (ts) {
      ts.clear(true);
      ts.clearOptions();
      candidates.forEach(e => ts.addOption({ value: e.userId, text: `${e.userName} (${e.jbgrNm || e.userId})` }));
      ts.refreshOptions(false);
    } else {
      document.getElementById('add-team-select').innerHTML =
        candidates.map(e => `<option value="${esc(e.userId)}">${esc(e.userName)} (${esc(e.jbgrNm||e.userId)})</option>`).join('');
    }
    document.getElementById('modal-add-team').classList.remove('hidden');
  }
  function closeAddTeamModal() { document.getElementById('modal-add-team').classList.add('hidden'); }
  function confirmAddTeam() {
    const sel = document.getElementById('add-team-select');
    const ts = sel.tomselect;
    const sid = ts ? ts.getValue() : sel.value;
    if (!sid) return;
    closeAddTeamModal();
    if (!extraSups.includes(sid)) extraSups.push(sid);
    renderTeams();
  }

  /* ── 팀 계층 헬퍼 ── */
  /* 팀 루트(leaderId)의 모든 하위 직원을 BFS로 수집 */
  function getTeamDescendants(leaderId) {
    const result  = [];
    const queue   = [leaderId];
    const visited = new Set();
    while (queue.length) {
      const pid = queue.shift();
      if (visited.has(pid)) continue;
      visited.add(pid);
      allEmps.forEach(e => {
        if (e.mntUserId === pid && e.userId !== pid) {
          result.push(e);
          queue.push(e.userId);
        }
      });
    }
    return result;
  }

  /* 드래그한 직원의 직접 사수 자동 계산 — 팀 내 직급 rank 바로 1단계 위 */
  function findDirectSup(draggedId, teamHeaderId) {
    const dragged = allEmps.find(e => e.userId === draggedId);
    if (!dragged) return teamHeaderId;
    const draggedOrd = gradeOrdMap[dragged.jbgrNm] ?? 999;

    const header  = allEmps.find(e => e.userId === teamHeaderId);
    const teamAll = [header, ...getTeamDescendants(teamHeaderId)]
                      .filter(e => e && e.userId !== draggedId);

    /* 나보다 높은 직급(sortOrd 작은 값) 중 가장 가까운 사람 */
    const higher  = teamAll.filter(e => (gradeOrdMap[e.jbgrNm] ?? 999) < draggedOrd);
    if (!higher.length) return teamHeaderId;
    higher.sort((a, b) => (gradeOrdMap[b.jbgrNm] ?? 999) - (gradeOrdMap[a.jbgrNm] ?? 999));
    return higher[0].userId;
  }

  /* ── 팀 전체 해제 (X 버튼) ── */
  function dissolveTeam(supId) {
    if (!confirm('이 팀을 전체 해제하시겠습니까?\n모든 팀원이 미배정 상태로 돌아갑니다.')) return;
    const members = getTeamDescendants(supId);
    const targets = [supId, ...members.map(e => e.userId)];
    extraSups = extraSups.filter(id => id !== supId);
    Promise.all(
      targets.map(uid =>
        fetch(`/admin/org/mapping/${uid}`, {
          method: 'PUT', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ mntUserId: null })
        }).then(r => r.json())
      )
    ).then(() => {
      /* 로컬 업데이트: re-fetch 없이 allEmps 수정 후 렌더 */
      targets.forEach(uid => {
        const emp = allEmps.find(e => e.userId === uid);
        if (emp) emp.mntUserId = null;
      });
      renderUnassigned();
      renderTeams();
    }).catch(err => alert('해제 중 오류: ' + err.message));
  }

  /* ── "+" 영역 드롭 → 드래그한 직원을 팀장으로 등록 (mntUserId = 자기 자신) ── */
  function onDropToNewTeam(event) {
    event.preventDefault();
    event.stopPropagation();
    if (!dragUserId) return;
    const allLeaderIds = new Set([
      ...allEmps.filter(e => e.mntUserId === e.userId).map(e => e.userId),
      ...extraSups
    ]);
    if (allLeaderIds.has(dragUserId)) return;
    extraSups.push(dragUserId);
    renderTeams();
    renderUnassigned();
    saveMntMapping(dragUserId, dragUserId); /* 자기 자신을 사수로 = 팀장 표시 */
  }

  /* ── 드롭 핸들러 ── */
  function onDropToTeam(event, colEl) {
    event.preventDefault();
    event.stopPropagation();
    colEl.classList.remove('drag-over');
    if (!dragUserId) return;
    const teamHeaderId = colEl.dataset.supId;
    if (!teamHeaderId || dragUserId === teamHeaderId) return;
    /* 직급 rank 기준으로 바로 1단계 위 사수를 자동 계산 */
    const directSupId = findDirectSup(dragUserId, teamHeaderId);
    if (dragCurMnt === directSupId) return; /* 이미 같은 사수면 무시 */
    saveMntMapping(dragUserId, directSupId);
  }

  function onDropToUnassigned(event) {
    event.preventDefault();
    if (!dragUserId || !dragCurMnt) return; /* 이미 미배정 */

    /* 하위 직원이 있으면 cascade로 함께 초기화 */
    const descendants = getTeamDescendants(dragUserId);
    if (!descendants.length) {
      saveMntMapping(dragUserId, null);
      return;
    }

    const targets = [dragUserId, ...descendants.map(e => e.userId)];
    Promise.all(
      targets.map(uid =>
        fetch(`/admin/org/mapping/${uid}`, {
          method: 'PUT', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ mntUserId: null })
        }).then(r => {
          if (!r.ok) throw new Error(`서버 오류 ${r.status}`);
          return r.json();
        })
      )
    ).then(() => {
      dragUserId = null;
      /* 로컬 업데이트: re-fetch 없이 allEmps 수정 후 렌더 */
      targets.forEach(uid => {
        const emp = allEmps.find(e => e.userId === uid);
        if (emp) emp.mntUserId = null;
      });
      renderUnassigned();
      renderTeams();
    }).catch(err => {
      dragUserId = null;
      alert('배정 해제 중 오류가 발생했습니다.\n' + err.message);
    });
  }

  function saveMntMapping(userId, newMntUserId) {
    fetch(`/admin/org/mapping/${userId}`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ mntUserId: newMntUserId })
    })
    .then(r => {
      if (!r.ok) throw new Error(`서버 오류 ${r.status}`);
      return r.json();
    })
    .then(d => {
      dragUserId = null;
      if (d.result === 'success') {
        /* 로컬 업데이트: re-fetch 없이 allEmps 수정 후 렌더 (깜박임 없음) */
        const emp = allEmps.find(e => e.userId === userId);
        if (emp) emp.mntUserId = newMntUserId;
        /* 팀장(자기 자신)으로 등록된 경우 extraSups에서 제거 (DB leader로 전환) */
        if (newMntUserId === userId) extraSups = extraSups.filter(id => id !== userId);
        renderUnassigned();
        renderTeams();
      } else {
        alert('배정 실패: ' + (d.message || '알 수 없는 오류'));
      }
    })
    .catch(err => {
      dragUserId = null;
      alert('배정 저장 중 오류가 발생했습니다.\n' + err.message);
    });
  }

  /* ── DnD 이벤트 위임 ── */
  document.addEventListener('dragstart', e => {
    const card = e.target.closest('.emp-card') || e.target.closest('.tree-node[draggable]');
    if (!card) return;
    dragUserId = card.dataset.uid;
    dragCurMnt = card.dataset.mnt;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragUserId); /* Firefox drop 이벤트 발화 필수 */
    requestAnimationFrame(() => { card.style.opacity = '0.45'; });
  });
  document.addEventListener('dragend', e => {
    const card = e.target.closest('.emp-card') || e.target.closest('.tree-node[draggable]');
    if (card) card.style.opacity = '';
    dragUserId = null;
    document.querySelectorAll('.mnt-col.drag-over, .tree-node.drag-over, #mnt-unassigned-list.drag-over')
      .forEach(el => el.classList.remove('drag-over'));
  });
  document.addEventListener('dragenter', e => {
    if (!dragUserId) return;
    const col  = e.target.closest('.mnt-col');
    if (col) col.classList.add('drag-over');
    const node = e.target.closest('.tree-node');
    if (node) node.classList.add('drag-over');
    const ua = e.target.closest('#mnt-unassigned-list');
    if (ua && dragCurMnt) ua.classList.add('drag-over');
  });
  document.addEventListener('dragleave', e => {
    const col = e.target.closest('.mnt-col');
    if (col && !col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    const node = e.target.closest('.tree-node');
    if (node && !node.contains(e.relatedTarget)) node.classList.remove('drag-over');
    const ua = e.target.closest('#mnt-unassigned-list');
    if (ua && !ua.contains(e.relatedTarget)) ua.classList.remove('drag-over');
  });
</script>

</body>
