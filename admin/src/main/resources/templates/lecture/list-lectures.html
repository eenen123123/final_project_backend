<title th:fragment="pageTitle">강의 목록 | HERMES</title>

<div class="space-y-6">
  <!-- 헤더 -->
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
  >
    <div>
      <div class="flex items-center gap-2 text-xs text-slate-400 mb-1">
        <a
          th:href="@{/admin/course/list}"
          class="hover:text-violet-500 transition-colors"
          >강좌 관리</a
        >
        <i class="fa-solid fa-chevron-right text-[10px]"></i>
        <a th:href="@{/admin/course/detail(courseSn=${course.courseSn})}"
          th:text="${course.courseNm}"
          class="text-slate-600 font-medium hover:text-violet-500 transition-colors">강좌명</a>
        <i class="fa-solid fa-chevron-right text-[10px]"></i>
        <span class="text-violet-500 font-medium">강의 목록</span>
      </div>
      <h1
        class="text-2xl font-bold text-slate-900 tracking-tight"
        th:text="${course?.courseNm} + ' 강의 목록'"
      >
        강의 목록
      </h1>
      <p class="text-sm text-slate-500 mt-1">
        등록된 강의를 확인하고 관리합니다.
      </p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <a
        th:href="@{/admin/course/detail(courseSn=${course.courseSn})}"
        class="hm-btn-secondary"
      >
        <i class="fa-solid fa-arrow-left"></i>
        <span>강좌 상세</span>
      </a>
      <a
        th:if="${#authentication.name == course.instrUserId}"
        th:href="@{/admin/lectures/insert(courseId=${course.courseSn})}"
        class="hm-btn-primary hm-btn-violet"
      >
        <i class="fa-solid fa-plus"></i>
        <span>강의 추가</span>
      </a>
    </div>
  </div>

  <!-- 목록 테이블 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div
      class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-slate-100"
    >
      <h2 class="text-sm font-bold text-slate-700">
        <i class="fa-solid fa-list text-violet-500 mr-2"></i>강의 목록
        <span
          class="ml-1 text-xs font-normal text-slate-400"
          th:text="'총 ' + ${lectures != null ? lectures.size() : 0} + '개'"
          >총 0개</span
        >
      </h2>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr
            class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider"
          >
            <th class="py-4 px-6 w-16 text-center">순서</th>
            <th class="py-4 px-6">강의명</th>
            <th class="py-4 px-6 w-28">유형</th>
            <th class="py-4 px-6 w-24 text-center">공개 여부</th>
            <th class="py-4 px-6 w-20 text-center">잠금</th>
            <th class="py-4 px-6 w-36 text-center">제어</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <!-- 강의 없을 때 -->
          <tr th:if="${lectures == null or lectures.isEmpty()}">
            <td colspan="6" class="py-16 text-center">
              <div class="flex flex-col items-center gap-3 text-slate-300">
                <i class="fa-solid fa-film text-4xl"></i>
                <p class="text-sm">등록된 강의가 없습니다.</p>
                <a
                  th:href="@{/admin/lectures/insert(courseId=${course.courseSn})}"
                  class="text-xs text-violet-500 hover:text-violet-600 font-semibold"
                >
                  첫 강의 등록하기 →
                </a>
              </div>
            </td>
          </tr>

          <!-- 강의 목록 -->
          <tr
            th:each="lec, iter : ${lectures}"
            class="hover:bg-slate-50/60 transition-colors"
          >
            <td class="py-4 px-6 text-center">
              <span
                class="w-7 h-7 rounded-lg bg-violet-50 text-violet-500 text-xs font-bold inline-flex items-center justify-center"
                th:text="${lec.sortOrd != null ? lec.sortOrd : iter.index + 1}"
                >1</span
              >
            </td>
            <td class="py-4 px-6">
              <p
                class="font-semibold text-slate-800 truncate max-w-sm"
                th:text="${lec.lectureNm}"
              >
                강의명
              </p>
              <p
                class="text-xs text-slate-400 mt-0.5 line-clamp-1 max-w-sm"
                th:if="${lec.lectureExplnCn}"
                th:text="${lec.lectureExplnCn}"
              ></p>
            </td>
            <td class="py-4 px-6">
              <span
                th:switch="${lec.lectureTypeCd}"
                class="px-2.5 py-0.5 rounded-full text-xs font-semibold"
              >
                <span
                  th:case="'VOD'"
                  class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-violet-50 text-violet-600"
                  >영상(VOD)</span
                >
                <span
                  th:case="'LIVE'"
                  class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-red-50 text-red-500"
                  >라이브</span
                >
                <span
                  th:case="'QUIZ'"
                  class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-violet-50 text-violet-600"
                  >퀴즈</span
                >
                <span
                  th:case="'DOC'"
                  class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-sky-50 text-sky-600"
                  >자료</span
                >
                <span
                  th:case="*"
                  class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500"
                  th:text="${lec.lectureTypeCd}"
                  >-</span
                >
              </span>
            </td>
            <td class="py-4 px-6 text-center">
              <span
                th:if="${lec.opnnYn == 'Y'}"
                class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-600"
                >공개</span
              >
              <span
                th:unless="${lec.opnnYn == 'Y'}"
                class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-400"
                >비공개</span
              >
            </td>
            <td class="py-4 px-6 text-center">
              <span
                th:if="${lec.lockYn == 'Y'}"
                class="text-amber-500 text-xs font-semibold"
              >
                <i class="fa-solid fa-lock mr-0.5"></i>잠금
              </span>
              <span
                th:unless="${lec.lockYn == 'Y'}"
                class="text-slate-300 text-xs"
                >-</span
              >
            </td>
            <td class="py-4 px-6 text-center">
              <div class="flex items-center justify-center gap-1">
                <a
                  th:href="@{/admin/lectures/view(lectureId=${lec.lectureSn})}"
                  class="p-1.5 text-slate-400 hover:text-violet-500 transition-colors"
                  title="미리보기"
                >
                  <i class="fa-solid fa-play text-sm"></i>
                </a>
                <button
                  class="p-1.5 text-slate-400 hover:text-sky-500 transition-colors"
                  title="수정"
                >
                  <i class="fa-solid fa-pen text-sm"></i>
                </button>
                <button
                  class="p-1.5 text-slate-400 hover:text-red-500 transition-colors"
                  title="삭제"
                >
                  <i class="fa-solid fa-trash text-sm"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
