<title th:fragment="pageTitle">강의 목록 | HERMES</title>

<div class="space-y-6">
  <!-- 헤더 -->
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"
  >
    <div>
      <h1
        class="text-2xl font-bold text-slate-900 tracking-tight"
        th:text="${course?.courseNm} + ' 강의 목록'"
      >
        강의 목록
      </h1>
      <p class="text-sm text-slate-500 mt-1">
        등록된 강의를 확인하고 관리합니다.
      </p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <a
        th:href="@{/admin/course/detail(courseSn=${course.courseSn})}"
        class="hm-btn-secondary"
      >
        <i class="fa-solid fa-arrow-left"></i>
        <span>강좌 상세</span>
      </a>
      <a
        th:if="${#authentication.name == course.instrUserId}"
        th:href="@{/admin/lectures/insert(courseId=${course.courseSn})}"
        class="hm-btn-primary hm-btn-violet"
      >
        <i class="fa-solid fa-plus"></i>
        <span>강의 추가</span>
      </a>
    </div>
  </div>

  <!-- 목록 테이블 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div
      class="flex items-center justify-between px-6 pt-5 pb-4 border-b border-slate-100"
    >
      <h2 class="text-sm font-bold text-slate-700">
        <i class="fa-solid fa-list text-violet-500 mr-2"></i>강의 목록
        <span
          class="ml-1 text-xs font-normal text-slate-400"
          th:text="'총 ' + ${lectures != null ? lectures.size() : 0} + '개'"
          >총 0개</span
        >
      </h2>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr
            class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider whitespace-nowrap"
          >
            <th class="py-4 px-6 w-16 text-center">순서</th>
            <th class="py-4 px-6">강의명</th>
            <th class="py-4 px-6 w-28 text-center">재생 시간</th>
            <th class="py-4 px-6 w-24 text-center">공개 여부</th>
            <th class="py-4 px-6 w-20 text-center">잠금</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <!-- 강의 없을 때 -->
          <tr th:if="${lectures == null or lectures.isEmpty()}">
            <td colspan="5" class="py-16 text-center">
              <div class="flex flex-col items-center gap-3 text-slate-300">
                <i class="fa-solid fa-film text-4xl"></i>
                <p class="text-sm">등록된 강의가 없습니다.</p>
                <a
                  th:href="@{/admin/lectures/insert(courseId=${course.courseSn})}"
                  class="text-xs text-violet-500 hover:text-violet-600 font-semibold"
                >
                  첫 강의 등록하기 →
                </a>
              </div>
            </td>
          </tr>

          <!-- 강의 목록 -->
          <tr
            th:each="lec, iter : ${lectures}"
            class="hover:bg-slate-50/60 transition-colors cursor-pointer"
            th:onclick="|location.href='@{/admin/lectures/view(lectureId=${lec.lectureSn})}'|"
          >
            <td class="py-4 px-6 text-center">
              <span
                class="w-7 h-7 rounded-lg bg-violet-50 text-violet-500 text-xs font-bold inline-flex items-center justify-center"
                th:text="${lec.sortOrd != null ? lec.sortOrd : iter.index + 1}"
                >1</span
              >
            </td>
            <td class="py-4 px-6">
              <p
                class="font-semibold text-slate-800 truncate max-w-sm"
                th:text="${lec.lectureNm}"
              >
                강의명
              </p>
              <p
                class="text-xs text-slate-400 mt-0.5 line-clamp-1 max-w-sm"
                th:if="${lec.lectureExplnCn != null and !#strings.isEmpty(lec.lectureExplnCn)}"
                th:text="${lec.lectureExplnCn}"
              ></p>
            </td>
            <td class="py-4 px-6 text-center text-xs">
              <span
                th:if="${lec.lectureDuration != null and lec.lectureDuration > 0}"
                class="font-medium text-slate-700"
              >
                <i class="fa-regular fa-clock mr-1 text-slate-400"></i>
                <span
                  th:text="${#numbers.formatInteger(lec.lectureDuration / 60, 1, 'DEFAULT') + ':' + (lec.lectureDuration % 60 < 10 ? '0' : '') + (lec.lectureDuration % 60)}"
                ></span>
              </span>
              <span
                th:unless="${lec.lectureDuration != null and lec.lectureDuration > 0}"
                class="text-slate-300"
                >-</span
              >
            </td>
            <td class="py-4 px-6 text-center">
              <span
                th:if="${lec.opnnYn == 'Y'}"
                class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-600"
                >공개</span
              >
              <span
                th:unless="${lec.opnnYn == 'Y'}"
                class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-400"
                >비공개</span
              >
            </td>
            <td class="py-4 px-6 text-center">
              <span
                th:if="${lec.lockYn == 'Y'}"
                class="text-amber-500 text-xs font-semibold"
              >
                <i class="fa-solid fa-lock mr-0.5"></i>잠금
              </span>
              <span
                th:unless="${lec.lockYn == 'Y'}"
                class="text-slate-300 text-xs"
                >해제</span
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
