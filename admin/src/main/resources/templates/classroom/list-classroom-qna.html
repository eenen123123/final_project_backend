<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | Q&A',
    ${classroom},
    'qna',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">Q&amp;A</h2>
    </div>

    <!-- 빈 목록 -->
    <div th:if="${#lists.isEmpty(qnaList)}"
         class="p-16 flex flex-col items-center justify-center text-center gap-3">
      <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-2xl">
        <i class="fa-solid fa-comments"></i>
      </div>
      <p class="text-sm font-medium text-slate-500">등록된 질문이 없습니다.</p>
    </div>

    <!-- Q&A 목록 -->
    <div th:unless="${#lists.isEmpty(qnaList)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider uppercase">
            <th class="py-3 px-6 w-12">번호</th>
            <th class="py-3 px-6">제목</th>
            <th class="py-3 px-6 w-24">작성자</th>
            <th class="py-3 px-6 w-20 text-center">답변</th>
            <th class="py-3 px-6 w-32">작성일</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <tr th:each="qna, stat : ${qnaList}" class="hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-6 text-xs text-slate-400 font-mono"
                th:text="${qnaList.size() - stat.index}">1</td>
            <td class="py-3 px-6">
              <a th:href="@{/classroom/detail/{sn}/qna/{postSn}(sn=${classroom.classSn},postSn=${qna.postSn})}"
                 class="font-semibold text-slate-800 hover:text-blue-600 transition-colors"
                 th:text="${qna.postSj}">질문 제목</a>
            </td>
            <td class="py-3 px-6 text-xs text-slate-500"
                th:text="${qna.memberDto != null ? qna.memberDto.userName : qna.wrtrUserId}">작성자</td>
            <td class="py-3 px-6 text-center">
              <span th:if="${qna.answYn == 'Y'}"
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-600">답변완료</span>
              <span th:unless="${qna.answYn == 'Y'}"
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-50 text-amber-500">미답변</span>
            </td>
            <td class="py-3 px-6 text-xs text-slate-400 font-mono"
                th:text="${qna.regDt != null ? #temporals.format(qna.regDt, 'yyyy-MM-dd') : '-'}">2026-06-01</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="border-t border-slate-100 px-6 py-3 bg-slate-50/50">
      <p class="text-xs text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(qnaList)}">0</span>건
      </p>
    </div>
  </div>

</div>
</body>
</html>
