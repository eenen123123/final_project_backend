<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 시험 관리',
    ${classroom},
    'exams',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
      <div>
        <h2 class="text-base font-bold text-slate-800">시험 목록</h2>
        <p class="text-sm text-slate-400 mt-1">이 클래스룸에 등록된 시험 목록입니다.</p>
      </div>
      <a th:href="@{/classroom/detail/{sn}/exams/write(sn=${classroom.classSn})}"
         class="text-sm font-semibold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
        <i class="fa-solid fa-plus text-xs"></i> 시험 등록
      </a>
    </div>

    <div th:if="${#lists.isEmpty(exams)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-clipboard-question"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 시험이 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(exams)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm text-slate-400">
            <th class="py-4 px-7 w-14 font-medium whitespace-nowrap">번호</th>
            <th class="py-4 px-7 font-medium">시험명</th>
            <th class="py-4 px-7 w-24 text-center font-medium whitespace-nowrap">문항 수</th>
            <th class="py-4 px-7 w-44 font-medium whitespace-nowrap">시험 기간</th>
            <th class="py-4 px-7 w-36 font-medium whitespace-nowrap">등록일</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="exam, stat : ${exams}" class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono whitespace-nowrap"
                th:text="${exams.size() - stat.index}">1</td>
            <td class="py-4 px-7">
              <a th:href="@{/classroom/detail/{sn}/exams/{examSn}(sn=${classroom.classSn},examSn=${exam.examSn})}"
                 class="font-semibold text-slate-800 hover:text-blue-600 transition-colors text-sm"
                 th:text="${exam.examRegNm}">시험명</a>
            </td>
            <td class="py-4 px-7 text-center">
              <span class="text-sm font-semibold text-slate-700" th:text="${exam.qstnCnt + '문항'}">0문항</span>
            </td>
            <td class="py-4 px-7 text-sm font-mono text-slate-400 whitespace-nowrap">
              <span th:if="${exam.examStrtDt == null and exam.examEndDt == null}" class="text-slate-300">-</span>
              <span th:unless="${exam.examStrtDt == null and exam.examEndDt == null}"
                    th:text="${(exam.examStrtDt != null ? exam.examStrtDt : '?') + ' ~ ' + (exam.examEndDt != null ? exam.examEndDt : '?')}">-</span>
            </td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono whitespace-nowrap"
                th:text="${exam.examRegDt != null ? #strings.substring(exam.examRegDt, 0, 10) : '-'}">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${exams.size()}">0</span>건
      </p>
    </div>
  </div>

</div>
</body>
</html>
