<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${editAssignment != null} ? (${classroom.classNm} + ' | 과제 수정') : (${classroom.classNm} + ' | 과제 등록'),
    ${classroom},
    'assignments',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100">
      <h2 class="text-base font-bold text-slate-800"
          th:text="${editAssignment != null} ? '과제 수정' : '과제 등록'">과제 등록</h2>
    </div>

    <form th:action="${editAssignment != null}
                      ? @{/classroom/detail/{sn}/assignments/{asgmtSn}/edit(sn=${classroom.classSn},asgmtSn=${editAssignment.asgmtSn})}
                      : @{/classroom/detail/{sn}/assignments/write(sn=${classroom.classSn})}"
          method="post"
          class="p-7 flex flex-col gap-5">

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-600">제목</label>
        <input type="text" name="asgmtSj"
               th:value="${editAssignment != null} ? ${editAssignment.asgmtSj} : ''"
               placeholder="과제 제목을 입력하세요"
               class="w-full text-sm px-4 py-3 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors"
               required />
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-600">내용</label>
        <textarea name="asgmtCn" rows="6" placeholder="과제 내용을 입력하세요"
                  th:text="${editAssignment != null} ? ${editAssignment.asgmtCn} : ''"
                  class="w-full text-sm px-4 py-3 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors resize-none"
                  required></textarea>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-slate-600">제출 마감일</label>
        <input type="datetime-local" name="sbmtDdlnDt"
               th:value="${editAssignment != null and editAssignment.sbmtDdlnDt != null}
                          ? ${#temporals.format(editAssignment.sbmtDdlnDt, 'yyyy-MM-dd''T''HH:mm')}
                          : ''"
               class="w-64 text-sm px-4 py-3 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors" />
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <a th:href="${editAssignment != null}
                     ? @{/classroom/detail/{sn}/assignments/{asgmtSn}(sn=${classroom.classSn},asgmtSn=${editAssignment.asgmtSn})}
                     : @{/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
           class="text-sm font-semibold px-5 py-2.5 text-slate-500 hover:text-slate-700 border border-slate-100 rounded-lg transition-colors">취소</a>
        <button type="submit"
                class="text-sm font-semibold px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                th:text="${editAssignment != null} ? '수정' : '등록'">등록</button>
      </div>
    </form>
  </div>

</div>
</body>
</html>
