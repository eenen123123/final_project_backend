<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 수강생 목록',
    ${classroom},
    'members',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100">
      <h2 class="text-base font-bold text-slate-800">수강생 목록</h2>
      <p class="text-sm text-slate-400 mt-1">이 클래스에 등록된 수강생 목록입니다.</p>
    </div>

    <div th:if="${#lists.isEmpty(memberPage.items)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-users"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 수강생이 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(memberPage.items)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm text-slate-400">
            <th class="py-4 px-7 w-14 font-medium whitespace-nowrap">번호</th>
            <th class="py-4 px-7 font-medium">이름</th>
            <th class="py-4 px-7 w-32 font-medium whitespace-nowrap">아이디</th>
            <th class="py-4 px-7 w-32 text-center font-medium whitespace-nowrap">수강 상태</th>
            <th class="py-4 px-7 w-36 font-medium whitespace-nowrap">등록일</th>
            <th class="py-4 px-7 w-44 font-medium whitespace-nowrap">진도율</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="member, stat : ${memberPage.items}"
              th:data-url="@{/classroom/detail/{sn}/members/{uid}(sn=${classroom.classSn},uid=${member.userId})}"
              onclick="location.href=this.dataset.url"
              class="border-b border-slate-50 hover:bg-slate-50 transition-colors cursor-pointer">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono whitespace-nowrap"
                th:text="${memberPage.totalCount - (currentPage - 1) * pageSize - stat.index}">1</td>
            <td class="py-4 px-7 font-semibold text-slate-800 text-sm" th:text="${member.userName}">홍길동</td>
            <td class="py-4 px-7 text-sm text-slate-500 font-mono whitespace-nowrap" th:text="${member.userId}">user123</td>
            <td class="py-4 px-7 text-center whitespace-nowrap">
              <th:block th:switch="${member.enrlStatCd}">
                <span th:case="${T(kr.or.ddit.finalProject.dto.classroom.EnrollStatus).ENROLLED}"
                      class="inline-flex items-center px-3 py-1 rounded-lg text-sm font-semibold text-blue-500 border border-blue-100">수강중</span>
                <span th:case="${T(kr.or.ddit.finalProject.dto.classroom.EnrollStatus).COMPLETED}"
                      class="inline-flex items-center px-3 py-1 rounded-lg text-sm font-semibold text-emerald-500 border border-emerald-100">수강완료</span>
                <span th:case="${T(kr.or.ddit.finalProject.dto.classroom.EnrollStatus).WITHDRAWN}"
                      class="inline-flex items-center px-3 py-1 rounded-lg text-sm font-semibold text-amber-500 border border-amber-100">중도탈퇴</span>
                <span th:case="${T(kr.or.ddit.finalProject.dto.classroom.EnrollStatus).CANCELLED}"
                      class="inline-flex items-center px-3 py-1 rounded-lg text-sm font-semibold text-slate-400 border border-slate-100">등록취소</span>
              </th:block>
            </td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono whitespace-nowrap" th:text="${member.formattedRegDt}">2026-01-01</td>
            <td class="py-4 px-7 whitespace-nowrap">
              <div class="flex items-center gap-2">
                <div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full"
                       th:style="'width:' + ${member.progressRate} + '%;'"
                       th:classappend="${member.progressRate >= 80 ? 'bg-emerald-400' : (member.progressRate >= 40 ? 'bg-amber-400' : 'bg-slate-300')}"></div>
                </div>
                <span class="text-sm font-semibold text-slate-600"
                      th:text="${member.progressRate} + '%'">0%</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100 flex items-center justify-between">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${memberPage.totalCount}">0</span>명
      </p>
      <div th:if="${totalPages > 1}" class="flex items-center gap-1">
        <a th:if="${currentPage > 1}"
           th:href="@{/classroom/detail/{sn}/members(sn=${classroom.classSn},page=${currentPage - 1})}"
           class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <th:block th:each="p : ${#numbers.sequence(1, totalPages)}">
          <a th:href="@{/classroom/detail/{sn}/members(sn=${classroom.classSn},page=${p})}"
             th:text="${p}"
             th:classappend="${p == currentPage} ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'"
             class="px-3 py-1.5 text-sm rounded-lg transition-colors font-medium">1</a>
        </th:block>
        <a th:if="${currentPage < totalPages}"
           th:href="@{/classroom/detail/{sn}/members(sn=${classroom.classSn},page=${currentPage + 1})}"
           class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fa-solid fa-chevron-right text-xs"></i>
        </a>
      </div>
    </div>
  </div>

</div>
</body>
</html>
