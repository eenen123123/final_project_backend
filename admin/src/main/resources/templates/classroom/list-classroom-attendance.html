<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 출결 관리',
    ${classroom},
    'attendance',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">

    <!-- 헤더: 제목 + 날짜 선택 -->
    <div class="px-7 py-5 border-b border-slate-200 flex items-center justify-between gap-4">
      <div>
        <h2 class="text-base font-bold text-slate-800">출결 관리</h2>
        <p class="text-sm text-slate-400 mt-1">날짜를 선택하고 수강생별 출결을 입력한 뒤 저장하세요.</p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <input type="date" id="datePicker"
               th:value="${targetDate}"
               class="text-sm border border-slate-200 rounded-lg px-3 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-200" />
        <button onclick="changeDate()"
                class="text-sm px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-lg transition-colors">
          조회
        </button>
      </div>
    </div>

    <!-- 수강생 없음 -->
    <div th:if="${#lists.isEmpty(attendanceRows)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-clipboard-check"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 수강생이 없습니다.</p>
    </div>

    <!-- 출결 테이블 -->
    <form th:unless="${#lists.isEmpty(attendanceRows)}" id="attendanceForm">
      <input type="hidden" name="date" th:value="${targetDate}" />
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-200 text-sm text-slate-400">
              <th class="py-4 px-7 w-14 font-medium">#</th>
              <th class="py-4 px-7 font-medium">이름</th>
              <th class="py-4 px-7 w-24 text-center font-medium">출석</th>
              <th class="py-4 px-7 w-24 text-center font-medium">지각</th>
              <th class="py-4 px-7 w-24 text-center font-medium">결석</th>
              <th class="py-4 px-7 w-24 text-center font-medium">조퇴</th>
            </tr>
          </thead>
          <tbody class="text-slate-700">
            <tr th:each="row, stat : ${attendanceRows}"
                class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
              <td class="py-4 px-7 text-sm text-slate-300 font-mono"
                  th:text="${stat.count}">1</td>
              <td class="py-4 px-7 text-sm font-semibold text-slate-800"
                  th:text="${row.studentName}">홍길동</td>
              <!-- 출석 -->
              <td class="py-4 px-7 text-center">
                <input type="radio"
                       th:name="'status_' + ${row.studentId}"
                       value="ATTEND"
                       th:checked="${row.status == 'ATTEND'}"
                       class="w-4 h-4 accent-emerald-500 cursor-pointer" />
              </td>
              <!-- 지각 -->
              <td class="py-4 px-7 text-center">
                <input type="radio"
                       th:name="'status_' + ${row.studentId}"
                       value="LATE"
                       th:checked="${row.status == 'LATE'}"
                       class="w-4 h-4 accent-amber-500 cursor-pointer" />
              </td>
              <!-- 결석 -->
              <td class="py-4 px-7 text-center">
                <input type="radio"
                       th:name="'status_' + ${row.studentId}"
                       value="ABSENT"
                       th:checked="${row.status == 'ABSENT'}"
                       class="w-4 h-4 accent-red-500 cursor-pointer" />
              </td>
              <!-- 조퇴 -->
              <td class="py-4 px-7 text-center">
                <input type="radio"
                       th:name="'status_' + ${row.studentId}"
                       value="EARLY_LEAVE"
                       th:checked="${row.status == 'EARLY_LEAVE'}"
                       class="w-4 h-4 accent-slate-400 cursor-pointer" />
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 저장 버튼 -->
      <div class="px-7 py-4 border-t border-slate-200 flex items-center justify-between">
        <p class="text-sm text-slate-400">
          총 <span class="font-semibold text-slate-600"
                   th:text="${#lists.size(attendanceRows)}">0</span>명
        </p>
        <button type="button" onclick="saveAttendance()"
                class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors">
          저장
        </button>
      </div>
    </form>

  </div>

  <script th:inline="javascript">
    const classSn   = /*[[${classroom.classSn}]]*/ 0;
    const startYmd  = /*[[${classroom.enrlStrtYmd}]]*/ null;
    const endYmd    = /*[[${classroom.enrlEndYmd}]]*/ null;

    // YYYY.MM.DD → YYYY-MM-DD 정규화 (DB 포맷 무관하게 처리)
    function toIsoDate(v) {
      if (!v) return null;
      return v.replace(/\./g, '-').substring(0, 10);
    }

    document.addEventListener('DOMContentLoaded', function () {
      const picker = document.getElementById('datePicker');
      const min = toIsoDate(startYmd);
      const max = toIsoDate(endYmd);
      if (min) picker.min = min;
      if (max) picker.max = max;
    });

    function changeDate() {
      const date = document.getElementById('datePicker').value;
      if (!date) return;
      location.href = `/classroom/detail/${classSn}/attendance?date=${date}`;
    }

    document.getElementById('datePicker')?.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') changeDate();
    });

    function saveAttendance() {
      const form = document.getElementById('attendanceForm');
      const data = new URLSearchParams(new FormData(form));

      fetch(`/classroom/detail/${classSn}/attendance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: data.toString()
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          showToast('출결이 저장되었습니다.', 'success');
        } else {
          showToast('저장에 실패했습니다.', 'error');
        }
      })
      .catch(() => showToast('저장 중 오류가 발생했습니다.', 'error'));
    }

    function showToast(msg, type) {
      const colors = type === 'success'
        ? 'bg-emerald-600 text-white'
        : 'bg-red-500 text-white';
      const toast = document.createElement('div');
      toast.className = `fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl text-sm font-semibold shadow-lg transition-all ${colors}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }
  </script>

</div>
</body>
</html>
