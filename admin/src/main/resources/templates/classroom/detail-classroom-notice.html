<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 공지 상세',
    ${classroom},
    'notice',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div th:if="${notice != null}" class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100">
      <h1 class="text-base font-bold text-slate-800" th:text="${notice.postSj}">공지 제목</h1>
      <div class="flex items-center gap-3 mt-2 text-sm text-slate-400">
        <span th:text="${notice.memberDto != null ? notice.memberDto.userName : notice.wrtrUserId}">작성자</span>
        <span class="w-px h-3 bg-slate-200"></span>
        <span th:text="${notice.regDt != null ? #temporals.format(notice.regDt, 'yyyy-MM-dd HH:mm') : '-'}">2026-06-01 09:00</span>
        <span class="w-px h-3 bg-slate-200"></span>
        <span>조회 <span th:text="${notice.inqCnt}">0</span></span>
      </div>
    </div>
    <div class="px-7 py-7 text-sm text-slate-700 leading-relaxed min-h-[200px]"
         th:utext="${notice.postCn}">공지 내용</div>

    <div th:if="${not #lists.isEmpty(attachedFiles)}"
         class="px-7 py-5 border-t border-slate-100 flex flex-col gap-2">
      <p class="text-sm font-semibold text-slate-500 mb-1">첨부파일</p>
      <div th:each="f : ${attachedFiles}"
           class="flex items-center gap-3 rounded-lg border border-slate-100 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 transition-colors">
        <i class="fa-solid fa-paperclip text-slate-300"></i>
        <span th:text="${f.orgnFileNm}" class="flex-1 truncate"></span>
        <span class="text-slate-400 text-sm"
              th:text="${#numbers.formatDecimal(f.fileSizeCnt / 1024.0, 1, 1) + ' KB'}"></span>
        <a th:href="@{/admin/files/{id}/download(id=${f.fileServerId})}"
           class="text-blue-500 hover:text-blue-700 transition-colors">
          <i class="fa-solid fa-download"></i>
        </a>
      </div>
    </div>

    <div class="px-7 py-4 border-t border-slate-100 flex justify-between items-center">
      <a th:href="@{/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
         class="text-sm font-semibold text-slate-400 hover:text-slate-600 flex items-center gap-2 transition-colors">
        <i class="fa-solid fa-arrow-left text-xs"></i> 목록으로
      </a>
      <div class="flex items-center gap-4">
        <a th:href="@{/classroom/detail/{sn}/notice/{postSn}/edit(sn=${classroom.classSn},postSn=${notice.postSn})}"
           class="text-sm font-semibold text-slate-500 hover:text-slate-700 transition-colors">수정</a>
        <form th:action="@{/classroom/detail/{sn}/notice/{postSn}/delete(sn=${classroom.classSn},postSn=${notice.postSn})}"
              method="post"
              onsubmit="return confirm('삭제하시겠습니까?')">
          <button type="submit"
                  class="text-sm font-semibold text-rose-400 hover:text-rose-600 transition-colors">삭제</button>
        </form>
      </div>
    </div>
  </div>

  <div th:unless="${notice != null}"
       class="bg-white border border-slate-100 rounded-xl p-20 flex flex-col items-center justify-center text-center gap-4">
    <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
      <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    <p class="text-base font-medium text-slate-400">존재하지 않는 공지사항입니다.</p>
    <a th:href="@{/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
       class="text-sm font-semibold text-blue-500 hover:text-blue-700 transition-colors">목록으로 돌아가기</a>
  </div>

</div>
</body>
</html>
