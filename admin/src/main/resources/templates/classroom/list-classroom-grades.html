<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 약점 분석',
    ${classroom},
    'grades',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <!-- 데이터가 하나도 없을 때 -->
  <div th:if="${#lists.isEmpty(weakPoints) and #lists.isEmpty(difficultyStats) and #lists.isEmpty(examTrend)}"
       class="bg-white border border-slate-100 rounded-xl p-20 flex flex-col items-center justify-center text-center gap-4">
    <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
      <i class="fa-solid fa-chart-bar"></i>
    </div>
    <div>
      <p class="text-base font-semibold text-slate-500">아직 분석할 데이터가 없습니다</p>
      <p class="text-sm text-slate-400 mt-1">
        세부 주제가 설정된 문항을 채점하거나 시험이 완료되면 분석이 표시됩니다.
      </p>
    </div>
  </div>

  <div th:unless="${#lists.isEmpty(weakPoints) and #lists.isEmpty(difficultyStats) and #lists.isEmpty(examTrend)}"
       class="flex flex-col gap-5">

    <!-- 상단 2개 차트 -->
    <div class="grid grid-cols-2 gap-5">

      <!-- 난이도별 득점률 (도넛) -->
      <div class="bg-white border border-slate-100 rounded-xl p-6">
        <h3 class="text-sm font-bold text-slate-700 mb-4">
          <i class="fa-solid fa-layer-group mr-1.5 text-violet-400"></i>난이도별 평균 득점률
        </h3>
        <div th:if="${#lists.isEmpty(difficultyStats)}" class="flex items-center justify-center h-48 text-slate-300 text-sm">
          데이터 없음
        </div>
        <div th:unless="${#lists.isEmpty(difficultyStats)}" class="flex items-center gap-6">
          <div class="relative" style="width:160px;height:160px;flex-shrink:0;">
            <canvas id="difficultyChart"></canvas>
          </div>
          <ul class="flex flex-col gap-2 text-sm flex-1">
            <li th:each="d : ${difficultyStats}" class="flex items-center justify-between gap-2">
              <span class="flex items-center gap-1.5">
                <span th:if="${d.diffCd == 'EASY'}"   class="w-2.5 h-2.5 rounded-full bg-emerald-400 shrink-0"></span>
                <span th:if="${d.diffCd == 'MEDIUM'}" class="w-2.5 h-2.5 rounded-full bg-amber-400 shrink-0"></span>
                <span th:if="${d.diffCd == 'HARD'}"   class="w-2.5 h-2.5 rounded-full bg-rose-400 shrink-0"></span>
                <span th:if="${d.diffCd == 'NONE'}"   class="w-2.5 h-2.5 rounded-full bg-slate-300 shrink-0"></span>
                <span th:text="${d.diffCd == 'EASY' ? '쉬움' : (d.diffCd == 'MEDIUM' ? '보통' : (d.diffCd == 'HARD' ? '어려움' : '미설정'))}"></span>
              </span>
              <span class="font-semibold text-slate-700" th:text="${d.avgScoreRate} + '%'"></span>
            </li>
          </ul>
        </div>
      </div>

      <!-- 시험별 득점률 추이 (꺾은선) -->
      <div class="bg-white border border-slate-100 rounded-xl p-6">
        <h3 class="text-sm font-bold text-slate-700 mb-4">
          <i class="fa-solid fa-arrow-trend-up mr-1.5 text-sky-400"></i>시험별 평균 득점률 추이
        </h3>
        <div th:if="${#lists.isEmpty(examTrend)}" class="flex items-center justify-center h-48 text-slate-300 text-sm">
          완료된 시험 없음
        </div>
        <div th:unless="${#lists.isEmpty(examTrend)}" style="height:160px;">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <!-- 세부 주제별 약점 (가로 막대) -->
    <div class="bg-white border border-slate-100 rounded-xl p-6">
      <h3 class="text-sm font-bold text-slate-700 mb-1">
        <i class="fa-solid fa-bullseye mr-1.5 text-rose-400"></i>세부 주제별 약점 분석
      </h3>
      <p class="text-xs text-slate-400 mb-4">득점률 낮은 순 정렬 &middot; 주제당 5건 이상 채점 시 표시</p>
      <div th:if="${#lists.isEmpty(weakPoints)}" class="flex items-center justify-center h-32 text-slate-300 text-sm">
        세부 주제가 설정된 채점 데이터가 없습니다
      </div>
      <div th:unless="${#lists.isEmpty(weakPoints)}" style="min-height:120px;">
        <canvas id="weakpointChart"></canvas>
      </div>
    </div>

  </div>

  <!-- Chart.js 데이터 (Thymeleaf → JS) -->
  <script th:inline="javascript">
    var _difficultyData = {
      labels: [],
      rates:  [],
      counts: []
    };
    /*[# th:each="d : ${difficultyStats}"]*/
    _difficultyData.labels.push(
      /*[[${d.diffCd == 'EASY' ? '쉬움' : (d.diffCd == 'MEDIUM' ? '보통' : (d.diffCd == 'HARD' ? '어려움' : '미설정'))}]]*/''
    );
    _difficultyData.rates.push(/*[[${d.avgScoreRate}]]*/0);
    _difficultyData.counts.push(/*[[${d.answerCount}]]*/0);
    /*[/]*/

    var _trendData = {
      labels: [],
      rates:  [],
      counts: []
    };
    /*[# th:each="t : ${examTrend}"]*/
    _trendData.labels.push(/*[[${t.examNm}]]*/'' );
    _trendData.rates.push(/*[[${t.avgScoreRate}]]*/0);
    _trendData.counts.push(/*[[${t.takerCount}]]*/0);
    /*[/]*/

    var _weakpointData = {
      labels: [],
      rates:  [],
      counts: []
    };
    /*[# th:each="w : ${weakPoints}"]*/
    _weakpointData.labels.push(/*[[${w.topic}]]*/'' );
    _weakpointData.rates.push(/*[[${w.avgScoreRate}]]*/0);
    _weakpointData.counts.push(/*[[${w.answerCount}]]*/0);
    /*[/]*/
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // ── 공통 색상 함수
    function rateColor(rate, alpha) {
      if (rate < 60)  return 'rgba(251,113,133,' + alpha + ')';   // rose-400
      if (rate <= 75) return 'rgba(251,191, 36,' + alpha + ')';   // amber-400
      return                  'rgba( 52,211,153,' + alpha + ')';  // emerald-400
    }

    // ── 도넛 차트 (난이도별)
    var diffCtx = document.getElementById('difficultyChart');
    if (diffCtx && _difficultyData.labels.length) {
      var diffColors = {
        '쉬움':   'rgba(52,211,153,0.85)',
        '보통':   'rgba(251,191,36,0.85)',
        '어려움': 'rgba(251,113,133,0.85)',
        '미설정': 'rgba(148,163,184,0.85)'
      };
      new Chart(diffCtx, {
        type: 'doughnut',
        data: {
          labels: _difficultyData.labels,
          datasets: [{
            data: _difficultyData.rates,
            backgroundColor: _difficultyData.labels.map(function(l) { return diffColors[l] || 'rgba(148,163,184,0.85)'; }),
            borderWidth: 2,
            borderColor: '#fff'
          }]
        },
        options: {
          cutout: '68%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var i = ctx.dataIndex;
                  return ' ' + ctx.label + ': ' + ctx.raw + '% (' + _difficultyData.counts[i] + '건)';
                }
              }
            }
          }
        }
      });
    }

    // ── 꺾은선 차트 (시험 추이)
    var trendCtx = document.getElementById('trendChart');
    if (trendCtx && _trendData.labels.length) {
      new Chart(trendCtx, {
        type: 'line',
        data: {
          labels: _trendData.labels,
          datasets: [{
            label: '평균 득점률',
            data: _trendData.rates,
            borderColor: 'rgba(56,189,248,0.9)',
            backgroundColor: 'rgba(56,189,248,0.12)',
            pointBackgroundColor: 'rgba(56,189,248,1)',
            pointRadius: 5,
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          scales: {
            y: {
              min: 0, max: 100,
              ticks: { callback: function(v) { return v + '%'; }, font: { size: 11 } },
              grid: { color: 'rgba(0,0,0,0.05)' }
            },
            x: { ticks: { font: { size: 11 }, maxRotation: 30 } }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var i = ctx.dataIndex;
                  return ' ' + ctx.raw + '% (' + _trendData.counts[i] + '명 응시)';
                }
              }
            }
          }
        }
      });
    }

    // ── 가로 막대 차트 (세부 주제 약점)
    var wpCtx = document.getElementById('weakpointChart');
    if (wpCtx && _weakpointData.labels.length) {
      var barColors = _weakpointData.rates.map(function(r) { return rateColor(r, 0.8); });
      var barH = Math.max(160, _weakpointData.labels.length * 40);
      wpCtx.parentElement.style.height = barH + 'px';
      wpCtx.height = barH;

      new Chart(wpCtx, {
        type: 'bar',
        data: {
          labels: _weakpointData.labels,
          datasets: [{
            label: '평균 득점률',
            data: _weakpointData.rates,
            backgroundColor: barColors,
            borderRadius: 4,
            borderSkipped: false
          }]
        },
        options: {
          indexAxis: 'y',
          scales: {
            x: {
              min: 0, max: 100,
              ticks: { callback: function(v) { return v + '%'; }, font: { size: 11 } },
              grid: { color: 'rgba(0,0,0,0.05)' }
            },
            y: { ticks: { font: { size: 12 } } }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var i = ctx.dataIndex;
                  return ' 득점률 ' + ctx.raw + '% (' + _weakpointData.counts[i] + '건 분석)';
                }
              }
            }
          }
        }
      });
    }
  </script>

</div>
</body>
</html>
