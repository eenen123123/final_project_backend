<!DOCTYPE html>
<html th:replace="~{classroom/fragments :: layout(
    ${classroom.classNm} + ' | ' + ${lecture.lectureNm},
    ${classroom},
    'lectures',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <!-- 강의 기본 정보 -->
  <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden mb-4">
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <div>
        <h2 class="text-sm font-bold text-slate-700" th:text="${lecture.lectureNm}">강의명</h2>
        <p class="text-xs text-slate-400 mt-0.5"
           th:with="dur=${lecture.lectureDuration}"
           th:text="${dur != null ? '재생 시간 ' + (dur / 60) + ':' + #strings.leftPad('' + (dur % 60), 2, '0') : '재생 시간 정보 없음'}">재생 시간</p>
      </div>
      <div class="flex items-center gap-2">
        <span th:classappend="${lecture.opnnYn == 'Y' ? 'bg-blue-50 text-blue-600' : 'bg-slate-100 text-slate-400'}"
              class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full">
          <i class="fa-solid fa-eye text-[10px]"></i>
          <span th:text="${lecture.opnnYn == 'Y' ? '공개' : '비공개'}">공개</span>
        </span>
        <span th:classappend="${lecture.lockYn == 'Y' ? 'bg-amber-50 text-amber-600' : 'bg-slate-100 text-slate-400'}"
              class="inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full">
          <i class="fa-solid fa-lock text-[10px]"></i>
          <span th:text="${lecture.lockYn == 'Y' ? '잠김' : '잠금 해제'}">잠금 해제</span>
        </span>
        <a th:href="@{/classroom/detail/{classSn}/lectures(classSn=${classroom.classSn})}"
           class="text-xs text-slate-400 hover:text-slate-600 transition-colors ml-2">
          <i class="fa-solid fa-arrow-left mr-1"></i>목록으로
        </a>
      </div>
    </div>
  </div>

  <!-- 수강생 진도 현황 -->
  <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">수강생 진도 현황</h2>
      <p class="text-xs text-slate-400 mt-0.5">이 강의를 완료한 수강생 목록입니다.</p>
    </div>

    <div th:if="${#lists.isEmpty(studentProgress)}"
         class="p-12 flex flex-col items-center justify-center text-center gap-3">
      <p class="text-sm font-medium text-slate-500">수강생이 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(studentProgress)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider uppercase">
            <th class="py-3 px-6 w-12">#</th>
            <th class="py-3 px-6">수강생</th>
            <th class="py-3 px-6 w-28 text-center">완료 여부</th>
            <th class="py-3 px-6 w-44">완료일시</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <tr th:each="s, stat : ${studentProgress}" class="hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-6 text-xs text-slate-400 font-mono" th:text="${stat.count}">1</td>
            <td class="py-3 px-6 font-semibold text-slate-800" th:text="${s.userName}">홍길동</td>
            <td class="py-3 px-6 text-center">
              <span th:if="${s.cmplYn == 'Y'}"
                    class="inline-flex items-center gap-1 text-xs font-semibold text-emerald-600 bg-emerald-50 px-2.5 py-0.5 rounded-full">
                <i class="fa-solid fa-check text-[10px]"></i> 완료
              </span>
              <span th:unless="${s.cmplYn == 'Y'}"
                    class="inline-flex items-center gap-1 text-xs font-semibold text-slate-400 bg-slate-100 px-2.5 py-0.5 rounded-full">
                <i class="fa-solid fa-minus text-[10px]"></i> 미완료
              </span>
            </td>
            <td class="py-3 px-6 text-xs text-slate-400 font-mono"
                th:text="${s.cmplDt != null ? s.cmplDt : '-'}">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div th:unless="${#lists.isEmpty(studentProgress)}" class="border-t border-slate-100 px-6 py-3 bg-slate-50/50">
      <p class="text-xs text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(studentProgress)}">0</span>명 중
        <span class="font-semibold text-emerald-600"
              th:text="${studentProgress.?[cmplYn.equals('Y')].size()}">0</span>명 완료
      </p>
    </div>
  </div>

</div>
</body>
</html>
