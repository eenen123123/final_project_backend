<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | ' + ${lecture.lectureNm},
    ${classroom},
    'lectures',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head></head>

<body>
  <div id="content">

    <!-- 강의 기본 정보 -->
    <div class="bg-white border border-slate-100 rounded-xl overflow-hidden mb-5">
      <div class="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
        <div>
          <h2 class="text-base font-bold text-slate-800" th:text="${lecture.lectureNm}">강의명</h2>
          <p class="text-sm text-slate-400 mt-1" th:with="dur=${lecture.lectureDuration}"
            th:text="${dur != null ? '재생 시간 ' + (dur / 60) + ':' + (dur % 60 < 10 ? '0' + (dur % 60) : '' + (dur % 60)) : '재생 시간 정보 없음'}">
            재생 시간</p>
        </div>
        <div class="flex items-center gap-2">
          <span
            th:classappend="${lecture.opnnYn == 'Y' ? 'text-blue-500 border-blue-100' : 'text-slate-400 border-slate-100'}"
            class="inline-flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-lg border">
            <i class="fa-solid fa-eye text-xs"></i>
            <span th:text="${lecture.opnnYn == 'Y' ? '공개' : '비공개'}">공개</span>
          </span>
          <span
            th:classappend="${lecture.lockYn == 'Y' ? 'text-amber-500 border-amber-100' : 'text-slate-400 border-slate-100'}"
            class="inline-flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-lg border">
            <i class="fa-solid fa-lock text-xs"></i>
            <span th:text="${lecture.lockYn == 'Y' ? '잠김' : '잠금 해제'}">잠금 해제</span>
          </span>
          <a th:href="@{/classroom/detail/{classSn}/lectures(classSn=${classroom.classSn})}"
            class="text-sm text-slate-400 hover:text-slate-600 transition-colors ml-3 flex items-center gap-1.5">
            <i class="fa-solid fa-arrow-left text-xs"></i>목록으로
          </a>
        </div>
      </div>
    </div>

  <!-- 강의 영상 -->
  <div th:if="${lecture.atchFileId != null}"
       class="bg-white border border-slate-100 rounded-xl overflow-hidden mb-5">
    <div class="px-7 py-5 border-b border-slate-100">
      <h2 class="text-base font-bold text-slate-800">강의 영상</h2>
    </div>
    <div class="p-7">
      <video controls
             class="w-full aspect-video rounded-lg bg-black"
             th:src="@{/admin/files/{id}/view(id=${lecture.atchFileId})}">
        영상을 재생할 수 없습니다.
      </video>
    </div>
  </div>

    <!-- 수강생 진도 현황 -->
    <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
      <div class="px-7 py-5 border-b border-slate-100">
        <h2 class="text-base font-bold text-slate-800">수강생 진도 현황</h2>
        <p class="text-sm text-slate-400 mt-1">이 강의를 완료한 수강생 목록입니다.</p>
      </div>

      <div th:if="${#lists.isEmpty(studentProgress)}"
        class="p-16 flex flex-col items-center justify-center text-center gap-4">
        <p class="text-base font-medium text-slate-400">수강생이 없습니다.</p>
      </div>

      <div th:unless="${#lists.isEmpty(studentProgress)}" class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-sm text-slate-400">
              <th class="py-4 px-7 w-14 font-medium">#</th>
              <th class="py-4 px-7 font-medium">수강생</th>
              <th class="py-4 px-7 w-32 text-center font-medium">완료 여부</th>
              <th class="py-4 px-7 w-48 font-medium">완료일시</th>
            </tr>
          </thead>
          <tbody class="text-slate-700">
            <tr th:each="s, stat : ${studentProgress}"
              class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
              <td class="py-4 px-7 text-sm text-slate-300 font-mono" th:text="${stat.count}">1</td>
              <td class="py-4 px-7 font-semibold text-slate-800 text-sm" th:text="${s.userName}">홍길동</td>
              <td class="py-4 px-7 text-center">
                <span th:if="${s.cmplYn == 'Y'}"
                  class="inline-flex items-center gap-1.5 text-sm font-semibold text-emerald-500 bg-emerald-50 border border-emerald-100 px-3 py-1 rounded-lg whitespace-nowrap">
                  완료
                </span>
                <span th:unless="${s.cmplYn == 'Y'}"
                  class="inline-flex items-center gap-1.5 text-sm font-semibold text-slate-400 border border-slate-100 px-3 py-1 rounded-lg whitespace-nowrap">
                  미완료
                </span>
              </td>
              <td class="py-4 px-7 text-sm text-slate-400 font-mono" th:text="${s.cmplDt != null ? s.cmplDt : '-'}">-
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div th:unless="${#lists.isEmpty(studentProgress)}" class="px-7 py-4 border-t border-slate-100">
        <p class="text-sm text-slate-400">
          전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(studentProgress)}">0</span>명 중
          <span class="font-semibold text-emerald-500"
            th:text="${studentProgress.?[cmplYn.equals('Y')].size()}">0</span>명 완료
        </p>
      </div>
    </div>

  </div>
</body>

</html>
