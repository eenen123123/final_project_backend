<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 과제 제출',
    ${classroom},
    'assignments',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
      <div>
        <h2 class="text-base font-bold text-slate-800">과제 목록</h2>
        <p class="text-sm text-slate-400 mt-1">수강생에게 부여한 과제 목록입니다.</p>
      </div>
      <button onclick="document.getElementById('writeForm').classList.toggle('hidden')"
              class="text-sm font-semibold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
        <i class="fa-solid fa-plus text-xs"></i> 과제 등록
      </button>
    </div>

    <div id="writeForm" class="hidden border-b border-slate-100 p-7">
      <form th:action="@{/classroom/detail/{sn}/assignments/write(sn=${classroom.classSn})}" method="post">
        <div class="flex flex-col gap-4">
          <input type="text" name="asgmtSj" placeholder="과제 제목"
                 class="w-full text-sm px-4 py-3 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors" required />
          <textarea name="asgmtCn" placeholder="과제 내용" rows="3"
                    class="w-full text-sm px-4 py-3 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors resize-none" required></textarea>
          <div class="flex items-center gap-4">
            <label class="text-sm font-semibold text-slate-500">제출 마감일</label>
            <input type="datetime-local" name="sbmtDdlnDt"
                   class="text-sm px-4 py-2.5 border border-slate-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors" />
          </div>
          <div class="flex justify-end gap-3">
            <button type="button" onclick="document.getElementById('writeForm').classList.add('hidden')"
                    class="text-sm font-semibold px-5 py-2.5 text-slate-500 border border-slate-100 rounded-lg hover:text-slate-700 transition-colors">취소</button>
            <button type="submit"
                    class="text-sm font-semibold px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">등록</button>
          </div>
        </div>
      </form>
    </div>

    <div th:if="${#lists.isEmpty(assignmentList)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-file-lines"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 과제가 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(assignmentList)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm text-slate-400">
            <th class="py-4 px-7 w-14 font-medium">번호</th>
            <th class="py-4 px-7 font-medium">제목</th>
            <th class="py-4 px-7 w-36 text-center font-medium">제출 현황</th>
            <th class="py-4 px-7 w-44 font-medium">마감일</th>
            <th class="py-4 px-7 w-36 font-medium">등록일</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="asgmt, stat : ${assignmentList}" class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono"
                th:text="${assignmentList.size() - stat.index}">1</td>
            <td class="py-4 px-7">
              <a th:href="@{/classroom/detail/{sn}/assignments/{asgmtSn}(sn=${classroom.classSn},asgmtSn=${asgmt.asgmtSn})}"
                 class="font-semibold text-slate-800 hover:text-blue-600 transition-colors text-sm"
                 th:text="${asgmt.asgmtSj}">과제 제목</a>
            </td>
            <td class="py-4 px-7 text-center">
              <span class="text-sm font-semibold text-slate-700"
                    th:text="${asgmt.sbmtCnt + ' / ' + asgmt.totMemberCnt + '명'}">0 / 0명</span>
            </td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono"
                th:text="${asgmt.sbmtDdlnDt != null ? #temporals.format(asgmt.sbmtDdlnDt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono"
                th:text="${asgmt.regDt != null ? #temporals.format(asgmt.regDt, 'yyyy-MM-dd') : '-'}">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(assignmentList)}">0</span>건
      </p>
    </div>
  </div>

</div>
</body>
</html>
