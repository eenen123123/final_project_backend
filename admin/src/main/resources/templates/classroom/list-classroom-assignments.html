<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 과제 관리',
    ${classroom},
    'assignments',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
      <div>
        <h2 class="text-base font-bold text-slate-800">과제 목록</h2>
        <p class="text-sm text-slate-400 mt-1">수강생에게 부여한 과제 목록입니다.</p>
      </div>
      <a th:href="@{/classroom/detail/{sn}/assignments/write(sn=${classroom.classSn})}"
         class="text-sm font-semibold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
        <i class="fa-solid fa-plus text-xs"></i> 과제 등록
      </a>
    </div>

    <div th:if="${#lists.isEmpty(assignmentPage.items)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-file-lines"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 과제가 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(assignmentPage.items)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm text-slate-400">
            <th class="py-4 px-7 w-14 font-medium whitespace-nowrap">번호</th>
            <th class="py-4 px-7 font-medium">제목</th>
            <th class="py-4 px-7 w-36 text-center font-medium whitespace-nowrap">제출 현황</th>
            <th class="py-4 px-7 w-36 text-center font-medium whitespace-nowrap">채점 현황</th>
            <th class="py-4 px-7 w-44 font-medium whitespace-nowrap">마감일</th>
            <th class="py-4 px-7 w-36 font-medium whitespace-nowrap">등록일</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="asgmt, stat : ${assignmentPage.items}" class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono whitespace-nowrap"
                th:text="${assignmentPage.totalCount - (currentPage - 1) * pageSize - stat.index}">1</td>
            <td class="py-4 px-7">
              <a th:href="@{/classroom/detail/{sn}/assignments/{asgmtSn}(sn=${classroom.classSn},asgmtSn=${asgmt.asgmtSn})}"
                 class="font-semibold text-slate-800 hover:text-blue-600 transition-colors text-sm"
                 th:text="${asgmt.asgmtSj}">과제 제목</a>
            </td>
            <td class="py-4 px-7 text-center whitespace-nowrap">
              <span class="text-sm font-semibold text-slate-700"
                    th:text="${asgmt.sbmtCnt + ' / ' + asgmt.totMemberCnt + '명'}">0 / 0명</span>
            </td>
            <td class="py-4 px-7 text-center whitespace-nowrap">
              <span th:if="${asgmt.sbmtCnt == 0}" class="text-sm text-slate-300">-</span>
              <span th:if="${asgmt.sbmtCnt > 0 and asgmt.grddCnt < asgmt.sbmtCnt}"
                    class="text-sm font-semibold text-amber-500"
                    th:text="${asgmt.grddCnt + ' / ' + asgmt.sbmtCnt + '명'}">0 / 0명</span>
              <span th:if="${asgmt.sbmtCnt > 0 and asgmt.grddCnt == asgmt.sbmtCnt}"
                    class="text-sm font-semibold text-emerald-500"
                    th:text="${asgmt.grddCnt + ' / ' + asgmt.sbmtCnt + '명'}">0 / 0명</span>
            </td>
            <td class="py-4 px-7 text-sm font-mono whitespace-nowrap"
                th:if="${asgmt.sbmtDdlnDt == null}" th:text="'-'">-</td>
            <td th:if="${asgmt.sbmtDdlnDt != null}"
                th:class="${asgmt.sbmtDdlnDt.isBefore(#temporals.createNow())}
                           ? 'py-4 px-7 text-sm font-mono text-slate-300 whitespace-nowrap'
                           : 'py-4 px-7 text-sm font-mono text-slate-400 whitespace-nowrap'"
                th:text="${#temporals.format(asgmt.sbmtDdlnDt, 'yyyy-MM-dd HH:mm')}">-</td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono whitespace-nowrap"
                th:text="${asgmt.regDt != null ? #temporals.format(asgmt.regDt, 'yyyy-MM-dd') : '-'}">-</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100 flex items-center justify-between">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${assignmentPage.totalCount}">0</span>건
      </p>
      <div th:if="${totalPages > 1}" class="flex items-center gap-1">
        <a th:if="${currentPage > 1}"
           th:href="@{/classroom/detail/{sn}/assignments(sn=${classroom.classSn},page=${currentPage - 1})}"
           class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <th:block th:each="p : ${#numbers.sequence(1, totalPages)}">
          <a th:href="@{/classroom/detail/{sn}/assignments(sn=${classroom.classSn},page=${p})}"
             th:text="${p}"
             th:classappend="${p == currentPage} ? 'bg-blue-600 text-white' : 'text-slate-500 hover:bg-slate-100'"
             class="px-3 py-1.5 text-sm rounded-lg transition-colors font-medium">1</a>
        </th:block>
        <a th:if="${currentPage < totalPages}"
           th:href="@{/classroom/detail/{sn}/assignments(sn=${classroom.classSn},page=${currentPage + 1})}"
           class="px-3 py-1.5 text-sm text-slate-500 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors">
          <i class="fa-solid fa-chevron-right text-xs"></i>
        </a>
      </div>
    </div>
  </div>

</div>
</body>
</html>
