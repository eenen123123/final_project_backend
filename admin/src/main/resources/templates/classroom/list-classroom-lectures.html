<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 온라인 강의',
    ${classroom},
    'lectures',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100">
      <h2 class="text-base font-bold text-slate-800">강의 목록</h2>
      <p class="text-sm text-slate-400 mt-1">수강생의 강의별 완료 현황입니다.</p>
    </div>

    <div th:if="${#lists.isEmpty(lectureList)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-play-circle"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 강의가 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(lectureList)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm font-semibold text-slate-400">
            <th class="py-4 px-7 w-14 font-medium whitespace-nowrap">순서</th>
            <th class="py-4 px-7 font-medium">강의명</th>
            <th class="py-4 px-7 w-28 text-center font-medium whitespace-nowrap">재생 시간</th>
            <th class="py-4 px-7 w-40 text-center font-medium whitespace-nowrap">완료 현황</th>
            <th class="py-4 px-7 w-44 font-medium whitespace-nowrap">완료율</th>
            <th class="py-4 px-7 w-28 text-center font-medium whitespace-nowrap">공개/잠금</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="lec, stat : ${lectureList}"
              th:onclick="|location.href='@{/classroom/detail/{classSn}/lectures/{lectureSn}(classSn=${classroom.classSn},lectureSn=${lec.lectureSn})}'|"
              class="border-b border-slate-50 hover:bg-slate-50 transition-colors cursor-pointer">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono whitespace-nowrap" th:text="${stat.count}">1</td>
            <td class="py-4 px-7">
              <div class="flex items-center gap-3">
                <span class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-blue-400 text-sm flex-shrink-0">
                  <i class="fa-solid fa-play"></i>
                </span>
                <span class="font-semibold text-slate-800 text-sm" th:text="${lec.lectureNm}">강의명</span>
              </div>
            </td>
            <td class="py-4 px-7 text-center text-sm text-slate-400 font-mono whitespace-nowrap"
                th:with="dur=${lec.lectureDuration}"
                th:text="${dur != null ? (dur / 60) + ':' + (dur % 60 < 10 ? '0' + (dur % 60) : '' + (dur % 60)) : '-'}">-</td>
            <td class="py-4 px-7 text-center whitespace-nowrap">
              <span class="text-sm font-semibold text-slate-700"
                    th:text="${lec.cmplCnt + ' / ' + lec.totMemberCnt + '명'}">0 / 0명</span>
            </td>
            <td class="py-4 px-7">
              <div th:if="${lec.totMemberCnt > 0}" class="flex items-center gap-3">
                <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-blue-500 rounded-full"
                       th:style="'width: ' + ${(lec.cmplCnt * 100 / lec.totMemberCnt)} + '%'"></div>
                </div>
                <span class="text-sm font-semibold text-slate-500 w-9 text-right"
                      th:text="${lec.cmplCnt * 100 / lec.totMemberCnt} + '%'">0%</span>
              </div>
              <span th:unless="${lec.totMemberCnt > 0}" class="text-sm text-slate-200">-</span>
            </td>
            <td class="py-4 px-7 text-center" onclick="event.stopPropagation()">
              <div class="flex items-center justify-center gap-1">
                <button th:data-lecture-sn="${lec.lectureSn}"
                        th:data-class-sn="${classroom.classSn}"
                        th:data-current="${lec.opnnYn}"
                        th:title="${lec.opnnYn == 'Y' ? '공개 중 (클릭 시 비공개)' : '비공개 (클릭 시 공개)'}"
                        onclick="toggleLecture(this, 'opnn')"
                        th:classappend="${lec.opnnYn == 'Y' ? 'text-blue-500' : 'text-slate-300'}"
                        class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-slate-100 transition-colors">
                  <i class="fa-solid fa-eye text-base"></i>
                </button>
                <button th:data-lecture-sn="${lec.lectureSn}"
                        th:data-class-sn="${classroom.classSn}"
                        th:data-current="${lec.lockYn}"
                        th:title="${lec.lockYn == 'Y' ? '잠김 (클릭 시 잠금 해제)' : '잠금 해제 (클릭 시 잠금)'}"
                        onclick="toggleLecture(this, 'lock')"
                        th:classappend="${lec.lockYn == 'Y' ? 'text-amber-500' : 'text-slate-300'}"
                        class="w-9 h-9 rounded-lg flex items-center justify-center hover:bg-slate-100 transition-colors">
                  <i class="fa-solid fa-lock text-base"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(lectureList)}">0</span>개 강의
      </p>
    </div>
  </div>

</div>

<script>
function toggleLecture(btn, type) {
  const lectureSn = btn.dataset.lectureSn;
  const classSn   = btn.dataset.classSn;
  const url = `/classroom/detail/${classSn}/lectures/${lectureSn}/toggle-${type}`;

  fetch(url, { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error();
      const isActive = btn.dataset.current === 'Y';
      btn.dataset.current = isActive ? 'N' : 'Y';
      if (type === 'opnn') {
        btn.classList.toggle('text-blue-500', !isActive);
        btn.classList.toggle('text-slate-300', isActive);
        btn.title = !isActive ? '공개 중 (클릭 시 비공개)' : '비공개 (클릭 시 공개)';
      } else {
        btn.classList.toggle('text-amber-500', !isActive);
        btn.classList.toggle('text-slate-300', isActive);
        btn.title = !isActive ? '잠김 (클릭 시 잠금 해제)' : '잠금 해제 (클릭 시 잠금)';
      }
    })
    .catch(() => alert('처리 중 오류가 발생했습니다.'));
}
</script>
</body>
</html>
