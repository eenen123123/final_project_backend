<!DOCTYPE html>
<html th:replace="~{classroom/fragments :: layout(
    ${classroom.classNm} + ' | 온라인 강의',
    ${classroom},
    'lectures',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white rounded-2xl border border-slate-200/80 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">강의 목록</h2>
      <p class="text-xs text-slate-400 mt-0.5">수강생의 강의별 완료 현황입니다.</p>
    </div>

    <!-- 빈 목록 -->
    <div th:if="${#lists.isEmpty(lectureList)}"
         class="p-16 flex flex-col items-center justify-center text-center gap-3">
      <div class="w-14 h-14 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-2xl">
        <i class="fa-solid fa-play-circle"></i>
      </div>
      <p class="text-sm font-medium text-slate-500">등록된 강의가 없습니다.</p>
    </div>

    <!-- 강의 목록 -->
    <div th:unless="${#lists.isEmpty(lectureList)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider uppercase">
            <th class="py-3 px-6 w-12">순서</th>
            <th class="py-3 px-6">강의명</th>
            <th class="py-3 px-6 w-24 text-center">재생 시간</th>
            <th class="py-3 px-6 w-36 text-center">완료 현황</th>
            <th class="py-3 px-6 w-40">완료율</th>
            <th class="py-3 px-6 w-24 text-center">공개/잠금</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">
          <tr th:each="lec, stat : ${lectureList}"
              th:onclick="|location.href='${#request.getContextPath()}/classroom/detail/${classroom.classSn}/lectures/${lec.lectureSn}'|"
              class="hover:bg-slate-50/50 transition-colors cursor-pointer">
            <td class="py-3 px-6 text-xs text-slate-400 font-mono" th:text="${stat.count}">1</td>
            <td class="py-3 px-6">
              <div class="flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-blue-50 flex items-center justify-center text-blue-400 text-[10px] flex-shrink-0">
                  <i class="fa-solid fa-play"></i>
                </span>
                <span class="font-semibold text-slate-800" th:text="${lec.lectureNm}">강의명</span>
              </div>
            </td>
            <td class="py-3 px-6 text-center text-xs text-slate-400 font-mono"
                th:with="dur=${lec.lectureDuration}"
                th:text="${dur != null ? (dur / 60) + ':' + #strings.leftPad('' + (dur % 60), 2, '0') : '-'}">-</td>
            <td class="py-3 px-6 text-center">
              <span class="text-xs font-bold"
                    th:text="${lec.cmplCnt + ' / ' + lec.totMemberCnt + '명'}">0 / 0명</span>
            </td>
            <td class="py-3 px-6">
              <div th:if="${lec.totMemberCnt > 0}" class="flex items-center gap-2">
                <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full bg-blue-500 rounded-full transition-all"
                       th:style="'width: ' + ${(lec.cmplCnt * 100 / lec.totMemberCnt)} + '%'"></div>
                </div>
                <span class="text-xs font-bold text-slate-600 w-8 text-right"
                      th:text="${lec.cmplCnt * 100 / lec.totMemberCnt} + '%'">0%</span>
              </div>
              <span th:unless="${lec.totMemberCnt > 0}" class="text-xs text-slate-300">-</span>
            </td>
            <td class="py-3 px-6 text-center" onclick="event.stopPropagation()">
              <div class="flex items-center justify-center gap-2">
                <button th:data-lecture-sn="${lec.lectureSn}"
                        th:data-class-sn="${classroom.classSn}"
                        th:data-current="${lec.opnnYn}"
                        th:title="${lec.opnnYn == 'Y' ? '공개 중 (클릭 시 비공개)' : '비공개 (클릭 시 공개)'}"
                        onclick="toggleLecture(this, 'opnn')"
                        th:classappend="${lec.opnnYn == 'Y' ? 'text-blue-500' : 'text-slate-300'}"
                        class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors">
                  <i class="fa-solid fa-eye text-xs"></i>
                </button>
                <button th:data-lecture-sn="${lec.lectureSn}"
                        th:data-class-sn="${classroom.classSn}"
                        th:data-current="${lec.lockYn}"
                        th:title="${lec.lockYn == 'Y' ? '잠김 (클릭 시 잠금 해제)' : '잠금 해제 (클릭 시 잠금)'}"
                        onclick="toggleLecture(this, 'lock')"
                        th:classappend="${lec.lockYn == 'Y' ? 'text-amber-500' : 'text-slate-300'}"
                        class="w-7 h-7 rounded-full flex items-center justify-center hover:bg-slate-100 transition-colors">
                  <i class="fa-solid fa-lock text-xs"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div th:unless="${#lists.isEmpty(lectureList)}" class="border-t border-slate-100 px-6 py-3 bg-slate-50/50">
      <p class="text-xs text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(lectureList)}">0</span>개 강의
      </p>
    </div>
  </div>

</div>

<script>
function toggleLecture(btn, type) {
  const lectureSn = btn.dataset.lectureSn;
  const classSn   = btn.dataset.classSn;
  const url = `/classroom/detail/${classSn}/lectures/${lectureSn}/toggle-${type}`;

  fetch(url, { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error();
      const isActive = btn.dataset.current === 'Y';
      btn.dataset.current = isActive ? 'N' : 'Y';
      if (type === 'opnn') {
        btn.classList.toggle('text-blue-500', !isActive);
        btn.classList.toggle('text-slate-300', isActive);
        btn.title = !isActive ? '공개 중 (클릭 시 비공개)' : '비공개 (클릭 시 공개)';
      } else {
        btn.classList.toggle('text-amber-500', !isActive);
        btn.classList.toggle('text-slate-300', isActive);
        btn.title = !isActive ? '잠김 (클릭 시 잠금 해제)' : '잠금 해제 (클릭 시 잠금)';
      }
    })
    .catch(() => alert('처리 중 오류가 발생했습니다.'));
}
</script>
</body>
</html>
