<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 과제 채점',
    ${classroom},
    'assignments',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="flex flex-col gap-5">

    <a th:href="@{/classroom/detail/{sn}/assignments/{asgmtSn}(sn=${classroom.classSn},asgmtSn=${assignment.asgmtSn})}"
       class="text-sm font-semibold text-slate-400 hover:text-slate-600 flex items-center gap-2 transition-colors w-fit">
      <i class="fa-solid fa-arrow-left text-xs"></i> 제출 현황으로
    </a>

    <!-- 과제 정보 카드 -->
    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <div class="px-7 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wide">과제 안내</h2>
        <span th:if="${assignment.sbmtDdlnDt != null}"
              class="text-xs text-slate-400">
          마감:
          <span th:if="${assignment.sbmtDdlnDt.isAfter(now)}"
                class="font-semibold text-rose-500"
                th:text="${#temporals.format(assignment.sbmtDdlnDt, 'yyyy-MM-dd HH:mm')}"></span>
          <span th:unless="${assignment.sbmtDdlnDt.isAfter(now)}"
                class="font-semibold text-slate-400"
                th:text="${#temporals.format(assignment.sbmtDdlnDt, 'yyyy-MM-dd HH:mm')} + ' (마감)'"></span>
        </span>
      </div>
      <div class="px-7 py-5">
        <h1 class="text-base font-bold text-slate-800 mb-3" th:text="${assignment.asgmtSj}">과제 제목</h1>
        <div class="text-sm text-slate-600 leading-relaxed tiptap-content"
             th:utext="${assignment.asgmtCn}">과제 내용</div>
      </div>
    </div>

    <!-- 제출 내용 카드 -->
    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <div class="px-7 py-4 border-b border-slate-200 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-sm font-bold select-none"
               th:text="${#strings.substring(submit.userName, 0, 1)}">학</div>
          <div>
            <p class="text-sm font-bold text-slate-800" th:text="${submit.userName}">학생명</p>
            <p class="text-xs text-slate-400"
               th:text="${submit.sbmtDt != null ? #temporals.format(submit.sbmtDt, 'yyyy-MM-dd HH:mm') + ' 제출' : ''}"></p>
          </div>
        </div>
        <span th:if="${submit.grddYn == 'Y'}"
              class="inline-flex items-center gap-1.5 text-xs font-semibold text-emerald-600 bg-emerald-50 border border-emerald-100 px-2.5 py-1 rounded-lg">
          <i class="fa-solid fa-circle-check text-xs"></i> 채점 완료
        </span>
        <span th:unless="${submit.grddYn == 'Y'}"
              class="inline-flex items-center gap-1.5 text-xs font-semibold text-amber-600 bg-amber-50 border border-amber-100 px-2.5 py-1 rounded-lg">
          <i class="fa-solid fa-circle-exclamation text-xs"></i> 미채점
        </span>
      </div>

      <!-- 제출 본문 -->
      <div class="px-7 py-6 min-h-[120px]">
        <div th:if="${submit.sbmtCn != null and !#strings.isEmpty(submit.sbmtCn)}"
             class="text-sm text-slate-700 leading-relaxed tiptap-content"
             th:utext="${submit.sbmtCn}">제출 내용</div>
        <div th:unless="${submit.sbmtCn != null and !#strings.isEmpty(submit.sbmtCn)}"
             class="text-sm text-slate-300 italic">제출된 내용이 없습니다.</div>
      </div>

      <!-- 첨부파일 -->
      <div th:if="${not #lists.isEmpty(attachedFiles)}"
           class="px-7 py-5 border-t border-slate-200 flex flex-col gap-2">
        <p class="text-sm font-semibold text-slate-500 mb-1">첨부파일</p>
        <div th:each="f : ${attachedFiles}"
             class="flex items-center gap-3 rounded-lg border border-slate-200 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 transition-colors">
          <i class="fa-solid fa-paperclip text-slate-300"></i>
          <span th:text="${f.orgnFileNm}" class="flex-1 truncate"></span>
          <span class="text-slate-400 text-xs"
                th:text="${#numbers.formatDecimal(f.fileSizeCnt / 1024.0, 1, 1) + ' KB'}"></span>
          <a th:href="${f.savePathNm}" target="_blank"
             class="text-blue-500 hover:text-blue-700 transition-colors text-xs font-semibold">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> 열기
          </a>
        </div>
      </div>
    </div>

    <!-- 채점 카드 -->
    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
      <div class="px-7 py-4 border-b border-slate-200">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wide">채점</h2>
      </div>
      <div class="px-7 py-6">
        <!-- 이전 채점 정보 -->
        <div th:if="${submit.grddYn == 'Y'}"
             class="mb-5 flex items-center gap-4 p-4 rounded-xl bg-emerald-50 border border-emerald-100">
          <div class="text-center">
            <p class="text-xs text-emerald-600 font-semibold mb-0.5">현재 점수</p>
            <p class="text-3xl font-black text-emerald-600" th:text="${submit.score}">100</p>
            <p class="text-xs text-emerald-400">/ 100점</p>
          </div>
          <div class="w-px h-12 bg-emerald-200"></div>
          <div class="text-sm text-emerald-700">
            <p>채점자: <span class="font-semibold" th:text="${submit.grddUserId}">-</span></p>
            <p class="mt-1 text-xs text-emerald-500"
               th:text="${submit.grddDt != null ? #temporals.format(submit.grddDt, 'yyyy-MM-dd HH:mm') : ''}"></p>
          </div>
        </div>

        <form th:action="@{/classroom/detail/{sn}/assignments/{asgmtSn}/grade/{sbmtSn}(sn=${classroom.classSn},asgmtSn=${assignment.asgmtSn},sbmtSn=${submit.sbmtSn})}"
              method="post" class="flex items-end gap-3">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-500">
              점수 입력 <span class="text-slate-300 font-normal">(0 ~ 100)</span>
            </label>
            <input type="number" name="score"
                   th:value="${submit.grddYn == 'Y' ? submit.score : ''}"
                   min="0" max="100" step="0.01" placeholder="점수 입력"
                   class="w-36 text-sm px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-300 transition-colors"
                   required />
          </div>
          <button type="submit"
                  th:class="${submit.grddYn == 'Y'}
                    ? 'text-sm font-semibold px-5 py-2.5 bg-slate-600 text-white rounded-lg hover:bg-slate-700 transition-colors'
                    : 'text-sm font-semibold px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors'"
                  th:text="${submit.grddYn == 'Y'} ? '점수 수정' : '채점 완료'">채점 완료</button>
        </form>
      </div>
    </div>

  </div>

</div>
</body>
</html>
