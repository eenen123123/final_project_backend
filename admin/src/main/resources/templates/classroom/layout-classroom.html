<!doctype html>
<html
  th:fragment="layout(pageTitle, classroom, activeTab, pageContent)"
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle}">클래스룸</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
      }
      #editor,
      #answerEditor {
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      #editor:focus-within,
      #answerEditor:focus-within {
        border-color: #93c5fd;
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
      }
    </style>
  </head>

  <body class="h-screen flex flex-col bg-white overflow-hidden">
    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-100 flex-shrink-0">
      <!-- 1행: 브레드크럼 + 클래스 정보 + 강사 -->
      <div class="flex items-center justify-between px-10 h-16">
        <div class="flex items-center gap-4 min-w-0">
          <a
            href="/classroom/list"
            class="flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-colors text-sm font-medium flex-shrink-0"
          >
            <i class="fa-solid fa-arrow-left"></i>
            클래스 목록
          </a>
          <span class="text-slate-200 text-base">/</span>
          <h1
            class="text-base font-bold text-slate-800 truncate"
            th:text="${classroom.classNm}"
          >
            클래스룸
          </h1>
          <span
            th:if="${classroom.classStatCd.name() == 'RECRUITING'}"
            class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-sky-50 text-sky-600 border border-sky-100"
            >모집중</span
          >
          <span
            th:if="${classroom.classStatCd.name() == 'ACTIVE'}"
            class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100"
            >운영중</span
          >
          <span
            th:if="${classroom.classStatCd.name() == 'CLOSED'}"
            class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-100 text-slate-500"
            >종료</span
          >
          <span
            th:if="${classroom.classStatCd.name() == 'WAITING'}"
            class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 border border-amber-100"
            >대기</span
          >
        </div>
        <div class="flex-shrink-0">
          <span
            class="inline-flex items-center gap-1.5 text-xs font-bold px-3 py-1 rounded-full bg-indigo-50 text-indigo-500 border border-indigo-100"
          >
            <i class="fa-solid fa-chalkboard-user text-[10px]"></i> 관리자
          </span>
        </div>
        <div
          class="flex items-center gap-6 text-sm text-slate-400 flex-shrink-0"
        >
          <span class="hidden lg:flex items-center gap-2">
            <i class="fa-solid fa-users"></i>
            <span>수강생</span>
            <span class="font-medium" th:text="${classroom.memberCount + '명'}"
              >0명</span
            >
          </span>
          <span class="hidden lg:flex items-center gap-2">
            <i class="fa-regular fa-calendar"></i>
            <span>운영기간</span>
            <span
              class="font-medium"
              th:text=" ${classroom.enrlStrtYmd + ' ~ ' + (classroom.enrlEndYmd !=null ? classroom.enrlEndYmd : '무기한'
            )}"
              >-</span
            >
          </span>
          <div class="w-px h-5 bg-slate-100"></div>
          <div class="flex items-center gap-2.5">
            <div
              class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-sm font-bold select-none"
              th:text="${#strings.substring(classroom.instrNm, 0, 1)}"
            >
              김
            </div>
            <span
              class="font-medium text-slate-600 text-sm"
              th:text="${classroom.instrNm + ' 강사'}"
              >강사</span
            >
          </div>
        </div>
      </div>

      <!-- 2행: 탭 네비게이션 -->
      <nav class="flex items-center gap-1 px-10 border-t border-slate-100">
        <a
          th:href="@{/classroom/detail/{sn}(sn=${classroom.classSn})}"
          th:class="${activeTab == 'home'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-house text-xs"></i> 홈
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
          th:class="${activeTab == 'notice'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-bullhorn text-xs"></i> 공지사항
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/lectures(sn=${classroom.classSn})}"
          th:class="${activeTab == 'lectures'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-play text-xs"></i> 온라인 강의
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
          th:class="${activeTab == 'assignments'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-file-lines text-xs"></i> 과제 관리
          <span
            th:if="${assignmentCount != null and assignmentCount > 0}"
            class="text-[10px] px-1.5 py-0.5 rounded-full font-bold bg-red-500 text-white leading-none"
            th:text="${assignmentCount}"
            >2</span
          >
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/qna(sn=${classroom.classSn})}"
          th:class="${activeTab == 'qna'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-comments text-xs"></i> Q&amp;A
          <span
            th:if="${unansweredQnaCount != null and unansweredQnaCount > 0}"
            class="text-[10px] px-1.5 py-0.5 rounded-full font-bold bg-red-500 text-white leading-none"
            th:text="${unansweredQnaCount}"
            >1</span
          >
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/dataroom(sn=${classroom.classSn})}"
          th:class="${activeTab == 'dataroom'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-folder-open text-xs"></i> 자료실
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/exams(sn=${classroom.classSn})}"
          th:class="${activeTab == 'exams'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-clipboard-question text-xs"></i> 시험 관리
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/grades(sn=${classroom.classSn})}"
          th:class="${activeTab == 'grades'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-chart-simple text-xs"></i> 약점 분석
        </a>
        <a
          th:href="@{/classroom/detail/{sn}/members(sn=${classroom.classSn})}"
          th:class="${activeTab == 'members'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'"
        >
          <i class="fa-solid fa-users text-xs"></i> 수강생 목록
        </a>
      </nav>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-5xl mx-auto px-10 py-8">
        <th:block th:replace="${pageContent}" />
      </div>
    </main>

    <script th:src="@{/js/admin-core.js}"></script>
    <th:block th:if="${toastMsg}">
      <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
          showHermesToast(/*[[${toastMsg}]]*/ '', /*[[${toastType != null ? toastType : 'success'}]]*/ 'success');
        });
      </script>
    </th:block>
    <th:block th:if="${activeTab == 'qna' or activeTab == 'exams'}">
      <script
        defer
        src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
      ></script>
      <script
        defer
        src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
        onload="
          renderMathInElement(document.body, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
            ],
          })
        "
      ></script>
    </th:block>
  </body>
</html>
