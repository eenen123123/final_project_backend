<!doctype html>
<html
  th:fragment="layout(pageTitle, classroom, activeTab, pageContent)"
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle}">클래스룸</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; }
    </style>
  </head>

  <body class="h-screen flex flex-col bg-white overflow-hidden">

    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-100 flex-shrink-0">
      <!-- 1행: 브레드크럼 + 클래스 정보 + 강사 -->
      <div class="flex items-center justify-between px-10 h-16">
        <div class="flex items-center gap-4 min-w-0">
          <a href="/classroom/list"
             class="flex items-center gap-2 text-slate-400 hover:text-slate-600 transition-colors text-sm font-medium flex-shrink-0">
            <i class="fa-solid fa-arrow-left"></i>
            클래스 목록
          </a>
          <span class="text-slate-200 text-base">/</span>
          <h1 class="text-base font-bold text-slate-800 truncate" th:text="${classroom.classNm}">클래스룸</h1>
          <span th:if="${classroom.classStatCd == '01'}"
                class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-sky-50 text-sky-600 border border-sky-100">모집중</span>
          <span th:if="${classroom.classStatCd == '02'}"
                class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100">운영중</span>
          <span th:if="${classroom.classStatCd == '03'}"
                class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-100 text-slate-500">종료</span>
          <span th:if="${classroom.classStatCd == '04'}"
                class="flex-shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 border border-amber-100">대기</span>
        </div>

        <div class="flex items-center gap-6 text-sm text-slate-400 flex-shrink-0">
          <span class="hidden lg:flex items-center gap-2">
            <i class="fa-solid fa-book-open text-slate-300"></i>
            <span th:text="${classroom.courseNm}">강좌명</span>
          </span>
          <span class="hidden lg:flex items-center gap-2">
            <i class="fa-solid fa-users text-slate-300"></i>
            <span th:text="${classroom.memberCount + '명'}">0명</span>
          </span>
          <span class="hidden lg:flex items-center gap-2">
            <i class="fa-regular fa-calendar text-slate-300"></i>
            <span th:text="${classroom.enrlStrtYmd}">-</span>
          </span>
          <div class="w-px h-5 bg-slate-100"></div>
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center text-white text-sm font-bold select-none"
                 th:text="${#strings.substring(classroom.instrNm, 0, 1)}">김</div>
            <span class="font-medium text-slate-700 text-sm" th:text="${classroom.instrNm + ' 강사'}">강사</span>
          </div>
        </div>
      </div>

      <!-- 2행: 탭 네비게이션 -->
      <nav class="flex items-center gap-1 px-10 border-t border-slate-100">
        <a th:href="@{/classroom/detail/{sn}(sn=${classroom.classSn})}"
           th:class="${activeTab == 'home'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-house text-xs"></i> 홈
        </a>
        <a th:href="@{/classroom/detail/{sn}/notice(sn=${classroom.classSn})}"
           th:class="${activeTab == 'notice'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-bullhorn text-xs"></i> 공지사항
        </a>
        <a th:href="@{/classroom/detail/{sn}/lectures(sn=${classroom.classSn})}"
           th:class="${activeTab == 'lectures'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-play text-xs"></i> 온라인 강의
        </a>
        <a th:href="@{/classroom/detail/{sn}/assignments(sn=${classroom.classSn})}"
           th:class="${activeTab == 'assignments'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-file-lines text-xs"></i> 과제 제출
          <span th:if="${assignmentCount != null and assignmentCount > 0}"
                class="text-[10px] px-1.5 py-0.5 rounded-full font-bold bg-red-500 text-white leading-none"
                th:text="${assignmentCount}">2</span>
        </a>
        <a th:href="@{/classroom/detail/{sn}/qna(sn=${classroom.classSn})}"
           th:class="${activeTab == 'qna'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-comments text-xs"></i> Q&amp;A
          <span th:if="${unansweredQnaCount != null and unansweredQnaCount > 0}"
                class="text-[10px] px-1.5 py-0.5 rounded-full font-bold bg-red-500 text-white leading-none"
                th:text="${unansweredQnaCount}">1</span>
        </a>
        <a th:href="@{/classroom/detail/{sn}/grades(sn=${classroom.classSn})}"
           th:class="${activeTab == 'grades'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-chart-simple text-xs"></i> 성적 관리
        </a>
        <a th:href="@{/classroom/detail/{sn}/members(sn=${classroom.classSn})}"
           th:class="${activeTab == 'members'}
             ? 'flex items-center gap-2 px-5 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 -mb-px'
             : 'flex items-center gap-2 px-5 py-3 text-sm font-medium text-slate-500 hover:text-slate-700 border-b-2 border-transparent -mb-px transition-colors'">
          <i class="fa-solid fa-users text-xs"></i> 수강생 목록
        </a>
      </nav>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-5xl mx-auto px-10 py-8">
        <th:block th:replace="${pageContent}" />
      </div>
    </main>

  </body>
</html>
