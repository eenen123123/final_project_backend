<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 시험 상세',
    ${classroom},
    'exams',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="flex flex-col gap-5">

    <a th:href="@{/classroom/detail/{sn}/exams(sn=${classroom.classSn})}"
       class="text-sm font-semibold text-slate-400 hover:text-slate-600 flex items-center gap-2 transition-colors w-fit">
      <i class="fa-solid fa-arrow-left text-xs"></i> 목록으로
    </a>

    <!-- 시험 기본 정보 -->
    <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
      <div class="px-7 py-5 border-b border-slate-100 flex items-start justify-between gap-4">
        <div>
          <h1 class="text-base font-bold text-slate-800" th:text="${exam.examRegNm}">시험명</h1>
          <div class="flex items-center gap-3 mt-2 text-sm text-slate-400">
            <span th:if="${exam.examStrtDt != null}">
              <i class="fa-regular fa-clock mr-1"></i>
              <span th:text="${exam.examStrtDt + ' ~ ' + (exam.examEndDt != null ? exam.examEndDt : '미정')}">-</span>
            </span>
            <span th:if="${exam.examStrtDt == null}" class="text-slate-300">시험 기간 미설정</span>
            <span class="w-px h-3 bg-slate-200"></span>
            <span th:text="${exam.questions.size() + '문항'}">0문항</span>
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          <a th:href="@{/classroom/detail/{sn}/exams/{examSn}/edit(sn=${classroom.classSn},examSn=${exam.examSn})}"
             class="text-sm font-semibold px-4 py-2 border border-slate-200 text-slate-600 rounded-lg hover:bg-slate-50 transition-colors">수정</a>
          <form th:action="@{/classroom/detail/{sn}/exams/{examSn}/delete(sn=${classroom.classSn},examSn=${exam.examSn})}"
                method="post"
                onsubmit="return confirm('시험을 삭제하시겠습니까?')">
            <button type="submit"
                    class="text-sm font-semibold px-4 py-2 border border-rose-100 text-rose-500 rounded-lg hover:bg-rose-50 transition-colors">삭제</button>
          </form>
        </div>
      </div>

      <!-- 배정 문항 목록 -->
      <div class="px-7 py-5">
        <h2 class="text-sm font-semibold text-slate-700 mb-3">배정 문항</h2>
        <div th:if="${#lists.isEmpty(exam.questions)}"
             class="py-8 text-center text-sm text-slate-300">배정된 문항이 없습니다.</div>
        <div th:unless="${#lists.isEmpty(exam.questions)}" class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-slate-100 text-xs text-slate-400">
                <th class="py-3 px-4 w-10 font-medium">순서</th>
                <th class="py-3 px-4 font-medium">문항 내용</th>
                <th class="py-3 px-4 w-24 text-center font-medium whitespace-nowrap">유형</th>
                <th class="py-3 px-4 w-20 text-center font-medium whitespace-nowrap">배점</th>
              </tr>
            </thead>
            <tbody class="text-slate-700">
              <tr th:each="q : ${exam.questions}" class="border-b border-slate-50">
                <td class="py-3 px-4 text-xs text-slate-300 font-mono" th:text="${q.qstnOrdr}">1</td>
                <td class="py-3 px-4 text-sm text-slate-700 max-w-xs truncate" th:text="${q.stem}">문항 내용</td>
                <td class="py-3 px-4 text-center">
                  <span th:if="${q.qstnTypeCd == 'MULTIPLE_CHOICE'}"
                        class="text-xs font-semibold px-2 py-0.5 rounded-full bg-sky-50 text-sky-600">객관식</span>
                  <span th:if="${q.qstnTypeCd == 'SHORT_ANSWER'}"
                        class="text-xs font-semibold px-2 py-0.5 rounded-full bg-violet-50 text-violet-600">단답형</span>
                  <span th:if="${q.qstnTypeCd == 'ESSAY'}"
                        class="text-xs font-semibold px-2 py-0.5 rounded-full bg-amber-50 text-amber-600">서술형</span>
                </td>
                <td class="py-3 px-4 text-center text-sm font-mono text-slate-600" th:text="${q.allocScr}">0</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 응시자 목록 -->
    <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
      <div class="px-7 py-5 border-b border-slate-100">
        <h2 class="text-base font-bold text-slate-800">응시자 목록</h2>
        <p class="text-sm text-slate-400 mt-1">
          총 <span class="font-semibold text-slate-600" th:text="${takers.size()}">0</span>명
        </p>
      </div>

      <div th:if="${#lists.isEmpty(takers)}"
           class="p-16 flex flex-col items-center justify-center text-center gap-3">
        <div class="w-12 h-12 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-2xl">
          <i class="fa-solid fa-users"></i>
        </div>
        <p class="text-sm font-medium text-slate-400">아직 응시자가 없습니다.</p>
      </div>

      <div th:unless="${#lists.isEmpty(takers)}" class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-sm text-slate-400">
              <th class="py-4 px-7 w-14 font-medium">번호</th>
              <th class="py-4 px-7 font-medium">이름</th>
              <th class="py-4 px-7 font-medium">아이디</th>
            </tr>
          </thead>
          <tbody class="text-slate-700">
            <tr th:each="taker, stat : ${takers}" class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
              <td class="py-4 px-7 text-sm text-slate-300 font-mono" th:text="${stat.count}">1</td>
              <td class="py-4 px-7 text-sm font-semibold text-slate-700" th:text="${taker.stdNm}">이름</td>
              <td class="py-4 px-7 text-sm text-slate-400 font-mono" th:text="${taker.stdUserId}">아이디</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</div>
</body>
</html>
