<!DOCTYPE html>
<html th:replace="~{classroom/layout-classroom :: layout(
    ${classroom.classNm} + ' | 자료실',
    ${classroom},
    'dataroom',
    ~{:: #content}
)}" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
<div id="content">

  <div class="bg-white border border-slate-100 rounded-xl overflow-hidden">
    <div class="px-7 py-5 border-b border-slate-100 flex items-center justify-between">
      <div>
        <h2 class="text-base font-bold text-slate-800">자료실</h2>
        <p class="text-sm text-slate-400 mt-1">수강생에게 제공할 학습 자료를 등록하세요.</p>
      </div>
      <a th:href="@{/classroom/detail/{sn}/dataroom/write(sn=${classroom.classSn})}"
         class="text-sm font-semibold px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
        <i class="fa-solid fa-plus text-xs"></i> 자료 등록
      </a>
    </div>

    <div th:if="${#lists.isEmpty(dataroomList)}"
         class="p-20 flex flex-col items-center justify-center text-center gap-4">
      <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-300 text-3xl">
        <i class="fa-solid fa-folder-open"></i>
      </div>
      <p class="text-base font-medium text-slate-400">등록된 자료가 없습니다.</p>
    </div>

    <div th:unless="${#lists.isEmpty(dataroomList)}" class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="border-b border-slate-100 text-sm text-slate-400">
            <th class="py-4 px-7 w-14 font-medium whitespace-nowrap">번호</th>
            <th class="py-4 px-7 font-medium">제목</th>
            <th class="py-4 px-7 w-20 text-center font-medium whitespace-nowrap">파일</th>
            <th class="py-4 px-7 w-32 font-medium whitespace-nowrap">작성자</th>
            <th class="py-4 px-7 w-40 font-medium whitespace-nowrap">등록일</th>
          </tr>
        </thead>
        <tbody class="text-slate-700">
          <tr th:each="item, stat : ${dataroomList}"
              class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
            <td class="py-4 px-7 text-sm text-slate-300 font-mono whitespace-nowrap"
                th:text="${dataroomList.size() - stat.index}">1</td>
            <td class="py-4 px-7">
              <a th:href="@{/classroom/detail/{sn}/dataroom/{postSn}(sn=${classroom.classSn},postSn=${item.postSn})}"
                 class="font-semibold text-slate-800 hover:text-blue-600 transition-colors text-sm"
                 th:text="${item.postSj}">자료 제목</a>
            </td>
            <td class="py-4 px-7 text-center">
              <span th:if="${item.atchFileId != null}"
                    class="inline-flex items-center gap-1 text-xs font-semibold text-blue-500 bg-blue-50 border border-blue-100 px-2 py-1 rounded-lg whitespace-nowrap">
                <i class="fa-solid fa-paperclip text-xs"></i> 첨부
              </span>
            </td>
            <td class="py-4 px-7 text-sm text-slate-500 whitespace-nowrap"
                th:text="${item.memberDto != null ? item.memberDto.userName : item.wrtrUserId}">강사명</td>
            <td class="py-4 px-7 text-sm text-slate-400 font-mono whitespace-nowrap"
                th:text="${item.regDt != null ? #temporals.format(item.regDt, 'yyyy-MM-dd') : '-'}">2026-06-01</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="px-7 py-4 border-t border-slate-100">
      <p class="text-sm text-slate-400">
        전체 <span class="font-semibold text-slate-600" th:text="${#lists.size(dataroomList)}">0</span>건
      </p>
    </div>
  </div>

</div>
</body>
</html>
