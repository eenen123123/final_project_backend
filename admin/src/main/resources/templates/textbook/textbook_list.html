<title th:fragment="pageTitle">교재 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">교재 관리</h1>
    <p class="text-sm text-slate-500 mt-1">등록된 교재 목록을 조회하고 관리합니다.</p>
  </div>

  <!-- ② 요약 통계 카드 4개 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

    <!-- 전체 교재 -->
    <a th:href="@{/admin/textbook}" class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 hover:border-blue-200 hover:shadow-md transition-all block">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-400 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-book"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">전체 교재</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" th:text="${totalCount + '권'}">0권</p>
    </a>

    <!-- 신규 등록 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-400 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-circle-plus"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">이번 달 신규</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" th:text="${newCount + '권'}">0권</p>
    </div>

    <!-- 재고 위험 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-400 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">재고 위험</p>
      </div>
      <p class="text-2xl font-bold text-amber-500" th:text="${dangerCount + '권'}">0권</p>
    </div>

    <!-- 보관함 (논리 삭제된 교재) -->
    <a th:href="@{/admin/textbook(archived=true)}"
      th:classappend="${archived} ? 'border-slate-400 bg-slate-50' : 'border-slate-100 bg-white hover:border-slate-300 hover:shadow-md'"
      class="rounded-2xl border shadow-sm p-5 transition-all block cursor-pointer">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-box-archive"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">보관함</p>
      </div>
      <p class="text-2xl font-bold text-slate-500" th:text="${archivedCount + '권'}">0권</p>
    </a>

  </div>

  <!-- 보관함 모드 배너 -->
  <div th:if="${archived}" class="flex items-center justify-between gap-3 bg-slate-100 border border-slate-200 rounded-xl px-5 py-3">
    <div class="flex items-center gap-2.5 text-slate-600 text-sm font-medium">
      <i class="fa-solid fa-box-archive text-slate-400"></i>
      보관함 — 삭제 처리된 교재 목록입니다.
    </div>
    <a th:href="@{/admin/textbook}" class="text-xs text-slate-500 hover:text-slate-700 underline underline-offset-2 whitespace-nowrap">
      전체 목록으로 돌아가기
    </a>
  </div>

  <!-- ③ 검색 + 정렬 + 테이블 통합 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">

    <!-- 검색 바 -->
    <div class="flex items-center gap-4 px-5 py-4 border-b border-slate-100">
      <form th:action="@{/admin/textbook}" method="get" class="flex items-center gap-2">
        <input type="hidden" name="archived" th:value="${archived}" />
        <input type="hidden" name="sort" th:value="${param.sort}" />
        <input type="text" name="keyword" th:value="${param.keyword}"
          class="hm-input hm-input-blue" style="width: 18rem;" placeholder="교재명 검색..." />
        <div style="width: 9rem; flex-shrink: 0;">
          <select name="subjClId" class="hm-input hm-input-blue cursor-pointer">
            <option value="">과목 전체</option>
            <option th:each="sc : ${subjClList}" th:value="${sc.subjClId}" th:text="${sc.subjClNm}"
              th:selected="${param.subjClId == sc.subjClId.toString()}">과목명</option>
          </select>
        </div>
        <button type="submit" class="hm-btn-primary hm-btn-blue" style="padding: 0.65rem 1.25rem; white-space: nowrap;">검색</button>
        <a th:href="${archived} ? @{/admin/textbook(archived=true)} : @{/admin/textbook}"
          style="display:inline-flex; align-items:center; gap:0.375rem; padding: 0.65rem 0.75rem; border-radius:0.75rem; font-size:0.875rem; font-weight:500; color:#94a3b8; white-space:nowrap; cursor:pointer; transition:all 0.15s ease;"
          onmouseover="this.style.color='#475569'; this.style.backgroundColor='#f1f5f9';"
          onmouseout="this.style.color='#94a3b8'; this.style.backgroundColor='transparent';">
          <i class="fa-solid fa-rotate-left" style="font-size:0.75rem;"></i>초기화
        </a>
      </form>

      <!-- 정렬 + 교재 등록 (오른쪽 끝) -->
      <div class="flex items-center gap-3 ml-auto shrink-0">
        <div class="flex items-center gap-1 bg-slate-100 rounded-xl p-1">
          <a th:href="@{/admin/textbook(keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived}, sort='recent')}"
            th:classappend="${param.sort == null or param.sort == 'recent'} ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap">
            최근 등록순
          </a>
          <a th:href="@{/admin/textbook(keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived}, sort='price')}"
            th:classappend="${param.sort == 'price'} ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap">
            판매가 높은순
          </a>
          <a th:href="@{/admin/textbook(keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived}, sort='stock')}"
            th:classappend="${param.sort == 'stock'} ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
            class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap">
            재고 부족순
          </a>
        </div>
        <a th:href="@{/admin/textbook/new}" class="hm-btn-primary hm-btn-blue whitespace-nowrap">
          <i class="fa-solid fa-plus"></i>
          <span>교재 등록</span>
        </a>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table style="width:100%; table-layout:fixed; border-collapse:collapse; text-align:left;">
        <colgroup>
          <col style="width: 30%" />
          <col style="width: 8%" />
          <col style="width: 11%" />
          <col style="width: 13%" />
          <col style="width: 10%" />
          <col style="width: 8%" />
          <col style="width: 10%" />
          <col style="width: 10%" />
        </colgroup>
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider">
            <th style="padding: 1rem 1.25rem; text-align:left;">교재 정보</th>
            <th style="padding: 1rem 1.25rem; text-align:left;">과목</th>
            <th style="padding: 1rem 1.25rem; text-align:left;">담당 강사</th>
            <th style="padding: 1rem 1.25rem; text-align:left;">저자 / 출판사</th>
            <th style="padding: 1rem 1.25rem; text-align:right;">판매가</th>
            <th style="padding: 1rem 1.25rem; text-align:right;">배송비</th>
            <th style="padding: 1rem 1.25rem; text-align:center;">등록일</th>
            <th class="py-4 px-5 text-center">관리</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50 text-sm text-slate-700">

          <!-- 데이터 없을 때 -->
          <tr th:if="${#lists.isEmpty(textbookList)}">
            <td colspan="8" class="py-20 text-center text-slate-400 text-sm">
              <i class="fa-solid fa-box-open text-2xl text-slate-200 mb-3 block"></i>
              <span th:text="${archived} ? '보관함에 교재가 없습니다.' : '등록된 교재가 없습니다.'">등록된 교재가 없습니다.</span>
            </td>
          </tr>

          <!-- 교재 목록 -->
          <tr th:each="textbook : ${textbookList}" class="hover:bg-slate-50/50 transition-colors">

            <!-- 교재 정보 -->
            <td style="padding: 1rem 1.25rem; text-align:left;">
              <div class="flex items-center gap-3">
                <div class="w-10 h-12 rounded-lg overflow-hidden border border-slate-200 shrink-0 bg-slate-100 flex items-center justify-center">
                  <img th:if="${textbook.thmbImg != null}" th:src="${textbook.thmbImg}" alt="교재 표지"
                    class="w-full h-full object-contain" />
                  <i th:if="${textbook.thmbImg == null}" class="fa-solid fa-book text-slate-300"></i>
                </div>
                <div class="min-w-0">
                  <a th:href="@{/admin/textbook/{sn}/detail(sn=${textbook.textbookSn})}"
                    class="font-bold text-slate-800 hover:text-blue-600 transition-colors block truncate"
                    th:text="${textbook.textbookNm}">교재명</a>
                  <p class="text-xs text-slate-400 truncate font-mono" th:text="${textbook.isbnNo}">ISBN</p>
                </div>
              </div>
            </td>

            <!-- 과목 -->
            <td style="padding: 1rem 1.25rem; text-align:left;">
              <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-blue-50 text-blue-600"
                th:text="${textbook.subjClNm ?: '-'}">과목</span>
            </td>

            <!-- 담당 강사 -->
            <td style="padding: 1rem 1.25rem; text-align:left;">
              <p class="text-sm text-slate-700 truncate" th:text="${textbook.instrUserNm ?: '-'}">강사명</p>
            </td>

            <!-- 저자/출판사 -->
            <td style="padding: 1rem 1.25rem; text-align:left;">
              <p class="text-sm text-slate-700 truncate" th:text="${textbook.authrNm ?: '-'}">저자명</p>
              <p class="text-xs text-slate-400 truncate" th:text="${textbook.pubrNm ?: '-'}">출판사</p>
            </td>

            <!-- 판매가 -->
            <td style="padding: 1rem 1.25rem; text-align:right;">
              <span class="font-bold text-slate-800"
                th:text="${#numbers.formatInteger(textbook.salePrcAmt, 1, 'COMMA') + '원'}">0원</span>
            </td>

            <!-- 배송비 -->
            <td style="padding: 1rem 1.25rem; text-align:right;">
              <span class="text-slate-500"
                th:text="${textbook.dlvrAmt != null ? #numbers.formatInteger(textbook.dlvrAmt, 1, 'COMMA') + '원' : '0원'}">0원</span>
            </td>

            <!-- 등록일 -->
            <td style="padding: 1rem 1.25rem; text-align:center;">
              <span class="text-xs text-slate-500"
                th:text="${#temporals.format(textbook.regDt, 'yyyy.MM.dd')}">2026.01.01</span>
            </td>

            <!-- 관리 -->
            <td style="padding: 1rem 1.25rem; text-align:center;">
              <a th:href="@{/admin/textbook/stock/{sn}(sn=${textbook.textbookSn})}"
                class="hm-btn-ghost text-xs px-3 py-1.5 whitespace-nowrap">
                <i class="fa-solid fa-box mr-1"></i>재고
              </a>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

    <!-- 페이지네이션 -->
    <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50/50"
         th:with="startItem=${(paginationInfo.page - 1) * paginationInfo.screenSize + 1},
                  endItem=${paginationInfo.page * paginationInfo.screenSize > totalCount ? totalCount : paginationInfo.page * paginationInfo.screenSize}">
      <p class="text-xs text-slate-400"
         th:text="${totalCount > 0 ? '총 ' + totalCount + '건 · ' + startItem + ' - ' + endItem + ' 표시 중' : '데이터가 없습니다.'}"></p>
      <div class="flex items-center gap-1" th:if="${paginationInfo.totalPage > 1}">
        <a th:if="${paginationInfo.startPage > 1}"
          th:href="@{/admin/textbook(page=${paginationInfo.startPage - 1}, keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived})}"
          class="w-8 h-8 rounded-lg text-xs flex items-center justify-center text-slate-400 hover:bg-slate-100">‹</a>

        <th:block th:each="p : ${#numbers.sequence(paginationInfo.startPage, paginationInfo.endPage)}">
          <a th:href="@{/admin/textbook(page=${p}, keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived})}"
            th:text="${p}"
            th:classappend="${p == paginationInfo.page} ? 'bg-blue-500 text-white font-bold' : 'text-slate-400 hover:bg-slate-100'"
            class="w-8 h-8 rounded-lg text-xs flex items-center justify-center">1</a>
        </th:block>

        <a th:if="${paginationInfo.endPage < paginationInfo.totalPage}"
          th:href="@{/admin/textbook(page=${paginationInfo.endPage + 1}, keyword=${param.keyword}, subjClId=${param.subjClId}, archived=${archived})}"
          class="w-8 h-8 rounded-lg text-xs flex items-center justify-center text-slate-400 hover:bg-slate-100">›</a>
      </div>
      <div th:unless="${paginationInfo.totalPage > 1}"></div>
    </div>

  </div>

</div>
