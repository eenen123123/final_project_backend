<title th:fragment="pageTitle">교재 상세 | HERMES</title>

<div class="space-y-6 max-w-5xl mx-auto">

  <!-- 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-5 border-b border-slate-100">
    <div>
      <p class="text-xs font-semibold text-amber-500 mb-1" th:if="${textbookDto.tagline != null}" th:text="${textbookDto.tagline}">태그라인</p>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight" th:text="${textbookDto.textbookNm}">교재명</h1>
      <p class="text-sm text-slate-400 mt-1">
        등록일 <span th:text="${#temporals.format(textbookDto.regDt, 'yyyy.MM.dd HH:mm')}">2026.01.01</span>
        · 등록자 <span th:text="${textbookDto.rgtrId}">-</span>
      </p>
    </div>
    <div class="flex items-center gap-2">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost text-sm py-2 px-3.5">
        <i class="fa-solid fa-arrow-left mr-1.5"></i>목록으로
      </a>
      <a th:href="@{/admin/textbook/{sn}(sn=${textbookDto.textbookSn})}" class="hm-btn-ghost text-sm py-2 px-3.5">
        <i class="fa-solid fa-pen mr-1.5"></i>수정
      </a>
      <a th:href="@{/admin/textbook/stock/{sn}(sn=${textbookDto.textbookSn})}" class="hm-btn-primary text-sm py-2 px-3.5">
        <i class="fa-solid fa-boxes-stacked mr-1.5"></i>재고 관리
      </a>
    </div>
  </div>

  <!-- 상단 레이아웃: 이미지 + 기본 정보 -->
  <div class="flex flex-col md:flex-row gap-6 items-start">

    <!-- 교재 표지 이미지 -->
    <div class="w-full md:w-48 flex-shrink-0">
      <div class="w-full aspect-[3/4] rounded-2xl overflow-hidden border border-slate-200 shadow-sm bg-slate-100 flex items-center justify-center">
        <img th:if="${textbookDto.thmbImg != null}"
             th:src="${textbookDto.thmbImg}" alt="교재 표지"
             class="w-full h-full object-contain" />
        <div th:if="${textbookDto.thmbImg == null}"
             class="flex flex-col items-center gap-2 text-slate-300">
          <i class="fa-solid fa-book text-4xl"></i>
          <span class="text-xs">이미지 없음</span>
        </div>
      </div>
    </div>

    <!-- 기본 정보 카드 -->
    <div class="flex-1 bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-4">
      <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-circle-info mr-2 text-blue-500"></i>기본 정보
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-3 text-sm">

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">교재명</span>
          <span class="text-slate-800 font-semibold" th:text="${textbookDto.textbookNm}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">태그라인</span>
          <span class="text-amber-500 font-medium" th:text="${textbookDto.tagline ?: '-'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">저자명</span>
          <span class="text-slate-700" th:text="${textbookDto.authrNm ?: '-'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">출판사</span>
          <span class="text-slate-700" th:text="${textbookDto.pubrNm ?: '-'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">ISBN</span>
          <span class="text-slate-700 font-mono" th:text="${textbookDto.isbnNo ?: '-'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">과목</span>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-lg text-xs font-bold bg-blue-50 text-blue-600"
                th:text="${textbookDto.subjClNm ?: '-'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">연결 강사</span>
          <span class="text-slate-700" th:text="${textbookDto.instrUserId ?: '강사 정보 없음'}">-</span>
        </div>

        <div class="flex items-start gap-3">
          <span class="text-xs font-bold text-slate-400 w-20 shrink-0 pt-0.5">교재 SN</span>
          <span class="text-slate-400 font-mono text-xs" th:text="${textbookDto.textbookSn}">-</span>
        </div>

      </div>
    </div>
  </div>

  <!-- 가격 정보 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 flex items-center mb-4">
      <i class="fa-solid fa-won-sign mr-2 text-emerald-500"></i>가격 정보
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

      <div class="bg-emerald-50 rounded-xl p-4 text-center">
        <p class="text-xs font-bold text-emerald-600 mb-1">판매가</p>
        <p class="text-2xl font-black text-emerald-700"
           th:text="${#numbers.formatInteger(textbookDto.salePrcAmt, 1, 'COMMA') + '원'}">0원</p>
      </div>

      <div class="bg-slate-50 rounded-xl p-4 text-center">
        <p class="text-xs font-bold text-slate-500 mb-1">매입 원가</p>
        <p class="text-2xl font-black text-slate-600"
           th:text="${textbookDto.purchPrcAmt != null ? #numbers.formatInteger(textbookDto.purchPrcAmt, 1, 'COMMA') + '원' : '-'}">0원</p>
      </div>

      <div class="bg-slate-50 rounded-xl p-4 text-center">
        <p class="text-xs font-bold text-slate-500 mb-1">배송비</p>
        <p class="text-2xl font-black text-slate-600"
           th:text="${textbookDto.dlvrAmt != null ? #numbers.formatInteger(textbookDto.dlvrAmt, 1, 'COMMA') + '원' : '0원'}">0원</p>
      </div>

    </div>
  </div>

  <!-- 교재 내용 -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- 간략 요약 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
      <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 flex items-center mb-4">
        <i class="fa-solid fa-align-left mr-2 text-violet-500"></i>간략 요약
      </h2>
      <div th:if="${textbookDto.bookSmry != null}">
        <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-line" th:text="${textbookDto.bookSmry}">-</p>
      </div>
      <p th:if="${textbookDto.bookSmry == null}" class="text-sm text-slate-300">입력된 내용이 없습니다.</p>
    </div>

    <!-- 목차 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
      <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 flex items-center mb-4">
        <i class="fa-solid fa-list-ol mr-2 text-amber-500"></i>목차
      </h2>
      <div th:if="${textbookDto.tocCn != null}">
        <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-line" th:text="${textbookDto.tocCn}">-</p>
      </div>
      <p th:if="${textbookDto.tocCn == null}" class="text-sm text-slate-300">입력된 내용이 없습니다.</p>
    </div>

  </div>

  <!-- 상세 설명 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 flex items-center mb-4">
      <i class="fa-solid fa-book-open mr-2 text-blue-500"></i>상세 설명
    </h2>
    <div th:if="${textbookDto.trgtGrdCn != null}">
      <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-line" th:text="${textbookDto.trgtGrdCn}">-</p>
    </div>
    <p th:if="${textbookDto.trgtGrdCn == null}" class="text-sm text-slate-300">입력된 내용이 없습니다.</p>
  </div>

  <!-- 메타 정보 -->
  <div class="bg-slate-50 rounded-2xl border border-slate-100 p-5">
    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">메타 정보</h2>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-xs text-slate-500">
      <div>
        <p class="font-bold text-slate-400 mb-0.5">등록일시</p>
        <p th:text="${#temporals.format(textbookDto.regDt, 'yyyy.MM.dd HH:mm')}">-</p>
      </div>
      <div>
        <p class="font-bold text-slate-400 mb-0.5">수정일시</p>
        <p th:text="${textbookDto.mdfcnDt != null ? #temporals.format(textbookDto.mdfcnDt, 'yyyy.MM.dd HH:mm') : '-'}">-</p>
      </div>
      <div>
        <p class="font-bold text-slate-400 mb-0.5">등록자</p>
        <p th:text="${textbookDto.rgtrId ?: '-'}">-</p>
      </div>
      <div>
        <p class="font-bold text-slate-400 mb-0.5">최종 수정자</p>
        <p th:text="${textbookDto.lastMdfrId ?: '-'}">-</p>
      </div>
    </div>
  </div>

</div>
