<title th:fragment="pageTitle">교재 [[${textbookDto.textbookSn != null} ? '수정' : '등록']] | HERMES</title>

<div class="space-y-6 max-w-5xl mx-auto">

  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-5 border-b border-slate-100">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight"
        th:text="${textbookDto.textbookSn != null} ? '교재 수정' : '교재 등록'">교재 등록</h1>
      <p class="text-sm text-slate-500 mt-1"
        th:text="${textbookDto.textbookSn != null} ? '교재 정보를 수정합니다.' : '새로운 교재를 등록합니다.'">새로운 교재를 등록합니다.</p>
    </div>
    <div class="flex items-center gap-3">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost text-sm py-2 px-3.5">
        <i class="fa-solid fa-arrow-left mr-1.5"></i>
        <span>목록으로</span>
      </a>
    </div>
  </div>

  <form
    th:action="${textbookDto.textbookSn != null} ? @{/admin/textbook/{sn}(sn=${textbookDto.textbookSn})} : @{/admin/textbook/new}"
    th:object="${textbookDto}" method="post" enctype="multipart/form-data" class="space-y-6">

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-book mr-2 text-blue-500"></i>기본 정보
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-x-5 gap-y-4">

        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            교재명 <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <input type="text" th:field="*{textbookNm}" class="hm-input w-full" placeholder="교재명을 입력하세요" required />
        </div>

        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">저자명</label>
          <input type="text" th:field="*{authrNm}" class="hm-input w-full" placeholder="저자명을 입력하세요" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">출판사명</label>
          <input type="text" th:field="*{pubrNm}" class="hm-input w-full" placeholder="출판사명을 입력하세요" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">ISBN(국제표준도서번호)</label>
          <input type="text" th:field="*{isbnNo}" class="hm-input w-full" placeholder="ISBN-13 입력" maxlength="13" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            과목 <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <select th:field="*{subjClId}" class="hm-input w-full cursor-pointer" required>
            <option value="">과목 선택</option>
            <option th:each="sc : ${subjClList}" th:value="${sc.subjClId}" th:text="${sc.subjClNm}">과목명</option>
          </select>
        </div>

        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">대상 학년 설명</label>
          <textarea th:field="*{trgtGrdCn}" class="hm-input w-full h-24 resize-none leading-relaxed"
            placeholder="예: 고등학교 3학년 대상 수능 대비 교재"></textarea>
        </div>

      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-won-sign mr-2 text-emerald-500"></i>가격 정보
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            판매가 (원) <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <input type="number" th:field="*{salePrcAmt}" class="hm-input w-full" placeholder="0" min="0" required />
        </div>

        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">매입 원가 (원)</label>
          <input type="number" th:field="*{purchPrcAmt}" class="hm-input w-full" placeholder="0" min="0" />
        </div>

        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">배송비 (원)</label>
          <input type="number" th:field="*{dlvrAmt}" class="hm-input w-full" placeholder="0" min="0" />
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-image mr-2 text-violet-500"></i>이미지 및 재고
      </h2>

      <div class="flex flex-col md:flex-row gap-8 items-start">

        <div class="flex flex-col gap-2 w-full max-w-[240px] flex-shrink-0">
          <label class="block text-[13px] font-semibold text-slate-700">교재 표지 이미지</label>

          <div class="relative w-full">
            <label for="thmbImgFile" id="uploadPlaceholder"
              th:classappend="${textbookDto.thmbImg != null} ? 'hidden' : ''"
              class="flex flex-col items-center justify-center w-full h-56 border-2 border-dashed border-slate-200 hover:border-blue-400 bg-slate-50/50 hover:bg-slate-50 rounded-2xl cursor-pointer transition-all group p-4 text-center">
              <div
                class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm border border-slate-100 text-slate-400 group-hover:text-blue-500 group-hover:scale-105 transition-all mb-3">
                <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
              </div>
              <span class="text-xs font-bold text-slate-600 group-hover:text-slate-800 transition-colors">이미지 업로드</span>
              <span class="text-[11px] text-slate-400 mt-1">정방형 또는 포스터 비율 권장</span>
            </label>

            <div id="previewContainer" th:classappend="${textbookDto.thmbImg != null} ? '' : 'hidden'"
              class="relative w-full h-56 rounded-2xl overflow-hidden border border-slate-200/80 shadow-sm bg-slate-100 group">
              <img id="previewImg" th:src="${textbookDto.thmbImg != null} ? ${textbookDto.thmbImg} : ''"
                alt="교재 표지 미리보기" class="w-full h-full object-cover" />
              <div
                class="absolute inset-0 bg-slate-900/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
              </div>
              <button type="button" onclick="removeImage()"
                class="absolute top-3 right-3 w-7 h-7 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center text-slate-500 hover:text-rose-600 shadow-md hover:scale-110 transition-all cursor-pointer">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>
            </div>
          </div>

          <input type="file" name="thmbImgFile" id="thmbImgFile" class="hidden" accept="image/*"
            onchange="handleImagePreview(this)" />
          <input type="hidden" name="isImgDeleted" id="isImgDeleted" value="N" />
          <p class="text-[11px] text-slate-400">JPG, PNG 파일만 등록 가능합니다.</p>
        </div>

        <div th:if="${textbookDto.textbookSn == null}" class="flex-1 w-full pt-0 md:pt-7">
          <div class="max-w-md bg-slate-50/70 border border-slate-100 rounded-2xl p-5">
            <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
              초기 재고 수량 <span class="text-rose-500 ml-0.5">*</span>
            </label>
            <input type="number" name="initInvtCnt" class="hm-input w-full bg-white" placeholder="0" min="0" value="0"
              required />
            <p class="text-xs text-slate-400 mt-2 leading-relaxed">
              <i class="fa-solid fa-circle-info mr-1 text-slate-400"></i>
              등록 시 초기 재고 수량이 물류 시스템에 자동으로 최초 입고 처리됩니다.
            </p>
          </div>
        </div>

      </div>
    </div>

    <div class="flex justify-end items-center gap-3 pt-2">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost py-2.5 px-5 text-sm">
        <i class="fa-solid fa-xmark mr-1.5"></i>
        <span>취소</span>
      </a>
      <button type="submit" class="hm-btn-primary py-2.5 px-6 text-sm shadow-sm">
        <i class="fa-solid fa-floppy-disk mr-1.5"></i>
        <span th:text="${textbookDto.textbookSn != null} ? '수정 완료' : '등록 완료'">등록 완료</span>
      </button>
    </div>

  </form>
</div>

<script th:inline="javascript">
  const originalImgSrc = /*[[${textbookDto.thmbImg}]]*/ null;

  function handleImagePreview(input) {
    const placeholder = document.getElementById('uploadPlaceholder');
    const container = document.getElementById('previewContainer');
    const preview = document.getElementById('previewImg');
    const isImgDeleted = document.getElementById('isImgDeleted');

    if (input.files && input.files[0]) {
      const file = input.files[0];

      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 업로드할 수 있습니다.');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        placeholder.classList.add('hidden');
        container.classList.remove('hidden');
        isImgDeleted.value = 'N';
      };
      reader.readAsDataURL(file);
    }
  }

  function removeImage() {
    const input = document.getElementById('thmbImgFile');
    const placeholder = document.getElementById('uploadPlaceholder');
    const container = document.getElementById('previewContainer');
    const preview = document.getElementById('previewImg');
    const isImgDeleted = document.getElementById('isImgDeleted');

    input.value = '';
    preview.src = '';
    container.classList.add('hidden');
    placeholder.classList.remove('hidden');
    isImgDeleted.value = 'Y';
  }
</script>
