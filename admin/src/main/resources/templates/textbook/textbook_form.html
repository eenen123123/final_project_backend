<title th:fragment="pageTitle">교재 [[${textbookDto.textbookSn != null} ? '수정' : '등록']] | HERMES</title>

<div class="space-y-6 max-w-5xl mx-auto">

  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-5 border-b border-slate-100">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight"
        th:text="${textbookDto.textbookSn != null} ? '교재 수정' : '교재 등록'">교재 등록</h1>
      <p class="text-sm text-slate-500 mt-1"
        th:text="${textbookDto.textbookSn != null} ? '교재 정보를 수정합니다.' : '새로운 교재를 등록합니다.'">새로운 교재를 등록합니다.</p>
    </div>
    <div class="flex items-center gap-3">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost text-sm py-2 px-3.5">
        <i class="fa-solid fa-arrow-left mr-1.5"></i>
        <span>목록으로</span>
      </a>
    </div>
  </div>

  <form
    th:action="${textbookDto.textbookSn != null} ? @{/admin/textbook/{sn}(sn=${textbookDto.textbookSn})} : @{/admin/textbook/new}"
    th:object="${textbookDto}" method="post" enctype="multipart/form-data" class="space-y-6">

    <!-- ① 기본 정보 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-book mr-2 text-blue-500"></i>기본 정보
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-x-5 gap-y-4">

        <!-- 태그라인 (제목 위 빨간 글씨) -->
        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">태그라인
            <span class="text-[11px] font-normal text-slate-400 ml-1">제목 위에 표시되는 시리즈명 (예: 만점 N제 2027 담금질)</span>
          </label>
          <input type="text" th:field="*{tagline}" class="hm-input w-full" placeholder="예: 만점 N제 2027 담금질" />
        </div>

        <!-- 교재명 -->
        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            교재명 (제목) <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <input type="text" th:field="*{textbookNm}" class="hm-input w-full" placeholder="교재명을 입력하세요" required />
        </div>

        <!-- 저자명 -->
        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">저자명</label>
          <input type="text" th:field="*{authrNm}" class="hm-input w-full" placeholder="저자명을 입력하세요" />
        </div>

        <!-- 출판사명 -->
        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">출판사명</label>
          <input type="text" th:field="*{pubrNm}" class="hm-input w-full" placeholder="출판사명을 입력하세요" />
        </div>

        <!-- ISBN -->
        <div class="md:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">ISBN(국제표준도서번호)</label>
          <input type="text" th:field="*{isbnNo}" class="hm-input w-full" placeholder="ISBN-13 입력" maxlength="13" />
        </div>

        <!-- 대분류 -->
        <div class="md:col-span-1">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            대분류 <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <select id="subjClIdSelect" class="hm-input w-full cursor-pointer" onchange="loadSubjects(this.value)" required>
            <option value="">대분류 선택</option>
            <option th:each="sc : ${subjClList}" th:value="${sc.subjClId}" th:text="${sc.subjClNm}"
              th:selected="${textbookDto.subjId != null and sc.subjClId == textbookDto.subjClId}">대분류명</option>
          </select>
        </div>

        <!-- 소분류 -->
        <div class="md:col-span-1">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            소분류 <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <select th:field="*{subjId}" data-ts-defer class="hm-input w-full cursor-pointer" required>
            <option value="">소분류 선택</option>
          </select>
        </div>

        <!-- 간략 요약 -->
        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">간략 요약
            <span class="text-[11px] font-normal text-slate-400 ml-1">교재 상세 페이지에 2~3줄로 표시됩니다.</span>
          </label>
          <textarea th:field="*{bookSmry}" class="hm-input w-full h-20 resize-none leading-relaxed"
            placeholder="예: 고난도 기출 + 고퀄리티 자작문항&#10;만점 N제 2027 담금질"></textarea>
        </div>

        <!-- 상세 설명 -->
        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">상세 설명
            <span class="text-[11px] font-normal text-slate-400 ml-1">교재 구성, 특징 등 상세 내용을 입력하세요.</span>
          </label>
          <textarea th:field="*{trgtGrdCn}" class="hm-input w-full h-32 resize-none leading-relaxed"
            placeholder="예: [교재구성]&#10;- 최신 6개년 평가원 기출 수록&#10;&#10;[교재특징]&#10;- 고난도 문항 완벽 분석"></textarea>
        </div>

        <!-- 목차 -->
        <div class="md:col-span-4">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">목차</label>
          <textarea th:field="*{tocCn}" class="hm-input w-full h-24 resize-none leading-relaxed"
            placeholder="예: 1강. 수열의 극한&#10;2강. 급수&#10;3강. 미분법"></textarea>
        </div>

      </div>
    </div>

    <!-- ② 강사 연결 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-chalkboard-user mr-2 text-amber-500"></i>강사 및 강좌 연결
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <!-- 연결 강좌 -->
        <div class="sm:col-span-2">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">연결 강좌
            <span class="text-[11px] font-normal text-slate-400 ml-1">선택한 강좌의 강사 정보가 자동으로 연결됩니다.</span>
          </label>
          <input type="hidden" th:field="*{courseSn}" id="courseSn" />

          <!-- 미선택 상태 -->
          <div id="courseEmpty" th:classappend="${textbookDto.courseSn != null} ? 'hidden' : ''"
            class="flex items-center justify-between gap-3 rounded-xl border border-dashed border-slate-200 bg-slate-50/80 px-5 py-4">
            <div class="flex items-center gap-2.5 text-slate-400">
              <i class="fa-solid fa-chalkboard-user text-slate-300 text-base"></i>
              <span class="text-sm">연결된 강좌가 없습니다.</span>
            </div>
            <button type="button" onclick="openCoursePopup()"
              class="hm-btn-ghost text-sm px-3.5 py-2 whitespace-nowrap cursor-pointer shrink-0">
              <i class="fa-solid fa-magnifying-glass mr-1.5"></i>강좌 선택
            </button>
          </div>

          <!-- 선택된 강좌 카드 -->
          <div id="courseCard" th:classappend="${textbookDto.courseSn == null} ? 'hidden' : ''"
            class="flex items-center gap-4 rounded-xl border border-amber-200 bg-gradient-to-r from-amber-50 to-white px-5 py-4">
            <div class="w-10 h-10 rounded-xl bg-amber-100 flex items-center justify-center shrink-0">
              <i class="fa-solid fa-chalkboard-user text-amber-500"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p id="courseNmDisplay" class="text-sm font-semibold text-slate-800 truncate"
                th:text="${textbookDto.courseNm ?: ''}"></p>
              <p class="flex items-center gap-1.5 mt-1">
                <i class="fa-solid fa-user-tie text-amber-400 text-[11px]"></i>
                <span id="instrNmDisplay" class="text-xs text-slate-500"
                  th:text="${textbookDto.instrUserNm != null} ? ${textbookDto.instrUserNm + ' 강사'} : ''"></span>
              </p>
            </div>
            <div class="flex items-center gap-1.5 shrink-0">
              <button type="button" onclick="openCoursePopup()"
                class="hm-btn-ghost text-xs px-3 py-1.5 whitespace-nowrap cursor-pointer">
                <i class="fa-solid fa-arrow-right-arrow-left mr-1"></i>변경
              </button>
              <button type="button" onclick="clearCourse()"
                class="hm-btn-ghost text-xs px-2.5 py-1.5 text-rose-400 hover:text-rose-600 cursor-pointer">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ③ 가격 정보 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-won-sign mr-2 text-emerald-500"></i>가격 정보
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            판매가 (원) <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <input type="number" th:field="*{salePrcAmt}" class="hm-input w-full" placeholder="0" min="0" required />
        </div>
        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">매입 원가 (원)</label>
          <input type="number" th:field="*{purchPrcAmt}" class="hm-input w-full" placeholder="0" min="0" />
        </div>
        <div>
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">배송비 (원)</label>
          <input type="number" th:field="*{dlvrAmt}" class="hm-input w-full" placeholder="0" min="0" />
        </div>
      </div>
    </div>

    <!-- ④ 이미지 및 재고 -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6 space-y-6">
      <h2 class="text-base font-bold text-slate-800 pb-3 border-b border-slate-100 flex items-center">
        <i class="fa-solid fa-image mr-2 text-violet-500"></i>이미지 및 재고
      </h2>

      <div class="flex flex-col md:flex-row gap-8 items-start">

        <div class="flex flex-col gap-2 w-full max-w-[240px] flex-shrink-0">
          <label class="block text-[13px] font-semibold text-slate-700">교재 표지 이미지</label>

          <div class="relative w-full">
            <label for="thmbImgFile" id="uploadPlaceholder"
              th:classappend="${textbookDto.thmbImg != null} ? 'hidden' : ''"
              class="flex flex-col items-center justify-center w-full h-56 border-2 border-dashed border-slate-200 hover:border-blue-400 bg-slate-50/50 hover:bg-slate-50 rounded-2xl cursor-pointer transition-all group p-4 text-center">
              <div
                class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm border border-slate-100 text-slate-400 group-hover:text-blue-500 group-hover:scale-105 transition-all mb-3">
                <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
              </div>
              <span class="text-xs font-bold text-slate-600 group-hover:text-slate-800 transition-colors">이미지 업로드</span>
              <span class="text-[11px] text-slate-400 mt-1">정방형 또는 포스터 비율 권장</span>
            </label>

            <div id="previewContainer" th:classappend="${textbookDto.thmbImg != null} ? '' : 'hidden'"
              class="relative w-full h-48 rounded-2xl overflow-hidden border border-slate-200/80 shadow-sm bg-slate-100 group">
              <img id="previewImg" th:src="${textbookDto.thmbImg != null} ? ${textbookDto.thmbImg} : ''"
                alt="교재 표지 미리보기" class="w-full h-full object-contain" />
              <div
                class="absolute inset-0 bg-slate-900/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
              </div>
              <button type="button" onclick="removeImage()"
                class="absolute top-3 right-3 w-7 h-7 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center text-slate-500 hover:text-rose-600 shadow-md hover:scale-110 transition-all cursor-pointer">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>
            </div>
          </div>

          <input type="file" name="thmbImgFile" id="thmbImgFile" class="hidden" accept="image/*"
            onchange="handleImagePreview(this)" />
          <input type="hidden" name="isImgDeleted" id="isImgDeleted" value="N" />
          <p class="text-[11px] text-slate-400">JPG, PNG 파일만 등록 가능합니다.</p>
        </div>

        <div th:if="${textbookDto.textbookSn == null}" class="flex-1 w-full pt-0 md:pt-7">
          <div class="bg-slate-50/70 border border-slate-100 rounded-2xl p-5 h-full">
          <label class="block text-[13px] font-semibold text-slate-700 mb-1.5">
            초기 재고 수량 <span class="text-rose-500 ml-0.5">*</span>
          </label>
          <div class="flex gap-2 mb-2">
            <input type="number" name="initInvtCnt" id="initInvtCnt" class="hm-input flex-1 bg-white" placeholder="0" min="0"
              value="0" required />
          </div>
          <div class="flex gap-2 mb-2">
            <button type="button" onclick="addQty(10)"
              class="flex-1 py-1.5 text-xs font-bold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-colors cursor-pointer">
              +10
            </button>
            <button type="button" onclick="addQty(100)"
              class="flex-1 py-1.5 text-xs font-bold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-colors cursor-pointer">
              +100
            </button>
            <button type="button" onclick="addQty(1000)"
              class="flex-1 py-1.5 text-xs font-bold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:border-slate-300 transition-colors cursor-pointer">
              +1000
            </button>
            <button type="button" onclick="resetQty()"
              class="px-3 py-1.5 text-xs font-bold text-rose-400 bg-white border border-slate-200 rounded-lg hover:bg-rose-50 hover:border-rose-200 transition-colors cursor-pointer">
              초기화
            </button>
          </div>
          <p class="text-xs text-slate-400 leading-relaxed">
            <i class="fa-solid fa-circle-info mr-1 text-slate-400"></i>
            등록 시 초기 재고 수량이 물류 시스템에 자동으로 최초 입고 처리됩니다.
          </p>
          </div>
        </div>

      </div>
    </div>

    <!-- 버튼 -->
    <div class="flex justify-end items-center gap-3 pt-2">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost py-2.5 px-5 text-sm">
        <i class="fa-solid fa-xmark mr-1.5"></i>
        <span>취소</span>
      </a>
      <button type="submit" class="hm-btn-primary py-2.5 px-6 text-sm shadow-sm">
        <i class="fa-solid fa-floppy-disk mr-1.5"></i>
        <span th:text="${textbookDto.textbookSn != null} ? '수정 완료' : '등록 완료'">등록 완료</span>
      </button>
    </div>

  </form>
</div>

<script th:inline="javascript">
  const originalImgSrc = /*[[${textbookDto.thmbImg}]]*/ null;

  function handleImagePreview(input) {
    const placeholder = document.getElementById('uploadPlaceholder');
    const container = document.getElementById('previewContainer');
    const preview = document.getElementById('previewImg');
    const isImgDeleted = document.getElementById('isImgDeleted');

    if (input.files && input.files[0]) {
      const file = input.files[0];
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 업로드할 수 있습니다.');
        input.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        placeholder.classList.add('hidden');
        container.classList.remove('hidden');
        isImgDeleted.value = 'N';
      };
      reader.readAsDataURL(file);
    }
  }

  function removeImage() {
    const input = document.getElementById('thmbImgFile');
    const placeholder = document.getElementById('uploadPlaceholder');
    const container = document.getElementById('previewContainer');
    const preview = document.getElementById('previewImg');
    const isImgDeleted = document.getElementById('isImgDeleted');

    input.value = '';
    preview.src = '';
    container.classList.add('hidden');
    placeholder.classList.remove('hidden');
    isImgDeleted.value = 'Y';
  }

  // 대분류 미선택 상태의 소분류 셀렉트에 가드 이벤트 추가
  function addSubjGuard(ts) {
    ts.control.addEventListener('mousedown', function (e) {
      e.stopPropagation();
      e.preventDefault();
      alert('대분류를 먼저 선택해주세요.');
    }, true);
  }

  // 대분류 선택 시 소분류 동적 로딩
  function loadSubjects(subjClId) {
    const subjIdEl = document.querySelector('select[name="subjId"]');
    if (!subjIdEl) return;
    if (subjIdEl.tomselect) subjIdEl.tomselect.destroy();
    subjIdEl.innerHTML = '<option value="">소분류 선택</option>';
    if (!subjClId) {
      addSubjGuard(window.initTomSelect(subjIdEl));
      return;
    }
    fetch('/admin/textbook/api/subjects?subjClId=' + subjClId)
      .then(res => res.json())
      .then(data => {
        data.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.subjId;
          opt.textContent = s.subjNm;
          subjIdEl.appendChild(opt);
        });
        const currentSubjId = /*[[${textbookDto.subjId}]]*/ null;
        if (currentSubjId) subjIdEl.value = String(currentSubjId);
        window.initTomSelect(subjIdEl);
      });
  }

  // 수정 폼 진입 시 소분류 목록 초기 로딩
  document.addEventListener('DOMContentLoaded', function () {
    const subjClIdSelect = document.getElementById('subjClIdSelect');
    const subjIdEl = document.querySelector('select[name="subjId"]');
    if (subjClIdSelect && subjClIdSelect.value) {
      loadSubjects(subjClIdSelect.value);
    } else if (subjIdEl && !subjIdEl.tomselect) {
      addSubjGuard(window.initTomSelect(subjIdEl));
    }
  });

  function openCoursePopup() {
    window.open('/admin/textbook/popup/courses', 'coursePopup',
      'width=720,height=540,scrollbars=yes,resizable=yes');
  }

  function selectCourse(sn, nm, instrNm) {
    document.getElementById('courseSn').value = sn;
    document.getElementById('courseNmDisplay').textContent = nm;
    document.getElementById('instrNmDisplay').textContent = instrNm ? instrNm + ' 강사' : '';
    document.getElementById('courseEmpty').classList.add('hidden');
    document.getElementById('courseCard').classList.remove('hidden');
  }

  function clearCourse() {
    document.getElementById('courseSn').value = '';
    document.getElementById('courseNmDisplay').textContent = '';
    document.getElementById('instrNmDisplay').textContent = '';
    document.getElementById('courseEmpty').classList.remove('hidden');
    document.getElementById('courseCard').classList.add('hidden');
  }

  function addQty(amount){
    const input = document.getElementById('initInvtCnt');
    let current = parseInt(input.value) || 0;
    input.value = current + amount;
  }

  function resetQty() {
      document.getElementById('initInvtCnt').value = 0;
    }

</script>
