<title th:fragment="pageTitle">교재 재고 관리 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">교재 재고 관리</h1>
      <p class="text-sm text-slate-500 mt-1">재고 현황을 확인하고 입출고 내역을 관리합니다.</p>
    </div>
    <div class="flex items-center gap-3">
      <a th:href="@{/admin/textbook}" class="hm-btn-ghost">
        <i class="fa-solid fa-arrow-left"></i>
        <span>목록으로</span>
      </a>
    </div>
  </div>

  <!-- ② 재고 현황 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-boxes-stacked"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">총 재고</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"
           th:text="${inventoryDto?.totInvtCnt + '권' ?: '0권'}">0권</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-box-open"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">판매 가능</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"
           th:text="${inventoryDto?.salableCnt + '권' ?: '0권'}">0권</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-cart-shopping"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">판매 완료</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"
           th:text="${inventoryDto?.saleCmplCnt + '권' ?: '0권'}">0권</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">파손/폐기</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"
           th:text="${inventoryDto?.dmgdDspslCnt + '권' ?: '0권'}">0권</p>
      </div>
    </div>
  </div>

  <!-- ③ 입/출고 등록 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 mb-5">
      <i class="fa-solid fa-arrow-right-arrow-left mr-2 text-violet-500"></i>입/출고 등록
    </h2>
    <form th:action="@{/admin/textbook/stock/{sn}/history(sn=${textbookSn})}" method="post"
          class="flex flex-wrap items-end gap-4"
          onsubmit="return confirm('입/출고 내역을 등록하시겠습니까?')">

      <!-- 유형 -->
      <div class="flex-1 min-w-48">
        <label class="block text-xs font-bold text-slate-500 mb-1.5">유형 (사유)</label>
        <select name="relDutyTypeCd" class="hm-input w-full">
          <optgroup label="입고">
            <option value="STOCK_IN">재고 입고</option>
            <option value="RETURN_IN">반품 입고</option>
          </optgroup>
          <optgroup label="출고">
            <option value="DAMAGE">파손/폐기</option>
            <option value="SALE_OUT">판매 출고</option>
          </optgroup>
        </select>
      </div>

      <!-- 수량 -->
      <div class="flex-1 min-w-36">
        <label class="block text-xs font-bold text-slate-500 mb-1.5">수량</label>
        <input type="number" name="chgCnt" class="hm-input w-full" min="1" placeholder="0" required />
      </div>

      <!-- 버튼 -->
      <div>
        <button type="submit" class="hm-btn-primary whitespace-nowrap">
          <i class="fa-solid fa-plus"></i>
          <span>등록</span>
        </button>
      </div>

    </form>
  </div>

  <!-- ④ 재고 수정 폼 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
    <h2 class="text-sm font-bold text-slate-700 pb-3 border-b border-slate-100 mb-5">
      <i class="fa-solid fa-pen mr-2 text-blue-500"></i>재고 수정
    </h2>
    <form th:action="@{/admin/textbook/stock/{sn}(sn=${textbookSn})}"
          th:object="${inventoryDto}"
          method="post"
          class="grid grid-cols-1 md:grid-cols-3 gap-5"
          onsubmit="return confirm('재고를 수정하시겠습니까?')">

      <!-- 총 재고 -->
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1.5">총 재고 수량</label>
        <input type="number" th:field="*{totInvtCnt}" class="hm-input w-full" min="0" />
      </div>

      <!-- 판매 가능 -->
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1.5">
          판매 가능 수량
          <span class="text-[10px] font-normal text-slate-400 ml-1">(자동 계산)</span>
        </label>
        <input type="number" th:field="*{salableCnt}" class="hm-input w-full bg-slate-50 text-slate-400 cursor-not-allowed" readonly />
      </div>

      <!-- 최소 유지 수량 -->
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1.5">최소 유지 수량</label>
        <input type="number" th:field="*{minKeepCnt}" class="hm-input w-full" min="0" />
      </div>

      <!-- 파손/폐기 -->
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1.5">파손/폐기 수량</label>
        <input type="number" th:field="*{dmgdDspslCnt}" class="hm-input w-full" min="0" />
      </div>

      <!-- 재고 상태 -->
      <div>
        <label class="block text-xs font-bold text-slate-500 mb-1.5">재고 상태</label>
        <select th:field="*{invtStatCd}" class="hm-input w-full">
          <option value="NORMAL">정상</option>
          <option value="SOLD_OUT">품절</option>
          <option value="WAITING">입고대기</option>
        </select>
      </div>

      <!-- 버튼 -->
      <div class="md:col-span-3 flex justify-end gap-3 pt-2">
        <button type="submit" class="hm-btn-primary">
          <i class="fa-solid fa-floppy-disk"></i>
          <span>재고 수정</span>
        </button>
      </div>

    </form>
  </div>

  <!-- ④ 입출고 내역 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="px-6 pt-5 pb-3 border-b border-slate-100">
      <h2 class="text-sm font-bold text-slate-700">
        <i class="fa-solid fa-clock-rotate-left mr-2 text-violet-500"></i>입출고 내역
      </h2>
    </div>

    <!-- 검색 필터 -->
    <div class="px-6 py-4 border-b border-slate-100">
      <form th:action="@{/admin/textbook/stock/{sn}(sn=${textbookSn})}" method="get"
            class="flex flex-wrap items-center gap-3">
        <!-- 입출고 유형 -->
        <select name="ioTypeCd" class="hm-input w-36">
          <option value="">전체</option>
          <option value="10" th:selected="${param.ioTypeCd == '10'}">입고</option>
          <option value="20" th:selected="${param.ioTypeCd == '20'}">출고</option>
        </select>
        <!-- 시작일 -->
        <input type="date" name="startDt" th:value="${param.startDt}" class="hm-input w-40" />
        <span class="text-slate-400 text-sm">~</span>
        <!-- 종료일 -->
        <input type="date" name="endDt" th:value="${param.endDt}" class="hm-input w-40" />
        <!-- 키워드 -->
        <input type="text" name="keyword" th:value="${param.keyword}"
               class="hm-input w-40" placeholder="처리자 ID 검색" />
        <button type="submit" class="hm-btn-primary">
          <i class="fa-solid fa-search"></i>
          <span>검색</span>
        </button>
        <a th:href="@{/admin/textbook/stock/{sn}(sn=${textbookSn})}" class="hm-btn-ghost">초기화</a>
      </form>
    </div>

    <!-- 내역 테이블 -->
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider">
            <th class="py-4 px-6 text-center">유형</th>
            <th class="py-4 px-6 text-left">사유</th>
            <th class="py-4 px-6 text-right">변경 수량</th>
            <th class="py-4 px-6 text-right">변경 전</th>
            <th class="py-4 px-6 text-right">변경 후</th>
            <th class="py-4 px-6 text-center">처리자</th>
            <th class="py-4 px-6 text-center">처리일시</th>
          </tr>
        </thead>
        <tbody id="history-table-body" class="divide-y divide-slate-50 text-sm text-slate-700">

          <!-- 데이터 없을 때 -->
          <tr th:if="${#lists.isEmpty(historyList)}">
            <td colspan="7" class="py-16 text-center text-slate-400 text-sm">
              입출고 내역이 없습니다.
            </td>
          </tr>

          <!-- 내역 목록 -->
          <tr th:each="history : ${historyList}" class="history-row hover:bg-slate-50/50 transition-colors">
            <!-- 유형 -->
            <td class="py-4 px-6 text-center">
              <span th:if="${history.ioTypeCd == '10'}"
                    class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-emerald-50 text-emerald-600">
                <i class="fa-solid fa-arrow-down mr-1"></i>입고
              </span>
              <span th:if="${history.ioTypeCd == '20'}"
                    class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold bg-rose-50 text-rose-600">
                <i class="fa-solid fa-arrow-up mr-1"></i>출고
              </span>
            </td>
            <!-- 사유 -->
            <td class="py-4 px-6 text-left">
              <span class="text-xs text-slate-600"
                th:text="${history.relDutyTypeCd?.label ?: '-'}">-</span>
            </td>
            <!-- 변경 수량 -->
            <td class="py-4 px-6 text-right font-bold"
                th:classappend="${history.ioTypeCd == '10'} ? 'text-emerald-600' : 'text-rose-600'"
                th:text="${(history.ioTypeCd == '10' ? '+' : '-') + history.chgCnt}">0</td>
            <!-- 변경 전 -->
            <td class="py-4 px-6 text-right text-slate-500" th:text="${history.bfrChgCnt}">0</td>
            <!-- 변경 후 -->
            <td class="py-4 px-6 text-right text-slate-700 font-medium" th:text="${history.aftChgCnt}">0</td>
            <!-- 처리자 -->
            <td class="py-4 px-6 text-center text-slate-600" th:text="${history.procUserId}">-</td>
            <!-- 처리일시 -->
            <td class="py-4 px-6 text-center text-xs text-slate-500"
                th:text="${#temporals.format(history.procDt, 'yyyy.MM.dd HH:mm')}">-</td>
          </tr>

        </tbody>
      </table>
    </div>

    <!-- JS 페이지네이션 -->
    <div id="history-pagination-wrap" class="flex items-center justify-between px-6 py-4 border-t border-slate-100">
      <p class="text-xs text-slate-400" id="history-pagination-info"></p>
      <div id="history-pagination" class="flex items-center gap-1"></div>
    </div>

  </div>

<script>
  const HISTORY_PAGE_SIZE = 10;
  const HISTORY_BLOCK_SIZE = 5;
  let currentHistoryPage = 1;

  function applyHistoryPaging() {
    const tbody = document.getElementById('history-table-body');
    if (!tbody) return;
    const allRows = Array.from(tbody.querySelectorAll('.history-row'));
    allRows.forEach(r => r.style.display = 'none');
    const offset = (currentHistoryPage - 1) * HISTORY_PAGE_SIZE;
    allRows.slice(offset, offset + HISTORY_PAGE_SIZE).forEach(r => r.style.display = '');
    renderHistoryPagination(allRows.length);
  }

  function renderHistoryPagination(totalCount) {
    const container = document.getElementById('history-pagination');
    const info = document.getElementById('history-pagination-info');
    const wrap = document.getElementById('history-pagination-wrap');
    if (!container) return;

    const totalPage = Math.ceil(totalCount / HISTORY_PAGE_SIZE);
    const start = totalCount === 0 ? 0 : (currentHistoryPage - 1) * HISTORY_PAGE_SIZE + 1;
    const end = Math.min(currentHistoryPage * HISTORY_PAGE_SIZE, totalCount);

    if (info) {
      info.textContent = totalCount === 0 ? '내역이 없습니다.' : `전체 ${totalCount}건 중 ${start}–${end} 표시`;
    }
    if (wrap) wrap.style.display = totalPage <= 1 ? 'none' : 'flex';
    if (totalPage <= 1) { container.innerHTML = ''; return; }

    const endPage = Math.min(Math.ceil(currentHistoryPage / HISTORY_BLOCK_SIZE) * HISTORY_BLOCK_SIZE, totalPage);
    const startPage = Math.max(endPage - HISTORY_BLOCK_SIZE + 1, 1);
    const BASE = 'w-8 h-8 rounded-lg text-xs flex items-center justify-center cursor-pointer transition-colors';

    let html = '';
    if (startPage > 1) {
      html += `<button onclick="goHistoryPage(${startPage - 1})" class="${BASE} text-slate-400 hover:bg-slate-100">‹</button>`;
    }
    for (let p = startPage; p <= endPage; p++) {
      const cls = p === currentHistoryPage ? 'bg-blue-500 text-white font-bold' : 'text-slate-500 hover:bg-slate-100';
      html += `<button onclick="goHistoryPage(${p})" class="${BASE} ${cls}">${p}</button>`;
    }
    if (endPage < totalPage) {
      html += `<button onclick="goHistoryPage(${endPage + 1})" class="${BASE} text-slate-400 hover:bg-slate-100">›</button>`;
    }
    container.innerHTML = html;
  }

  function goHistoryPage(p) {
    currentHistoryPage = p;
    applyHistoryPaging();
  }

  document.addEventListener('DOMContentLoaded', applyHistoryPaging);
</script>

</div>
