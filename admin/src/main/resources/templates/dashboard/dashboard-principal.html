<title th:fragment="pageTitle">대시보드 | HERMES</title>

<div class="space-y-6">
  <!-- 인사말 -->
  <div
    class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center justify-between"
  >
    <div>
      <h1 class="text-2xl font-bold text-gray-900">
        안녕하세요, <span th:text="${adminUserName}">원장님</span> 👋
      </h1>
      <p class="text-sm text-gray-500 mt-1">오늘도 HERMES 운영을 함께합니다.</p>
    </div>
    <span
      class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-violet-700 bg-violet-50 rounded-full border border-violet-100"
    >
      <span class="w-1.5 h-1.5 bg-violet-500 rounded-full animate-pulse"></span>
      원장
    </span>
  </div>

  <!-- 요약 카드 -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            내 결재 대기
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${myPendingCnt} + ' 건'"
          >
            0 건
          </h3>
        </div>
        <div class="p-2.5 bg-violet-50 text-violet-600 rounded-xl">
          <i class="fa-solid fa-pen-to-square text-base"></i>
        </div>
      </div>
      <a
        href="/admin/approval"
        class="mt-4 flex items-center gap-1 text-xs text-violet-600 font-medium hover:underline"
      >
        결재함 바로가기 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            전체 미결재 건수
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${allPendingCnt} + ' 건'"
          >
            0 건
          </h3>
        </div>
        <div class="p-2.5 bg-amber-50 text-amber-600 rounded-xl">
          <i class="fa-solid fa-file-circle-exclamation text-base"></i>
        </div>
      </div>
      <p class="mt-4 text-xs text-gray-400">전 직원 미처리 결재 합계</p>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            이번 달 총 매출
          </p>
          <h3
            class="text-2xl font-bold text-emerald-600 mt-2"
            th:text="${#numbers.formatInteger(monthTotal, 0, 'COMMA')} + ' 원'"
          >
            0 원
          </h3>
        </div>
        <div class="p-2.5 bg-emerald-50 text-emerald-600 rounded-xl">
          <i class="fa-solid fa-won-sign text-base"></i>
        </div>
      </div>
      <a
        href="/admin/finance"
        class="mt-4 flex items-center gap-1 text-xs text-emerald-600 font-medium hover:underline"
      >
        매출 상세 보기 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            신규 회원 승인 대기
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${pendingMemberCnt} + ' 명'"
          >
            0 명
          </h3>
        </div>
        <div class="p-2.5 bg-rose-50 text-rose-500 rounded-xl">
          <i class="fa-solid fa-user-clock text-base"></i>
        </div>
      </div>
      <a
        href="/admin/students/approve"
        class="mt-4 flex items-center gap-1 text-xs text-rose-500 font-medium hover:underline"
      >
        승인 처리 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            운영 중 클래스룸
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${activeClassCnt} + ' 개'"
          >
            0 개
          </h3>
        </div>
        <div class="p-2.5 bg-sky-50 text-sky-600 rounded-xl">
          <i class="fa-solid fa-chalkboard-user text-base"></i>
        </div>
      </div>
      <a
        href="/admin/monitoring"
        class="mt-4 flex items-center gap-1 text-xs text-sky-600 font-medium hover:underline"
      >
        학사 모니터링 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            전체 수강생 수
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${totalStudentCnt} + ' 명'"
          >
            0 명
          </h3>
        </div>
        <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
          <i class="fa-solid fa-users text-base"></i>
        </div>
      </div>
      <p class="mt-4 text-xs text-gray-400">현재 클래스룸 등록 학생 합계</p>
    </div>
  </div>

  <!-- 바로가기 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
    <h2 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
      <i class="fa-solid fa-layer-group text-violet-500"></i> 주요 메뉴 바로가기
    </h2>
    <div class="flex flex-wrap gap-3">
      <a
        href="/admin/approval"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-violet-600 hover:bg-violet-700 rounded-xl transition-all shadow-sm"
      >
        <i class="fa-solid fa-file-signature text-xs"></i> 전자결재
      </a>
      <a
        href="/admin/finance"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-all"
      >
        <i class="fa-solid fa-chart-line text-xs text-gray-400"></i> 매출·재무
      </a>
      <a
        href="/admin/students/approve"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-all"
      >
        <i class="fa-solid fa-user-check text-xs text-gray-400"></i> 회원 승인
      </a>
      <a
        href="/admin/monitoring"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-all"
      >
        <i class="fa-solid fa-gauge text-xs text-gray-400"></i> 학사 모니터링
      </a>
      <a
        href="/admin/quality"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-xl transition-all"
      >
        <i class="fa-solid fa-star text-xs text-gray-400"></i> 서비스 품질
      </a>
    </div>
  </div>
</div>
