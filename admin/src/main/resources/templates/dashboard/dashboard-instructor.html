<title th:fragment="pageTitle">대시보드 | HERMES</title>

<div class="space-y-6">
  <!-- 인사말 -->
  <div
    class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center justify-between"
  >
    <div>
      <h1 class="text-2xl font-bold text-gray-900">
        안녕하세요, <span th:text="${adminUserName}"></span> 선생님! 👋
      </h1>
      <p class="text-sm text-gray-500 mt-1">오늘도 수고해주세요.</p>
    </div>
    <span
      class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-indigo-700 bg-indigo-50 rounded-full border border-indigo-100"
    >
      <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span>
      <span th:text="${isTeamLead} ? '강사팀장' : '강사'">강사</span>
    </span>
  </div>

  <!-- 공통 요약 카드 (4개) -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- 내 결재 대기 -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            내 결재 대기
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${myPendingCnt} + ' 건'"
          >
            0 건
          </h3>
        </div>
        <div class="p-2.5 bg-violet-50 text-violet-600 rounded-xl">
          <i class="fa-solid fa-pen-to-square text-base"></i>
        </div>
      </div>
      <a
        href="/admin/approval"
        class="mt-4 flex items-center gap-1 text-xs text-violet-600 font-medium hover:underline"
      >
        결재함 바로가기 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <!-- 내 클래스룸 수 -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            내 클래스룸
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${myClassroomCnt} + ' 개'"
          >
            0 개
          </h3>
        </div>
        <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
          <i class="fa-solid fa-chalkboard-user text-base"></i>
        </div>
      </div>
      <a
        href="/classroom/list"
        class="mt-4 flex items-center gap-1 text-xs text-indigo-600 font-medium hover:underline"
      >
        클래스룸 목록 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <!-- 강사 게시판 미답변 Q&A -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            미답변 Q&amp;A
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${unansweredQnaCnt} + ' 건'"
          >
            0 건
          </h3>
        </div>
        <div class="p-2.5 bg-amber-50 text-amber-600 rounded-xl">
          <i class="fa-solid fa-circle-question text-base"></i>
        </div>
      </div>
      <a
        href="/instructor/board/list"
        class="mt-4 flex items-center gap-1 text-xs text-amber-600 font-medium hover:underline"
      >
        강사 게시판 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <!-- 보유 문항 수 -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            보유 문항 수
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${myQuestionCnt} + ' 개'"
          >
            0 개
          </h3>
        </div>
        <div class="p-2.5 bg-sky-50 text-sky-600 rounded-xl">
          <i class="fa-solid fa-list-check text-base"></i>
        </div>
      </div>
      <a
        href="/instructor/questions"
        class="mt-4 flex items-center gap-1 text-xs text-sky-600 font-medium hover:underline"
      >
        문항 관리 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>
  </div>

  <!-- 일반 강사: 이번 달 내 일지 -->
  <div
    th:unless="${isTeamLead}"
    class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100"
  >
    <div class="flex justify-between items-start">
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">
          이번 달 내 일지
        </p>
        <h3
          class="text-2xl font-bold text-gray-900 mt-2"
          th:text="${myJournalCnt} + ' 건'"
        >
          0 건
        </h3>
      </div>
      <div class="p-2.5 bg-emerald-50 text-emerald-600 rounded-xl">
        <i class="fa-solid fa-book-open text-base"></i>
      </div>
    </div>
    <a
      href="/instructor/journals"
      class="mt-4 flex items-center gap-1 text-xs text-emerald-600 font-medium hover:underline"
    >
      일지 작성하기 <i class="fa-solid fa-angle-right text-[10px]"></i>
    </a>
  </div>

  <!-- 팀장 전용: 팀 현황 카드 -->
  <div th:if="${isTeamLead}" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            운영 중 클래스룸
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${activeClassCnt} + ' 개'"
          >
            0 개
          </h3>
        </div>
        <div class="p-2.5 bg-indigo-50 text-indigo-600 rounded-xl">
          <i class="fa-solid fa-layer-group text-base"></i>
        </div>
      </div>
      <p class="mt-4 text-xs text-gray-400">전체 ACTIVE 클래스룸 합계</p>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            이번 달 팀 일지
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${thisMonthJournalCnt} + ' 건'"
          >
            0 건
          </h3>
        </div>
        <div class="p-2.5 bg-emerald-50 text-emerald-600 rounded-xl">
          <i class="fa-solid fa-book-open text-base"></i>
        </div>
      </div>
      <a
        href="/instructor/journals"
        class="mt-4 flex items-center gap-1 text-xs text-emerald-600 font-medium hover:underline"
      >
        팀 일지 보기 <i class="fa-solid fa-angle-right text-[10px]"></i>
      </a>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-start">
        <div>
          <p
            class="text-xs font-semibold text-gray-400 uppercase tracking-wider"
          >
            재직 중 강사
          </p>
          <h3
            class="text-2xl font-bold text-gray-900 mt-2"
            th:text="${teamMemberCnt} + ' 명'"
          >
            0 명
          </h3>
        </div>
        <div class="p-2.5 bg-violet-50 text-violet-600 rounded-xl">
          <i class="fa-solid fa-people-group text-base"></i>
        </div>
      </div>
      <p class="mt-4 text-xs text-gray-400">강사팀 현재 재직 인원</p>
    </div>
  </div>

  <!-- 바로가기 -->

    </h2>

      </a>
      <a href="/classroom/list"

</div>
