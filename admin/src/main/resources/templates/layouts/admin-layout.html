<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:replace="~{${contentPage} :: pageTitle} ?: _">HERMES Admin</title>

    <!--
      [FOUC 방지 1단계] 페이지 전체를 숨긴다.
      Tailwind CDN은 동기 스크립트라 실행되는 동안 브라우저가 잠시 멈추는데,
      그 사이에 스타일 없는 HTML이 순간적으로 노출(FOUC)될 수 있다.
      visibility: hidden을 Tailwind 로드 전에 적용해 그 틈을 막는다.
      페이지는 아래 DOMContentLoaded 스크립트가 다시 visible로 되돌린다.
    -->
    <style>html { visibility: hidden; }</style>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{/css/admin-core.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}" />

    <!--
      [FOUC 방지 2단계] 사이드바 상태를 첫 페인트 전에 DOM에 반영한다.

      문제: sidebar-admin.js는 defer로 로드되어 DOM 파싱 완료 후 실행된다.
           그 전에 브라우저가 이미 첫 프레임을 그리면, 사이드바가 잠깐
           보였다가 사라지는 깜빡임(FOUC)이 발생한다.
      해결: <head>에서 인라인 스크립트로 즉시 실행해 JS가 뜨기 전에 상태를 적용한다.

      ① 사이드바 숨김 상태: html[data-sidebar="hidden"] 속성을 미리 추가.
         sidebar-admin.css에 이 속성을 보고 width:0을 적용하는 규칙이 있다.
         sidebar-admin.js가 실행되면 이 속성을 지우고 classList로 관리를 넘긴다.

      ② 섹션 접힘 상태: localStorage에 저장된 collapsed 섹션들을 읽어
         max-height:0 스타일을 동적으로 생성해 <head>에 주입한다.
         transition:none !important로 초기화 시 애니메이션이 재생되지 않게 막는다.
         sidebar-admin.js가 실행된 후 이 임시 스타일 태그(sectionInitStyle)를 제거한다.
    -->
    <script>
      (function () {
        // ① 사이드바 숨김 FOUC 방지
        if (localStorage.getItem("hermesSidebarState") === "hidden") {
          document.documentElement.setAttribute("data-sidebar", "hidden");
        }

        // ② 섹션 collapsed FOUC 방지
        var sectionState = JSON.parse(localStorage.getItem("hermesSectionState") || "{}");
        var css = Object.keys(sectionState)
          .filter(function (k) { return sectionState[k] === "collapsed"; })
          .map(function (k) {
            var sel = '[data-section-key="' + k + '"]';
            return sel + ' .sidebar-list { max-height: 0 !important; transition: none !important; }' +
                   sel + ' .sidebar-section-arrow { transform: rotate(90deg) !important; transition: none !important; }';
          })
          .join("");
        if (css) {
          var style = document.createElement("style");
          style.id = "sectionInitStyle";
          style.textContent = css;
          document.head.appendChild(style);
        }
      })();
    </script>
  </head>

  <body class="h-screen flex flex-col overflow-hidden">
    <th:block th:replace="~{fragments/header :: headerFragment}"></th:block>

    <div class="flex-1 flex min-h-0 w-full relative">
      <div
        th:replace="~{fragments/sidebars/sidebar_admin :: sidebarAdminFragment}"
      ></div>

      <main class="flex-1 overflow-y-auto p-8 no-scrollbar bg-[#F8FAFC]">
        <th:block th:insert="~{${contentPage}}"></th:block>
      </main>
    </div>

    <!--
      현재 활성 메뉴가 사이드바 화면 밖에 있을 때 자동 스크롤한다.
      defer 스크립트(sidebar-admin.js)가 아닌 인라인으로 두는 이유:
      defer는 DOM 파싱 후 실행되지만 첫 페인트보다 늦을 수 있어,
      스크롤이 화면에 보인 뒤 뒤늦게 발생하는 점프(FOUC)가 생긴다.
      인라인은 렌더링 직전에 실행되어 점프 없이 올바른 위치에서 시작한다.
    -->
    <script>
      (function () {
        if (localStorage.getItem("hermesSidebarState") === "hidden") return;
        var active = document.querySelector("#adminSidebar .sidebar-link.active");
        if (active) active.scrollIntoView({ block: "center" });
      })();
    </script>

    <!--
      [FOUC 방지 3단계] 페이지를 다시 보이게 한다.
      DOMContentLoaded 후 requestAnimationFrame을 2번 중첩하는 이유:
      1번째 rAF: 브라우저가 스타일 계산(layout)을 완료한 프레임을 예약
      2번째 rAF: 실제 화면에 그려지는(paint) 프레임에 맞춰 visible 적용
      이 시점이면 Tailwind CSS와 모든 스타일이 적용된 상태이므로
      완성된 화면이 한 번에 나타나고 FOUC가 발생하지 않는다.
    -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.style.visibility = "visible";
          });
        });
      });
    </script>

    <script th:src="@{/js/admin-core.js}" defer></script>
    <script th:src="@{/js/sidebar-admin.js}" defer></script>

    <!-- SockJS → StompJS → notification.js 순서로 defer 실행되어야 한다 (의존성 순서) -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js" defer></script>
    <script th:src="@{/js/notification.js}" defer></script>
  </body>
</html>
