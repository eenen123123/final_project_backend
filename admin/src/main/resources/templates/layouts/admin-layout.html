<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:replace="~{${contentPage} :: pageTitle} ?: _">HERMES Admin</title>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- tom-select.css 를 먼저 로드해야 admin-core.css 의 오버라이드가 !important 없이 동작함 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" />
    <link rel="stylesheet" th:href="@{/css/admin-core.css}" />
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}" />
  </head>

  <body class="h-screen flex flex-col overflow-hidden">
    <header th:replace="~{fragments/header :: headerFragment}"></header>

    <div class="flex-1 flex min-h-0 w-full relative">
      <div
        th:replace="~{fragments/sidebars/sidebar_admin :: sidebarAdminFragment}"
      ></div>

      <main class="flex-1 overflow-y-auto p-8 no-scrollbar bg-[#F8FAFC]">
        <th:block th:insert="~{${contentPage}}"></th:block>
      </main>
    </div>

    <script th:src="@{/js/admin-core.js}" defer></script>
    <script th:src="@{/js/sidebar-admin.js}" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    <script>
      // 전역 Tom Select 초기화 함수 — data-ts-defer 없는 select 에 자동 적용,
      // fetch 등으로 options 를 비동기 로드하는 경우 data-ts-defer 속성 추가 후 직접 호출
      window.initTomSelect = function (el) {
        return new TomSelect(el, {
          create: false,
          onInitialize: function () {
            // 드롭다운 전용으로 사용하므로 타이핑 입력 차단
            this.control_input.setAttribute("readonly", "readonly");
          },
        });
      };

      document.querySelectorAll("select.hm-input:not([data-ts-defer])").forEach(function (el) {
        window.initTomSelect(el);
      });
    </script>
  </body>
</html>
