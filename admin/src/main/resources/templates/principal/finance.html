<title th:fragment="pageTitle">매출 및 재무 분석 | HERMES</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">매출 및 재무 분석</h1>
      <p class="text-sm text-slate-500 mt-1">원비 수납과 온라인 결제(강의·교재)를 합산한 매출 현황을 조회합니다.</p>
    </div>
    <div class="w-40">
      <!-- 연도: 공통코드 218 -->
      <select class="hm-input" id="yearSelect" onchange="loadMonthly(this.value)"></select>
    </div>
  </div>

  <!-- ② 요약 통계 카드 (이번 달) -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-won-sign"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">이번 달 매출</p>
      </div>
      <p class="text-2xl font-bold text-slate-800"><span id="card-total">0</span> <span class="text-sm text-slate-400">원</span></p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-arrow-trend-up"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">전월 대비</p>
      </div>
      <p class="text-2xl font-bold text-slate-800" id="card-growth">-</p>
      <p class="text-xs text-slate-400 mt-0.5" id="card-growth-prev">전월 0원</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-sky-50 text-sky-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-building-columns"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">원비 수입</p>
      </div>
      <p class="text-2xl font-bold text-slate-800"><span id="card-tuition">0</span> <span class="text-sm text-slate-400">원</span></p>
      <p class="text-xs text-slate-400 mt-0.5" id="card-tuition-pct">-</p>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-lg shrink-0">
          <i class="fa-solid fa-cart-shopping"></i>
        </div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider leading-tight">강의·교재 수입</p>
      </div>
      <p class="text-2xl font-bold text-slate-800"><span id="card-online">0</span> <span class="text-sm text-slate-400">원</span></p>
      <p class="text-xs text-slate-400 mt-0.5" id="card-online-pct">-</p>
    </div>
  </div>

  <!-- ③ 탭 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="flex border-b border-slate-100 px-6 pt-4 gap-1">
      <button data-tab="tab-trend"
        class="fin-tab-btn px-5 py-2.5 text-sm font-semibold rounded-t-xl transition-all text-slate-500 hover:text-violet-600 border-b-2 border-transparent"
        onclick="switchFinTab('tab-trend', this)">
        <i class="fa-solid fa-chart-line mr-2"></i>월별 매출 추이
      </button>
      <button data-tab="tab-ratio"
        class="fin-tab-btn px-5 py-2.5 text-sm font-semibold rounded-t-xl transition-all text-slate-500 hover:text-violet-600 border-b-2 border-transparent"
        onclick="switchFinTab('tab-ratio', this)">
        <i class="fa-solid fa-chart-pie mr-2"></i>항목별 비율 분석
      </button>
      <button data-tab="tab-cashflow"
        class="fin-tab-btn px-5 py-2.5 text-sm font-semibold rounded-t-xl transition-all text-slate-500 hover:text-violet-600 border-b-2 border-transparent"
        onclick="switchFinTab('tab-cashflow', this)">
        <i class="fa-solid fa-receipt mr-2"></i>수입 거래 내역
      </button>
    </div>

    <!-- ===== TAB 1: 월별 매출 추이 ===== -->
    <div id="tab-trend" class="fin-tab-panel p-6 space-y-6">
      <div class="h-72">
        <canvas id="monthlyChart"></canvas>
      </div>

      <div class="rounded-xl border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider">
                <th class="py-3.5 px-6">월</th>
                <th class="py-3.5 px-6 text-right">원비</th>
                <th class="py-3.5 px-6 text-right">강의</th>
                <th class="py-3.5 px-6 text-right">교재</th>
                <th class="py-3.5 px-6 text-right">기타</th>
                <th class="py-3.5 px-6 text-right">총 매출</th>
                <th class="py-3.5 px-6 text-center">전월 대비</th>
              </tr>
            </thead>
            <tbody id="trend-tbody" class="divide-y divide-slate-50 text-sm text-slate-700"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===== TAB 2: 항목별 비율 분석 ===== -->
    <div id="tab-ratio" class="fin-tab-panel p-6 hidden">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
        <div class="flex flex-col items-center">
          <h3 class="text-sm font-bold text-slate-700 mb-4">이번 달 수입 항목별 비율</h3>
          <div class="w-64 h-64">
            <canvas id="ratioChart"></canvas>
          </div>
        </div>
        <div class="space-y-3" id="ratio-breakdown"></div>
      </div>
    </div>

    <!-- ===== TAB 3: 수입 거래 내역 ===== -->
    <div id="tab-cashflow" class="fin-tab-panel p-6 space-y-5 hidden">
      <!-- 필터 -->
      <div class="flex flex-wrap items-center gap-3">
        <input type="month" class="hm-input w-44" id="tx-month" onchange="loadTransactions(1)" />
        <!-- 결제수단: 공통코드 223 -->
        <select class="hm-input w-44" id="tx-mthd" onchange="loadTransactions(1)"></select>
      </div>

      <!-- 월 요약 배너 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="rounded-xl bg-violet-50 border border-violet-100 p-4 text-center">
          <p class="text-xs font-bold text-violet-600 uppercase tracking-wider">선택 월 총 수입</p>
          <p class="text-xl font-bold text-violet-700 font-mono mt-1"><span id="tx-total">0</span> 원</p>
        </div>
        <div class="rounded-xl bg-slate-50 border border-slate-100 p-4 text-center">
          <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">거래 건수</p>
          <p class="text-xl font-bold text-slate-700 font-mono mt-1"><span id="tx-count">0</span> 건</p>
        </div>
      </div>

      <!-- 거래 내역 테이블 -->
      <div class="rounded-xl border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-500 tracking-wider">
                <th class="py-3.5 px-6">날짜</th>
                <th class="py-3.5 px-6 text-center">구분</th>
                <th class="py-3.5 px-6">항목</th>
                <th class="py-3.5 px-6">구매자</th>
                <th class="py-3.5 px-6 text-center">결제수단</th>
                <th class="py-3.5 px-6 text-right">금액 (원)</th>
              </tr>
            </thead>
            <tbody id="tx-tbody" class="divide-y divide-slate-50 text-sm text-slate-700"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50/50">
          <p class="text-xs text-slate-400" id="tx-info"></p>
          <div class="flex items-center gap-1" id="tx-pagination"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Tailwind safelist: 동적 JS 클래스 인식용 -->
<div class="hidden w-8 h-8 rounded-lg text-xs items-center justify-center bg-violet-600 text-white font-bold text-slate-400 hover:bg-slate-100"></div>

<th:block th:fragment="pageJs">
  <script th:src="@{/js/principal/finance.js}"></script>
</th:block>
