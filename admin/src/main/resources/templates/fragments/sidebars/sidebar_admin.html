<aside
  th:fragment="sidebarAdminFragment"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  id="adminSidebar"
  class="w-60 bg-[#121212] text-slate-400 flex flex-col shrink-0 z-20 transition-all duration-300 overflow-hidden relative border-r border-white/5"
>
  <nav class="flex-1 overflow-y-auto py-8 no-scrollbar overflow-x-hidden">
    <div th:replace="~{fragments/sidebars/menus/menu_common}"></div>

    <div
      sec:authorize="hasAuthority('D400')"
      th:replace="~{fragments/sidebars/menus/menu_principal}"
    ></div>

    <div
      sec:authorize="hasAuthority('D100') and hasAuthority('A001') or hasAuthority('D400')"
      th:replace="~{fragments/sidebars/menus/menu_manager}"
    ></div>

    <div
      sec:authorize="hasAuthority('D100') or hasAuthority('D400')"
      th:replace="~{fragments/sidebars/menus/menu_staff}"
    ></div>

    <div
      sec:authorize="hasAuthority('D200') or hasAuthority('D400')"
      th:replace="~{fragments/sidebars/menus/menu_pd}"
    ></div>

    <div
      sec:authorize="hasAuthority('D300') or hasAuthority('D400')"
      th:replace="~{fragments/sidebars/menus/menu_instructor}"
    ></div>
  </nav>
</aside>
