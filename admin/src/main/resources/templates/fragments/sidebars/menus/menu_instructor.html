<div
  class="sidebar-section"
  data-section-key="강사 업무"
  style="--section-color: #0ea5e9"
>
  <p class="sidebar-title text-sky-500 sidebar-section-toggle">
    <i class="fa-solid fa-chalkboard-user sidebar-section-icon"></i>강사 업무<i
      class="fa-solid fa-chevron-down sidebar-section-arrow"
    ></i>
  </p>
  <ul class="sidebar-list">
    <!-- 담당 클래스 관리 -->
    <li>
      <a
        href="/classroom/list"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/classroom')} ? 'active'"
      >
        <i class="fa-solid fa-chalkboard sidebar-icon"></i>
        <span class="sidebar-link-text">담당 클래스 관리</span>
      </a>
    </li>

    <!-- 강사 게시판 -->
    <li>
      <a
        href="/instructor/board/list"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/instructor/board')} ? 'active'"
      >
        <i class="fa-solid fa-clipboard sidebar-icon"></i>
        <span class="sidebar-link-text">강사 게시판</span>
      </a>
    </li>

    <!-- 문항 관리 -->
    <li>
      <a
        href="/instructor/questions"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/instructor/questions')} ? 'active'"
      >
        <i class="fa-solid fa-marker sidebar-icon"></i>
        <span class="sidebar-link-text">문항 관리</span>
      </a>
    </li>

    <!-- 업무 일지 관리 -->
    <li>
      <a
        href="/instructor/journals"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/instructor/journals')} ? 'active'"
      >
        <i class="fa-solid fa-book sidebar-icon"></i>
        <span class="sidebar-link-text">업무 일지</span>
      </a>
    </li>

    <!-- 커리큘럼 관리 -->
    <li>
      <a
        href="/instructor/curriculum"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/instructor/curriculum')} ? 'active'"
      >
        <i class="fa-solid fa-book-open-reader sidebar-icon"></i>
        <span class="sidebar-link-text">커리큘럼 관리</span>
      </a>
    </li>

    <!--  개인 페이지 관리 -->
    <li>
      <a
        href="/instructor/profile/instructor"
        class="sidebar-link"
        th:classappend="${currentUri.startsWith('/instructor/profile')} ? 'active'"
      >
        <i class="fa-solid fa-address-card sidebar-icon"></i>
        <span class="sidebar-link-text">개인 페이지 관리</span>
      </a>
    </li>
  </ul>
</div>
