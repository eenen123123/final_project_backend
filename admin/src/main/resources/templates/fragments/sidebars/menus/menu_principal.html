<div class="sidebar-section"
     th:if="${allowedMenus == null or allowedMenus.contains('academic_monitoring') or allowedMenus.contains('system_log') or allowedMenus.contains('finance_analysis') or allowedMenus.contains('quality') or allowedMenus.contains('perm_settings')}"
     data-section-key="원장 업무" style="--section-color: #8b5cf6;">
  <p class="sidebar-title text-violet-500 sidebar-section-toggle"><i class="fa-solid fa-user-tie sidebar-section-icon"></i>원장 업무<i class="fa-solid fa-chevron-down sidebar-section-arrow"></i></p>
  <ul class="sidebar-list">
    <li th:if="${allowedMenus == null or allowedMenus.contains('academic_monitoring')}">
      <a href="/admin/monitoring" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/monitoring')} ? 'active'">
        <i class="fa-solid fa-desktop sidebar-icon"></i>
        <span class="sidebar-link-text">학사 운영 모니터링</span>
      </a>
    </li>
    <li th:if="${allowedMenus == null or allowedMenus.contains('system_log')}">
      <a href="/admin/system/monitoring" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/system/monitoring')} ? 'active'">
        <i class="fa-solid fa-user-shield sidebar-icon"></i>
        <span class="sidebar-link-text">시스템 로그 관리</span>
      </a>
    </li>
    <li th:if="${allowedMenus == null or allowedMenus.contains('finance_analysis')}">
      <a href="/admin/finance" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/finance')} ? 'active'">
        <i class="fa-solid fa-coins sidebar-icon"></i>
        <span class="sidebar-link-text">매출 및 재무 분석</span>
      </a>
    </li>
    <li th:if="${allowedMenus == null or allowedMenus.contains('quality')}">
      <a href="/admin/quality" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/quality')} ? 'active'">
        <i class="fa-solid fa-star-half-stroke sidebar-icon"></i>
        <span class="sidebar-link-text">서비스 품질 관리</span>
      </a>
    </li>
    <li th:if="${allowedMenus == null or allowedMenus.contains('perm_settings')}">
      <a href="/admin/settings/permissions" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/settings/permissions')} ? 'active'">
        <i class="fa-solid fa-user-shield sidebar-icon"></i>
        <span class="sidebar-link-text">관리자 권한 설정</span>
      </a>
    </li>
  </ul>
</div>
