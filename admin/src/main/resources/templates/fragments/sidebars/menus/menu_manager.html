<div class="sidebar-section"
     th:if="${allowedMenus == null or allowedMenus.contains('instructor_monitor') or allowedMenus.contains('consultation') or allowedMenus.contains('retention')}"
     data-section-key="행정팀장 업무" style="--section-color: #10b981;">
  <p class="sidebar-title text-emerald-500 sidebar-section-toggle"><i class="fa-solid fa-users-gear sidebar-section-icon"></i>행정팀장 업무<i class="fa-solid fa-chevron-down sidebar-section-arrow"></i></p>
  <ul class="sidebar-list">

    <li th:if="${allowedMenus == null or allowedMenus.contains('instructor_monitor')}">
      <a href="/admin/instructors/monitor" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/instructors/monitor')} ? 'active'">
        <i class="fa-solid fa-chalkboard-user sidebar-icon"></i>
        <span class="sidebar-link-text">강사 및 업무 모니터링</span>
      </a>
    </li>

    <li th:if="${allowedMenus == null or allowedMenus.contains('consultation')}">
      <a href="/admin/consultation" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/consultation')} ? 'active'">
        <i class="fa-solid fa-handshake sidebar-icon"></i>
        <span class="sidebar-link-text">학부모 상담 관리</span>
      </a>
    </li>

    <li th:if="${allowedMenus == null or allowedMenus.contains('retention')}">
      <a href="/admin/retention" class="sidebar-link"
         th:classappend="${currentUri.startsWith('/admin/retention')} ? 'active'">
        <i class="fa-solid fa-shield-heart sidebar-icon"></i>
        <span class="sidebar-link-text">퇴원 방어 및 유지</span>
      </a>
    </li>

  </ul>
</div>
