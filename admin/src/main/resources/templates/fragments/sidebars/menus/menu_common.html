<div class="sidebar-section" data-section-key="공통 업무" style="--section-color: #cbd5e1;">

  <ul class="sidebar-list">
    <li>
      <a href="/admin/note" class="sidebar-link" th:classappend="${currentUri.startsWith('/admin/note')} ? 'active'">

      </a>
    </li>
    <li>
      <a href="/admin/chat/room/list" class="sidebar-link"

      </a>

    <li>
      <a href="/admin/approval" class="sidebar-link"

      </a>
    </li>
    <!-- <li>
      <a href="/admin/board/customer-service" class="sidebar-link"
        th:classappend="${currentUri.startsWith('/admin/board/customer-service')} ? 'active'">
        <i class="fa-solid fa-headset sidebar-icon"></i>
        <span class="sidebar-link-text">고객센터 관리</span>
      </a>
    </li> -->

    <li>
      <a href="/admin/calendar" class="sidebar-link"
        th:classappend="${currentUri.startsWith('/admin/calendar')} ? 'active'">

        <span class="sidebar-link-text">통합 일정 관리</span>
      </a>
    </li>
    <li>
      <a href="/admin/course/list" class="sidebar-link"

        <i class="fa-solid fa-chalkboard sidebar-icon"></i>

    <li>
      <a href="/admin/certificate" class="sidebar-link"

        <span class="sidebar-link-text">증명서 발급</span>
