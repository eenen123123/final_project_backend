<title th:fragment="pageTitle">쪽지함 | HERMES Admin</title>

<style>
  .note-nav-link {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.5rem 0.875rem;
    border-radius: 0.625rem;
    font-size: 0.875rem;
    color: #475569;
    transition:
      background 0.15s,
      color 0.15s;
    cursor: pointer;
    text-decoration: none;
  }
  .note-nav-link:hover {
    background-color: #f1f5f9;
    color: #1e293b;
  }
  .note-nav-link.active {
    background-color: #ede9fe;
    color: #7c3aed;
    font-weight: 600;
  }
  .note-nav-link.personal {
    color: #3b82f6;
  }

  .note-nav-link.personal:hover {
    background-color: #dbeafe;
    color: #1e40af;
  }

  .note-nav-link.system {
    color: #10b981;
  }

  .note-nav-link.system:hover {
    background-color: #d1fae5;
    color: #065f46;
  }

  .note-nav-link.trash {
    color: #94a3b8;
  }
  .note-nav-link.trash:hover {
    background-color: #fee2e2;
    color: #ef4444;
  }
  .note-subnav {
    padding-left: 1.25rem;
    margin-top: 0.125rem;
    display: flex;
    flex-direction: column;
    gap: 0.125rem;
    border-left: 2px solid #e2e8f0;
    margin-left: 1.125rem;
  }
  .note-subnav .note-nav-link {
    font-size: 0.8125rem;
    padding: 0.375rem 0.75rem;
  }
  .note-table {
    table-layout: fixed;
  }
  .note-table th {
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    color: #64748b;
    border-bottom: 1px solid #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
  }
  .note-table td {
    padding: 0.875rem 1rem;
    font-size: 0.875rem;
    color: #334155;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    max-width: 0;
  }
  .note-table tbody tr:hover {
    background-color: #f8fafc;
  }
  .note-table tbody tr.unread td {
    font-weight: 600;
    color: #1e293b;
  }
  .note-subject {
    max-width: 200px;
    font-weight: 600;
    color: #1e293b;
    cursor: pointer;
  }
  .note-content-preview {
    max-width: 480px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .note-content-preview:hover {
    color: #7c3aed;
  }
</style>
<!-- ───────────────── 페이지 헤더 ───────────────── -->
<div class="flex items-center justify-between mb-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">메시지 관리</h1>
    <p class="text-sm text-slate-500 mt-0.5">메시지를 주고받고 보관·삭제하며 관리합니다.</p>
  </div>
</div>
<!-- 쪽지함 레이아웃: 좌측 탐색 + 우측 목록 -->
<div
  class="flex bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"
  style="height: calc(100vh - 9rem)"
>
  <!-- 좌측 쪽지 탐색 패널 -->
  <aside
    class="w-60 flex-shrink-0 flex flex-col border-r border-slate-100 bg-slate-50"
  >
    <!-- 쪽지 쓰기 버튼 -->
    <div class="p-4 space-y-2 border-b border-slate-100">
      <a
        class="hm-btn-primary w-full"
        th:href="@{/admin/note/write}"
        target="_blank"
        onclick="
          window.open(this.href, '_blank', 'width=1000,height=600');
          return false;
        "
      >
        <i class="fa-solid fa-pen-to-square"></i>
        쪽지 쓰기
      </a>
      <button
        class="w-full flex items-center justify-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-600 bg-white hover:bg-slate-50 transition-colors"
      >
        <i class="fa-solid fa-user-pen text-slate-400"></i>
        내게 쓰기
      </button>
    </div>

    <!-- 쪽지 카테고리 목록 -->
    <nav class="flex-1 p-3 overflow-y-auto no-scrollbar">
      <ul class="space-y-0.5">
        <li>
          <a
            th:href="@{/admin/note(box='received')}"
            th:class="'note-nav-link' + (${box == 'received'} ? ' active' : '')"
          >
            <i class="fa-solid fa-inbox w-4 text-center"></i>
            <span>받은 쪽지</span>
          </a>
          <div th:if="${box == 'received'}" class="note-subnav">
            <!-- <a
              th:href="@{/admin/note(box='received')}"
              th:class="'note-nav-link' + (${postType == null} ? ' active' : '')"
            >
              <i class="fa-solid fa-list w-4 text-center"></i>
              <span>전체</span>
            </a> -->
            <a
              th:href="@{/admin/note(box='received', postType='PERSONAL')}"
              th:class="'note-nav-link personal' + (${postType == 'PERSONAL'} ? ' active' : '')"
            >
              <i class="fa-solid fa-user w-4 text-center"></i>
              <span>개인</span>
            </a>
            <a
              th:href="@{/admin/note(box='received', postType='SYSTEM')}"
              th:class="'note-nav-link system' + (${postType == 'SYSTEM'} ? ' active' : '')"
            >
              <i class="fa-solid fa-users w-4 text-center"></i>
              <span>단체</span>
            </a>
          </div>
        </li>
        <li>
          <a
            th:href="@{/admin/note(box='self')}"
            th:class="'note-nav-link' + (${box == 'self'} ? ' active' : '')"
          >
            <i class="fa-solid fa-note-sticky w-4 text-center"></i>
            <span>내게 쓴 쪽지함</span>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/note(box='sent')}"
            th:class="'note-nav-link' + (${box == 'sent'} ? ' active' : '')"
          >
            <i class="fa-solid fa-paper-plane w-4 text-center"></i>
            <span>보낸 쪽지함</span>
          </a>
        </li>
        <li>
          <a
            th:href="@{/admin/note(box='archive')}"
            th:class="'note-nav-link' + (${box == 'archive'} ? ' active' : '')"
          >
            <i class="fa-solid fa-box-archive w-4 text-center"></i>
            <span>쪽지 보관함</span>
          </a>
        </li>
      </ul>

      <div class="border-t border-slate-200 my-3"></div>

      <ul>
        <li>
          <a
            th:href="@{/admin/note(box='trash')}"
            th:class="'note-nav-link trash' + (${box == 'trash'} ? ' active' : '')"
          >
            <i class="fa-solid fa-trash w-4 text-center"></i>
            <span>휴지통</span>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- 우측 목록 영역 -->
  <div id="noteListContent" class="flex-1 flex flex-col min-w-0">
    <!-- 필터 바 -->
    <div
      class="flex items-center gap-3 px-6 py-4 border-b border-slate-100 bg-white flex-shrink-0"
    >
      <select class="hm-input" style="width: 9rem" data-cs-defer>
        <option value="">전체 쪽지</option>
        <option value="unread">읽지 않은 쪽지</option>
        <option value="read">읽은 쪽지</option>
      </select>
      <select class="hm-input" style="width: 7rem" data-cs-defer>
        <option value="id">아이디</option>
        <option value="name">이름</option>
        <option value="content">내용</option>
      </select>
      <input
        type="text"
        class="hm-input flex-1"
        placeholder="검색어를 입력하세요"
        style="min-width: 0"
      />
      <button class="hm-btn-primary flex-shrink-0">
        <i class="fa-solid fa-magnifying-glass"></i>
        검색
      </button>
    </div>

    <!-- 액션 바 -->
    <div
      class="flex items-center justify-between px-6 py-3 border-b border-slate-100 bg-slate-50/50 flex-shrink-0"
    >
      <div class="flex items-center gap-2">
        <!-- 일반 함 (받은/보낸/내게): 삭제 + 보관 -->
        <th:block th:if="${box != 'trash' and box != 'archive'}">
          <button
            onclick="batchDelete()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors"
          >
            <i class="fa-solid fa-trash-can"></i>
            선택 삭제
          </button>
          <button
            onclick="batchArchive()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-violet-50 hover:text-violet-600 hover:border-violet-200 transition-colors"
          >
            <i class="fa-solid fa-box-archive"></i>
            선택 보관
          </button>
        </th:block>
        <!-- 보관함: 삭제 + 보관 해제 -->
        <th:block th:if="${box == 'archive'}">
          <button
            onclick="batchDelete()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors"
          >
            <i class="fa-solid fa-trash-can"></i>
            선택 삭제
          </button>
          <button
            onclick="batchUnarchive()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-violet-50 hover:text-violet-600 hover:border-violet-200 transition-colors"
          >
            <i class="fa-solid fa-box-open"></i>
            선택 보관 해제
          </button>
        </th:block>
        <!-- 휴지통: 복원 + 완전삭제 -->
        <th:block th:if="${box == 'trash'}">
          <button
            onclick="batchRestore()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-green-50 hover:text-green-600 hover:border-green-200 transition-colors"
          >
            <i class="fa-solid fa-rotate-left"></i>
            선택 복원
          </button>
          <button
            onclick="batchPermanentDelete()"
            class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-slate-600 border border-slate-200 rounded-lg bg-white hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors"
          >
            <i class="fa-solid fa-trash-can"></i>
            선택 완전삭제
          </button>
        </th:block>
      </div>
      <span class="text-xs text-slate-400"
        >총
        <strong class="text-slate-600" th:text="${#lists.size(postList)}"
          >0</strong
        >건</span
      >
    </div>

    <!-- 쪽지 목록 테이블 -->
    <div class="flex-1 overflow-y-auto no-scrollbar">
      <table class="note-table w-full">
        <colgroup>
          <col style="width: 2.5rem" />
          <col style="width: 16%" />
          <col style="width: 16%" />
          <col style="width: 20%" />
          <col />
          <!-- 내용: 나머지 공간 자동 분배 -->
          <col style="width: 13%" />
          <col style="width: 4rem" />
          <col style="width: 4rem" />
        </colgroup>
        <thead class="bg-slate-50">
          <tr>
            <th style="text-align: center">
              <input
                type="checkbox"
                class="rounded border-slate-300 text-violet-600 cursor-pointer"
              />
            </th>
            <th th:text="${box == 'sent' ? '받은사람' : '보낸사람'}">
              보낸사람
            </th>
            <th th:if="${box == 'archive'}">받은사람</th>
            <th>제목</th>
            <th>내용</th>
            <th>날짜</th>
            <th
              style="text-align: center"
              th:text="${box == 'archive'} ? '보관해제' : (${box == 'trash'} ? '복원' : '삭제')"
            >
              삭제
            </th>
            <th
              style="text-align: center"
              th:text="${box == 'archive'} ? '삭제' : (${box == 'trash'} ? '완전삭제' : '보관')"
            >
              보관
            </th>
          </tr>
        </thead>
        <tbody>
          <tr
            th:each="post : ${postList}"
            class="unread"
            style="cursor: pointer"
            th:data-post-sn="${post.ntceSn}"
            th:data-rcvr-user-id="${post.rcvrUserId}"
            onclick="
              window.open(
                '/admin/note/read?postSn=' +
                  this.dataset.postSn +
                  '&rcvrUserId=' +
                  this.dataset.rcvrUserId,
                '_blank',
                'width=1000,height=600',
              )
            "
          >
            <td style="text-align: center" onclick="event.stopPropagation()">
              <input
                type="checkbox"
                class="rounded border-slate-300 text-violet-600 cursor-pointer"
              />
            </td>
            <td>
              <div class="flex items-center gap-2">
                <span
                  class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 text-xs font-bold flex items-center justify-center flex-shrink-0"
                  th:text="${#strings.substring(post.sndrName, 0, 1)}"
                  >A</span
                >
                <div>
                  <div class="flex items-center gap-1.5">
                    <p
                      class="text-sm font-medium text-slate-800"
                      th:text="${box == 'sent' ? post.rcvrName : post.sndrName}"
                    ></p>
                    <span
                      class="text-[10px] text-slate-400"
                      th:text="${box == 'sent' ? post.rcvrJbgrNm : post.sndrJbgrNm}"
                      >직급</span
                    >
                  </div>
                  <p
                    class="text-xs text-slate-400"
                    th:text="${box == 'sent' ? post.rcvrUserId : post.sndrUserId}"
                  >
                    아이디
                  </p>
                </div>
              </div>
            </td>
            <td th:if="${box == 'archive'}">
              <div class="flex items-center gap-2">
                <span
                  class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 text-xs font-bold flex items-center justify-center flex-shrink-0"
                  th:text="${#strings.substring(post.rcvrName, 0, 1)}"
                  >A</span
                >
                <div>
                  <div class="flex items-center gap-1.5">
                    <p
                      class="text-sm font-medium text-slate-800"
                      th:text="${post.rcvrName}"
                    >
                      받는사람
                    </p>
                    <span
                      class="text-[10px] text-slate-400"
                      th:text="${post.rcvrJbgrNm}"
                      >직급</span
                    >
                  </div>
                  <p
                    class="text-xs text-slate-400"
                    th:text="${post.rcvrUserId}"
                  >
                    아이디
                  </p>
                </div>
              </div>
            </td>
            <td>
              <span class="note-subject" th:text="${post.ntceSj}"
                >쪽지 제목</span
              >
            </td>
            <td class="note-content-preview" th:text="${post.ntceCn}">
              쪽지 내용
            </td>
            <td
              class="text-slate-400 text-xs"
              th:text="${#temporals.format(post.ntceSndDt, 'yyyy.MM.dd (E) HH:mm:ss')}"
            >
              <!-- 2026-06-05T16:04:08.959923 형식이라 바꿔주기 -->

              2026-06-05 09:30
            </td>
            <!-- 휴지통/보관함이 아닐 때: 삭제(→휴지통) + 보관 -->
            <td
              th:if="${box != 'trash' and box != 'archive'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-red-500 transition-colors text-sm"
                onclick="deleteNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
            <td
              th:if="${box != 'trash' and box != 'archive'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-violet-500 transition-colors text-sm"
                title="보관"
                onclick="archiveNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-box-archive"></i>
              </button>
            </td>
            <!-- 보관함일 때: 보관 해제 + 삭제 -->
            <td
              th:if="${box == 'archive'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-violet-500 transition-colors text-sm"
                title="보관 해제"
                onclick="unarchiveNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-box-open"></i>
              </button>
            </td>
            <td
              th:if="${box == 'archive'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-red-500 transition-colors text-sm"
                title="삭제"
                onclick="deleteNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
            <!-- 휴지통일 때: 복원 + 완전삭제 -->
            <td
              th:if="${box == 'trash'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-green-500 transition-colors text-sm"
                title="복원"
                onclick="restoreNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-rotate-left"></i>
              </button>
            </td>
            <td
              th:if="${box == 'trash'}"
              style="text-align: center"
              onclick="event.stopPropagation()"
            >
              <button
                class="text-slate-300 hover:text-red-500 transition-colors text-sm"
                title="완전 삭제"
                onclick="permanentDeleteNote(this.closest('tr').dataset.postSn)"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
          </tr>

          <!-- 빈 상태 (데이터 없을 때 표시) -->
          <!-- 실제 구현 시 th:if로 조건 처리 -->
        </tbody>
      </table>

      <!-- 빈 상태 메시지 (쪽지가 없을 때) -->
      <div
        th:if="${#lists.isEmpty(postList)}"
        class="flex flex-col items-center justify-center py-20 text-slate-400"
      >
        <div
          class="flex flex-col items-center justify-center py-20 text-slate-400"
        >
          <i
            class="fa-regular fa-envelope-open text-5xl mb-4 text-slate-200"
          ></i>
          <p class="text-sm font-medium">받은 쪽지가 없습니다.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    try {
      document.querySelectorAll("select[data-cs-defer]").forEach(function (el) {
        window.initCustomSelect(el);
      });
    } catch (e) {}

    // 토스트 알림
    function showToast(message, type) {
      const colors =
        type === "error" ? "bg-red-600 text-white" : "bg-slate-800 text-white";
      const toast = document.createElement("div");
      toast.className =
        "fixed bottom-6 right-6 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-all duration-300 " +
        colors;
      toast.style.opacity = "0";
      toast.textContent = message;
      document.body.appendChild(toast);
      requestAnimationFrame(() => {
        toast.style.opacity = "1";
      });
      setTimeout(() => {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // 헤더 체크박스 indeterminate 동기화
    function syncHeaderCheckbox() {
      const headerCb = document.querySelector("thead input[type=checkbox]");
      const rowCbs = [
        ...document.querySelectorAll("tbody input[type=checkbox]"),
      ];
      if (!headerCb) return;
      const checkedCount = rowCbs.filter((cb) => cb.checked).length;
      headerCb.indeterminate = checkedCount > 0 && checkedCount < rowCbs.length;
      headerCb.checked = rowCbs.length > 0 && checkedCount === rowCbs.length;
    }

    // 체크된 행의 postSn 수집
    function getCheckedPostSns() {
      return [...document.querySelectorAll("tbody tr")]
        .filter((tr) => tr.querySelector("input[type=checkbox]")?.checked)
        .map((tr) => tr.dataset.postSn)
        .filter(Boolean);
    }

    // 일괄 처리 공통
    async function batchAction(url, postSns, successMsg) {
      if (!postSns.length) {
        showToast("선택된 쪽지가 없습니다.", "error");
        return;
      }
      await Promise.all(
        postSns.map((sn) => fetch(url + "?postSn=" + sn, { method: "POST" })),
      );
      showToast(successMsg);
      refreshNoteList();
    }

    function batchDelete() {
      batchAction(
        "/admin/note/delete",
        getCheckedPostSns(),
        "선택한 쪽지를 휴지통으로 이동했습니다.",
      );
    }
    function batchArchive() {
      batchAction(
        "/admin/note/archive",
        getCheckedPostSns(),
        "선택한 쪽지를 보관함으로 이동했습니다.",
      );
    }
    function batchUnarchive() {
      batchAction(
        "/admin/note/archive/cancel",
        getCheckedPostSns(),
        "보관을 해제했습니다.",
      );
    }
    function batchRestore() {
      batchAction(
        "/admin/note/restore",
        getCheckedPostSns(),
        "선택한 쪽지를 복원했습니다.",
      );
    }
    async function batchPermanentDelete() {
      const sns = getCheckedPostSns();
      if (!sns.length) {
        showToast("선택된 쪽지가 없습니다.", "error");
        return;
      }
      if (
        !confirm(
          "완전히 삭제하면 복원할 수 없습니다. 선택된 " +
            sns.length +
            "건을 삭제하시겠습니까?",
        )
      )
        return;
      await Promise.all(
        sns.map((sn) =>
          fetch("/admin/note/delete/permanent?postSn=" + sn, {
            method: "POST",
          }),
        ),
      );
      showToast("영구 삭제했습니다.");
      refreshNoteList();
    }

    // 개별 액션
    function deleteNote(postSn) {
      fetch("/admin/note/delete?postSn=" + postSn, { method: "POST" }).then(
        () => {
          showToast("휴지통으로 이동했습니다.");
          refreshNoteList();
        },
      );
    }
    function restoreNote(postSn) {
      fetch("/admin/note/restore?postSn=" + postSn, { method: "POST" }).then(
        () => {
          showToast("복원했습니다.");
          refreshNoteList();
        },
      );
    }
    function archiveNote(postSn) {
      fetch("/admin/note/archive?postSn=" + postSn, { method: "POST" }).then(
        () => {
          showToast("보관함으로 이동했습니다.");
          refreshNoteList();
        },
      );
    }
    function unarchiveNote(postSn) {
      fetch("/admin/note/archive/cancel?postSn=" + postSn, {
        method: "POST",
      }).then(() => {
        showToast("보관을 해제했습니다.");
        refreshNoteList();
      });
    }
    function permanentDeleteNote(postSn) {
      if (!confirm("완전히 삭제하면 복원할 수 없습니다. 삭제하시겠습니까?"))
        return;
      fetch("/admin/note/delete/permanent?postSn=" + postSn, {
        method: "POST",
      }).then(() => {
        showToast("영구 삭제했습니다.");
        refreshNoteList();
      });
    }

    // 목록 새로고침 (팝업에서도 호출)
    function refreshNoteList() {
      location.reload();
    }

    // 체크박스 이벤트 초기화 (최초 로드 및 새로고침 후 재호출)
    function initNoteList() {
      const headerCb = document.querySelector("thead input[type=checkbox]");
      if (headerCb) {
        headerCb.addEventListener("change", function () {
          document
            .querySelectorAll("tbody input[type=checkbox]")
            .forEach((cb) => {
              cb.checked = this.checked;
              cb.closest("tr").classList.toggle("bg-violet-50", this.checked);
            });
        });
      }
      document.querySelectorAll("tbody input[type=checkbox]").forEach((cb) => {
        cb.addEventListener("change", function () {
          this.closest("tr").classList.toggle("bg-violet-50", this.checked);
          syncHeaderCheckbox();
        });
      });
    }

    initNoteList();
  </script>
</div>
