<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쪽지 읽기 | HERMES Admin</title>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style type="text/tailwindcss">
      body {
        font-family: "Noto Sans KR", sans-serif;
      }
    </style>
  </head>

  <body class="h-screen flex flex-col bg-slate-50 overflow-hidden">
    <!-- 헤더 -->
    <div
      class="flex items-center justify-between px-5 py-3.5 bg-white border-b border-slate-100 flex-shrink-0"
    >
      <div class="flex items-center gap-2">
        <i class="fa-regular fa-envelope-open text-violet-500 text-sm"></i>
        <h2 class="text-sm font-bold text-slate-800">쪽지 읽기</h2>
      </div>
      <button
        type="button"
        onclick="window.close()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
      >
        <i class="fa-solid fa-xmark text-sm"></i>
      </button>
    </div>

    <!-- 메타 정보 -->
    <div class="bg-white border-b border-slate-100 flex-shrink-0">
      <!-- 제목 -->
      <div class="flex items-center gap-3 px-5 py-3 border-b border-slate-100">
        <span class="text-xs font-semibold text-slate-400 w-16 shrink-0">제목</span>
        <p class="text-sm font-semibold text-slate-800" th:text="${post.ntceSj}">쪽지 제목</p>
      </div>

      <!-- 보낸 사람 -->
      <div class="flex items-center gap-3 px-5 py-3 border-b border-slate-100">
        <span class="text-xs font-semibold text-slate-400 w-16 shrink-0">보낸 사람</span>
        <div class="flex items-center gap-2">
          <span
            class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 text-xs font-bold flex items-center justify-center flex-shrink-0"
            th:text="${#strings.substring(post.sndrName, 0, 1)}"
          >A</span>
          <p class="text-sm font-medium text-slate-800" th:text="${post.sndrName}">보낸 사람</p>
          <span class="text-xs text-slate-400" th:text="${post.sndrJbgrNm}">직급</span>
          <span class="text-xs text-slate-400" th:text="${'(' + post.sndrUserId + ')'}">아이디</span>
        </div>
      </div>

      <!-- 받는 사람 -->
      <div class="flex items-center gap-3 px-5 py-3 border-b border-slate-100">
        <span class="text-xs font-semibold text-slate-400 w-16 shrink-0">받는 사람</span>
        <div class="flex items-center gap-2">
          <span
            class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 text-xs font-bold flex items-center justify-center flex-shrink-0"
            th:text="${#strings.substring(post.rcvrName, 0, 1)}"
          >A</span>
          <p class="text-sm font-medium text-slate-800" th:text="${post.rcvrName}">받는 사람</p>
          <span class="text-xs text-slate-400" th:text="${post.rcvrJbgrNm}">직급</span>
          <span class="text-xs text-slate-400" th:text="${'(' + post.rcvrUserId + ')'}">아이디</span>
        </div>
      </div>

      <!-- 날짜 -->
      <div class="flex items-center gap-3 px-5 py-3">
        <span class="text-xs font-semibold text-slate-400 w-16 shrink-0">날짜</span>
        <p
          class="text-xs text-slate-500"
          th:text="${#temporals.format(post.ntceSndDt, 'yyyy년 MM월 dd일 (E) HH:mm:ss')}"
        >
          2026-06-08
        </p>
      </div>
    </div>

    <!-- 본문 -->
    <div class="flex-1 overflow-y-auto px-5 py-5 bg-white">
      <p
        class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap"
        th:text="${post.ntceCn}"
      >
        쪽지 내용이 여기에 표시됩니다.
      </p>
    </div>

    <!-- 하단 액션 -->
    <div
      class="flex items-center justify-between px-5 py-3.5 border-t border-slate-100 bg-white flex-shrink-0"
    >
      <button
        type="button"
        th:data-sndr-user-id="${post.sndrUserId}"
        th:data-ntce-sj="${post.ntceSj}"
        onclick="replyNote(this)"
        class="cursor-pointer flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-violet-600 rounded-xl hover:bg-violet-700 transition-colors"
      >
        <i class="fa-solid fa-reply text-xs"></i>
        답장
      </button>
      <button
        type="button"
        onclick="window.close()"
        class="cursor-pointer px-4 py-2 text-sm text-slate-500 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors"
      >
        닫기
      </button>
    </div>

    <script>
      function replyNote(btn) {
        const replyTo = btn.dataset.sndrUserId;
        const subject = encodeURIComponent(btn.dataset.ntceSj);
        window.open(
          '/admin/note/write?replyTo=' + replyTo + '&subject=' + subject,
          '_blank',
          'width=1000,height=600'
        );
      }
    </script>
  </body>
</html>
