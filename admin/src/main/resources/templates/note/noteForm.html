<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쪽지 쓰기 | HERMES Admin</title>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style type="text/tailwindcss">
      body {
        font-family: "Noto Sans KR", sans-serif;
      }
    </style>
  </head>

  <body class="h-screen flex flex-col bg-slate-50 overflow-hidden">
    <!-- 헤더 -->
    <div
      class="flex items-center justify-between px-5 py-3.5 bg-white border-b border-slate-100 flex-shrink-0"
    >
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-pen-to-square text-violet-500 text-sm"></i>
        <h2 class="text-sm font-bold text-slate-800">쪽지 쓰기</h2>
      </div>
      <button
        type="button"
        onclick="window.close()"
        class="w-7 h-7 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors"
      >
        <i class="fa-solid fa-xmark text-sm"></i>
      </button>
    </div>

    <!-- 바디 -->
    <div class="flex flex-1 min-h-0">
      <!-- 좌측: 수신자 선택 패널 -->
      <aside
        class="w-64 flex-shrink-0 flex flex-col border-r border-slate-100 bg-white"
      >
        <!-- 헤더 -->
        <div class="px-4 py-3 border-b border-slate-100 flex-shrink-0 flex items-center justify-between">
          <p class="text-sm font-bold text-slate-700 flex items-center gap-1.5">
            <i class="fa-solid fa-users text-violet-400 text-xs"></i>
            수신자 <span id="selectedCount" class="text-violet-600">0</span>명
          </p>
          <button
            type="button"
            id="selectAllBtn"
            class="text-xs font-semibold text-violet-500 hover:text-violet-700 transition-colors"
          >전체 선택</button>
        </div>

        <!-- 검색 -->
        <div class="px-3 py-2 border-b border-slate-100 flex-shrink-0">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-50 border border-slate-200">
            <i class="fa-solid fa-magnifying-glass text-slate-400 text-xs"></i>
            <input
              id="userSearch"
              type="text"
              placeholder="이름 또는 아이디 검색"
              class="flex-1 text-xs text-slate-700 placeholder-slate-400 bg-transparent outline-none"
            />
          </div>
        </div>

        <!-- 역할별 유저 목록 -->
        <div
          class="flex-1 overflow-y-auto p-2 space-y-1"
          th:unless="${#maps.isEmpty(groupedAdminUsers)}"
        >
          <div class="user-group" th:each="entry : ${groupedAdminUsers}">
            <!-- 그룹 헤더 (클릭으로 접기/펼치기) -->
            <button
              type="button"
              class="group-toggle w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-slate-50 transition-colors sticky top-0 bg-white z-10"
            >
              <span
                class="text-[11px] font-bold text-violet-600 tracking-wider"
                th:text="${entry.key}"
              >역할</span>
              <span
                class="text-[10px] text-slate-400 font-medium"
                th:text="${entry.value.size()} + '명'"
              >0명</span>
              <div class="flex-1 h-px bg-slate-100"></div>
              <i class="fa-solid fa-chevron-down text-slate-300 text-[10px] toggle-icon transition-transform duration-200"></i>
            </button>
            <!-- 유저 목록 -->
            <ul class="group-list space-y-0.5">
              <li
                th:each="user : ${entry.value}"
                class="receiver-row flex items-center gap-3 py-2 px-2 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer"
                th:data-name="${user.userName}"
                th:data-userid="${user.userId}"
              >
                <input
                  type="checkbox"
                  name="receiverUserIds"
                  th:value="${user.userId}"
                  th:id="'user-' + ${user.userId}"
                  form="noteForm"
                  class="receiver-cb hidden"
                />
                <div
                  class="w-8 h-8 rounded-full bg-violet-100 text-violet-600 flex items-center justify-center text-xs font-bold shrink-0"
                  th:text="${#strings.substring(user.userName, 0, 1)}"
                >U</div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-1.5">
                    <p class="text-sm font-semibold text-slate-800 truncate" th:text="${user.userName}">이름</p>
                    <span class="text-[10px] text-slate-400 shrink-0" th:text="${user.employeeInfo.jbgrNm}">직급</span>
                  </div>
                  <p class="text-xs text-slate-400 truncate" th:text="${user.userId}">아이디</p>
                </div>
                <i class="fa-solid fa-check text-violet-500 text-xs check-icon opacity-0 shrink-0"></i>
              </li>
            </ul>
          </div>

          <!-- 검색 결과 없을 때 -->
          <div id="noSearchResult" class="hidden py-10 text-center text-slate-400 text-xs">
            검색 결과가 없습니다.
          </div>
        </div>

        <!-- 수신자 없을 때 -->
        <div
          th:if="${#maps.isEmpty(groupedAdminUsers)}"
          class="flex-1 flex flex-col items-center justify-center gap-2 text-center p-6"
        >
          <div
            class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 text-xl"
          >
            <i class="fa-solid fa-user-slash"></i>
          </div>
          <p class="text-sm text-slate-400">선택 가능한 수신자가 없습니다.</p>
        </div>
      </aside>

      <!-- 우측: 작성 영역 -->
      <div class="flex-1 flex flex-col min-w-0 bg-white">
        <form
          id="noteForm"
          th:action="@{/admin/note/send}"
          method="post"
          class="flex flex-col h-full"
        >
          <!-- 제목 -->
          <div
            class="flex items-center gap-3 px-5 py-3 border-b border-slate-100 flex-shrink-0"
          >
            <span class="text-xs font-semibold text-slate-400 w-16 shrink-0"
              >제목</span
            >
            <input
              type="text"
              id="title"
              name="title"
              placeholder="제목을 입력하세요"
              required
              th:value="${replySubject}"
              class="flex-1 text-sm text-slate-700 placeholder-slate-300 outline-none bg-transparent"
            />
          </div>

          <!-- 내용 -->
          <div class="flex-1 px-5 py-4">
            <textarea
              id="content"
              name="content"
              required
              placeholder="내용을 입력하세요..."
              class="w-full h-full resize-none text-sm text-slate-700 placeholder-slate-300 outline-none bg-transparent leading-relaxed"
            ></textarea>
          </div>

          <!-- 하단 액션 -->
          <div
            class="flex items-center justify-end gap-2 px-5 py-3.5 border-t border-slate-100 flex-shrink-0"
          >
            <button
              type="button"
              onclick="window.close()"
              class="cursor-pointer px-4 py-2 text-sm text-slate-500 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors"
            >
              취소
            </button>
            <button
              type="submit"
              class="cursor-pointer flex items-center gap-2 px-5 py-2 text-sm font-semibold text-white bg-violet-600 rounded-xl hover:bg-violet-700 transition-colors"
            >
              <i class="fa-solid fa-paper-plane text-xs"></i>
              보내기
            </button>
          </div>
        </form>
      </div>
    </div>

    <script th:inline="javascript">
      const countEl = document.getElementById("selectedCount");

      function updateCount() {
        countEl.textContent = document.querySelectorAll(".receiver-cb:checked").length;
      }

      // 행 클릭 토글
      document.querySelectorAll(".receiver-row").forEach((row) => {
        row.addEventListener("click", () => {
          const cb = row.querySelector(".receiver-cb");
          cb.checked = !cb.checked;
          row.classList.toggle("bg-violet-50", cb.checked);
          row.querySelector(".check-icon").classList.toggle("opacity-0", !cb.checked);
          updateCount();
        });
      });

      // 전체 선택/해제 (검색 중이면 보이는 행만)
      const selectAllBtn = document.getElementById("selectAllBtn");
      selectAllBtn.addEventListener("click", () => {
        const visibleRows = [...document.querySelectorAll(".receiver-row")].filter(
          (r) => !r.classList.contains("hidden")
        );
        const allChecked = visibleRows.every((r) => r.querySelector(".receiver-cb").checked);
        visibleRows.forEach((row) => {
          const cb = row.querySelector(".receiver-cb");
          cb.checked = !allChecked;
          row.classList.toggle("bg-violet-50", !allChecked);
          row.querySelector(".check-icon").classList.toggle("opacity-0", allChecked);
        });
        selectAllBtn.textContent = allChecked ? "전체 선택" : "전체 해제";
        updateCount();
      });

      // 그룹 접기/펼치기
      document.querySelectorAll(".group-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const list = btn.nextElementSibling;
          const icon = btn.querySelector(".toggle-icon");
          const collapsed = list.classList.toggle("hidden");
          icon.style.transform = collapsed ? "rotate(-90deg)" : "";
        });
      });

      // 이름/아이디 검색 필터
      document.getElementById("userSearch").addEventListener("input", (e) => {
        const q = e.target.value.trim().toLowerCase();
        let anyVisible = false;
        document.querySelectorAll(".user-group").forEach((group) => {
          const list = group.querySelector(".group-list");
          const toggle = group.querySelector(".group-toggle");
          let groupHasResult = false;
          group.querySelectorAll(".receiver-row").forEach((row) => {
            const match =
              !q ||
              row.dataset.name.toLowerCase().includes(q) ||
              row.dataset.userid.toLowerCase().includes(q);
            row.classList.toggle("hidden", !match);
            if (match) groupHasResult = true;
          });
          group.classList.toggle("hidden", !groupHasResult);
          if (groupHasResult) {
            list.classList.remove("hidden");
            toggle.querySelector(".toggle-icon").style.transform = "";
            anyVisible = true;
          }
        });
        document.getElementById("noSearchResult").classList.toggle("hidden", anyVisible);
      });

      // 답장 시 수신자 자동 선택
      const replyToUserId = /*[[${replyTo}]]*/ '';
      if (replyToUserId) {
        const targetRow = document.querySelector('.receiver-row[data-userid="' + replyToUserId + '"]');
        if (targetRow) targetRow.click();
      }

      // 폼 제출
      document.querySelector("form").addEventListener("submit", (e) => {
        e.preventDefault();
        fetch(e.target.action, {
          method: "POST",
          body: new FormData(e.target),
        }).then((res) => {
          if (res.ok || res.redirected) {
            alert("쪽지가 성공적으로 보내졌습니다!");
            try { if (window.opener) window.opener.refreshNoteList(); } catch (e) {}
            window.close();
          }
        });
      });
    </script>
  </body>
</html>
