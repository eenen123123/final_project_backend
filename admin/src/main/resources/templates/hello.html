<title th:fragment="pageTitle">테스트 페이지 | HERMES</title>

<div>
  <input
    type="text"
    name="message"
    placeholder="Enter a message to send"
    class="border-solid border-2 border-gray-500 rounded-md px-4 py-2"
  />
  <button
    type="submit"
    class="border-solid border-2 border-gray-500 rounded-md px-4 py-2"
  >
    Send Notification
  </button>

  <div class="mt-4">
    <a href="/" class="text-blue-500 hover:underline">Go to Home</a>
  </div>
  <script>
    document
      .querySelector("button[type='submit']")
      .addEventListener("click", function () {
        const message = document.querySelector("input[name='message']").value;
        fetch("/admin/test/noti?message=" + encodeURIComponent(message), {
          method: "GET",
        });
      });
  </script>
</div>
