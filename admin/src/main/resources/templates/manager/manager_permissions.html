</div>

      note: "5월 31일 퇴사 예정. 퇴사일에 전체 접근 차단 처리 필요.",
    },
  ];

  const blockedStaff = [
    {
      id: 13,
      name: "구직원A",
      loginId: "ex_staff_a",
      role: "행정 직원",
      blockedDate: "2026-04-01",
      reason: "퇴사",
    },
    {
      id: 14,
      name: "구강사B",
      loginId: "ex_inst_b",
      role: "강사",
      blockedDate: "2026-03-15",
      reason: "계약 종료",
    },
  ];

  let selectedStaffId = null;
  let blockTargetId = null;
  let currentFilter = "all";

  /* ── 상태 배지 ── */
  function statusBadge(status) {
    const map = {
      active: ["bg-emerald-50 text-emerald-700", "활성"],
      review: ["bg-amber-50 text-amber-600", "검토 필요"],
      blocked: ["bg-red-50 text-red-600", "차단"],
    };
    const [cls, label] = map[status] || ["bg-slate-100 text-slate-500", status];
    return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${cls}">${label}</span>`;
  }

  function roleBadge(roleType) {
    const map = {
      manager: "bg-violet-50 text-violet-700",
      staff: "bg-sky-50 text-sky-700",
      instructor: "bg-emerald-50 text-emerald-700",
      pd: "bg-amber-50 text-amber-700",
    };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[roleType] || "bg-slate-100 text-slate-500"}">${roleType}</span>`;
  }

  /* ── 직원 목록 렌더링 ── */
  function renderStaffList(filter, keyword) {
    const list = document.getElementById("staffList");
    let data = staffData.filter((s) => {
      if (filter === "active") return s.status === "active";
      if (filter === "review") return s.status === "review";
      if (filter === "blocked") return false;
      return true;
    });

    const allData =
      filter === "blocked"
        ? blockedStaff.map((b) => ({ ...b, status: "blocked" }))
        : filter === "all"
          ? [...data, ...blockedStaff.map((b) => ({ ...b, status: "blocked" }))]
          : data;

    const searched = keyword
      ? allData.filter(
          (s) => s.name.includes(keyword) || (s.role || "").includes(keyword),
        )
      : allData;

    if (searched.length === 0) {
      list.innerHTML = `<div class="py-8 text-center text-slate-300 text-sm">해당하는 직원이 없습니다.</div>`;
      return;
    }

    list.innerHTML = searched
      .map((s) => {
        const isSelected = s.id === selectedStaffId;
        const dot =
          s.status === "active"
            ? "bg-emerald-400"
            : s.status === "review"
              ? "bg-amber-400"
              : "bg-red-400";
        return `
        <button onclick="selectStaff(${s.id}, '${s.status}')"
          class="w-full text-left px-4 py-3 flex items-center gap-3 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0
            ${isSelected ? "bg-violet-50 border-l-2 border-l-violet-500" : "border-l-2 border-l-transparent"}">
          <div class="relative shrink-0">
            <div class="w-10 h-10 rounded-xl bg-slate-100 text-slate-600 font-bold flex items-center justify-center">
              ${s.name[0]}
            </div>
            <span class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-white ${dot}"></span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5">
              <p class="text-sm font-semibold text-slate-800">${s.name}</p>
              ${s.status === "review" ? `<i class="fa-solid fa-triangle-exclamation text-amber-400 text-xs"></i>` : ""}
            </div>
            <p class="text-xs text-slate-400 truncate">${s.role}</p>
          </div>
          <div class="shrink-0">${statusBadge(s.status)}</div>
        </button>
      `;
      })
      .join("");
  }

  function setStaffFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".staff-filter-btn").forEach((b) => {
      b.classList.remove(
        "bg-violet-50",
        "text-violet-700",
        "border-violet-300",
      );
      b.classList.add("bg-slate-50", "text-slate-500", "border-slate-200");
    });
    btn.classList.remove("bg-slate-50", "text-slate-500", "border-slate-200");
    btn.classList.add("bg-violet-50", "text-violet-700", "border-violet-300");
    renderStaffList(filter, "");
  }

  function filterStaff(keyword) {
    renderStaffList(currentFilter, keyword);
  }

  /* ── 직원 선택 → 권한 상세 ── */
  function selectStaff(id, status) {
    selectedStaffId = id;
    renderStaffList(currentFilter, "");

    const isBlocked = status === "blocked";
    const s = isBlocked
      ? {
          ...blockedStaff.find((b) => b.id === id),
          menus: [],
          history: [],
          status: "blocked",
        }
      : staffData.find((s) => s.id === id);

    if (!s) return;

    document.getElementById("staffDetailEmpty").classList.add("hidden");
    document.getElementById("staffDetail").classList.remove("hidden");

    document.getElementById("detailAvatar").textContent = s.name[0];
    document.getElementById("detailName").textContent = s.name;
    document.getElementById("detailRole").textContent =
      (s.role || "-") + "  ·  " + (s.loginId || "-");
    document.getElementById("detailLastLogin").textContent =
      s.lastLogin || (s.blockedDate ? s.blockedDate + " (차단)" : "-");
    document.getElementById("detailGrantDate").textContent =
      s.grantDate || s.blockedDate || "-";
    document.getElementById("detailStatus").innerHTML = statusBadge(s.status);

    /* 액션 버튼 */
    const actions = document.getElementById("detailActions");
    if (isBlocked) {
      actions.innerHTML = `
        <button onclick="showHermesToast('접근 차단이 해제되었습니다.', 'success')"
          class="px-3 py-1.5 text-xs font-semibold text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors">
          <i class="fa-solid fa-lock-open mr-1"></i>차단 해제
        </button>`;
    } else if (s.status === "review") {
      actions.innerHTML = `
        <button onclick="openBlockModal(${s.id})"
          class="px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
          <i class="fa-solid fa-user-slash mr-1"></i>즉시 차단
        </button>`;
    } else {
      actions.innerHTML = `
        <button onclick="openBlockModal(${s.id})"
          class="px-3 py-1.5 text-xs font-semibold text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
          <i class="fa-solid fa-user-slash mr-1"></i>접근 차단
        </button>`;
    }

    /* 메뉴 권한 토글 */
    const menuContainer = document.getElementById("menuPermissions");
    if (isBlocked || !s.menus) {
      menuContainer.innerHTML = `<p class="text-xs text-slate-300 text-center py-3">차단된 계정은 권한을 편집할 수 없습니다.</p>`;
    } else {
      menuContainer.innerHTML = allMenus
        .map((m) => {
          const has = s.menus.includes(m.key);
          return `
          <label class="flex items-center justify-between p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer group">
            <div class="flex items-center gap-3">
              <div class="w-7 h-7 rounded-lg ${has ? "bg-violet-50 text-violet-600" : "bg-slate-100 text-slate-300"} flex items-center justify-center text-xs transition-colors">
                <i class="fa-solid ${m.icon}"></i>
              </div>
              <span class="text-sm font-medium text-slate-700">${m.label}</span>
            </div>
            <input type="checkbox" class="hm-switch" data-menu="${m.key}" ${has ? "checked" : ""}>
          </label>
        `;
        })
        .join("");
    }

    /* 변경 이력 */
    const historyContainer = document.getElementById("permissionHistory");
    const history = s.history || [];
    historyContainer.innerHTML =
      history.length === 0
        ? `<p class="text-xs text-slate-300 text-center py-2">변경 이력이 없습니다.</p>`
        : history
            .map(
              (h) => `
          <div class="flex items-start gap-3 text-xs">
            <span class="text-slate-300 whitespace-nowrap shrink-0">${h.date}</span>
            <span class="text-slate-600">${h.action}</span>
            <span class="text-slate-400 ml-auto shrink-0">${h.by}</span>
          </div>
        `,
            )
            .join("");

    /* 검토 사유 표시 */
    if (s.note) {
      const noteEl = document.createElement("div");
      noteEl.className =
        "bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-700 leading-relaxed";
      noteEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${s.note}`;
      menuContainer.parentElement.insertAdjacentElement("beforebegin", noteEl);
    }
  }

  /* ── 권한 저장 ── */
  function savePermissions() {
    const s = staffData.find((s) => s.id === selectedStaffId);
    if (!s) return;
    const checked = [
      ...document.querySelectorAll("#menuPermissions input[type=checkbox]"),
    ]
      .filter((cb) => cb.checked)
      .map((cb) => cb.dataset.menu);
    s.menus = checked;
    showHermesToast(`${s.name}의 권한이 저장되었습니다.`, "success");
  }

  /* ── 차단 모달 ── */
  function openBlockModal(id) {
    blockTargetId = id;
    const s = staffData.find((s) => s.id === id);
    document.getElementById("blockModalTitle").textContent =
      s.name + " 접근 차단";
    document.getElementById("blockModalDesc").textContent =
      s.name +
      "(" +
      s.loginId +
      ")의 시스템 접근을 즉시 차단합니다. 모든 메뉴 권한이 회수되며 로그인이 불가합니다.";
    document.getElementById("blockModal").classList.remove("hidden");
  }

  function closeBlockModal() {
    document.getElementById("blockModal").classList.add("hidden");
    blockTargetId = null;
  }

  function confirmBlock() {
    const s = staffData.find((s) => s.id === blockTargetId);
    if (s) {
      s.status = "blocked";
      s.menus = [];
    }
    closeBlockModal();
    selectedStaffId = null;
    document.getElementById("staffDetailEmpty").classList.remove("hidden");
    document.getElementById("staffDetail").classList.add("hidden");
    renderStaffList(currentFilter, "");
    showHermesToast(
      "접근이 차단되었습니다. 해당 직원은 즉시 로그아웃됩니다.",
      "success",
    );
  }

  /* ── 권한 부여 모달 ── */
  function openGrantModal() {
    const grantMenuList = document.getElementById("grantMenuList");
    grantMenuList.innerHTML = allMenus
      .map(
        (m) => `
      <label class="flex items-center gap-3 py-1.5 cursor-pointer">
        <input type="checkbox" class="hm-switch" data-grant-menu="${m.key}">
        <div class="flex items-center gap-2">
          <i class="fa-solid ${m.icon} text-slate-400 w-4 text-center text-xs"></i>
          <span class="text-sm text-slate-700">${m.label}</span>
        </div>
      </label>
    `,
      )
      .join("");
    document.getElementById("grantModal").classList.remove("hidden");
  }

  function closeGrantModal() {
    document.getElementById("grantModal").classList.add("hidden");
    ["grantName", "grantId", "grantJoinDate"].forEach((id) => {
      document.getElementById(id).value = "";
    });
    document.getElementById("grantRoleType").value = "";
  }

  function saveGrantPermission() {
    const name = document.getElementById("grantName").value.trim();
    const loginId = document.getElementById("grantId").value.trim();
    const roleType = document.getElementById("grantRoleType").value;
    if (!name) {
      showHermesToast("직원명을 입력해 주세요.", "error");
      return;
    }
    if (!loginId) {
      showHermesToast("시스템 ID를 입력해 주세요.", "error");
      return;
    }
    if (!roleType) {
      showHermesToast("직책을 선택해 주세요.", "error");
      return;
    }
    closeGrantModal();
    showHermesToast(name + "에게 권한이 부여되었습니다.", "success");
  }

  /* ── 검토 필요 알림 ── */
  function renderReviewAlert() {
    const container = document.getElementById("reviewAlertList");
    const reviews = staffData.filter((s) => s.status === "review");
    container.innerHTML = reviews
      .map(
        (s) => `
      <div class="flex items-center gap-3 bg-white border border-red-200 rounded-xl px-4 py-2.5">
        <div class="w-8 h-8 rounded-lg bg-red-50 text-red-500 font-bold flex items-center justify-center text-sm shrink-0">
          ${s.name[0]}
        </div>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-slate-800">${s.name}</p>
          <p class="text-xs text-red-500 truncate max-w-48">${s.note}</p>
        </div>
        <button onclick="selectStaff(${s.id}, 'review')" class="ml-2 px-3 py-1 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors shrink-0">
          권한 처리
        </button>
      </div>
    `,
      )
      .join("");
  }

  /* ── 초기 렌더링 ── */
  renderStaffList("all", "");
  renderReviewAlert();
</script>
