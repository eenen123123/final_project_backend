<title th:fragment="pageTitle">학부모 상담 관리 | HERMES</title>

<link rel="stylesheet" th:href="@{/css/manager/calendar-shared.css}" />
<link rel="stylesheet" th:href="@{/css/manager/consultation.css}" />
<script th:src="@{/js/manager/calendar-shared.js}" defer></script>
<script th:src="@{/js/manager/consultation.js}" defer></script>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">학부모 상담 관리</h1>
      <p class="text-sm text-slate-500 mt-1">학생별 상담 이력을 기록하고 학부모 상담 내용을 관리합니다.</p>
    </div>
    <!-- <div class="flex items-center gap-3">
      <button class="hm-btn-primary hm-btn-emerald" onclick="goWriteTab()">
        <i class="fa-solid fa-pen-to-square"></i>
        <span>상담 작성</span>
      </button>
    </div> -->
  </div>

  <!-- ② 요약 통계 카드 -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-violet-50 text-violet-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-calendar-check"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">이번 달 상담</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"><span id="sumMonth">0</span>건</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-sky-50 text-sky-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-clock"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">예정 상담</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"><span id="sumScheduled">0</span>건</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">완료 상담</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"><span id="sumDone">0</span>건</p>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center text-xl shrink-0">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <div>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">후속 조치 필요</p>
        <p class="text-2xl font-bold text-slate-800 mt-0.5"><span id="sumFollowup">0</span>건</p>
      </div>
    </div>
  </div>

  <!-- ③ 통합 캘린더 (상담 + 퇴원방어 공용) -->
  <div th:replace="~{fragments/manager_calendar :: managerCalendar}"></div>

  <!-- ④ 탭 영역 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">

    <!-- 탭 헤더 -->
    <div class="flex items-center gap-1 px-5 pt-4 border-b border-slate-100">
      <button class="con-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors"
        data-tab="tab-history" onclick="switchConTab('tab-history', this)">
        <i class="fa-solid fa-list mr-1.5"></i>전체 상담 이력
      </button>
      <button class="con-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors"
        data-tab="tab-student" onclick="switchConTab('tab-student', this)">
        <i class="fa-solid fa-user-graduate mr-1.5"></i>학생별 조회
      </button>
      <button class="con-tab-btn px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors"
        data-tab="tab-write" onclick="switchConTab('tab-write', this)">
        <i class="fa-solid fa-pen-to-square mr-1.5"></i>상담 내용 작성
      </button>
    </div>

    <!-- ───────── 탭 1: 전체 상담 이력 ───────── -->
    <div id="tab-history" class="con-tab-panel p-5">
      <!-- 검색 필터 (서버사이드) -->
      <div class="flex flex-wrap gap-3 mb-4">
        <div class="w-56">
          <input type="text" id="historyKeyword" class="hm-input hm-input-emerald" placeholder="학생명 / 학부모명 검색..."
                 onkeydown="if(event.key==='Enter') loadHistory(1)">
        </div>
        <div class="w-36">
          <select id="historyStat" class="hm-input hm-input-emerald" onchange="loadHistory(1)"></select>
        </div>
        <div class="w-36">
          <select id="historyType" class="hm-input hm-input-emerald" onchange="loadHistory(1)"></select>
        </div>
        <button class="hm-btn-primary hm-btn-emerald" onclick="loadHistory(1)">
          <i class="fa-solid fa-magnifying-glass"></i><span>검색</span>
        </button>
      </div>

      <!-- 테이블: 일시 | 학생명 | 학부모 | 담당강사 | 유형 | 상태 | 상담요약 | 보기 -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100">
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">일시</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학생명</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">학부모</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">담당강사</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">유형</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">상태</th>
              <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">상담 요약</th>
              <th class="py-2 px-3"></th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>

      <!-- 페이징 -->
      <div class="flex items-center justify-between mt-4 pt-4 border-t border-slate-50">
        <p class="text-xs text-slate-400">총 <span id="historyTotal">0</span>건</p>
        <div class="flex items-center gap-1" id="historyPaging"></div>
      </div>
    </div>

    <!-- ───────── 탭 2: 학생별 조회 (모달 검색) ───────── -->
    <div id="tab-student" class="con-tab-panel hidden p-5">
      <div class="flex items-center gap-3 mb-4">
        <button class="hm-btn-primary hm-btn-emerald" onclick="openStudentSearch('student')">
          <i class="fa-solid fa-magnifying-glass"></i><span>학생 검색</span>
        </button>
        <p class="text-xs text-slate-400">학생을 검색·선택하면 해당 학생의 상담 이력이 표시됩니다.</p>
      </div>

      <div id="studentDetailEmpty" class="flex flex-col items-center justify-center h-64 text-slate-300">
        <i class="fa-solid fa-user-graduate text-4xl mb-3"></i>
        <p class="text-sm">학생을 검색하여 선택해 주세요.</p>
      </div>

      <div id="studentDetailPanel" class="hidden">
        <!-- 학생 정보 헤더 -->
        <div class="flex items-center gap-4 mb-4 p-4 bg-slate-50 rounded-xl">
          <div class="w-12 h-12 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-lg" id="detailStudentAvatar">-</div>
          <div>
            <p class="font-bold text-slate-800" id="detailStudentName">-</p>
            <p class="text-xs text-slate-500" id="detailStudentSub">-</p>
          </div>
          <div class="ml-auto flex gap-2">
            <span class="px-2.5 py-1 bg-white border border-slate-200 rounded-lg text-xs text-slate-600">
              총 <span id="detailTotalCount" class="font-bold text-emerald-600">0</span>회 상담
            </span>
            <button class="hm-btn-primary hm-btn-emerald text-xs py-1.5 px-3" onclick="writeForStudent()">
              <i class="fa-solid fa-pen"></i> 상담 작성
            </button>
          </div>
        </div>
        <!-- 타임라인 -->
        <div class="space-y-3 max-h-[480px] overflow-y-auto no-scrollbar pr-1" id="detailTimeline"></div>
      </div>
    </div>

    <!-- ───────── 탭 3: 상담 내용 작성 ───────── -->
    <div id="tab-write" class="con-tab-panel hidden p-5">
      <div class="max-w-2xl">
        <h3 class="text-sm font-bold text-slate-700 mb-4">새 상담 기록 작성</h3>
        <div class="space-y-4">

          <!-- 상담 대상 구분: 재원생 / 신규 문의(전화·방문) -->
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">상담 대상 <span class="text-red-400">*</span></label>
            <div class="flex gap-2">
              <button type="button" id="modeMemberBtn" class="write-mode-btn flex-1" onclick="setWriteMode('member')">
                <i class="fa-solid fa-user-graduate mr-1"></i>재원생
              </button>
              <button type="button" id="modeProspectBtn" class="write-mode-btn flex-1" onclick="setWriteMode('prospect')">
                <i class="fa-solid fa-phone-volume mr-1"></i>신규 문의 (전화·방문)
              </button>
            </div>
          </div>

          <!-- 재원생: 학생 검색(MEMBER) + 학부모 자동 매칭 -->
          <div id="memberBlock" class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">학생 선택 <span class="text-red-400">*</span></label>
              <input type="hidden" id="writeStudentId">
              <div class="flex gap-2">
                <input type="text" class="hm-input hm-input-emerald bg-slate-50" id="writeStudentNm" placeholder="재원생을 검색하세요" readonly>
                <button type="button" class="px-3 rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-50 shrink-0"
                        onclick="openStudentSearch('write')">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">학부모명 (자동 매칭)</label>
              <input type="text" class="hm-input hm-input-emerald bg-slate-50" id="writeParentNm" placeholder="학생 선택 시 자동 표시" readonly>
            </div>
          </div>

          <!-- 신규 문의자: 이름 + 연락처 직접 입력 -->
          <div id="prospectBlock" class="grid grid-cols-2 gap-4 hidden">
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">문의자 이름 <span class="text-red-400">*</span></label>
              <input type="text" class="hm-input hm-input-emerald" id="writeCnslNm" placeholder="신규 문의자 성함">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">연락처</label>
              <input type="text" class="hm-input hm-input-emerald" id="writeCnslTelno" placeholder="010-0000-0000">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">상담 일시 <span class="text-red-400">*</span></label>
              <input type="datetime-local" class="hm-input hm-input-emerald" id="writeDatetime">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">상담 유형</label>
              <select class="hm-input hm-input-emerald" id="writeType"></select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">상태</label>
              <select class="hm-input hm-input-emerald" id="writeStatus"></select>
            </div>
          </div>

          <!-- 작성 순서: 상담 내용 → 상담 요약 → 후속 조치 -->
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">상담 내용 <span class="text-red-400">*</span></label>
            <textarea class="hm-input hm-input-emerald resize-none" id="writeContent" rows="5"
              placeholder="상담 내용을 자세히 기록하세요. (학생의 학습 태도, 학부모 요청 사항, 특이 사항 등)"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">상담 요약</label>
            <textarea class="hm-input hm-input-emerald resize-none" id="writeSummary" rows="2"
              placeholder="이력 목록에 표시될 한 줄 요약을 입력하세요."></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">후속 조치 사항</label>
            <textarea class="hm-input hm-input-emerald resize-none" id="writeFollowup" rows="2"
              placeholder="다음 상담까지 필요한 조치나 확인 사항을 입력하세요. (선택)"></textarea>
          </div>

          <div class="flex justify-end gap-3 pt-2">
            <button class="px-5 py-2.5 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors" onclick="resetWriteForm()">
              초기화
            </button>
            <button class="hm-btn-primary hm-btn-emerald" onclick="saveConsultRecord()">
              <i class="fa-solid fa-floppy-disk"></i>
              <span>상담 기록 저장</span>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ===== 학생 검색 모달 (공용 · 서버사이드 페이징) ===== -->
<div id="studentSearchModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeStudentSearch()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-bold text-slate-800">학생 검색</h3>
      <button onclick="closeStudentSearch()" class="text-slate-400 hover:text-slate-600">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>
    <div class="flex gap-2 mb-3">
      <input type="text" id="stuSearchKeyword" class="hm-input hm-input-emerald" placeholder="학생명 / 학부모명 검색..."
             onkeydown="if(event.key==='Enter') loadStudentSearch(1)">
      <button class="hm-btn-primary hm-btn-emerald shrink-0" onclick="loadStudentSearch(1)">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
    <div class="border border-slate-100 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50">
          <tr>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400">학생명</th>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400">반/강좌</th>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400">학부모</th>
            <th class="py-2 px-3"></th>
          </tr>
        </thead>
        <tbody id="stuSearchBody"></tbody>
      </table>
    </div>
    <div class="flex items-center justify-between mt-3">
      <p class="text-xs text-slate-400">총 <span id="stuSearchTotal">0</span>명</p>
      <div class="flex items-center gap-1" id="stuSearchPaging"></div>
    </div>
  </div>
</div>

<!-- ===== 상담 상세 모달 ===== -->
<div id="detailModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDetailModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-bold text-slate-800" id="detailModalTitle">상담 상세</h3>
      <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>
    <div id="detailModalBody" class="space-y-3 text-sm text-slate-700"></div>
    <div class="flex justify-end gap-3 mt-5">
      <button class="px-4 py-2 text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition-colors" onclick="closeDetailModal()">닫기</button>
    </div>
  </div>
</div>
