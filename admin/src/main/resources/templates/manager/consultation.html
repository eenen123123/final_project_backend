    { id: 1, date: '2026-05-26', time: '10:00', studentId: 1, student: '김민준', parent: '김영희', classNm: '고등수학A', type: '대면', status: '완료', summary: '중간고사 성적 하락 원인 상담, 보충 수업 동의', content: '중간고사에서 수학 성적이 78점으로 전월 대비 12점 하락하였습니다. 학생의 집중력 저하 및 자기주도학습 부재가 주 원인으로 파악되었으며, 주 1회 보충 수업 진행에 학부모가 동의하였습니다.', followup: '다음 주부터 목요일 7시 보충 수업 진행 예정' },
    { id: 2, date: '2026-05-26', time: '14:00', studentId: 2, student: '이서연', parent: '이미숙', classNm: '중등수학B', type: '전화', status: '완료', summary: '출결 관련 안내 및 학습 태도 개선 요청', content: '최근 2주간 3회 지각이 발생하여 학부모께 안내드렸습니다. 가정 내 기상 시간 관리를 요청드렸으며, 학생의 학습 의욕은 높다고 전달하였습니다.', followup: '' },
    { id: 3, date: '2026-05-26', time: '16:30', studentId: 3, student: '박지호', parent: '박현주', classNm: '고등영어', type: '대면', status: '예정', summary: '6월 수강 갱신 상담', content: '', followup: '' },
    { id: 4, date: '2026-05-23', time: '11:00', studentId: 4, student: '최유진', parent: '최정호', classNm: '중등수학A', type: '대면', status: '후속조치', summary: '수업 집중도 저하 및 진도 이탈 문제 논의', content: '최유진 학생이 최근 수업 중 스마트폰 사용이 잦아 수업에 방해가 되고 있습니다. 담임 교사와 함께 학생 면담 진행 예정이며, 학부모도 적극 협조를 약속하였습니다.', followup: '5/28 학생 면담 후 결과 공유, 6/5 재상담 예정' },
    { id: 5, date: '2026-05-21', time: '15:00', studentId: 5, student: '정하은', parent: '정민아', classNm: '고등수학B', type: '전화', status: '완료', summary: '상위권 유지 전략 및 수능 대비 계획 상담', content: '정하은 학생은 현재 반 내 상위 5% 성적을 유지하고 있습니다. 수능 대비를 위해 9월부터 심화반으로 이동하는 방안을 논의하였으며 학부모도 긍정적으로 검토 중입니다.', followup: '' },
    { id: 6, date: '2026-05-20', time: '13:00', studentId: 1, student: '김민준', parent: '김영희', classNm: '고등수학A', type: '문자', status: '완료', summary: '보충 수업 일정 확인 문자 안내', content: '목요일 7시 보충 수업 일정을 문자로 재확인하였습니다.', followup: '' },
    { id: 7, date: '2026-05-15', time: '10:30', studentId: 3, student: '박지호', parent: '박현주', classNm: '고등영어', type: '대면', status: '완료', summary: '수강료 결제 및 교재 구입 관련 안내', content: '6월 수강료 및 교재비 납부 방법을 안내하였습니다. 학부모께서 자동이체 등록을 원하셔서 관련 서류를 제공하였습니다.', followup: '' },
  ];

  const students = [
    { id: 1, name: '김민준', classNm: '고등수학A', grade: '고2' },
    { id: 2, name: '이서연', classNm: '중등수학B', grade: '중3' },
    { id: 3, name: '박지호', classNm: '고등영어',  grade: '고1' },
    { id: 4, name: '최유진', classNm: '중등수학A', grade: '중2' },
    { id: 5, name: '정하은', classNm: '고등수학B', grade: '고3' },
  ];

  /* ── 탭 전환 ── */
  function switchConTab(tabId, btn) {
    document.querySelectorAll('.con-tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.con-tab-btn').forEach(b => {
      b.classList.remove('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
      b.classList.add('text-slate-500', 'border-transparent');
    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
  }

  /* ── 상태 배지 ── */
  function statusBadge(status) {
    const map = {
      '예정':   'bg-sky-50 text-sky-700',
      '완료':   'bg-emerald-50 text-emerald-700',
      '후속조치': 'bg-amber-50 text-amber-700',
      '취소':   'bg-slate-100 text-slate-500',
    };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${map[status] || 'bg-slate-100 text-slate-500'}">${status}</span>`;
  }

  function typeBadge(type) {
    const map = {
      '대면': 'bg-violet-50 text-violet-700',
      '전화': 'bg-blue-50 text-blue-700',
      '문자': 'bg-slate-100 text-slate-600',
    };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[type] || 'bg-slate-100 text-slate-500'}">${type}</span>`;
  }

  /* ── 전체 이력 테이블 렌더링 ── */
  function renderHistoryTable(data) {
    const tbody = document.getElementById('historyTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">검색 결과가 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(c => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 text-slate-600 whitespace-nowrap">${c.date} ${c.time}</td>
        <td class="py-3 px-3 font-medium text-slate-800">${c.student}</td>
        <td class="py-3 px-3 text-slate-600">${c.parent}</td>
        <td class="py-3 px-3 text-slate-500 text-xs">${c.classNm}</td>
        <td class="py-3 px-3">${typeBadge(c.type)}</td>
        <td class="py-3 px-3">${statusBadge(c.status)}</td>
        <td class="py-3 px-3 text-slate-500 text-xs max-w-xs truncate">${c.summary}</td>
        <td class="py-3 px-3">
          <button onclick="openDetailModal(${c.id})" class="text-violet-500 hover:text-violet-700 text-xs font-semibold">
            <i class="fa-solid fa-eye"></i> 보기
          </button>
        </td>
      </tr>
    `).join('');
  }

  function filterHistory(keyword) {
    const filtered = keyword ? consultData.filter(c => c.student.includes(keyword) || c.parent.includes(keyword)) : consultData;
    renderHistoryTable(filtered);
  }

  function filterHistoryStatus(status) {
    const filtered = status ? consultData.filter(c => c.status === status) : consultData;
    renderHistoryTable(filtered);
  }

  function filterHistoryType(type) {
    const filtered = type ? consultData.filter(c => c.type === type) : consultData;
    renderHistoryTable(filtered);
  }

  /* ── 사이드 패널 (오늘 상담) ── */
  function renderSidePanel(dateStr) {
    const panel = document.getElementById('sidePanelList');
    const label = document.getElementById('sidePanelDate');
    const count = document.getElementById('sidePanelCount');
    if (!panel) return;

    const today = dateStr || new Date().toISOString().slice(0, 10);
    const todayItems = consultData.filter(c => c.date === today);
    const isToday = today === new Date().toISOString().slice(0, 10);
    label.textContent = isToday ? '오늘의 상담' : today + ' 상담';
    count.textContent = todayItems.length + '건';

    if (todayItems.length === 0) {
      panel.innerHTML = `<p class="text-xs text-slate-300 text-center py-4">등록된 상담이 없습니다.</p>`;
      return;
    }
    panel.innerHTML = todayItems.map(c => `
      <div class="p-3 rounded-xl border border-slate-100 hover:border-violet-200 cursor-pointer transition-colors" onclick="openDetailModal(${c.id})">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm font-semibold text-slate-800">${c.time} · ${c.student}</span>
          ${statusBadge(c.status)}
        </div>
        <p class="text-xs text-slate-400 truncate">${c.summary || c.parent + ' 학부모 상담'}</p>
        <p class="text-xs text-slate-300 mt-0.5">${typeBadge(c.type)}</p>
      </div>
    `).join('');
  }

  /* ── 학생 목록 렌더링 ── */
  function renderStudentList(data) {
    const list = document.getElementById('studentList');
    if (!list) return;
    list.innerHTML = data.map(s => `
      <button onclick="selectStudent(${s.id})"
        class="student-item w-full text-left px-3 py-2.5 rounded-xl hover:bg-violet-50 transition-colors flex items-center gap-3"
        data-id="${s.id}">
        <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center text-xs font-bold shrink-0">
          ${s.name[0]}
        </div>
        <div>
          <p class="text-sm font-medium text-slate-800">${s.name}</p>
          <p class="text-xs text-slate-400">${s.grade} · ${s.classNm}</p>
        </div>
        <span class="ml-auto text-xs text-slate-300">${consultData.filter(c => c.studentId === s.id).length}건</span>
      </button>
    `).join('');
  }

  function filterStudents(keyword) {
    const filtered = keyword ? students.filter(s => s.name.includes(keyword)) : students;
    renderStudentList(filtered);
  }

  function selectStudent(id) {
    /* 선택 표시 */
    document.querySelectorAll('.student-item').forEach(b => {
      b.classList.toggle('bg-violet-50 text-violet-700 font-semibold', parseInt(b.dataset.id) === id);
    });

    const s = students.find(s => s.id === id);
    const records = consultData.filter(c => c.studentId === id).sort((a, b) => b.date.localeCompare(a.date));

    document.getElementById('studentDetailEmpty').classList.add('hidden');
    document.getElementById('studentDetailPanel').classList.remove('hidden');
    document.getElementById('detailStudentAvatar').textContent = s.name[0];
    document.getElementById('detailStudentName').textContent = s.name;
    document.getElementById('detailStudentClass').textContent = s.grade + ' · ' + s.classNm;
    document.getElementById('detailTotalCount').textContent = records.length;

    const timeline = document.getElementById('detailTimeline');
    if (records.length === 0) {
      timeline.innerHTML = `<p class="text-xs text-slate-300 text-center py-6">상담 이력이 없습니다.</p>`;
      return;
    }
    timeline.innerHTML = records.map(c => `
      <div class="relative pl-5 before:absolute before:left-1.5 before:top-0 before:bottom-0 before:w-px before:bg-slate-100">
        <div class="absolute left-0 top-1.5 w-3 h-3 rounded-full border-2 border-white ${c.status === '완료' ? 'bg-emerald-400' : c.status === '예정' ? 'bg-sky-400' : c.status === '후속조치' ? 'bg-amber-400' : 'bg-slate-300'} shadow"></div>
        <div class="bg-white border border-slate-100 rounded-xl p-3 hover:border-violet-200 cursor-pointer transition-colors" onclick="openDetailModal(${c.id})">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold text-slate-600">${c.date} ${c.time}</span>
            <div class="flex gap-1">${typeBadge(c.type)} ${statusBadge(c.status)}</div>
          </div>
          <p class="text-xs text-slate-700 font-medium">${c.summary}</p>
          ${c.followup ? `<p class="text-xs text-amber-600 mt-1"><i class="fa-solid fa-arrow-right mr-1"></i>${c.followup}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  /* ── 상세 모달 ── */
  function openDetailModal(id) {
    const c = consultData.find(c => c.id === id);
    if (!c) return;
    document.getElementById('detailModalTitle').textContent = c.student + ' · ' + c.date + ' 상담 기록';
    document.getElementById('detailModalBody').innerHTML = `
      <div class="grid grid-cols-2 gap-3 bg-slate-50 rounded-xl p-4">
        <div><p class="text-xs text-slate-400 mb-0.5">학생</p><p class="font-medium">${c.student}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">학부모</p><p class="font-medium">${c.parent}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">일시</p><p class="font-medium">${c.date} ${c.time}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">유형 / 상태</p><p class="font-medium flex gap-1">${typeBadge(c.type)} ${statusBadge(c.status)}</p></div>
      </div>
      ${c.content ? `<div><p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">상담 내용</p><p class="text-sm leading-relaxed bg-white border border-slate-100 rounded-xl p-3">${c.content}</p></div>` : ''}
      ${c.followup ? `<div><p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">후속 조치</p><p class="text-sm leading-relaxed bg-amber-50 border border-amber-100 rounded-xl p-3 text-amber-700">${c.followup}</p></div>` : ''}
    `;
    document.getElementById('detailModal').classList.remove('hidden');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
  }

  /* ── 일정 등록 모달 ── */
  function openNewConsultModal() {
    const now = new Date();
    now.setMinutes(0, 0, 0);
    now.setHours(now.getHours() + 1);
    document.getElementById('modalDatetime').value = now.toISOString().slice(0, 16);
    document.getElementById('consultModal').classList.remove('hidden');
  }

  function closeConsultModal() {
    document.getElementById('consultModal').classList.add('hidden');
  }

  function saveConsultSchedule() {
    const student = document.getElementById('modalStudent').value;
    if (!student) { showHermesToast('학생을 선택해 주세요.', 'error'); return; }
    const dt = document.getElementById('modalDatetime').value;
    if (!dt) { showHermesToast('상담 일시를 선택해 주세요.', 'error'); return; }
    closeConsultModal();
    showHermesToast('상담 일정이 등록되었습니다.', 'success');
  }

  /* ── 빠른 메모 ── */
  function saveQuickMemo() {
    const student = document.getElementById('quickStudent').value;
    const memo = document.getElementById('quickMemo').value.trim();
    if (!student) { showHermesToast('학생을 선택해 주세요.', 'error'); return; }
    if (!memo) { showHermesToast('메모 내용을 입력해 주세요.', 'error'); return; }
    document.getElementById('quickMemo').value = '';
    showHermesToast('메모가 저장되었습니다.', 'success');
  }

  /* ── 상담 기록 저장 ── */
  function saveConsultRecord() {
    const student = document.getElementById('writeStudent').value;
    const dt = document.getElementById('writeDatetime').value;
    const content = document.getElementById('writeContent').value.trim();
    if (!student) { showHermesToast('학생을 선택해 주세요.', 'error'); return; }
    if (!dt) { showHermesToast('상담 일시를 입력해 주세요.', 'error'); return; }
    if (!content) { showHermesToast('상담 내용을 입력해 주세요.', 'error'); return; }
    showHermesToast('상담 기록이 저장되었습니다.', 'success');
    resetWriteForm();
  }

  function resetWriteForm() {
    ['writeStudent', 'writeDatetime', 'writeParent', 'writeContent', 'writeFollowup'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  }

  /* ── FullCalendar 초기화 ── */
  const calendarEl = document.getElementById('consultCalendar');
  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'ko',
    headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
    height: 480,
    events: consultData.map(c => ({
      title: c.student + ' ' + c.type,
      start: c.date + 'T' + c.time,
      backgroundColor: c.status === '완료' ? '#10b981' : c.status === '예정' ? '#0ea5e9' : c.status === '후속조치' ? '#f59e0b' : '#94a3b8',
      extendedProps: { id: c.id }
    })),
    eventClick: function(info) {
      openDetailModal(info.event.extendedProps.id);
    },
    dateClick: function(info) {
      renderSidePanel(info.dateStr);
    }
  });
  calendar.render();

  /* ── 초기 렌더링 ── */
  renderHistoryTable(consultData);
  renderSidePanel();
  renderStudentList(students);

  /* ── 탭 초기화 (렌더링 이후에 실행) ── */
  (function () {
    const firstBtn = document.querySelector('.con-tab-btn[data-tab="tab-history"]');
    if (firstBtn) switchConTab('tab-history', firstBtn);
  })();
</script>
