      b.classList.add('text-slate-500', 'border-transparent');
    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
  }

  /* ── 위험도 배지 ── */
  function riskBadge(risk) {
    const map = {
      '고위험': 'bg-red-50 text-red-600',
      '중위험': 'bg-amber-50 text-amber-600',
      '저위험': 'bg-sky-50 text-sky-600',
    };
    return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${map[risk] || 'bg-slate-100 text-slate-500'}">${risk}</span>`;
  }

  /* ── 결과 배지 ── */
  function resultBadge(result) {
    const map = {
      '유지':   'bg-emerald-50 text-emerald-700',
      '진행중': 'bg-violet-50 text-violet-700',
      '퇴원':   'bg-slate-100 text-slate-500',
    };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-semibold ${map[result] || 'bg-slate-100 text-slate-500'}">${result}</span>`;
  }

  /* ── 근태 이상 게이지 ── */
  function absenceGauge(count, max, color) {
    const pct = Math.min(100, Math.round((count / max) * 100));
    return `<div class="flex items-center gap-2">
      <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <div class="h-full ${color} rounded-full" style="width:${pct}%"></div>
      </div>
      <span class="text-xs font-bold w-4 text-right">${count}</span>
    </div>`;
  }

  /* ── 근태 특이사항 테이블 렌더링 ── */
  function renderAttendanceTable(data) {
    const tbody = document.getElementById('attendanceTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">해당 데이터가 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 font-medium text-slate-800">${r.student}</td>
        <td class="py-3 px-3 text-xs text-slate-500">${r.classNm}</td>
        <td class="py-3 px-3 w-24">${absenceGauge(r.absence, 7, 'bg-red-400')}</td>
        <td class="py-3 px-3 w-24">${absenceGauge(r.late, 10, 'bg-amber-400')}</td>
        <td class="py-3 px-3 w-24">${absenceGauge(r.early, 5, 'bg-sky-400')}</td>
        <td class="py-3 px-3 text-xs text-slate-500 max-w-xs truncate">${r.lastNote}</td>
        <td class="py-3 px-3">${riskBadge(r.risk)}</td>
        <td class="py-3 px-3">
          <button onclick="goToProcess(${r.studentId})" class="text-violet-500 hover:text-violet-700 text-xs font-semibold whitespace-nowrap">
            <i class="fa-solid fa-comments"></i> 상담
          </button>
        </td>
      </tr>
    `).join('');
  }

  function filterAttendance(keyword) {
    const data = keyword ? attendanceData.filter(r => r.student.includes(keyword)) : attendanceData;
    renderAttendanceTable(data);
  }

  function filterAttendanceType(type) {
    if (!type) { renderAttendanceTable(attendanceData); return; }
    const key = type === '결석' ? 'absence' : type === '지각' ? 'late' : 'early';
    renderAttendanceTable(attendanceData.filter(r => r[key] > 0));
  }

  function filterAttendanceClass(classNm) {
    const data = classNm ? attendanceData.filter(r => r.classNm === classNm) : attendanceData;
    renderAttendanceTable(data);
  }

  /* ── 근태 저장 ── */
  function saveAttendance() {
    const student = document.getElementById('attStudent').value;
    const date    = document.getElementById('attDate').value;
    const type    = document.getElementById('attType').value;
    if (!student) { showHermesToast('학생을 선택해 주세요.', 'error'); return; }
    if (!date)    { showHermesToast('날짜를 선택해 주세요.', 'error'); return; }
    showHermesToast(`${type} 특이사항이 저장되었습니다.`, 'success');
    document.getElementById('attStudent').value = '';
    document.getElementById('attDate').value = '';
    document.getElementById('attMemo').value = '';
  }

  /* ── 퇴원 위험 카드 렌더링 ── */
  function renderRiskCards(data) {
    const grid = document.getElementById('riskCardGrid');
    if (!grid) return;
    if (data.length === 0) {
      grid.innerHTML = `<div class="col-span-3 py-10 text-center text-slate-300 text-sm">해당하는 학생이 없습니다.</div>`;
      return;
    }
    const borderMap = { '고위험': 'border-red-200', '중위험': 'border-amber-200', '저위험': 'border-sky-200' };
    const dotMap    = { '고위험': 'bg-red-500', '중위험': 'bg-amber-400', '저위험': 'bg-sky-400' };
    grid.innerHTML = data.map(r => `
      <div class="bg-white rounded-2xl border-2 ${borderMap[r.risk]} shadow-sm p-4">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full ${dotMap[r.risk]} shrink-0 mt-0.5"></div>
            <div>
              <p class="font-bold text-slate-800">${r.student}</p>
              <p class="text-xs text-slate-400">${r.grade} · ${r.classNm}</p>
            </div>
          </div>
          ${riskBadge(r.risk)}
        </div>

        <div class="space-y-1 mb-3">
          ${r.reasons.map(reason => `
            <div class="flex items-center gap-1.5 text-xs text-slate-600">
              <i class="fa-solid fa-circle-exclamation text-slate-300 shrink-0"></i>
              ${reason}
            </div>
          `).join('')}
        </div>

        ${r.note ? `<p class="text-xs text-slate-500 bg-slate-50 rounded-lg px-3 py-2 mb-3 leading-relaxed">${r.note}</p>` : ''}

        <div class="border-t border-slate-100 pt-3 flex items-center justify-between">
          <div class="text-xs text-slate-400">
            <span>최근 상담: ${r.lastContact}</span>
            <span class="mx-1.5">·</span>
            <span>담당: ${r.counselor}</span>
            <span class="mx-1.5">·</span>
            <span class="font-semibold text-violet-600">${r.counselCount}회</span>
          </div>
          <button onclick="openProcessModal()" class="text-xs font-semibold text-violet-600 hover:text-violet-800 transition-colors">
            <i class="fa-solid fa-comments mr-0.5"></i> 상담 추가
          </button>
        </div>
      </div>
    `).join('');
  }

  function filterRisk(value) {
    const data = value ? riskData.filter(r => r.risk === value) : riskData;
    renderRiskCards(data);
  }

  /* ── 상담 프로세스 이력 테이블 ── */
  function renderProcessTable(data) {
    const tbody = document.getElementById('processTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">해당 데이터가 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 font-medium text-slate-800">${r.student}</td>
        <td class="py-3 px-3 text-xs text-slate-500">${r.classNm}</td>
        <td class="py-3 px-3 text-sm text-slate-600">${r.reason}</td>
        <td class="py-3 px-3 text-center">
          <span class="px-2.5 py-0.5 bg-violet-50 text-violet-700 rounded-full text-xs font-bold">${r.counselCount}회</span>
        </td>
        <td class="py-3 px-3 text-sm text-slate-500">${r.lastDate}</td>
        <td class="py-3 px-3 text-sm text-slate-600">${r.counselor}</td>
        <td class="py-3 px-3">${resultBadge(r.result)}</td>
        <td class="py-3 px-3">
          <button onclick="openProcessModal()" class="text-violet-500 hover:text-violet-700 text-xs font-semibold">
            <i class="fa-solid fa-plus"></i> 추가
          </button>
        </td>
      </tr>
    `).join('');
  }

  function filterProcess(keyword) {
    const data = keyword ? processData.filter(r => r.student.includes(keyword)) : processData;
    renderProcessTable(data);
  }

  function filterProcessResult(result) {
    const data = result ? processData.filter(r => r.result === result) : processData;
    renderProcessTable(data);
  }

  /* ── 근태 탭에서 상담 탭으로 이동 ── */
  function goToProcess(studentId) {
    const btn = document.querySelector('.ret-tab-btn[data-tab="tab-process"]');
    if (btn) switchRetTab('tab-process', btn);
    showHermesToast('상담 프로세스 이력 탭으로 이동했습니다.', 'info');
  }

  /* ── 상담 이력 모달 ── */
  function openProcessModal() {
    document.getElementById('processModal').classList.remove('hidden');
  }

  function closeProcessModal() {
    document.getElementById('processModal').classList.add('hidden');
  }

  function saveProcessRecord() {
    const student = document.getElementById('modalProcessStudent').value;
    const content = document.getElementById('modalProcessContent').value.trim();
    if (!student) { showHermesToast('학생을 선택해 주세요.', 'error'); return; }
    if (!content) { showHermesToast('상담 내용을 입력해 주세요.', 'error'); return; }
    closeProcessModal();
    showHermesToast('상담 이력이 저장되었습니다.', 'success');
    document.getElementById('modalProcessContent').value = '';
  }

  /* ── 초기 렌더링 ── */
  renderAttendanceTable(attendanceData);
  renderRiskCards(riskData);
  renderProcessTable(processData);

  /* ── 탭 초기화 (렌더링 이후에 실행) ── */
  (function () {
    const firstBtn = document.querySelector('.ret-tab-btn[data-tab="tab-attendance"]');
    if (firstBtn) switchRetTab('tab-attendance', firstBtn);
  })();
</script>
