<title th:fragment="pageTitle">강사 업무 모니터링 | HERMES</title>

<div class="space-y-6">

  <!-- ① 페이지 헤더 -->
  <div>
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight">강사 업무 모니터링</h1>
    <p class="text-sm text-slate-500 mt-1">강좌 운영 현황 및 담당 강사 업무 일지를 확인합니다.</p>
  </div>

  <!-- ② 요약 지표 카드 3개 -->
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-violet-50 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-chalkboard-user text-violet-500 text-xl"></i>
      </div>
      <div>
        <p class="text-xs text-slate-400 font-medium mb-0.5">운영중 강좌</p>
        <p class="text-2xl font-bold text-slate-900">
          <span th:text="${activeClassCount}">0</span><span class="text-base font-medium text-slate-400 ml-1">개</span>
        </p>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-sky-50 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-users text-sky-500 text-xl"></i>
      </div>
      <div>
        <p class="text-xs text-slate-400 font-medium mb-0.5">전체 수강생</p>
        <p class="text-2xl font-bold text-slate-900">
          <span th:text="${totalStudentCount}">0</span><span class="text-base font-medium text-slate-400 ml-1">명</span>
        </p>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-4">
      <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center shrink-0">
        <i class="fa-solid fa-clipboard-check text-emerald-500 text-xl"></i>
      </div>
      <div>
        <p class="text-xs text-slate-400 font-medium mb-0.5">이번달 업무 일지</p>
        <p class="text-2xl font-bold text-slate-900">
          <span th:text="${thisMonthJournalCount}">0</span><span class="text-base font-medium text-slate-400 ml-1">건</span>
        </p>
      </div>
    </div>

  </div>

  <!-- ③ 운영 강좌 현황 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm">
    <div class="flex items-center justify-between px-5 pt-5 pb-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-chalkboard text-violet-500"></i>
        <span class="text-sm font-bold text-slate-700">운영중 강좌 현황</span>
      </div>
      <span class="text-xs text-slate-400">총 <span class="font-bold text-slate-600" th:text="${activeClassCount}">0</span>개</span>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100">
            <th class="text-left py-2 px-5 text-xs font-semibold text-slate-400 uppercase tracking-wider">강좌명</th>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">담당 강사</th>
            <th class="text-right py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수강생</th>
            <th class="py-2 px-5"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="c : ${activeClassrooms}"
              th:classappend="${c.instrUserId == instrId} ? 'bg-violet-50/50' : ''"
              class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-5 font-medium text-slate-800" th:text="${c.classNm}">-</td>
            <td class="py-3 px-3 text-slate-600" th:text="${c.instrUserNm}">-</td>
            <td class="py-3 px-3 text-right text-xs font-medium text-slate-600">
              <span th:text="${c.studentCnt}">0</span>명
            </td>
            <td class="py-3 px-5 text-right whitespace-nowrap">
              <!-- 선택 안 된 강좌 → 일지 보기 링크 -->
              <a th:if="${c.instrUserId != instrId}"
                 th:href="|/admin/instructors/monitor?instrId=${c.instrUserId}&keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}#journal-section|"
                 class="text-xs font-semibold text-violet-600 hover:text-violet-800 transition-colors">
                일지 보기 <i class="fa-solid fa-arrow-down text-xs ml-0.5"></i>
              </a>
              <!-- 선택된 강좌 → 필터 해제 링크 -->
              <a th:if="${c.instrUserId == instrId}"
                 th:href="|/admin/instructors/monitor?keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}#journal-section|"
                 class="text-xs font-semibold text-slate-400 hover:text-slate-600 transition-colors">
                <i class="fa-solid fa-xmark text-xs mr-0.5"></i> 해제
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(activeClassrooms)}">
            <td colspan="4" class="py-10 text-center text-slate-300 text-sm">운영중인 강좌가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ④ 업무 일지 현황 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm" id="journal-section">

    <!-- 섹션 헤더 (강사 필터 적용 시 강사명 표시) -->
    <div class="flex items-center justify-between px-5 pt-5 pb-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-clipboard-list text-violet-500"></i>
        <span class="text-sm font-bold text-slate-700">업무 일지 현황</span>
        <span th:if="${selectedInstrNm != ''}"
              class="flex items-center gap-1.5 px-2.5 py-1 bg-violet-100 text-violet-700 text-xs font-semibold rounded-full">
          <i class="fa-solid fa-filter text-xs"></i>
          <span th:text="${selectedInstrNm}">강사명</span> 강사
        </span>
      </div>
      <a th:if="${selectedInstrNm != ''}"
         th:href="|/admin/instructors/monitor?keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}|"
         class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
        전체 보기
      </a>
    </div>

    <!-- 날짜·키워드 필터 폼 -->
    <form method="get" action="/admin/instructors/monitor" class="flex flex-wrap gap-3 p-5 pb-4">
      <!-- instrId는 hidden으로 유지 (강좌 클릭 상태 보존) -->
      <input type="hidden" name="instrId" th:value="${instrId}">
      <div class="w-36">
        <input type="date" name="fromDt" class="hm-input" th:value="${fromDt}">
      </div>
      <div class="w-36">
        <input type="date" name="toDt" class="hm-input" th:value="${toDt}">
      </div>
      <div class="flex-1 min-w-40">
        <input type="text" name="keyword" class="hm-input"
               placeholder="일지 제목 검색..." th:value="${keyword}">
      </div>
      <button type="submit" class="hm-btn-primary">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>검색</span>
      </button>
      <a th:if="${keyword != '' or fromDt != '' or toDt != ''}"
         th:href="|/admin/instructors/monitor?instrId=${instrId}#journal-section|"
         class="px-4 py-2 text-sm text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl font-semibold transition-colors">
        초기화
      </a>
    </form>

    <!-- 일지 테이블 -->
    <div class="overflow-x-auto px-5 pb-5">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100">
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">날짜</th>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">강사명</th>
            <th class="text-left py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">일지 제목</th>
            <th class="text-center py-2 px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider">수행</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="j : ${journalList}"
              class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
            <td class="py-3 px-3 text-slate-500 whitespace-nowrap" th:text="${j.jrnlDt}">-</td>
            <td class="py-3 px-3 font-medium text-slate-800" th:text="${j.instrUserNm}">-</td>
            <td class="py-3 px-3 text-slate-600 max-w-xs truncate" th:text="${j.jrnlTitle}">-</td>
            <td class="py-3 px-3 text-center">
              <span class="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-50 text-emerald-600 mx-auto">
                <i class="fa-solid fa-check text-xs"></i>
              </span>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(journalList)}">
            <td colspan="4" class="py-10 text-center text-slate-300 text-sm">작성된 일지가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 페이지네이션 바 (employees.html 스타일) -->
    <div class="flex items-center justify-between px-5 py-4 border-t border-slate-100 bg-slate-50/50">

      <!-- 좌측: 건수 표시 -->
      <p class="text-xs text-slate-400">
        <th:block th:if="${totalCount > 0}">
          <span th:text="${startItem}">1</span> - <span th:text="${endItem}">10</span> /
        </th:block>
        총 <span class="font-semibold text-slate-600" th:text="${totalCount}">0</span>건
      </p>

      <!-- 우측: 페이지 버튼 -->
      <div class="flex items-center gap-1" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 1}"
           th:href="|/admin/instructors/monitor?instrId=${instrId}&keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}&page=${currentPage - 1}#journal-section|"
           class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 transition-colors">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </a>
        <span th:unless="${currentPage > 1}"
              class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-300 cursor-default">
          <i class="fa-solid fa-chevron-left text-xs"></i>
        </span>

        <th:block th:each="p : ${#numbers.sequence(1, totalPages)}">
          <a th:href="|/admin/instructors/monitor?instrId=${instrId}&keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}&page=${p}#journal-section|"
             th:text="${p}"
             th:classappend="${p == currentPage} ? 'bg-violet-500 text-white' : 'text-slate-500 hover:bg-slate-100'"
             class="w-8 h-8 flex items-center justify-center rounded-lg text-xs font-medium transition-colors">1</a>
        </th:block>

        <a th:if="${currentPage < totalPages}"
           th:href="|/admin/instructors/monitor?instrId=${instrId}&keyword=${keyword}&fromDt=${fromDt}&toDt=${toDt}&page=${currentPage + 1}#journal-section|"
           class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-500 hover:bg-slate-100 transition-colors">
          <i class="fa-solid fa-chevron-right text-xs"></i>
        </a>
        <span th:unless="${currentPage < totalPages}"
              class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-300 cursor-default">
          <i class="fa-solid fa-chevron-right text-xs"></i>
        </span>
      </div>

    </div>

  </div>
</div>

<script src="/js/manager/instructors_monitor.js"></script>
