  function switchTmTab(tabId, btn) {
    document.querySelectorAll('.tm-tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.tm-tab-btn').forEach(b => {
      b.classList.remove('text-violet-600', 'border-violet-500', 'bg-violet-50/60');

    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
  }

  function statusBadge(status) {
    const map = {
      '미확인': 'bg-red-50 text-red-600',
      '검토중': 'bg-sky-50 text-sky-600',
      '반영':   'bg-emerald-50 text-emerald-700',
      '보류':   'bg-slate-100 text-slate-500',
    };
    return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${map[status] || 'bg-slate-100 text-slate-500'}">${status}</span>`;
  }

  function typeBadge(type) {
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${type === '학습' ? 'bg-violet-50 text-violet-700' : 'bg-amber-50 text-amber-700'}">${type}</span>`;
  }

  function checkIcon(done) {
    return done
      ? `<span class="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-50 text-emerald-600 mx-auto"><i class="fa-solid fa-check text-xs"></i></span>`
      : `<span class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 text-slate-300 mx-auto"><i class="fa-solid fa-minus text-xs"></i></span>`;
  }

  /* ── 강사 선택 카드 ── */
  function renderInstructorCards(selected) {
    const container = document.getElementById('instructorCards');
    container.innerHTML = instructors.map(ins => {
      const isSelected = selected === ins.id;
      const color = ins.journalRate >= 90 ? 'text-emerald-600' : ins.journalRate >= 75 ? 'text-amber-500' : 'text-red-500';
      return `
        <button onclick="selectInstructor(${ins.id})"
          class="inst-card bg-white rounded-2xl border-2 p-4 text-left transition-all hover:border-violet-300 hover:shadow-md ${isSelected ? 'border-violet-500 shadow-md shadow-violet-100' : 'border-slate-100'}">
          <div class="flex items-center gap-2 mb-2">
            <div class="w-9 h-9 rounded-xl bg-violet-50 text-violet-600 font-bold flex items-center justify-center text-sm shrink-0">
              ${ins.name[0]}
            </div>
            <div>
              <p class="text-sm font-bold text-slate-800">${ins.name}</p>
              <p class="text-xs text-slate-400">${ins.subject}</p>
            </div>
          </div>
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span>담당 ${ins.classes}반 · ${ins.students}명</span>
          </div>
          <div class="mt-2">
            <div class="flex justify-between text-xs mb-0.5">
              <span class="text-slate-400">일지 작성률</span>
              <span class="font-bold ${color}">${ins.journalRate}%</span>
            </div>
            <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full ${ins.journalRate >= 90 ? 'bg-emerald-400' : ins.journalRate >= 75 ? 'bg-amber-400' : 'bg-red-400'}"
                style="width:${ins.journalRate}%"></div>
            </div>
          </div>
        </button>
      `;
    }).join('');
  }

  let selectedInstructor = 0;
  function selectInstructor(id) {
    selectedInstructor = id === selectedInstructor ? 0 : id;
    renderInstructorCards(selectedInstructor);
    renderJournal(journalData);
    renderWorklog();
  }

  /* ── 상담 일지 ── */
  function renderJournal(data) {
    const filtered = selectedInstructor ? data.filter(j => j.instructorId === selectedInstructor) : data;
    const list = document.getElementById('journalList');
    if (!list) return;
    if (filtered.length === 0) {
      list.innerHTML = `<div class="py-10 text-center text-slate-300 text-sm">해당하는 상담 일지가 없습니다.</div>`;
      return;
    }
    list.innerHTML = filtered.map(j => `
      <div class="border border-slate-100 rounded-2xl p-4 hover:border-violet-200 transition-colors cursor-pointer group"
        onclick="openJournalModal(${j.id})">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-violet-50 text-violet-600 font-bold flex items-center justify-center text-sm shrink-0">
              ${j.instructor[0]}
            </div>
            <div>
              <div class="flex items-center gap-2 mb-0.5">
                <span class="text-sm font-bold text-slate-800">${j.instructor} 강사</span>
                <span class="text-xs text-slate-300">·</span>
                <span class="text-xs text-slate-400">${j.date}</span>
                ${typeBadge(j.type)}
              </div>
              <p class="text-xs text-slate-500">대상: <span class="font-medium text-slate-700">${j.student}</span> · ${j.classNm}</p>
            </div>
          </div>
          <span class="text-xs text-violet-500 font-semibold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
            <i class="fa-solid fa-eye mr-1"></i>상세
          </span>
        </div>
        <div class="mt-3 pl-12">
          <p class="text-sm text-slate-700 font-medium">${j.summary}</p>
          ${j.followup ? `<p class="text-xs text-amber-600 mt-1.5"><i class="fa-solid fa-arrow-right mr-1"></i>${j.followup}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filterJournal(keyword) {
    const data = keyword ? journalData.filter(j => j.student.includes(keyword) || j.summary.includes(keyword)) : journalData;
    renderJournal(data);
  }

  function filterJournalInstructor(id) {
    selectedInstructor = parseInt(id) || 0;
    renderInstructorCards(selectedInstructor);
    renderJournal(journalData);
  }

  function filterJournalMonth(month) {
    const data = month ? journalData.filter(j => j.date.startsWith(month)) : journalData;
    renderJournal(data);
  }

  function openJournalModal(id) {
    const j = journalData.find(j => j.id === id);
    if (!j) return;
    document.getElementById('jmTitle').textContent = j.instructor + ' 강사 · ' + j.date + ' 상담 일지';
    document.getElementById('jmBody').innerHTML = `
      <div class="grid grid-cols-2 gap-3 bg-slate-50 rounded-xl p-4">
        <div><p class="text-xs text-slate-400 mb-0.5">대상 학생</p><p class="font-medium text-slate-800">${j.student}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">담당반</p><p class="font-medium text-slate-800">${j.classNm}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">일지 유형</p>${typeBadge(j.type)}</div>
        <div><p class="text-xs text-slate-400 mb-0.5">작성일</p><p class="font-medium text-slate-800">${j.date}</p></div>
      </div>
      <div>
        <p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">상담 내용</p>
        <p class="text-sm leading-relaxed bg-white border border-slate-100 rounded-xl p-3 text-slate-700">${j.content}</p>
      </div>
      ${j.followup ? `
      <div>
        <p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">후속 조치</p>
        <p class="text-sm leading-relaxed bg-amber-50 border border-amber-100 rounded-xl p-3 text-amber-700">${j.followup}</p>
      </div>` : ''}
    `;
    document.getElementById('journalModal').classList.remove('hidden');
  }

  function closeJournalModal() {
    document.getElementById('journalModal').classList.add('hidden');
  }

  /* ── 일일 업무 기록 ── */
  function renderWorklog() {
    const selId = parseInt(document.getElementById('worklogInstructor')?.value) || 0;
    const data = selId ? worklogData.filter(w => w.instructorId === selId) : worklogData;
    const tbody = document.getElementById('worklogTableBody');
    if (!tbody) return;
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">데이터가 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(w => {
      const rateColor = w.rate === 100 ? 'text-emerald-600' : w.rate >= 70 ? 'text-amber-500' : 'text-red-500';
      const barColor  = w.rate === 100 ? 'bg-emerald-400' : w.rate >= 70 ? 'bg-amber-400' : 'bg-red-400';
      return `
        <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
          <td class="py-3 px-3 text-slate-600 whitespace-nowrap">${w.date}</td>
          <td class="py-3 px-3 font-medium text-slate-800">${w.instructor}</td>
          <td class="py-3 px-3 text-xs text-slate-500">${w.classNm}</td>
          <td class="py-3 px-3 text-center">${checkIcon(w.lecture)}</td>
          <td class="py-3 px-3 text-center">${checkIcon(w.counsel)}</td>
          <td class="py-3 px-3 text-center">${checkIcon(w.grading)}</td>
          <td class="py-3 px-3 text-xs text-slate-500 max-w-xs truncate">${w.note}</td>
          <td class="py-3 px-3 w-28">
            <div class="flex items-center gap-2">
              <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full ${barColor} rounded-full" style="width:${w.rate}%"></div>
              </div>
              <span class="text-xs font-bold ${rateColor} w-7 text-right">${w.rate}%</span>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  /* ── 건의사항 ── */
  function renderSuggest(data) {
    const list = document.getElementById('suggestList');
    if (!list) return;
    if (data.length === 0) {
      list.innerHTML = `<div class="py-10 text-center text-slate-300 text-sm">건의사항이 없습니다.</div>`;
      return;
    }
    const categoryColor = { '수업환경': 'bg-violet-50 text-violet-600', '교재': 'bg-sky-50 text-sky-600', '학사운영': 'bg-emerald-50 text-emerald-700', '기타': 'bg-slate-100 text-slate-500' };
    list.innerHTML = data.map(s => `
      <div class="border rounded-2xl p-5 ${s.status === '미확인' ? 'border-red-200 bg-red-50/30' : 'border-slate-100'}">
        <div class="flex items-start justify-between gap-4 mb-3">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-slate-100 text-slate-600 font-bold flex items-center justify-center text-sm shrink-0">
              ${s.instructor[0]}
            </div>
            <div>
              <p class="text-sm font-bold text-slate-800">${s.title}</p>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="text-xs text-slate-400">${s.instructor} 강사 · ${s.date}</span>
                <span class="px-2 py-0.5 rounded-full text-xs font-medium ${categoryColor[s.category] || 'bg-slate-100 text-slate-500'}">${s.category}</span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            ${statusBadge(s.status)}
            ${s.status === '미확인' || s.status === '검토중' ? `
              <button onclick="openFeedbackModal(${s.id})" class="hm-btn-primary text-xs py-1.5 px-3">
                <i class="fa-solid fa-pen"></i> 피드백
              </button>
            ` : ''}
          </div>
        </div>

        <p class="text-sm text-slate-700 leading-relaxed pl-12 mb-3">${s.content}</p>

        ${s.feedback ? `
          <div class="pl-12">
            <div class="bg-white border border-slate-200 rounded-xl px-4 py-3">
              <p class="text-xs font-semibold text-slate-400 mb-1"><i class="fa-solid fa-reply mr-1 text-violet-400"></i>운영 피드백</p>
              <p class="text-sm text-slate-700 leading-relaxed">${s.feedback}</p>
            </div>
          </div>
        ` : ''}
      </div>
    `).join('');
  }

  function filterSuggest(status) {
    const data = status ? suggestData.filter(s => s.status === status) : suggestData;
    renderSuggest(data);
  }

  function filterSuggestInstructor(id) {
    const data = id ? suggestData.filter(s => s.instructorId === parseInt(id)) : suggestData;
    renderSuggest(data);
  }

  function filterSuggestCategory(category) {
    const data = category ? suggestData.filter(s => s.category === category) : suggestData;
    renderSuggest(data);
  }

  /* ── 피드백 모달 ── */
  function openFeedbackModal(id) {
    const s = suggestData.find(s => s.id === id);
    if (!s) return;
    activeFeedbackId = id;
    document.getElementById('fbInstructor').textContent = s.instructor + ' 강사';
    document.getElementById('fbDate').textContent = s.date;
    document.getElementById('fbContent').textContent = s.content;
    document.getElementById('fbText').value = s.feedback || '';
    document.getElementById('fbResult').value = s.status === '미확인' ? '검토중' : s.status;
    document.getElementById('feedbackModal').classList.remove('hidden');
  }

  function closeFeedbackModal() {
    document.getElementById('feedbackModal').classList.add('hidden');
    activeFeedbackId = null;
  }

  function saveFeedback() {
    const text = document.getElementById('fbText').value.trim();
    if (!text) { showHermesToast('피드백 내용을 입력해 주세요.', 'error'); return; }
    const result = document.getElementById('fbResult').value;
    const s = suggestData.find(s => s.id === activeFeedbackId);
    if (s) { s.status = result; s.feedback = text; }

    const unread = suggestData.filter(s => s.status === '미확인').length;
    const badge = document.getElementById('suggestBadge');
    if (badge) { badge.textContent = unread; badge.style.display = unread ? '' : 'none'; }

    renderSuggest(suggestData);
    closeFeedbackModal();
    showHermesToast('피드백이 전송되었습니다.', 'success');
  }

  /* ── 초기화 ── */
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('monitorDate').value = today;

  renderInstructorCards(0);
  renderJournal(journalData);
  renderWorklog();
  renderSuggest(suggestData);

  /* ── 탭 초기화 (렌더링 이후에 실행) ── */
  (function () {
    const firstBtn = document.querySelector('.tm-tab-btn[data-tab="tab-journal"]');
    if (firstBtn) switchTmTab('tab-journal', firstBtn);
  })();
</script>
