    { id: 5,  title: '강사 정태양 채용 최종 승인',             category: '인사', urgency: '일반', drafter: '박매니저', draftDate: '2026-05-19', processDate: null,       status: '대기', content: '과학 강사 정태양(경력 5년)의 6월 1일 정식 채용을 승인 요청드립니다. 면접 결과 및 이력서는 첨부 파일 확인 부탁드립니다.', principalComment: '' },
    { id: 6,  title: '4월 학원 운영 보고서 제출',              category: '학사', urgency: '일반', drafter: '이담임',  draftDate: '2026-05-10', processDate: '2026-05-12', status: '승인', content: '2026년 4월 학원 운영 현황 보고서를 제출합니다.', principalComment: '수고하셨습니다. 보고서 잘 확인했습니다. 5월에도 좋은 성과 부탁드립니다.' },

    { id: 8,  title: '주차장 확장 공사 예산 요청',             category: '시설', urgency: '일반', drafter: '박매니저', draftDate: '2026-05-05', processDate: '2026-05-07', status: '반려', content: '학원 주차 공간 부족 해결을 위해 옆 공터 임대 후 주차장 확장 공사를 요청드립니다. 총 예상 비용: 8,500,000원.', principalComment: '현재 예산 상황을 감안하여 반려합니다. 다음 분기에 재검토를 요청드립니다.' },

    { id: 10, title: '행정직원 최수진 직책 변경 요청',         category: '인사', urgency: '일반', drafter: '박매니저', draftDate: '2026-04-25', processDate: '2026-04-28', status: '반려', content: '행정직원 최수진을 팀장으로 승진 요청드립니다. 근무 기간 3년, 성과 우수.', principalComment: '조직 구조 전반 검토 후 결정하겠습니다. 우선 보류합니다.' },
  ];

  const tempDrafts = [
    { id: 101, title: '7월 여름방학 특강 강사비 품의 (작성 중)', category: '예산', savedAt: '2026-05-26 14:32', content: '여름방학 특강 강사 3명 인건비 총...' },
  ];

  /* ── 탭 전환 ── */
  function switchApTab(tabId, btn) {
    document.querySelectorAll('.ap-tab-panel').forEach(p => p.classList.add('hidden'));
    document.querySelectorAll('.ap-tab-btn').forEach(b => {
      b.classList.remove('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
      b.classList.add('text-slate-500', 'border-transparent');
    });
    document.getElementById(tabId).classList.remove('hidden');
    btn.classList.remove('text-slate-500', 'border-transparent');
    btn.classList.add('text-violet-600', 'border-violet-500', 'bg-violet-50/60');
  }

  /* ── 배지 ── */
  function statusBadge(status) {
    const map = {
      '대기': 'bg-amber-50 text-amber-600',
      '승인': 'bg-emerald-50 text-emerald-700',
      '반려': 'bg-red-50 text-red-600',
    };
    return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${map[status] || 'bg-slate-100 text-slate-500'}">${status}</span>`;
  }

  function urgencyBadge(urgency) {
    return urgency === '긴급'
      ? `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-red-50 text-red-600">긴급</span>`
      : '';
  }

  function categoryBadge(cat) {
    const map = { '인사': 'bg-violet-50 text-violet-700', '예산': 'bg-sky-50 text-sky-700', '학사': 'bg-emerald-50 text-emerald-700', '시설': 'bg-amber-50 text-amber-700', '기타': 'bg-slate-100 text-slate-500' };
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${map[cat] || 'bg-slate-100 text-slate-500'}">${cat}</span>`;
  }

  /* ── 결재 대기 목록 ── */

    const list = document.getElementById('pendingList');
    const data = approvalData.filter(a => a.status === '대기');

      list.innerHTML = `<div class="py-10 text-center text-slate-300 text-sm">결재 대기 중인 안건이 없습니다.</div>`;
      return;
    }
    list.innerHTML = data.map(a => `
      <div class="border-2 border-amber-200 bg-amber-50/20 rounded-2xl p-5">
        <div class="flex items-start justify-between gap-4 mb-3">
          <div>
            <div class="flex items-center gap-2 mb-1">
              ${urgencyBadge(a.urgency)} ${categoryBadge(a.category)}
              <span class="text-xs text-slate-400">No.${String(a.id).padStart(3, '0')}</span>
            </div>
            <h3 class="text-base font-bold text-slate-800">${a.title}</h3>
            <p class="text-xs text-slate-400 mt-0.5">기안: ${a.drafter} · ${a.draftDate}</p>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            ${statusBadge(a.status)}
            <button onclick="openDetailModal(${a.id})" class="hm-btn-primary text-xs py-1.5 px-3">
              <i class="fa-solid fa-eye"></i> 상세
            </button>
          </div>
        </div>

        <!-- 결재 진행 단계 표시 -->
        <div class="flex items-center gap-2 mt-3">
          <div class="flex items-center gap-1.5">
            <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs">
              <i class="fa-solid fa-check"></i>
            </div>
            <div class="text-xs">
              <p class="font-semibold text-slate-700">기안</p>
              <p class="text-slate-400">${a.drafter}</p>
            </div>
          </div>
          <div class="flex-1 h-px bg-slate-200 mx-1"></div>
          <div class="flex items-center gap-1.5">
            <div class="w-6 h-6 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center text-xs animate-pulse">
              <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <div class="text-xs">
              <p class="font-semibold text-slate-700">원장 결재</p>
              <p class="text-slate-400">대기 중</p>
            </div>
          </div>
          <div class="flex-1 h-px bg-slate-100 mx-1"></div>
          <div class="flex items-center gap-1.5">
            <div class="w-6 h-6 rounded-full bg-slate-100 text-slate-300 flex items-center justify-center text-xs">
              <i class="fa-solid fa-flag"></i>
            </div>
            <div class="text-xs">
              <p class="font-semibold text-slate-300">완료</p>
            </div>
          </div>
        </div>

        <p class="text-sm text-slate-600 mt-3 line-clamp-2">${a.content}</p>
      </div>
    `).join('');
  }

  /* ── 전체 목록 테이블 ── */
  function renderAllTable(data) {
    const tbody = document.getElementById('allTableBody');
    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="py-10 text-center text-slate-300 text-sm">해당하는 기안이 없습니다.</td></tr>`;
      return;
    }
    tbody.innerHTML = data.map(a => `
      <tr class="border-b border-slate-50 hover:bg-slate-50/50 transition-colors">
        <td class="py-3 px-3 text-xs text-slate-400 font-mono">No.${String(a.id).padStart(3,'0')}</td>
        <td class="py-3 px-3">
          <div class="flex items-center gap-2">
            ${a.urgency === '긴급' ? `<span class="w-1.5 h-1.5 rounded-full bg-red-500 shrink-0"></span>` : ''}
            <span class="font-medium text-slate-800">${a.title}</span>
          </div>
        </td>
        <td class="py-3 px-3">${categoryBadge(a.category)}</td>
        <td class="py-3 px-3 text-sm text-slate-500 whitespace-nowrap">${a.draftDate}</td>
        <td class="py-3 px-3 text-sm text-slate-600">${a.drafter}</td>
        <td class="py-3 px-3 text-sm text-slate-400 whitespace-nowrap">${a.processDate || '-'}</td>
        <td class="py-3 px-3">${statusBadge(a.status)}</td>
        <td class="py-3 px-3">
          <button onclick="openDetailModal(${a.id})" class="text-violet-500 hover:text-violet-700 text-xs font-semibold">
            <i class="fa-solid fa-eye"></i> 보기
          </button>
        </td>
      </tr>
    `).join('');
  }

  function filterAll(keyword) {
    const data = keyword ? approvalData.filter(a => a.title.includes(keyword)) : approvalData;
    renderAllTable(data);
  }

  function filterAllStatus(status) {
    const data = status ? approvalData.filter(a => a.status === status) : approvalData;
    renderAllTable(data);
  }

  function filterAllCategory(cat) {
    const data = cat ? approvalData.filter(a => a.category === cat) : approvalData;
    renderAllTable(data);
  }

  /* ── 임시 저장 목록 ── */
  function renderDraftList() {
    const list = document.getElementById('draftList');
    if (tempDrafts.length === 0) {
      list.innerHTML = `<div class="py-10 text-center text-slate-300 text-sm">임시 저장된 기안이 없습니다.</div>`;
      return;
    }
    list.innerHTML = tempDrafts.map(d => `
      <div class="border border-slate-200 border-dashed rounded-2xl p-4 flex items-center gap-4">
        <div class="w-10 h-10 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center text-lg shrink-0">
          <i class="fa-regular fa-file-lines"></i>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-medium text-slate-700 truncate">${d.title}</p>
          <div class="flex items-center gap-2 mt-0.5">
            ${categoryBadge(d.category)}
            <span class="text-xs text-slate-400">저장: ${d.savedAt}</span>
          </div>
        </div>
        <div class="flex gap-2 shrink-0">
          <button class="px-3 py-1.5 text-xs font-semibold text-violet-600 bg-violet-50 hover:bg-violet-100 rounded-lg transition-colors"
            onclick="openDraftModal()">
            <i class="fa-solid fa-pen mr-1"></i>이어 작성
          </button>
          <button class="px-3 py-1.5 text-xs font-semibold text-slate-400 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors"
            onclick="showHermesToast('임시 저장이 삭제되었습니다.', 'info')">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </div>
    `).join('');
  }

  /* ── 결재 상세 모달 ── */
  function openDetailModal(id) {
    const a = approvalData.find(a => a.id === id);
    if (!a) return;
    document.getElementById('detailTitle').textContent = a.title;

    const statusStep = a.status === '승인'
      ? `<div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs"><i class="fa-solid fa-check"></i></div>`
      : a.status === '반려'
      ? `<div class="w-6 h-6 rounded-full bg-red-100 text-red-500 flex items-center justify-center text-xs"><i class="fa-solid fa-xmark"></i></div>`
      : `<div class="w-6 h-6 rounded-full bg-amber-100 text-amber-500 flex items-center justify-center text-xs"><i class="fa-solid fa-hourglass-half"></i></div>`;

    document.getElementById('detailBody').innerHTML = `
      <div class="grid grid-cols-2 gap-3 bg-slate-50 rounded-xl p-4">
        <div><p class="text-xs text-slate-400 mb-0.5">분류</p>${categoryBadge(a.category)}</div>
        <div><p class="text-xs text-slate-400 mb-0.5">긴급도</p><p class="font-medium text-slate-800">${a.urgency}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">기안자</p><p class="font-medium text-slate-800">${a.drafter}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">기안일</p><p class="font-medium text-slate-800">${a.draftDate}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">처리일</p><p class="font-medium text-slate-800">${a.processDate || '처리 전'}</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">결재 상태</p>${statusBadge(a.status)}</div>
      </div>

      <!-- 결재 흐름 -->
      <div class="flex items-center gap-2 bg-white border border-slate-100 rounded-xl p-4">
        <div class="flex items-center gap-1.5">
          <div class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center text-xs"><i class="fa-solid fa-check"></i></div>
          <div class="text-xs"><p class="font-semibold text-slate-700">기안</p><p class="text-slate-400">${a.drafter}</p></div>
        </div>
        <div class="flex-1 h-px bg-slate-200 mx-1"></div>
        <div class="flex items-center gap-1.5">
          ${statusStep}
          <div class="text-xs"><p class="font-semibold text-slate-700">원장 결재</p><p class="text-slate-400">${a.status === '대기' ? '대기 중' : a.processDate}</p></div>
        </div>
        <div class="flex-1 h-px bg-slate-200 mx-1"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-6 h-6 rounded-full ${a.status !== '대기' ? 'bg-emerald-100 text-emerald-600' : 'bg-slate-100 text-slate-300'} flex items-center justify-center text-xs">
            <i class="fa-solid fa-flag"></i>
          </div>
          <div class="text-xs"><p class="font-semibold ${a.status !== '대기' ? 'text-slate-700' : 'text-slate-300'}">완료</p></div>
        </div>
      </div>

      <div>
        <p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">기안 내용</p>
        <p class="text-sm leading-relaxed bg-white border border-slate-100 rounded-xl p-4 text-slate-700">${a.content}</p>
      </div>

      ${a.principalComment ? `
      <div>
        <p class="text-xs text-slate-400 mb-1 font-semibold uppercase tracking-wider">원장 코멘트</p>
        <p class="text-sm leading-relaxed ${a.status === '반려' ? 'bg-red-50 border border-red-100 text-red-700' : 'bg-emerald-50 border border-emerald-100 text-emerald-800'} rounded-xl p-4">${a.principalComment}</p>
      </div>` : ''}
    `;
    document.getElementById('detailModal').classList.remove('hidden');
  }

  function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
  }

  /* ── 기안 작성 모달 ── */
  function openDraftModal() {
    document.getElementById('draftModal').classList.remove('hidden');
  }

  function closeDraftModal() {
    document.getElementById('draftModal').classList.add('hidden');
  }

  function saveDraftTemp() {
    const title = document.getElementById('draftTitle').value.trim();
    if (!title) { showHermesToast('제목을 입력해 주세요.', 'error'); return; }
    closeDraftModal();
    showHermesToast('임시 저장되었습니다.', 'success');
  }

  function submitDraft() {
    const category = document.getElementById('draftCategory').value;
    const title    = document.getElementById('draftTitle').value.trim();
    const content  = document.getElementById('draftContent').value.trim();
    if (!category) { showHermesToast('분류를 선택해 주세요.', 'error'); return; }
    if (!title)    { showHermesToast('제목을 입력해 주세요.', 'error'); return; }
    if (!content)  { showHermesToast('기안 내용을 입력해 주세요.', 'error'); return; }
    closeDraftModal();
    showHermesToast('결재가 원장에게 상신되었습니다.', 'success');
  }

  /* ── 초기 렌더링 ── */
  renderPending();
  renderAllTable(approvalData);
  renderDraftList();

  /* ── 탭 초기화 (렌더링 이후에 실행) ── */
  (function () {
    const firstBtn = document.querySelector('.ap-tab-btn[data-tab="tab-pending"]');
    if (firstBtn) switchApTab('tab-pending', firstBtn);
  })();
</script>
