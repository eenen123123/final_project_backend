<title th:fragment="pageTitle">추천 항목 등록 | HERMES</title>

<div class="space-y-6 max-w-2xl mx-auto">

  <!-- 헤더 -->
  <div class="flex items-center gap-3">
    <a href="/admin/featured"
      class="w-8 h-8 flex items-center justify-center rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50 transition-colors mr-3">
      <i class="fa-solid fa-arrow-left text-sm"></i>
    </a>
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">추천 항목 등록</h1>
      <p class="text-sm text-slate-500 mt-0.5">마이페이지에 표시할 강좌 또는 교재를 추천 목록에 추가합니다.</p>
    </div>
  </div>

  <!-- 등록 폼 카드 -->
  <div class="bg-white rounded-2xl border border-slate-100 shadow-sm divide-y divide-slate-100">

    <!-- 1. 상품 선택 -->
    <div class="px-6 py-5">
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        상품 선택 <span class="text-rose-400">*</span>
      </label>

      <!-- 선택 전 -->
      <div id="productEmpty">
        <button type="button" onclick="openProductPopup()"
          class="flex items-center gap-3 w-full px-4 py-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 hover:border-blue-300 hover:text-blue-500 hover:bg-blue-50/40 transition-colors cursor-pointer">
          <i class="fa-solid fa-plus-circle text-xl"></i>
          <span class="text-sm font-medium">강좌 또는 교재를 선택하세요</span>
        </button>
      </div>

      <!-- 선택 후 프리뷰 -->
      <div id="productPreview" class="hidden">
        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-200">
          <div class="flex items-center gap-3 min-w-0">
            <span id="prodTypeBadge"
              class="text-xs font-bold px-2.5 py-1 rounded-lg bg-indigo-50 text-indigo-600 shrink-0">강좌</span>
            <p id="prodNmText" class="font-semibold text-slate-800 truncate">-</p>
          </div>
          <button type="button" onclick="openProductPopup()"
            class="text-xs px-3 py-1.5 rounded-xl font-medium shrink-0 ml-3 whitespace-nowrap bg-slate-100 text-slate-500 border border-slate-200 hover:bg-slate-200 transition-colors">변경</button>
        </div>
        <input type="hidden" id="prodType" />
        <input type="hidden" id="prodSn" />
      </div>
    </div>

    <!-- 2. 커스텀 이미지 -->
    <div class="px-6 py-5">
      <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        커스텀 이미지 <span class="text-slate-300 font-normal normal-case ml-1">선택</span>
      </label>

      <div id="imgPreviewWrap" class="hidden mb-3 relative w-fit">
        <img id="imgPreview" src="" alt="미리보기"
          class="w-28 h-32 object-contain rounded-xl border border-slate-200 bg-slate-50" />
        <button type="button" onclick="clearImage()"
          class="absolute -top-2 -right-2 w-5 h-5 rounded-full bg-rose-500 text-white flex items-center justify-center text-xs hover:bg-rose-600 transition-colors">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <label id="imgDropZone" for="customImgFile"
        class="flex flex-col items-center justify-center gap-1.5 w-full h-24 border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:border-blue-300 hover:bg-blue-50/40 transition-colors">
        <i class="fa-solid fa-cloud-arrow-up text-slate-300 text-2xl"></i>
        <span class="text-xs text-slate-400">클릭하여 이미지 선택</span>
        <span id="imgUploadStatus" class="text-xs text-blue-500 hidden">업로드 중...</span>
      </label>
      <input type="file" id="customImgFile" accept="image/*" class="hidden" onchange="handleImageUpload(this)" />
      <input type="hidden" id="customImg" />
    </div>

    <!-- 3. 노출 설명 -->
    <div class="px-6 py-5">
      <label for="customDesc" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        노출 설명 <span class="text-slate-300 font-normal normal-case ml-1">선택</span>
      </label>
      <textarea id="customDesc" rows="3"
        class="hm-input hm-input-blue w-full resize-none"
        placeholder="마이페이지 카드에 표시할 설명을 입력하세요."></textarea>
    </div>

    <!-- 4. 정렬 순서 -->
    <div class="px-6 py-5">
      <label for="sortOrd" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">
        정렬 순서 <span class="text-slate-300 font-normal normal-case ml-1">낮을수록 앞에 표시</span>
      </label>
      <input type="number" id="sortOrd" class="hm-input hm-input-blue" value="0" min="0" style="width: 8rem;" />
    </div>

    <!-- 푸터 버튼 -->
    <div class="px-6 py-4 bg-slate-50/60 flex items-center justify-end gap-3 rounded-b-2xl">
      <a href="/admin/featured" class="hm-btn-ghost">취소</a>
      <button type="button" onclick="submitInsert()" class="hm-btn-primary hm-btn-blue">등록</button>
    </div>

  </div>
</div>

<script th:inline="javascript">
  function openProductPopup() {
    window.open('/admin/featured/popup/products', 'productSelect',
      'width=700,height=580,resizable=yes,scrollbars=yes');
  }

  function onProductSelected(type, sn, nm) {
    document.getElementById('prodType').value = type;
    document.getElementById('prodSn').value = sn;
    document.getElementById('prodNmText').textContent = nm;
    const badge = document.getElementById('prodTypeBadge');
    if (type === 'COURSE') {
      badge.textContent = '강좌';
      badge.className = 'text-xs font-bold px-2.5 py-1 rounded-lg bg-indigo-50 text-indigo-600 shrink-0';
    } else {
      badge.textContent = '교재';
      badge.className = 'text-xs font-bold px-2.5 py-1 rounded-lg bg-emerald-50 text-emerald-600 shrink-0';
    }
    document.getElementById('productEmpty').classList.add('hidden');
    document.getElementById('productPreview').classList.remove('hidden');
  }

  function clearImage() {
    document.getElementById('customImg').value = '';
    document.getElementById('customImgFile').value = '';
    document.getElementById('imgPreview').src = '';
    document.getElementById('imgPreviewWrap').classList.add('hidden');
    const dz = document.getElementById('imgDropZone');
    dz.classList.remove('hidden');
    dz.querySelector('i').classList.remove('hidden');
    dz.querySelector('span').classList.remove('hidden');
    document.getElementById('imgUploadStatus').classList.add('hidden');
  }

  async function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('imgUploadStatus');
    const dz = document.getElementById('imgDropZone');
    statusEl.classList.remove('hidden');
    dz.querySelector('i').classList.add('hidden');
    dz.querySelector('span').classList.add('hidden');
    const formData = new FormData();
    formData.append('image', file);
    try {
      const res = await fetch('/admin/featured/api/upload-image', { method: 'POST', body: formData });
      if (!res.ok) throw new Error();
      const { url } = await res.json();
      document.getElementById('customImg').value = url;
      document.getElementById('imgPreview').src = url;
      document.getElementById('imgPreviewWrap').classList.remove('hidden');
      document.getElementById('imgDropZone').classList.add('hidden');
    } catch {
      alert('이미지 업로드에 실패했습니다.');
      clearImage();
    }
  }

  async function submitInsert() {
    const prodType = document.getElementById('prodType').value;
    const prodSn   = document.getElementById('prodSn').value;
    if (!prodType || !prodSn) { alert('상품을 선택하세요.'); return; }

    const customImg  = document.getElementById('customImg').value.trim()  || null;
    const customDesc = document.getElementById('customDesc').value.trim() || null;
    const sortOrd    = parseInt(document.getElementById('sortOrd').value)  || 0;

    const res = await fetch('/admin/featured/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prodType, prodSn: parseInt(prodSn), customImg, customDesc, sortOrd })
    });
    if (res.ok) {
      location.href = '/admin/featured';
    } else {
      alert('등록 중 오류가 발생했습니다.');
    }
  }
</script>
